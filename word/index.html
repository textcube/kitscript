<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternal Invasion: Sheriff of Word City</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #020408;
            --panel-bg: rgba(10, 15, 28, 0.95);
            --accent: #00f2ff;
            --spy: #39ff14;
            --civilian: #ff003c;
            --mana: #bc13fe;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #viewport { 
            position: relative; 
            flex-grow: 1; 
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #020408 100%);
            overflow: hidden; 
        }

        #viewport::after {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.5) 100%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* --- Header UI --- */
        #game-header {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            align-items: center;
            padding: 8px 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0, 242, 255, 0.15);
            z-index: 100;
        }

        @media (max-width: 768px) {
            #game-header {
                grid-template-columns: 1fr auto;
                padding: 5px 10px;
            }
            .brand-section { display: none; }
            #word-terminal { grid-column: 1; }
            .control-section { grid-column: 2; align-items: flex-end; }
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
        }
        .brand-name { 
            font-size: 0.75rem; 
            font-weight: 700;
            color: var(--accent); 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin-bottom: 2px;
            line-height: 1;
        }
        .game-title-main {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 700;
            line-height: 1.1;
            white-space: nowrap;
        }
        .game-title-sub { 
            font-size: 0.6rem; 
            color: var(--accent); 
            opacity: 0.7;
            font-weight: 400; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #word-terminal { display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #hint-box { font-size: 0.65rem; color: var(--accent); margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; text-align: center; }
        #word-slots { display: flex; justify-content: center; gap: 4px; max-width: 100%; flex-wrap: wrap; }
        
        .slot {
            width: 28px; height: 34px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: bold; color: rgba(255,255,255,0.1); transition: all 0.3s;
        }
        @media (max-width: 480px) {
            .slot { width: 22px; height: 30px; font-size: 0.9rem; }
        }
        .slot.filled { color: var(--spy); border-color: var(--spy); text-shadow: 0 0 10px var(--spy); background: rgba(57, 255, 20, 0.05); }
        .slot.celebrate { animation: slot-pulse 0.5s infinite alternate; border-color: #fff; color: #fff; background: var(--spy); }

        @keyframes slot-pulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.5); }
        }

        .control-section { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .stats-row { display: flex; align-items: center; gap: 10px; }
        .btns-row { display: flex; align-items: center; gap: 6px; }
        .stat-container { text-align: right; }
        .stat-label { font-size: 0.45rem; color: var(--accent); letter-spacing: 1px; margin-bottom: 1px; }
        .hearts-row { font-size: 0.9rem; color: var(--civilian); text-shadow: 0 0 10px var(--civilian); }
        .bar-outer { width: 60px; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        #mana-fill { width: 0%; height: 100%; background: var(--mana); box-shadow: 0 0 10px var(--mana); transition: width 0.3s; }

        .icon-btn {
            width: 32px; height: 32px; 
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        @media (max-width: 480px) {
            .icon-btn { width: 30px; height: 30px; }
        }
        .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .icon-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0, 242, 255, 0.15); }

        canvas { display: block; width: 100%; height: 100%; }

        #ai-badge {
            position: absolute; top: 10px; left: 10px;
            padding: 4px 10px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--accent); border-radius: 4px;
            font-size: 0.55rem; color: var(--accent); pointer-events: none; z-index: 20;
        }

        #skill-button {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            padding: 14px 45px; background: rgba(20, 20, 30, 0.8); border: 2px solid #334155;
            color: #64748b; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1rem;
            letter-spacing: 4px; text-transform: uppercase; border-radius: 50px; cursor: pointer;
            z-index: 150; opacity: 0.5; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        #skill-button.ready { 
            opacity: 1; border-color: var(--mana); color: var(--mana); 
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); 
            background: rgba(188, 19, 254, 0.1);
        }
        #skill-button.ready:active { transform: translateX(-50%) scale(0.95); }
        #skill-button.active { 
            background: var(--mana); color: #fff; border-color: #fff; 
            opacity: 1; box-shadow: 0 0 40px var(--mana);
        }
        
        @keyframes btn-shake {
            0%, 100% { transform: translateX(-50%); }
            25% { transform: translateX(-52%); }
            75% { transform: translateX(-48%); }
        }
        .btn-locked-shake { animation: btn-shake 0.2s ease-in-out 2; border-color: var(--civilian) !important; color: var(--civilian) !important; }

        .overlay {
            position: absolute; inset: 0; background: rgba(2, 4, 8, 0.85);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; backdrop-filter: blur(10px);
        }
        .modal {
            background: rgba(15, 23, 42, 0.9); padding: 30px; border-radius: 15px;
            border: 2px solid var(--accent); text-align: center; max-width: 400px; width: 85%;
        }
        .modal h2 { font-size: 1.8rem; margin-bottom: 10px; color: var(--civilian); }
        #countdown { font-size: 3rem; color: var(--accent); margin: 10px 0; font-family: 'JetBrains Mono', monospace; }
        
        textarea {
            width: 100%; height: 120px; background: #020617; color: var(--spy);
            border: 1px solid #334155; border-radius: 8px; padding: 12px;
            font-family: 'JetBrains Mono', monospace; margin-bottom: 15px; resize: none; font-size: 0.8rem;
        }

        .btn-primary {
            background: var(--accent); color: #000; border: none; padding: 12px 25px;
            font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 6px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header id="game-header">
        <div class="brand-section">
            <span class="brand-name">BUNTGAMES</span>
            <span class="game-title-main">Sheriff of Word City</span>
            <span class="game-title-sub">ETERNAL INVASION</span>
        </div>

        <div id="word-terminal">
            <div id="hint-box">INITIALIZING...</div>
            <div id="word-slots"></div>
        </div>

        <div class="control-section">
            <div class="stats-row">
                <div class="stat-container">
                    <div class="hearts-row" id="hearts-display">❤️❤️❤️❤️❤️</div>
                </div>
                <div class="stat-container">
                    <div class="bar-outer"><div id="mana-fill"></div></div>
                </div>
            </div>
            <div class="btns-row">
                <button id="sound-toggle" class="icon-btn" title="Sound">
                    <svg id="icon-audio" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/></svg>
                </button>
                <a href="https://kitscript.com/pickme/" target="_blank" class="icon-btn" title="Home">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </a>
                <a href="https://youtube.com/@textcube" target="_blank" class="icon-btn" title="YouTube">
                    <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.42 5.58a2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.42-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>
                </a>
                <button id="settings-btn" class="icon-btn" title="Settings">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main id="viewport">
        <canvas id="gameCanvas"></canvas>
        <div id="ai-badge">
            <span id="ctrl-mode">AUTO</span>
            <span id="ctrl-timer"></span>
        </div>
        
        <button id="skill-button">Overload</button>

        <div id="restart-overlay" class="overlay">
            <div class="modal">
                <h2>DEFEATED</h2>
                <div id="death-reason-box">REASON: UNKNOWN ERROR</div>
                <div id="countdown">7</div>
                <button class="btn-primary" onclick="startGame()">FORCE REBOOT</button>
            </div>
        </div>

        <div id="settings-modal" class="overlay">
            <div class="modal">
                <h3 style="color:var(--accent); margin-bottom: 10px;">MISSION DATABASE</h3>
                <textarea id="word-input">CYBERPUNK - NEON FUTURE
ALGORITHM - LOGICAL STEP
DATABASE - DATA STORAGE
FIREWALL - SYSTEM DEFENSE
MAINFRAME - CENTRAL HUB
QUANTUM - NEXT GEN TECH</textarea>
                <div style="display:flex; gap: 10px; justify-content: center;">
                    <button class="btn-primary" style="background:transparent; color:white; border:1px solid #555" onclick="hideSettings()">CANCEL</button>
                    <button class="btn-primary" onclick="saveSettings()">SAVE & SYNC</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const manaFill = document.getElementById('mana-fill');
        const heartsDisplay = document.getElementById('hearts-display');
        const wordSlots = document.getElementById('word-slots');
        const hintBox = document.getElementById('hint-box');
        const skillBtn = document.getElementById('skill-button');
        const restartOverlay = document.getElementById('restart-overlay');
        const deathReasonDisplay = document.getElementById('death-reason-box');
        const settingsModal = document.getElementById('settings-modal');
        const countdownEl = document.getElementById('countdown');
        const soundToggle = document.getElementById('sound-toggle');
        const wordInput = document.getElementById('word-input');
        const ctrlModeText = document.getElementById('ctrl-mode');
        const ctrlTimerText = document.getElementById('ctrl-timer');
        const iconAudio = document.getElementById('icon-audio');

        const CONFIG = {
            SPAWN_RATE: 1500,
            SHOT_INTERVAL: 320, 
            BULLET_SPEED: 8,
            ATTACK_RANGE: 120, 
            SKILL_COST: 100, 
            SKILL_DURATION: 5000, 
            RESTART_TIME: 7,
            AUTO_RETURN_DELAY: 10000,
            AI_DETECTION_RANGE: 320 // 탐색 범위를 화면 절반 미만으로 최적화
        };

        const COLORS = { accent: '#00f2ff', spy: '#39ff14', civilian: '#ff003c', mana: '#bc13fe' };

        let state = {
            active: false,
            isPaused: false,
            isManual: false,
            isDragging: false,
            lastMouseX: 0,
            lastMouseY: 0,
            lastInputTime: 0,
            hearts: 5,
            mana: 0,
            skillActiveUntil: 0, 
            startTime: 0,
            lastSpawn: 0,
            lastShot: 0,
            shake: 0,
            audio: false,
            audioCtx: null,
            difficulty: 1,
            wordList: [],
            word: null,
            found: [], 
            isWordTransitioning: false, 
            player: { x: 80, y: 0, r: 18, speed: 7 },
            entities: { bullets: [], letters: [], fx: [], parts: [] },
            background: { stars: [], gridOffset: 0 },
            restartTimer: null,
            deathReason: "UNKNOWN",
            lastFrameTime: 0,
            keys: {}
        };

        function getCol(n) { return COLORS[n] || '#ffffff'; }

        function initBackground() {
            state.background.stars = [];
            for (let i = 0; i < 60; i++) {
                state.background.stars.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    size: Math.random() * 1.5, speed: 0.5 + Math.random() * 1.5, opacity: 0.1 + Math.random() * 0.4
                });
            }
        }

        function drawBackground(dt) {
            const bg = state.background;
            bg.stars.forEach(star => {
                star.x -= star.speed * (state.active && !state.isPaused ? state.difficulty : 0.5) * (dt / 16.6);
                if (star.x < 0) star.x = canvas.width;
                ctx.fillStyle = `rgba(0, 242, 255, ${star.opacity})`;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
            });
            const gridH = canvas.height * 0.4, startY = canvas.height - gridH;
            bg.gridOffset = (bg.gridOffset + 1.5 * (state.active && !state.isPaused ? state.difficulty : 0.5)) % 50;
            for (let i = 0; i <= gridH; i += 40) {
                const y = startY + i, alpha = (i / gridH) * 0.15;
                ctx.strokeStyle = `rgba(0, 242, 255, ${alpha})`;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        function initAudio() { if(!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSfx(f, t, d, v=0.03) {
            if(!state.audio || !state.audioCtx) return;
            try {
                const o = state.audioCtx.createOscillator(); const g = state.audioCtx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, state.audioCtx.currentTime);
                g.gain.setValueAtTime(v, state.audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + d);
                o.connect(g); g.connect(state.audioCtx.destination);
                o.start(); o.stop(state.audioCtx.currentTime + d);
            } catch(e) {}
        }

        soundToggle.onclick = (e) => {
            e.stopPropagation();
            initAudio(); state.audio = !state.audio;
            soundToggle.classList.toggle('active', state.audio);
            iconAudio.innerHTML = state.audio 
                ? '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>'
                : '<path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
        };

        skillBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            if(!state.active || state.isPaused) return;
            const now = Date.now();
            if(state.mana >= CONFIG.SKILL_COST && now > state.skillActiveUntil) {
                triggerSkill();
            } else if (now > state.skillActiveUntil) {
                skillBtn.classList.add('btn-locked-shake');
                playSfx(50, 'sawtooth', 0.2, 0.05);
                setTimeout(() => skillBtn.classList.remove('btn-locked-shake'), 400);
            }
        });

        window.addEventListener('keydown', (e) => {
            state.keys[e.code] = true;
            if(['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) setManualMode();
            if(e.code === 'Space') triggerSkill();
        });
        window.addEventListener('keyup', (e) => state.keys[e.code] = false);

        function setManualMode() { state.isManual = true; state.lastInputTime = Date.now(); }

        const onDown = (e) => {
            if (!state.active) return;
            const pos = e.touches ? e.touches[0] : e;
            state.lastMouseX = pos.clientX; state.lastMouseY = pos.clientY;
            state.isDragging = true; setManualMode();
        };

        const onMove = (e) => {
            if (!state.active || !state.isDragging) return;
            const pos = e.touches ? e.touches[0] : e;
            const dx = pos.clientX - state.lastMouseX;
            const dy = pos.clientY - state.lastMouseY;
            state.player.x += dx; state.player.y += dy;
            state.player.x = Math.max(state.player.r, Math.min(canvas.width - state.player.r, state.player.x));
            state.player.y = Math.max(state.player.r, Math.min(canvas.height - state.player.r, state.player.y));
            state.lastMouseX = pos.clientX; state.lastMouseY = pos.clientY;
            state.lastInputTime = Date.now();
        };

        const onUp = () => { state.isDragging = false; };

        canvas.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(e); }, { passive: false });
        window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, { passive: false });
        window.addEventListener('touchend', onUp);

        function resize() {
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.height;
            if(!state.active) state.player.y = canvas.height / 2;
            initBackground();
        }
        window.addEventListener('resize', resize);

        document.getElementById('settings-btn').onclick = (e) => { 
            e.stopPropagation(); state.isPaused = true; settingsModal.style.display = 'flex'; 
        };
        function hideSettings() { state.isPaused = false; settingsModal.style.display = 'none'; }
        
        function saveSettings() {
            const input = wordInput.value.trim();
            if(!input) return;
            state.wordList = input.split('\n').map(l => {
                const p = l.split('-').map(s => s.trim());
                return p.length >= 2 ? { w: p[0].toUpperCase(), h: p[1] } : null;
            }).filter(x => x);
            hideSettings(); startGame(); 
        }

        function nextWord() {
            if(!state.wordList.length) saveSettings();
            state.word = state.wordList[Math.floor(Math.random() * state.wordList.length)];
            state.found = []; state.isWordTransitioning = false;
            hintBox.textContent = `${state.word.h}`; renderSlots();
        }

        function renderSlots() {
            wordSlots.innerHTML = '';
            const targetLength = state.word.w.length;
            [...state.word.w].forEach((char, i) => {
                const div = document.createElement('div');
                div.className = 'slot' + (state.found.includes(i) ? ' filled' : '');
                if (state.found.length === targetLength) div.classList.add('celebrate');
                div.textContent = state.found.includes(i) ? char : '';
                wordSlots.appendChild(div);
            });
            if(state.found.length === targetLength && !state.isWordTransitioning) {
                state.isWordTransitioning = true;
                triggerCompleteEffect();
                setTimeout(() => { if(state.active) nextWord(); }, 2000);
            }
        }

        function triggerCompleteEffect() {
            state.shake = 20; 
            state.mana = Math.min(100, state.mana + 30);
            state.hearts = Math.min(5, state.hearts + 1);
            playSfx(440, 'sine', 0.2);
            state.entities.fx.push({ type: 'mission_clear', life: 1.5, maxLife: 1.5 });
        }

        function spawn() {
            if (state.isPaused || !state.word) return;
            const char = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
            const isCharInTargetWord = [...state.word.w].includes(char);
            let hp = 1; if(Math.random() * state.difficulty > 2) hp = 2;
            state.entities.letters.push({
                char, type: isCharInTargetWord ? 'active' : 'civilian',
                x: canvas.width + 40, y: 50 + Math.random() * (canvas.height - 100),
                vx: (0.7 + state.difficulty * 0.3) * (0.8 + Math.random() * 0.4), r: 18, hp, maxHp: hp, hitFlash: 0 
            });
        }

        function triggerSkill() {
            if(!state.active || state.mana < CONFIG.SKILL_COST || state.isPaused) return;
            state.mana -= CONFIG.SKILL_COST; state.shake = 10; state.skillActiveUntil = Date.now() + CONFIG.SKILL_DURATION;
            playSfx(400, 'square', 0.5);
            state.entities.fx.push({ type: 'scan_wave', life: 1, maxLife: 1 });
        }

        function damage(amt, reason) {
            if(!state.active || state.isPaused) return;
            state.hearts -= amt; state.shake = 15; playSfx(80, 'sawtooth', 0.2);
            if(state.hearts <= 0) { state.deathReason = reason || "CORE FAILURE"; endGame(); }
        }

        function handleLetterDeath(l, reason = "INTERFERENCE") {
            if (l.isDead) return; l.isDead = true; l.hp = -999; 
            if(l.type === 'active') { 
                const wordArr = [...state.word.w];
                const charIndices = wordArr.map((c, i) => c === l.char ? i : -1).filter(i => i !== -1);
                const firstEmptySlot = charIndices.find(idx => !state.found.includes(idx));
                
                state.shake = 10;
                playSfx(660, 'sine', 0.1);
                
                if (firstEmptySlot !== undefined) {
                    state.found.push(firstEmptySlot); state.mana = Math.min(100, state.mana + 15); renderSlots(); 
                } else { 
                    state.mana = Math.min(100, state.mana + 5); 
                    state.entities.fx.push({ type: 'bonus_hit', x: l.x, y: l.y, life: 1.0 });
                }
            } else { 
                damage(1, reason); 
            }
            createParticles(l.x, l.y, l.type === 'active' ? getCol('spy') : getCol('civilian')); 
        }

        function createParticles(x, y, color) {
            for(let i=0; i<8; i++) state.entities.parts.push({ x, y, c: color, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, size: 2 + Math.random()*2 });
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function getNeededCharWeight(char) {
            if (!state.word) return 1;
            const wordArr = [...state.word.w];
            const remaining = wordArr.filter((c, idx) => c === char && !state.found.includes(idx)).length;
            if (remaining >= 2) return 1.45;
            if (remaining === 1) return 1.2;
            return 0.85;
        }

        function distanceToSegment(px, py, ax, ay, bx, by) {
            const abx = bx - ax;
            const aby = by - ay;
            const abLenSq = abx * abx + aby * aby;
            if (!abLenSq) return Math.hypot(px - ax, py - ay);
            const t = clamp(((px - ax) * abx + (py - ay) * aby) / abLenSq, 0, 1);
            const cx = ax + abx * t;
            const cy = ay + aby * t;
            return Math.hypot(px - cx, py - cy);
        }

        function getCivilianPathRisk(fromX, fromY, toX, toY) {
            const avoidRadius = 90;
            const civilians = state.entities.letters.filter(l => l.type === 'civilian' && l.hp > 0);
            return civilians.reduce((risk, c) => {
                const projectedX = c.x - c.vx * 18;
                const dist = distanceToSegment(projectedX, c.y, fromX, fromY, toX, toY);
                if (dist >= avoidRadius) return risk;
                const closeness = 1 - dist / avoidRadius;
                const aheadBias = projectedX > fromX - 20 ? 1 : 0.4;
                return risk + closeness * aheadBias;
            }, 0);
        }

        function getLaneRiskForSpy(spy, laneY) {
            const laneClearance = 32;
            const civilians = state.entities.letters.filter(l => l.type === 'civilian' && l.hp > 0);
            return civilians.reduce((risk, c) => {
                if (c.x <= state.player.x || c.x >= spy.x) return risk;
                const verticalGap = Math.abs(c.y - laneY);
                if (verticalGap >= laneClearance + c.r) return risk;
                const xWeight = 1 - (c.x - state.player.x) / Math.max(1, spy.x - state.player.x);
                const yWeight = 1 - verticalGap / (laneClearance + c.r);
                return risk + xWeight * yWeight * 1.3;
            }, 0);
        }

        function getShotLineRisk(playerX, playerY, targetX, lineY) {
            const shotStartX = playerX + 15;
            const shotEndX = Math.min(shotStartX + CONFIG.ATTACK_RANGE, targetX + 6);
            if (shotEndX <= shotStartX) return Infinity;
            const civilians = state.entities.letters.filter(l => l.type === 'civilian' && l.hp > 0);
            return civilians.reduce((risk, c) => {
                if (c.x + c.r < shotStartX || c.x - c.r > shotEndX) return risk;
                const projectedX = c.x - c.vx * 10;
                const dist = distanceToSegment(projectedX, c.y, shotStartX, lineY, shotEndX, lineY);
                const safeRadius = c.r + 7;
                if (dist >= safeRadius) return risk;
                const closeness = 1 - dist / safeRadius;
                const overlapBias = projectedX < targetX ? 1.35 : 0.8;
                return risk + closeness * overlapBias;
            }, 0);
        }

        function getBestShotWindow(player, spy) {
            const candidateCenters = [spy.y - 6, spy.y, spy.y + 6];
            let bestWindow = null;

            candidateCenters.forEach(centerY => {
                const upperLineY = centerY - 6;
                const lowerLineY = centerY + 6;
                const shotRisk = getShotLineRisk(player.x, centerY, spy.x, upperLineY) +
                    getShotLineRisk(player.x, centerY, spy.x, lowerLineY);
                const hitUpper = Math.abs(spy.y - upperLineY) <= spy.r + 5;
                const hitLower = Math.abs(spy.y - lowerLineY) <= spy.r + 5;
                const hitScore = (hitUpper ? 1 : 0) + (hitLower ? 1 : 0);
                if (!hitScore) return;
                const window = { centerY, shotRisk, hitScore };
                if (!bestWindow || shotRisk < bestWindow.shotRisk || (shotRisk === bestWindow.shotRisk && hitScore > bestWindow.hitScore)) {
                    bestWindow = window;
                }
            });

            return bestWindow;
        }

        function chooseAutoTarget(player) {
            const detectionRange = CONFIG.AI_DETECTION_RANGE;
            const maxX = 220;
            const standoffDistance = 110;
            const collideDistance = 48;
            const collideRiskLimit = 0.85;
            const spies = state.entities.letters.filter(l =>
                l.type === 'active' &&
                l.hp > 0 &&
                l.x > player.x - 20 &&
                l.x < player.x + detectionRange
            );

            if (!spies.length) return null;

            let bestPlan = null;

            spies.forEach(spy => {
                const urgency = clamp((canvas.width * 0.55 - spy.x) / (canvas.width * 0.55), 0, 1.4);
                const charWeight = getNeededCharWeight(spy.char);
                const shotWindow = getBestShotWindow(player, spy);
                const shotCenterY = shotWindow ? shotWindow.centerY : spy.y;
                const laneRisk = shotWindow ? shotWindow.shotRisk : (getLaneRiskForSpy(spy, spy.y) + 2.5);
                const canShootFromHere = !!shotWindow && Math.abs(player.y - shotCenterY) < 16 && laneRisk < 0.45;
                const standoffX = clamp(
                    spy.x - standoffDistance,
                    player.r + 8,
                    Math.min(maxX, spy.x - 28)
                );
                const interceptX = clamp(
                    spy.x - collideDistance,
                    player.r + 8,
                    Math.min(maxX, spy.x - 10)
                );
                const standoffRisk = getCivilianPathRisk(player.x, player.y, standoffX, shotCenterY) + laneRisk * 1.1;
                const collideRisk = getCivilianPathRisk(player.x, player.y, interceptX, spy.y);
                const hitWindow = spy.x - player.x;
                const shouldCollide = (
                    !shotWindow ||
                    hitWindow < CONFIG.ATTACK_RANGE * 0.55 ||
                    (laneRisk > 1.15 && collideRisk < collideRiskLimit)
                ) && collideRisk < collideRiskLimit;
                const mode = shouldCollide ? 'collide' : (canShootFromHere ? 'hold' : 'shoot');
                const targetX = mode === 'collide' ? interceptX : standoffX;
                const targetY = mode === 'collide' ? spy.y : shotCenterY;
                const pathRisk = mode === 'collide' ? collideRisk : standoffRisk;
                const distancePenalty = Math.hypot(targetX - player.x, targetY - player.y) / 220;
                const modeBonus = mode === 'collide' ? 0.2 : (canShootFromHere ? 0.85 : 0.35);
                const hitBonus = shotWindow ? shotWindow.hitScore * 0.35 : -0.4;
                const score = urgency * 2.8 + charWeight * 1.9 + modeBonus + hitBonus - pathRisk * 1.8 - distancePenalty;

                if (!bestPlan || score > bestPlan.score) {
                    bestPlan = { spy, mode, targetX, targetY, score, laneRisk, pathRisk, shotWindow };
                }
            });

            return bestPlan;
        }

        function applyAutoMovement(plan, deltaScale) {
            const p = state.player;
            const maxX = 240;
            const pathLookahead = 90;
            const avoidRadius = 90;

            if (!plan) {
                const homeX = 88;
                const homeY = canvas.height * 0.5;
                p.x += (homeX - p.x) * 0.08 * deltaScale;
                p.y += (homeY - p.y) * 0.08 * deltaScale;
                return 0;
            }

            let avoidX = 0;
            let avoidY = 0;
            const nearbyCivilians = state.entities.letters.filter(l =>
                l.type === 'civilian' &&
                l.hp > 0 &&
                l.x > p.x - 40 &&
                l.x < p.x + pathLookahead &&
                Math.abs(l.y - p.y) < avoidRadius
            );

            nearbyCivilians.forEach(c => {
                const projectedX = c.x - c.vx * 16;
                const dx = p.x - projectedX;
                const dy = p.y - c.y;
                const dist = Math.max(1, Math.hypot(dx, dy));
                if (dist >= avoidRadius) return;
                const force = (avoidRadius - dist) / avoidRadius;
                avoidX += (dx / dist) * force * 26;
                avoidY += (dy / dist) * force * 42;
            });

            const desiredX = clamp(plan.targetX + avoidX, p.r, Math.min(canvas.width - p.r, maxX));
            const desiredY = clamp(plan.targetY + avoidY, p.r, canvas.height - p.r);
            const easingX = plan.mode === 'collide' ? 0.16 : 0.12;
            const easingY = plan.mode === 'collide' ? 0.18 : 0.14;
            p.x += (desiredX - p.x) * easingX * deltaScale;
            p.y += (desiredY - p.y) * easingY * deltaScale;

            return nearbyCivilians.length;
        }

        function gameLoop(currentTime) {
            if (!state.lastFrameTime) state.lastFrameTime = currentTime;
            const dt = currentTime - state.lastFrameTime;
            state.lastFrameTime = currentTime;
            if (state.active && !state.isPaused) update(dt);
            draw(dt);
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            const now = Date.now();
            state.difficulty = 1 + (now - state.startTime) / 40000;
            const deltaScale = Math.min(2.0, dt / 16.6);
            const p = state.player;
            if(state.isManual && now - state.lastInputTime > CONFIG.AUTO_RETURN_DELAY) state.isManual = false;
            
            if(state.isManual) {
                const moveAmt = p.speed * deltaScale;
                if(state.keys['KeyW'] || state.keys['ArrowUp']) p.y -= moveAmt;
                if(state.keys['KeyS'] || state.keys['ArrowDown']) p.y += moveAmt;
                if(state.keys['KeyA'] || state.keys['ArrowLeft']) p.x -= moveAmt;
                if(state.keys['KeyD'] || state.keys['ArrowRight']) p.x += moveAmt;
            } else {
                const autoPlan = chooseAutoTarget(p);
                const nearbyCivilianCount = applyAutoMovement(autoPlan, deltaScale);
                const visibleSpies = state.entities.letters.filter(l =>
                    l.type === 'active' &&
                    l.hp > 0 &&
                    l.x > p.x - 10 &&
                    l.x < p.x + CONFIG.AI_DETECTION_RANGE
                );
                const shouldUseSkill = visibleSpies.length >= 4 || (
                    autoPlan &&
                    autoPlan.laneRisk > 1.2 &&
                    nearbyCivilianCount >= 2
                );
                if(state.mana >= 100 && now > state.skillActiveUntil && shouldUseSkill) triggerSkill();
                if (false) {
                // --- AI 오토파일럿 로직 최적화 (베테랑의 지적 반영) ---
                // 전방 사거리 내에 있는 스파이만 인식
                const spiesInRange = state.entities.letters.filter(l => 
                    l.type === 'active' && 
                    l.hp > 0 && 
                    l.x > p.x && // 기체보다 앞에 있어야 함
                    l.x < p.x + CONFIG.AI_DETECTION_RANGE // 근거리/중거리 감지
                );

                // 중앙 복귀 로직 삭제: 기본 타겟을 현재 위치(p.x, p.y)로 설정
                let targetY = p.y, targetX = p.x;
                
                if(spiesInRange.length) {
                    // 감지 범위 내에서 가장 가까운(왼쪽) 스파이 추격
                    const t = spiesInRange.reduce((a, b) => a.x < b.x ? a : b);
                    targetY = t.y; 
                    // 적절한 사격 거리 유지 (너무 붙지 않음)
                    targetX = Math.max(60, Math.min(canvas.width * 0.3, t.x - 120));
                    
                    // 이동 실행
                    p.y += (targetY - p.y) * 0.12 * deltaScale; 
                    p.x += (targetX - p.x) * 0.1 * deltaScale;
                }
                
                // 위치 유지(Hold Position): 타겟이 없으면 p.x, p.y의 변화가 없으므로 정지함

                if(state.mana >= 100 && now > state.skillActiveUntil && (spiesInRange.length > 3)) triggerSkill();
                }
            }

            p.x = Math.max(p.r, Math.min(canvas.width - p.r, p.x));
            p.y = Math.max(p.r, Math.min(canvas.height - p.r, p.y));

            if(now - state.lastShot > CONFIG.SHOT_INTERVAL) {
                state.entities.bullets.push({ x: p.x + 15, y: p.y - 6, startX: p.x + 15, hp: 1 }, { x: p.x + 15, y: p.y + 6, startX: p.x + 15, hp: 1 });
                state.lastShot = now; playSfx(1000, 'sine', 0.03, 0.015);
            }
            if(now - state.lastSpawn > Math.max(400, CONFIG.SPAWN_RATE - state.difficulty * 200)) spawn(), state.lastSpawn = now;
            state.entities.bullets.forEach(b => { 
                b.x += CONFIG.BULLET_SPEED * deltaScale; 
                if(b.x > b.startX + CONFIG.ATTACK_RANGE || b.x > canvas.width) b.hp = 0; 
            });
            state.entities.letters.forEach(l => {
                l.x -= l.vx * deltaScale; if(l.hitFlash > 0) l.hitFlash--;
                if (l.hp > 0) {
                    state.entities.bullets.forEach(b => {
                        if(l.hp > 0 && b.hp && Math.hypot(l.x - b.x, l.y - b.y) < l.r + 5) { b.hp = 0; l.hp--; l.hitFlash = 5; if(l.hp <= 0) handleLetterDeath(l, "INTERFERENCE"); }
                    });
                    if(l.hp > 0 && Math.hypot(l.x - p.x, l.y - p.y) < l.r + p.r) { 
                        if(l.type === 'active') handleLetterDeath(l, "BREACH"); 
                        else { 
                            l.hp = 0; 
                            handleLetterDeath(l, "COLLISION"); 
                        }
                    }
                    if(l.hp > 0 && l.x < -30) { 
                        if(l.type === 'active') { damage(1, "BREACH"); state.entities.fx.push({ type: 'miss', char: l.char, x: 30, y: l.y, life: 1.2 }); } 
                        l.hp = 0; 
                    }
                }
            });
            state.entities.letters = state.entities.letters.filter(l => l.hp > 0);
            state.entities.bullets = state.entities.bullets.filter(b => b.hp > 0);
            state.mana = Math.min(100, state.mana + 0.08 * deltaScale);
            state.entities.parts.forEach(pa => { pa.x += pa.vx; pa.y += pa.vy; pa.life -= 0.02; });
            state.entities.parts = state.entities.parts.filter(pa => pa.life > 0);
            state.entities.fx.forEach(f => f.life -= 0.02);
            state.entities.fx = state.entities.fx.filter(f => f.life > 0);
            if(state.shake > 0) state.shake *= 0.9;
            manaFill.style.width = state.mana + '%';
            heartsDisplay.textContent = '❤️'.repeat(Math.max(0, state.hearts));
            const isSkillActive = now < state.skillActiveUntil;
            skillBtn.classList.toggle('ready', state.mana >= 100 && !isSkillActive);
            skillBtn.classList.toggle('active', isSkillActive);
            skillBtn.textContent = isSkillActive ? `SCANNING` : "Overload";
            ctrlModeText.textContent = state.isManual ? "MANUAL" : "AUTO";
            ctrlTimerText.textContent = state.isManual ? `(${Math.ceil((CONFIG.AUTO_RETURN_DELAY - (now - state.lastInputTime)) / 1000)}s)` : "";
        }

        function draw(dt) {
            ctx.save();
            if(state.shake > 0.5) ctx.translate((Math.random()-0.5)*state.shake, (Math.random()-0.5)*state.shake);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground(dt);
            if(state.word) {
                const now = Date.now();
                const isSkillActive = now < state.skillActiveUntil;
                state.entities.bullets.forEach(b => { ctx.fillStyle = '#fff'; ctx.fillRect(b.x, b.y-1.5, 10, 3); });
                ctx.font = 'bold 18px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                state.entities.letters.forEach(l => {
                    let col = isSkillActive ? (l.type === 'active' ? getCol('spy') : getCol('civilian')) : getCol('accent');
                    if (l.hitFlash > 0) col = '#fff';
                    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(l.x, l.y, l.r, 0, Math.PI * 2); ctx.stroke(); 
                    ctx.fillStyle = col; ctx.fillText(l.char, l.x, l.y);
                });
                const p = state.player; ctx.shadowBlur = 15; ctx.shadowColor = getCol('accent'); ctx.fillStyle = getCol('accent');
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                state.entities.parts.forEach(pa => { ctx.globalAlpha = pa.life; ctx.fillStyle = pa.c; ctx.fillRect(pa.x, pa.y, pa.size, pa.size); });
                state.entities.fx.forEach(f => {
                    if(f.type === 'miss') { ctx.globalAlpha = f.life; ctx.fillStyle = getCol('civilian'); ctx.font = 'bold 14px Orbitron'; ctx.fillText(`BREACH: ${f.char}`, f.x + 50, f.y); }
                    else if(f.type === 'mission_clear') { ctx.globalAlpha = f.life; ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Orbitron'; ctx.fillText("SECURED", canvas.width/2, canvas.height/2); }
                    else if(f.type === 'bonus_hit') { ctx.globalAlpha = f.life; ctx.fillStyle = varColor('--spy'); ctx.font = 'bold 10px JetBrains Mono'; ctx.fillText("OVER-SYNC", f.x, f.y - 20); }
                    else if(f.type === 'scan_wave') {
                        const radius = (1 - f.life) * canvas.width * 1.5;
                        ctx.strokeStyle = `rgba(188, 19, 254, ${f.life})`; ctx.lineWidth = 5;
                        ctx.beginPath(); ctx.arc(p.x, p.y, radius, 0, Math.PI * 2); ctx.stroke();
                    }
                });
                ctx.globalAlpha = 1;
            }
            ctx.restore();
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        function startGame() {
            state.active = false; resize(); if(state.restartTimer) clearInterval(state.restartTimer);
            state.hearts = 5; state.mana = 0; state.difficulty = 1; state.startTime = Date.now();
            state.entities = { bullets: [], letters: [], fx: [], parts: [] };
            state.player.x = 80; state.player.y = canvas.height/2; state.isManual = false; 
            restartOverlay.style.display = 'none'; nextWord(); state.active = true;
        }

        function endGame() {
            state.active = false; restartOverlay.style.display = 'flex'; 
            deathReasonDisplay.textContent = `REASON: ${state.deathReason}`;
            let count = CONFIG.RESTART_TIME; countdownEl.textContent = count;
            state.restartTimer = setInterval(() => { count--; countdownEl.textContent = count; if(count <= 0) { clearInterval(state.restartTimer); startGame(); } }, 1000);
        }

        requestAnimationFrame(gameLoop);
        window.onload = () => { resize(); saveSettings(); startGame(); };
    </script>
</body>
