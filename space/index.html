      x.beginPath(); x.moveTo(0, dangerY); x.lineTo(w, dangerY); x.stroke();
      x.setLineDash([]);
      x.lineDashOffset = 0;
    }

    function drawBulletWithTrail(b, glowSprite, coreColor, w2, h2, glowSize) {
      glowSize = glowSize || 20;
      for (let i = b.trail.length - 1; i >= 0; i--) {
        const t = b.trail[i];
        const a = (1 - (i + 1) / (b.trail.length + 1)) * 0.35;
        x.fillStyle = coreColor.replace(')', `,${a.toFixed(3)})`).replace('rgb', 'rgba');
        x.fillRect(t.x - w2 / 2, t.y - h2 / 2, w2, h2);
      }
      const gh = glowSize / 2;
      x.drawImage(glowSprite, b.x - gh, b.y - gh, glowSize, glowSize);
      x.fillStyle = coreColor;
      x.fillRect(b.x - w2 / 2, b.y - h2 / 2, w2, h2);
    }

    function drawBullets() {
      for (const b of pBullets) {
        // X1: visible damage feedback — player bullets get a touch bigger/glowier as playerGrowth.dmg
        // climbs (dmg 1 = baseline, each +1 nudges size/glow up), so power growth reads at a glance.
        const dmg = b.dmg || 1;
        const bw = 4 + Math.min(4, (dmg - 1) * 1.1), bh = 8 + Math.min(6, (dmg - 1) * 1.6);
        const glowSize = 20 + Math.min(14, (dmg - 1) * 3.5);
        drawBulletWithTrail(b, bulletGlowP, 'rgb(124,216,255)', bw, bh, glowSize);
      }
      for (const b of eBullets) drawBulletWithTrail(b, bulletGlowE, 'rgb(255,115,115)', 4, 8);
    }

    function drawParticles() {
      for (const p of particles) {
        const t = p.life / p.maxLife;
        const alpha = Math.max(0, 1 - t);
        x.fillStyle = `rgba(${p.color},${alpha.toFixed(3)})`;
        const s = p.size * (1 - t * 0.4);
        x.fillRect(p.x - s / 2, p.y - s / 2, s, s);
      }
    }

    // M1: faint ring under the finger while dragging, in logical coords.
    function drawTouchIndicator() {
      if (!touchActive) return;
      x.save();
      x.strokeStyle = 'rgba(190,220,255,.45)';
      x.lineWidth = 2;
      x.beginPath();
      x.arc(touchX, player.y, player.r + 18, 0, Math.PI * 2);
      x.stroke();
      x.restore();
    }

    function drawScorePopups() {
      x.textAlign = 'center';
      for (const s of scorePopups) {
        const t = s.life / s.maxLife;
        const alpha = 1 - t;
        const rise = t * (s.big ? 30 : 22);
        x.globalAlpha = Math.max(0, alpha);
        // X1: "LEVEL UP!" gets its own gold color + slight upscale pop so it reads as a distinct
        // milestone event rather than just another big score popup.
        if (s.kind === 'levelup') {
          const pop = 1 + (1 - Math.min(1, t / 0.35)) * 0.25;
          x.fillStyle = THEME.hud.bestHighlight;
          x.font = '800 30px system-ui, sans-serif';
          x.save();
          x.translate(s.x, s.y - rise);
          x.scale(pop, pop);
          x.shadowColor = 'rgba(255,216,115,.7)';
          x.shadowBlur = 14;
          x.fillText(s.text, 0, 0);
          x.restore();
        } else {
          x.fillStyle = s.big ? THEME.popup.bonus : THEME.popup.score;
          x.font = s.big ? '800 34px system-ui, sans-serif' : '700 16px system-ui, sans-serif';
          x.fillText(s.text, s.x, s.y - rise);
        }
      }
      x.globalAlpha = 1;
      x.textAlign = 'start';
    }

    function drawVignette() {
      if (hitVignette <= 0 || !vignetteCanvas) return;
      x.save();
      x.globalAlpha = hitVignette;
      x.drawImage(vignetteCanvas, 0, 0);
      x.restore();
    }

    function drawWaveBanner() {
      if (!waveBanner) return;
      const t = waveBanner.t;
      let alpha, slide;
      if (t < 0.3) { alpha = t / 0.3; slide = (1 - alpha) * -60; }
      else if (t < 0.9) { alpha = 1; slide = 0; }
      else { alpha = 1 - (t - 0.9) / 0.3; slide = (1 - alpha) * 60; }
      alpha = Math.max(0, Math.min(1, alpha));
      x.save();
      x.globalAlpha = alpha;
      x.textAlign = 'center';
      x.fillStyle = '#eaf3ff';
      x.font = '800 46px system-ui, sans-serif';
      x.fillText(`WAVE ${waveBanner.wave}`, w / 2, h * .38 + slide);
      x.textAlign = 'start';
      x.restore();
    }

    function drawMiniShip(px, py, filled, scale, alpha) {
      x.save();
      x.globalAlpha = alpha;
      x.translate(px, py);
      x.scale(scale, scale);
      x.fillStyle = filled ? THEME.hud.lifeIcon : 'rgba(0,0,0,0)';
      x.strokeStyle = THEME.hud.lifeIconEmpty;
      x.lineWidth = filled ? 0 : 1.3;
      x.beginPath();
      x.moveTo(0, -7);
      x.lineTo(-7, 6);
      x.lineTo(7, 6);
      x.closePath();
      if (filled) x.fill(); else x.stroke();
      x.restore();
    }

    let hudLastNow = 0;
    // H1: HUD scaled ~2x for readability (fonts/icons/gauge/panel doubled, small caption labels
    // added above each section, subtle text shadow for contrast on the starfield). The panel is
    // also moved up (topY 62 -> 24) so even at double height its bottom edge (topY+4+barH-8 = 108)
    // stays clear of the formation's first row (buildWave starts row 0 at world y >= 190, sprite
    // top edge ~130).
    function drawHud(now) {
      const hudDt = Math.min(0.1, Math.max(0, now - (hudLastNow || now)));
      hudLastNow = now;
      const now_hud = now;
      const topY = 24;
      // X1: panel height grown 88 -> 104 to fit a thin XP gauge strip along the bottom edge (16px
      // of extra room). buildWave's row-0 world y (190, sprite top ~130) still clears the new panel
      // bottom (topY+4+ph = 28+96 = 124) by ~6px — checked against the wider tier-2 hitbox too.
      const barH = 104;
      const pad = 12;
      x.save();

      // S1: panel background with rounded corners + border + section dividers
      const px0 = pad, py0 = topY + 4, pw = w - pad * 2, ph = barH - 8;
      const rr = 16;
      x.beginPath();
      x.moveTo(px0 + rr, py0);
      x.arcTo(px0 + pw, py0, px0 + pw, py0 + ph, rr);
      x.arcTo(px0 + pw, py0 + ph, px0, py0 + ph, rr);
      x.arcTo(px0, py0 + ph, px0, py0, rr);
      x.arcTo(px0, py0, px0 + pw, py0, rr);
      x.closePath();
      x.fillStyle = THEME.hud.panelBg;
      x.fill();
      x.strokeStyle = THEME.hud.panelBorder;
      x.lineWidth = 1;
      x.stroke();

      // section dividers (left|center, center|right)
      const div1 = px0 + pw * 0.28, div2 = px0 + pw * 0.72;
      x.strokeStyle = THEME.hud.panelDivider;
      x.beginPath();
      x.moveTo(div1, py0 + 8); x.lineTo(div1, py0 + ph - 8);
      x.moveTo(div2, py0 + 8); x.lineTo(div2, py0 + ph - 8);
      x.stroke();

      // H1: thin dark text shadow — lifts text/icons off bright starfield pixels behind the panel
      x.shadowColor = 'rgba(0,0,0,.6)';
      x.shadowBlur = 3;
      x.shadowOffsetY = 1;
      x.textAlign = 'center';

      // H1: small dim caption above each section clarifies the info structure at a glance
      const capFont = '700 13px system-ui, sans-serif';
      const capY = topY + 22;
      const lcx = (px0 + div1) / 2, rcx = (div2 + px0 + pw) / 2;

      // left: lives as mini-ship icons (2x), with fade+shrink-out on loss and dim outline when empty
      x.fillStyle = THEME.hud.dim;
      x.font = capFont;
      x.fillText('LIVES', lcx, capY);
      let lx = lcx - 44;
      for (let i = 0; i < 3; i++) {
        const fx = lifeFx[i];
        let filled = i < player.lives, scale = 2, alpha = 1;
        if (fx) {
          const t = Math.min(1, fx.t / 0.4);
          filled = true; // still show ship fading out
          scale = 2 * (1 - t * 0.5);
          alpha = 1 - t;
        }
        drawMiniShip(lx, topY + 56, filled, scale, alpha);
        lx += 44;
      }

      // center: score (monospace, digit-aligned) + best (highlights on new record)
      x.fillStyle = THEME.hud.dim;
      x.font = capFont;
      x.fillText('SCORE', w / 2, capY);
      x.fillStyle = THEME.hud.text;
      x.font = '800 40px ui-monospace, monospace';
      x.fillText(`${score}`, w / 2, topY + 58);

      const flashing = now_hud < bestFlashUntil;
      if (flashing) {
        const t = 1 - Math.max(0, bestFlashUntil - now_hud) / 1;
        const pulse = Math.sin(t * Math.PI * 6) * 0.5 + 0.5;
        x.save();
        x.translate(w / 2, topY + 78);
        x.scale(1 + pulse * 0.18, 1 + pulse * 0.18);
        x.fillStyle = THEME.hud.bestHighlight;
        x.font = '800 19px ui-monospace, monospace';
        x.fillText(`Best ${highscore}`, 0, 0);
        x.restore();
      } else {
        x.fillStyle = THEME.hud.dim;
        x.font = '600 18px ui-monospace, monospace';
        x.fillText(`Best ${highscore}`, w / 2, topY + 78);
      }

      // right: wave + remaining-enemy gauge (green gradient, smoothed toward target)
      const total = enemies.length + dyingEnemies.length || 1;
      const remaining = enemies.filter(e => e.alive).length;
      const gaugeW = 170, gaugeH = 14;
      const gx = rcx - gaugeW / 2, gy = topY + 48;
      const targetFrac = Math.max(0, Math.min(1, remaining / total));
      hudRemainingDisplay += (targetFrac - hudRemainingDisplay) * Math.min(1, hudDt * 6);
      if (Math.abs(hudRemainingDisplay - targetFrac) < 0.002) hudRemainingDisplay = targetFrac;
      x.fillStyle = THEME.hud.text;
      x.font = '800 24px system-ui, sans-serif';
      x.fillText(`WAVE ${wave}`, rcx, topY + 38);
      // H1: no shadow on the gauge rects — blur under thin bars reads as smearing, not depth
      x.shadowColor = 'transparent';
      x.shadowBlur = 0;
      x.shadowOffsetY = 0;
      x.fillStyle = THEME.hud.gaugeBg;
      x.fillRect(gx, gy, gaugeW, gaugeH);
      const drawFrac = hudRemainingDisplay;
      const gaugeGrad = x.createLinearGradient(gx, 0, gx + gaugeW, 0);
      if (drawFrac > 0.3) {
        gaugeGrad.addColorStop(0, THEME.hud.gaugeFg2);
        gaugeGrad.addColorStop(1, THEME.hud.gaugeFg);
      } else {
        gaugeGrad.addColorStop(0, THEME.hud.gaugeWarn);
        gaugeGrad.addColorStop(1, THEME.hud.gaugeFg2);
      }
      x.fillStyle = gaugeGrad;
      x.fillRect(gx, gy, gaugeW * drawFrac, gaugeH);

      // X1: thin full-width XP gauge along the panel's bottom edge — the panel grew 16px (barH
      // 88->104) specifically to fit this strip without crowding the three sections above it.
      const xpBarH = 6, xpPad = 20;
      const xpx0 = px0 + xpPad, xpw = pw - xpPad * 2;
      const xpy = py0 + ph - xpBarH - 6;
      const xpFrac = Math.max(0, Math.min(1, playerGrowth.xp / playerGrowth.xpNext));
      x.fillStyle = THEME.hud.gaugeBg;
      x.fillRect(xpx0, xpy, xpw, xpBarH);
      x.fillStyle = THEME.hud.bestHighlight;
      x.fillRect(xpx0, xpy, xpw * xpFrac, xpBarH);

      // "LV n" badge under Best — drawn last (on top of the XP gauge strip it visually sits over)
      // so the digits stay legible instead of being painted over by the gauge fill. Pulses briefly
      // right after a level-up (same window as the level-up ring FX / score popup).
      x.shadowColor = 'rgba(0,0,0,.6)';
      x.shadowBlur = 3;
      x.shadowOffsetY = 1;
      const lvPulseT = now_hud < playerGrowth.levelUpFlashUntil
        ? 1 - Math.max(0, playerGrowth.levelUpFlashUntil - now_hud) / 1.1 : 1;
      const lvPulse = now_hud < playerGrowth.levelUpFlashUntil ? Math.sin(lvPulseT * Math.PI * 5) * 0.5 + 0.5 : 0;
      x.textAlign = 'center';
      x.save();
      x.translate(w / 2, topY + 96);
      x.scale(1 + lvPulse * 0.22, 1 + lvPulse * 0.22);
      x.fillStyle = now_hud < playerGrowth.levelUpFlashUntil ? THEME.hud.bestHighlight : THEME.hud.dim;
      x.font = '800 15px ui-monospace, monospace';
      x.fillText(`LV ${playerGrowth.level}`, 0, 0);
      x.restore();

      x.textAlign = 'start';
      x.restore();
    }

    // Shared "glass panel" chrome for PAUSED (canvas-drawn) so it reads as the same design
    // language as the HTML game-over/overlay panel: rounded card, soft cyan border glow, thin
    // hairline dividers framing an uppercase gradient title.
    function drawGlassPanel(cx, cy, pw, ph, rr) {
      x.save();
      x.beginPath();
      x.moveTo(cx - pw / 2 + rr, cy - ph / 2);
      x.arcTo(cx + pw / 2, cy - ph / 2, cx + pw / 2, cy + ph / 2, rr);
      x.arcTo(cx + pw / 2, cy + ph / 2, cx - pw / 2, cy + ph / 2, rr);
      x.arcTo(cx - pw / 2, cy + ph / 2, cx - pw / 2, cy - ph / 2, rr);
      x.arcTo(cx - pw / 2, cy - ph / 2, cx + pw / 2, cy - ph / 2, rr);
      x.closePath();
      x.fillStyle = 'rgba(11,17,36,.72)';
      x.shadowColor = 'rgba(96,212,255,.35)';
      x.shadowBlur = 34;
      x.fill();
      x.shadowColor = 'transparent'; x.shadowBlur = 0;
      x.strokeStyle = 'rgba(126,220,255,.4)';
      x.lineWidth = 1;
      x.stroke();
      x.restore();
    }

    function drawPauseScreen() {
      x.fillStyle = 'rgba(3,6,16,.6)'; x.fillRect(0, 0, w, h);

      const cx = w / 2, cy = h / 2;
      const pw = Math.min(420, w - 80), ph = 260;
      drawGlassPanel(cx, cy, pw, ph, 22);

      x.textAlign = 'center';
      const titleY = cy - ph / 2 + 46;

      // hairline above the title, matching the HTML panel's ::before divider
      x.strokeStyle = 'rgba(126,220,255,.28)';
      x.lineWidth = 1;
      x.beginPath(); x.moveTo(cx - 32, titleY - 28); x.lineTo(cx + 32, titleY - 28); x.stroke();

      const titleGrad = x.createLinearGradient(cx - 90, 0, cx + 90, 0);
      titleGrad.addColorStop(0, '#eaf9ff');
      titleGrad.addColorStop(.55, '#7ee0ff');
      titleGrad.addColorStop(1, '#7cd8ff');
      x.fillStyle = titleGrad;
      x.font = '800 34px system-ui, sans-serif';
      x.fillText('P A U S E D', cx, titleY);

      x.strokeStyle = 'rgba(126,220,255,.28)';
      x.beginPath(); x.moveTo(cx - pw / 2 + 24, titleY + 18); x.lineTo(cx + pw / 2 - 24, titleY + 18); x.stroke();

      x.fillStyle = THEME.hud.dim;
      x.font = '600 14.5px system-ui, sans-serif';
      const lines = [
        '← / → or A / D  —  Move',
        'P  —  Pause / Resume',
        'Enter  —  Restart',
        'Sound toggle  —  top bar button'
      ];
      lines.forEach((line, i) => x.fillText(line, cx, titleY + 50 + i * 26));
      x.textAlign = 'start';
    }

    let last = performance.now() / 1000;
    function loop(tms) {
      const now = tms / 1000, dt = Math.min(0.033, now - last); last = now;
      if (mode === RUNNING) updateRunning(dt, now);
      updateState(dt);
      draw(now);
      requestAnimationFrame(loop);
    }

    beginNewRun();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
