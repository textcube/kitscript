<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Space Auto-Battle</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05070f; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #topbar { position: fixed; top: 0; left: 0; right: 0; height: 62px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 14px; background: linear-gradient(180deg, rgba(9,14,29,.95), rgba(9,14,29,.65)); border-bottom: 1px solid rgba(126,162,255,.32); z-index: 4; }
    .brand { display: flex; flex-direction: column; gap: 1px; }
    .game-title { font-size: 18px; font-weight: 800; color: #e6efff; letter-spacing: .2px; }
    .studio { font-size: 12px; font-weight: 700; color: #8cb0ff; letter-spacing: .3px; text-transform: uppercase; }
    .top-actions { display: flex; gap: 8px; }
    .top-link { border: 1px solid #7ea2ff; border-radius: 8px; background: #19284d; color: #e8f0ff; font-weight: 700; font-size: 13px; padding: 8px 10px; text-decoration: none; }
    .top-link:hover { filter: brightness(1.12); }
    #hud { position: fixed; left: 12px; top: 72px; color: #d8e7ff; font-weight: 600; font-size: 14px; letter-spacing: .2px; text-shadow: 0 1px 0 #000; pointer-events: none; z-index: 3; }
    #overlay { position: fixed; inset: 0; display: none; place-items: center; background: rgba(0,0,0,.48); color: #fff; text-align: center; }
    #overlay.show { display: grid; }
    .panel { background: rgba(12, 18, 35, .92); border: 1px solid #5f87ff; border-radius: 10px; padding: 22px 28px; min-width: 260px; }
    .title { font-size: 34px; font-weight: 800; margin-bottom: 8px; }
    .countdown { color: #9cb9ff; font-size: 18px; margin: 6px 0 14px; }
    button { border: 1px solid #7ea2ff; border-radius: 8px; background: #19284d; color: #e8f0ff; font-weight: 700; padding: 8px 12px; cursor: pointer; }
    button:hover { filter: brightness(1.12); }
  </style>
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <div class="game-title">Eternal Invasion: Space Edition</div>
      <div class="studio">BuntGames</div>
    </div>
    <div class="top-actions">
      <a class="top-link" href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">YouTube</a>
      <a class="top-link" href="https://github.com" target="_blank" rel="noopener noreferrer">게임 원본</a>
    </div>
  </header>
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <div id="overlay"><div class="panel"><div class="title">GAME OVER</div><div class="countdown" id="cd">Restarting in 7…</div><button id="restartNow">Restart now</button></div></div>
  <script>
    const RUNNING = 'RUNNING', GAME_OVER = 'GAME_OVER', RESTART_COUNTDOWN = 'RESTART_COUNTDOWN';
    const c = document.getElementById('game'), x = c.getContext('2d');
    const hud = document.getElementById('hud'), ov = document.getElementById('overlay'), cd = document.getElementById('cd');

    let w = 0, h = 0, dangerY = 0;
    const keys = Object.create(null);
    const stars = Array.from({ length: 130 }, () => ({ x: Math.random(), y: Math.random(), z: .4 + Math.random() * .9, t: Math.random() * 6.28 }));

    const player = { x: 0, y: 0, r: 13, speed: 630, autoSpeed: 450, lives: 3, invulnUntil: 0, fireCd: 0 };
    const enemies = [], pBullets = [], eBullets = [];
    let target = null, score = 0, wave = 1;
    let formation = { x: 0, y: 70, vx: 72, stepDown: 24 };
    let enemySpeedBase = 72, nextEnemyShot = 0;

    let mode = RUNNING, gameOverHold = 0, countdown = 7;

    const THEME = {
      bg: '#05070f',
      dangerLine: 'rgba(255,86,86,.26)',
      aimLine: 'rgba(130,190,255,.35)',
      player: {
        nose: '#d9f7ff',
        wing: '#39bdf8',
        outline: '#91e8ff',
        cockpit: '#eaf9ff',
        wingLine: '#184f76',
        engineGlow: 'rgba(96,212,255,.38)',
        engineCore: 'rgba(194,245,255,.9)',
        shield: 'rgba(133,201,255,.85)',
        shieldInner: 'rgba(85,163,255,.32)'
      },
      enemy: {
        top: '#9bb8ff',
        topFlash: '#fff4ad',
        cockpit: '#1a2342',
        cockpitFlash: '#334f92',
        engine: '#25325a',
        engineFlash: '#5268a8',
        pod: '#708ed8',
        podFlash: '#b9d0ff',
        glow: '#ff6a7f',
        glowFlash: '#ffe1e1',
        outline: 'rgba(93,119,196,.8)',
        outlineFlash: 'rgba(255,243,184,.95)',
        hpBg: 'rgba(6,10,22,.88)',
        hpFg: '#7affb0'
      },
      bullets: {
        player: '#7cd8ff',
        enemy: '#ff7373'
      }
    };

    let audioCtx = null, masterGain = null, audioReady = false;

    function initAudio() {
      if (audioCtx) return;
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return;
      audioCtx = new AudioCtor();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.08;
      masterGain.connect(audioCtx.destination);
    }

    function unlockAudio() {
      initAudio();
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      audioReady = audioCtx.state === 'running';
    }

    function tone(type, freq, duration, volume = 1, slide = 1) {
      if (!audioReady || !audioCtx || !masterGain) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      if (slide !== 1) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq * slide), t + duration);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.9 * volume, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(t);
      osc.stop(t + duration + 0.02);
    }

    function playSfx(kind) {
      if (kind === 'playerFire') tone('square', 720, 0.06, 0.75, 0.75);
      else if (kind === 'enemyFire') tone('sawtooth', 280, 0.09, 0.6, 0.86);
      else if (kind === 'enemyHit') tone('triangle', 420, 0.05, 0.55, 1.2);
      else if (kind === 'enemyDown') tone('square', 210, 0.18, 0.9, 2.1);
      else if (kind === 'playerHit') tone('sawtooth', 180, 0.2, 0.9, 0.55);
    }

    function resize() {
      w = c.width = innerWidth; h = c.height = innerHeight;
      dangerY = h - 120;
      player.y = h - 64;
      player.x = Math.min(Math.max(player.x || w * .5, 28), w - 28);
    }
    addEventListener('resize', resize); resize();

    addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (["ArrowLeft", "ArrowRight", "a", "d", "A", "D"].includes(e.key)) e.preventDefault(); });
    addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    addEventListener('pointerdown', unlockAudio, { once: true });
    addEventListener('keydown', unlockAudio, { once: true });
    document.getElementById('restartNow').onclick = () => { if (mode !== RUNNING) beginNewRun(); };

    function buildWave() {
      enemies.length = 0;
      const cols = 6, rows = 3, sx = 84, sy = 66;
      const startX = (w - (cols - 1) * sx) * .5;
      const hpBoost = Math.floor((wave - 1) / 3);
      for (let r = 0; r < rows; r++) {
        for (let col = 0; col < cols; col++) {
          const base = r === 0 ? 1 : (r === 1 ? 2 : 3);
          enemies.push({ x: startX + col * sx, y: 86 + r * sy, w: 34, h: 22, maxHp: base + hpBoost, hp: base + hpBoost, flash: 0, alive: true });
        }
      }
      formation = { x: 0, y: 70, vx: enemySpeedBase + (wave - 1) * 8, stepDown: 20 + Math.min(18, wave * 1.5) };
      nextEnemyShot = 0.6 + Math.random() * 0.6;
    }

    function beginNewRun() {
      score = 0; wave = 1; enemySpeedBase = 72;
      player.lives = 3; player.invulnUntil = 0; player.fireCd = 0;
      pBullets.length = 0; eBullets.length = 0;
      mode = RUNNING; gameOverHold = 0; countdown = 7;
      ov.classList.remove('show');
      buildWave();
    }

    function beginGameOver() {
      if (mode !== RUNNING) return;
      mode = GAME_OVER;
      gameOverHold = 0.45;
      countdown = 7;
      ov.classList.add('show');
      cd.textContent = `Restarting in ${Math.ceil(countdown)}…`;
    }

    function pickTarget() {
      let best = null;
      for (const e of enemies) {
        if (!e.alive) continue;
        if (!best) { best = e; continue; }
        if (e.hp < best.hp) best = e;
        else if (e.hp === best.hp && Math.abs(e.x - player.x) < Math.abs(best.x - player.x)) best = e;
      }
      target = best;
    }

    function enemyBounds() {
      let l = 1e9, r = -1e9;
      for (const e of enemies) if (e.alive) { l = Math.min(l, e.x - e.w * .5); r = Math.max(r, e.x + e.w * .5); }
      return { l, r };
    }

    function firePlayerBullet() {
      if (!target) return;
      const ox = target.x - player.x, oy = target.y - player.y;
      const d = Math.hypot(ox, oy) || 1;
      const sp = 580;
      pBullets.push({ x: player.x, y: player.y - player.r, vx: ox / d * sp, vy: oy / d * sp });
      playSfx('playerFire');
    }

    function fireEnemyBullet(dt) {
      nextEnemyShot -= dt;
      if (nextEnemyShot > 0) return;
      nextEnemyShot = 0.7 + Math.random() * 0.5;
      const live = enemies.filter(e => e.alive);
      if (!live.length) return;
      const e = live[(Math.random() * live.length) | 0];
      const ey = e.y + formation.y;
      const tx = player.x + (Math.random() - .5) * 24, ty = player.y;
      const ox = tx - e.x, oy = ty - ey, d = Math.hypot(ox, oy) || 1, sp = 240 + wave * 8;
      eBullets.push({ x: e.x, y: ey + 14, vx: ox / d * sp, vy: oy / d * sp });
      playSfx('enemyFire');
    }

    function updateRunning(dt, now) {
      pickTarget();

      const l = keys['arrowleft'] || keys['a'], r = keys['arrowright'] || keys['d'];
      const manual = (r ? 1 : 0) - (l ? 1 : 0);
      if (manual) player.x += manual * player.speed * dt;
      else if (target) {
        const dx = target.x - player.x, step = Math.sign(dx) * Math.min(Math.abs(dx), player.autoSpeed * dt);
        player.x += step;
      }
      player.x = Math.max(22, Math.min(w - 22, player.x));

      player.fireCd -= dt;
      while (player.fireCd <= 0) { firePlayerBullet(); player.fireCd += 0.15; }

      formation.x += formation.vx * dt;
      const b = enemyBounds();
      if (b.l + formation.x < 14 || b.r + formation.x > w - 14) {
        formation.vx *= -1.06;
        formation.y += formation.stepDown;
      }

      for (const e of enemies) if (e.alive) {
        e.x += formation.vx * dt;
        e.flash = Math.max(0, e.flash - dt * 6);
        if (e.y + formation.y > dangerY) { beginGameOver(); return; }
      }

      fireEnemyBullet(dt);

      for (let i = pBullets.length - 1; i >= 0; i--) {
        const b = pBullets[i]; b.x += b.vx * dt; b.y += b.vy * dt;
        if (b.x < -20 || b.x > w + 20 || b.y < -30 || b.y > h + 20) { pBullets.splice(i, 1); continue; }
        for (const e of enemies) {
          if (!e.alive) continue;
          const ex = e.x, ey = e.y + formation.y;
          if (Math.abs(b.x - ex) < e.w * .5 && Math.abs(b.y - ey) < e.h * .5) {
            e.hp--; e.flash = 1; pBullets.splice(i, 1);
            playSfx('enemyHit');
            if (e.hp <= 0) { e.alive = false; score += 10; playSfx('enemyDown'); }
            break;
          }
        }
      }

      for (let i = eBullets.length - 1; i >= 0; i--) {
        const b = eBullets[i]; b.x += b.vx * dt; b.y += b.vy * dt;
        if (b.x < -20 || b.x > w + 20 || b.y < -20 || b.y > h + 20) { eBullets.splice(i, 1); continue; }
        if (Math.hypot(b.x - player.x, b.y - player.y) < player.r + 4) {
          eBullets.splice(i, 1);
          if (now > player.invulnUntil) {
            player.lives--; player.invulnUntil = now + 0.8;
            playSfx('playerHit');
            if (player.lives <= 0) { beginGameOver(); return; }
          }
        }
      }

      if (!enemies.some(e => e.alive)) {
        wave++; enemySpeedBase += 5;
        pBullets.length = 0; eBullets.length = 0;
        buildWave();
      }
    }

    function updateState(dt) {
      if (mode === RUNNING) return;
      if (mode === GAME_OVER) {
        gameOverHold -= dt;
        if (gameOverHold <= 0) mode = RESTART_COUNTDOWN;
      }
      if (mode === RESTART_COUNTDOWN) {
        countdown -= dt;
        if (countdown <= 0) beginNewRun();
        else cd.textContent = `Restarting in ${Math.ceil(countdown)}…`;
      }
    }

    function drawPlayer(ctx, p, now) {
      const inv = now < p.invulnUntil;
      const blinkOff = inv && Math.floor(now * 16) % 2 !== 0;
      if (blinkOff) return;

      const bodyGrad = ctx.createLinearGradient(p.x, p.y - 18, p.x, p.y + 16);
      bodyGrad.addColorStop(0, THEME.player.nose);
      bodyGrad.addColorStop(0.55, '#79deff');
      bodyGrad.addColorStop(1, THEME.player.wing);

      ctx.fillStyle = THEME.player.engineGlow;
      ctx.beginPath();
      ctx.arc(p.x - 7, p.y + 14, 6, 0, Math.PI * 2);
      ctx.arc(p.x + 7, p.y + 14, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(p.x, p.y + 18);
      ctx.lineTo(p.x - 7, p.y + 27);
      ctx.lineTo(p.x + 7, p.y + 27);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - 16);
      ctx.lineTo(p.x - 14, p.y + 14);
      ctx.lineTo(p.x + 14, p.y + 14);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = THEME.player.outline;
      ctx.lineWidth = 1.6;
      ctx.stroke();

      ctx.strokeStyle = THEME.player.wingLine;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - 8);
      ctx.lineTo(p.x - 9, p.y + 11);
      ctx.moveTo(p.x, p.y - 8);
      ctx.lineTo(p.x + 9, p.y + 11);
      ctx.stroke();

      ctx.fillStyle = THEME.player.cockpit;
      ctx.fillRect(p.x - 3, p.y - 5, 6, 9);
      ctx.fillStyle = THEME.player.engineCore;
      ctx.fillRect(p.x - 6, p.y + 13, 4, 2.6);
      ctx.fillRect(p.x + 2, p.y + 13, 4, 2.6);

      if (inv && Math.floor(now * 12) % 2 === 0) {
        ctx.strokeStyle = THEME.player.shield;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 21, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = THEME.player.shieldInner;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 17.5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawEnemy(ctx, e, formationY) {
      if (!e.alive) return;
      const ex = e.x, ey = e.y + formationY;
      const flash = Math.min(1, e.flash);
      const topColor = flash > 0 ? THEME.enemy.topFlash : THEME.enemy.top;
      const cockpitColor = flash > 0 ? THEME.enemy.cockpitFlash : THEME.enemy.cockpit;
      const engineColor = flash > 0 ? THEME.enemy.engineFlash : THEME.enemy.engine;
      const podColor = flash > 0 ? THEME.enemy.podFlash : THEME.enemy.pod;
      const glowColor = flash > 0 ? THEME.enemy.glowFlash : THEME.enemy.glow;

      ctx.fillStyle = topColor;
      ctx.beginPath();
      ctx.moveTo(ex - 16, ey - 8);
      ctx.lineTo(ex, ey - 12);
      ctx.lineTo(ex + 16, ey - 8);
      ctx.lineTo(ex + 13, ey + 1);
      ctx.lineTo(ex - 13, ey + 1);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = cockpitColor;
      ctx.fillRect(ex - 8, ey - 2, 16, 7);
      ctx.fillStyle = engineColor;
      ctx.fillRect(ex - 11, ey + 5, 22, 6);

      ctx.fillStyle = podColor;
      ctx.fillRect(ex - 18, ey + 2, 5, 8);
      ctx.fillRect(ex + 13, ey + 2, 5, 8);

      ctx.fillStyle = glowColor;
      ctx.fillRect(ex - 15, ey + 9, 4, 3.5);
      ctx.fillRect(ex + 11, ey + 9, 4, 3.5);
      ctx.beginPath();
      ctx.arc(ex - 15.5, ey + 1.5, 1.5, 0, Math.PI * 2);
      ctx.arc(ex + 15.5, ey + 1.5, 1.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = flash > 0 ? THEME.enemy.outlineFlash : THEME.enemy.outline;
      ctx.lineWidth = 1.1 + flash * 1.2;
      ctx.strokeRect(ex - 16.5, ey - 12.5, 33, 24);

      const bw = 28, hpW = bw * (e.hp / e.maxHp);
      ctx.fillStyle = THEME.enemy.hpBg;
      ctx.fillRect(ex - bw / 2, ey - 18, bw, 4);
      ctx.fillStyle = THEME.enemy.hpFg;
      ctx.fillRect(ex - bw / 2, ey - 18, hpW, 4);
    }

    function draw(now) {
      x.clearRect(0, 0, w, h);
      x.fillStyle = THEME.bg; x.fillRect(0, 0, w, h);

      for (const s of stars) {
        s.t += .01 * s.z;
        const px = s.x * w, py = (s.y * h + (now * 18 * s.z)) % h, a = .25 + .6 * (Math.sin(s.t) * .5 + .5);
        x.fillStyle = `rgba(170,200,255,${a.toFixed(3)})`;
        const r = s.z * 1.4;
        x.fillRect(px, py, r, r);
      }

      x.strokeStyle = THEME.dangerLine; x.beginPath(); x.moveTo(0, dangerY); x.lineTo(w, dangerY); x.stroke();

      if (target) {
        x.strokeStyle = THEME.aimLine; x.setLineDash([6, 7]);
        x.beginPath(); x.moveTo(player.x, player.y - 10); x.lineTo(target.x, target.y + formation.y); x.stroke(); x.setLineDash([]);
      }

      for (const b of pBullets) { x.fillStyle = THEME.bullets.player; x.fillRect(b.x - 2, b.y - 6, 4, 8); }
      for (const b of eBullets) { x.fillStyle = THEME.bullets.enemy; x.fillRect(b.x - 2, b.y - 2, 4, 8); }

      for (const e of enemies) drawEnemy(x, e, formation.y);
      drawPlayer(x, player, now);

      hud.textContent = `Score ${score}   Lives ${player.lives}   Wave ${wave}   Target ${target ? `HP:${target.hp}` : '-'}`;
    }

    let last = performance.now() / 1000;
    function loop(tms) {
      const now = tms / 1000, dt = Math.min(0.033, now - last); last = now;
      if (mode === RUNNING) updateRunning(dt, now);
      updateState(dt);
      draw(now);
      requestAnimationFrame(loop);
    }

    beginNewRun();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
