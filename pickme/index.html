<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PICK ME - RETRO STAGE SELECT (MANUAL OVERRIDE)</title>
  <style>
    :root {
      --bg: #080808;
      --panel-bg: #1a1a1a;
      --accent: #00ff00;
      --text: #ffffff;
      --shadow: #000000;
      --crt-line: rgba(18, 16, 16, 0.15);
      --cols: 3;
      --card-h: 140px;
    }

    body.theme-city { --accent: #ff00ff; }
    body.theme-space { --accent: #00ffff; }
    body.theme-tool { --accent: #ffff00; }
    body.theme-default { --accent: #00ff00; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 1.25rem 1rem 1.5rem;
    }

    .retro-links {
      position: absolute;
      top: 0.8rem;
      left: 0.8rem;
      z-index: 110;
      display: flex;
      gap: 0.45rem;
      padding: 0.4rem;
      border: 3px solid var(--accent);
      background: var(--panel-bg);
      box-shadow: 5px 5px 0 var(--shadow);
    }

    .retro-link {
      width: 2.45rem;
      height: 2.45rem;
      display: grid;
      place-items: center;
      border: 2px solid #555;
      color: var(--text);
      background: var(--bg);
      box-shadow: 2px 2px 0 var(--shadow);
      transition: none;
    }

    .retro-link:hover,
    .retro-link:focus-visible {
      color: #000;
      border-color: #fff;
      background: var(--accent);
      outline: none;
    }

    .retro-link:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .retro-link svg {
      width: 1.25rem;
      height: 1.25rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: square;
      stroke-linejoin: miter;
      shape-rendering: crispEdges;
    }

    /* CRT Scanline Effect */
    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(var(--crt-line) 50%, rgba(0, 0, 0, 0) 50%),
                  linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
      z-index: 100;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    #status-container {
      margin-bottom: 1rem;
      text-align: center;
      z-index: 10;
      flex-shrink: 0;
    }

    .main-label {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 0.8rem;
      animation: blink 0.8s infinite steps(2);
    }

    .status-text {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
      border: 4px solid var(--accent);
      padding: 0.5rem 1.5rem;
      background: var(--bg);
      box-shadow: 6px 6px 0px var(--shadow);
      min-width: 320px;
    }

    #stop-btn {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      z-index: 110;
      --button-inner-gap: 0.8rem;
      min-width: 9.5rem;
      height: 3.625rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 0.15rem;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--panel-bg);
      border: 3px solid var(--accent);
      box-shadow: 4px 4px 0px var(--shadow);
      padding: 0.45rem 1.2rem;
      cursor: pointer;
    }

    #stop-btn:hover,
    #stop-btn:focus-visible {
      color: #000;
      background:
        linear-gradient(var(--accent), var(--accent)) center / calc(100% - var(--button-inner-gap)) calc(100% - var(--button-inner-gap)) no-repeat,
        var(--panel-bg);
    }
    #stop-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--shadow); }
    #stop-btn.hidden { display: none; }

    #stop-btn::after {
      content: "";
      position: absolute;
      inset: 0.4rem;
      border: 2px solid #555;
      pointer-events: none;
    }

    #stop-btn:hover::after,
    #stop-btn:focus-visible::after {
      border-color: #fff;
    }

    #pick-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      gap: 0.8rem;
      width: min(95vw, 1100px);
      z-index: 10;
      align-content: start;
      padding-bottom: 0.5rem;
    }

    .pick-card {
      min-height: var(--card-h);
      height: var(--card-h);
      background: var(--panel-bg);
      border: 3px solid #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      box-shadow: 4px 4px 0px var(--shadow);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      transition: opacity 0.4s ease, border-color 0.1s, transform 0.2s;
      cursor: pointer;
    }

    .pick-card::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.65);
      z-index: 1;
      transition: background 0.2s;
    }

    .pick-card:hover {
      transform: translateY(-2px);
      border-color: #666;
    }

    .pick-card.active {
      border-color: #fff;
      transform: scale(1.05);
      z-index: 5;
    }
    
    .pick-card.active::after {
      background: rgba(0, 0, 0, 0.15);
    }

    .pick-card.winner {
      background-color: var(--accent) !important;
      border-color: #ffffff !important;
      transform: scale(1.1) !important;
      z-index: 10;
      animation: flash 0.1s infinite;
      opacity: 1 !important;
    }

    .pick-card.winner::after { display: none; }

    .pick-card.winner span {
      color: #000 !important;
      text-shadow: none !important;
    }

    #pick-grid.finalized .pick-card:not(.winner) {
      opacity: 0.15;
      filter: grayscale(1);
      cursor: default;
    }

    .pick-card span {
      font-size: clamp(0.7rem, 2.2vw, 1.1rem);
      text-align: center;
      padding: 0.5rem;
      word-break: keep-all;
      text-transform: uppercase;
      line-height: 1.2;
      z-index: 2;
      font-weight: 900;
      text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
      pointer-events: none; /* 텍스트가 클릭을 방해하지 않도록 */
    }

    .pick-card .weight-indicator {
      position: absolute;
      top: 6px;
      left: 6px;
      font-size: 0.6rem;
      color: var(--accent);
      opacity: 0.9;
      z-index: 3;
    }

    @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes flash { 0% { filter: invert(0); } 100% { filter: invert(1); } }

    @media (max-width: 600px) {
      #status-container { margin-top: 4.2rem; }
      .status-text { font-size: 1.4rem; min-width: 240px; }
      #pick-grid { gap: 0.5rem; }
      body { padding: 0.8rem 0.7rem 1rem; }
      .retro-links { top: 0.6rem; left: 0.6rem; }
      .retro-link { width: 2.2rem; height: 2.2rem; }
      #stop-btn {
        top: 0.6rem;
        right: 0.6rem;
        --button-inner-gap: 0.6rem;
        min-width: 7.25rem;
        height: 3.375rem;
        padding-inline: 0.65rem;
        font-size: 0.72rem;
        letter-spacing: 0.1rem;
      }
    }

    @media (max-width: 360px) {
      .retro-links {
        gap: 0.25rem;
        padding: 0.3rem;
      }

      .retro-link {
        width: 2rem;
        height: 2rem;
      }

      #stop-btn {
        min-width: 6.5rem;
        height: 3rem;
        padding-inline: 0.45rem;
        font-size: 0.65rem;
        letter-spacing: 0.06rem;
      }

      #stop-btn::after { inset: 0.3rem; }
      #status-container { margin-top: 3.8rem; }
    }
  </style>
</head>

    let isStopped = false;
    let shuffleTimeout = null;
    let currentRouteList = [];

    function buildAutoRoutes(dirNames) {
      return dirNames.map((dir) => {
        const theme = inferTheme(dir);
        return {
          url: buildRouteUrl(dir),
          weight: inferWeight(dir),
          theme,
          label: CURATED_LABELS[dir] || slugToLabel(dir),
          image: THEME_IMAGES[theme] || THEME_IMAGES.default,
          enabled: true
        };
      });
    }

    function mergeRoutes(curated, generated) {
      const map = new Map();
      [...curated, ...generated].forEach((route) => {
        const key = route.url;
        if (!map.has(key)) map.set(key, route);
      });
      return Array.from(map.values());
    }

    function buildRouteUrl(dir) {
      if (dir === "tool") return "https://kitscript.com/tool/";
      return `https://kitscript.com/game/${dir}/`;
    }

    function inferTheme(dir) {
      if (SPACE_DIRS.has(dir)) return "space";
      if (CITY_DIRS.has(dir)) return "city";
      if (TOOL_DIRS.has(dir)) return "tool";
      return "default";
    }

    function inferWeight(dir) {
      if (["city", "star", "space", "pizza"].includes(dir)) return 2;
      return 1;
    }

    function slugToLabel(dir) {
      return dir.replace(/[-_]+/g, " ").toUpperCase();
    }

    function resolveSafeUrl(path) {
      if (!path || path.trim() === "") return "/";
      if (path.startsWith('http')) return path;
      let base = "";
      try {
        if (window.location.origin && window.location.origin !== 'null') base = window.location.origin;
        else {
          const parts = window.location.href.split('/');
          if (parts.length >= 3) base = parts[0] + "//" + parts[2];
        }
      } catch (e) {}
      if (base.startsWith('blob:')) base = base.replace('blob:', '');
      return base + (path.startsWith('/') ? path : '/' + path);
    }

    function init() {
      currentRouteList = filterRoutes();
      if (currentRouteList.length === 0) {
        window.location.replace(resolveSafeUrl("/"));
        return;
      }
      setupTheme();
      renderCards(currentRouteList);
      updateGridMetrics(currentRouteList.length);
      
      const selected = pickOne(currentRouteList);

      // 개별 카드 클릭 이벤트 위임
      gridEl.addEventListener('click', (e) => {
        if (isFinalized) return;
        
        const card = e.target.closest('.pick-card');
        if (!card) return;

        // 랜덤 루프 중단
        if (shuffleTimeout) clearTimeout(shuffleTimeout);
        
        const manualUrl = card.dataset.url;
        statusEl.innerText = "MANUAL SELECT";
        finalize(card, manualUrl);
      });

      // 랜덤 선택 중단 / 재추첨 버튼
      stopBtn.addEventListener('click', () => {
        if (isFinalized) return;
        if (!isStopped) {
          isStopped = true;
          if (shuffleTimeout) clearTimeout(shuffleTimeout);
          document.querySelectorAll('.pick-card').forEach(c => c.classList.remove('active'));
          statusEl.innerText = "MANUAL MODE";
          stopBtn.innerHTML = "&#9654; RE-ROLL";
        } else {
          isStopped = false;
          stopBtn.innerHTML = "&#9632; STOP";
          startSequence(pickOne(currentRouteList));
        }
      });

      window.addEventListener('resize', () => updateGridMetrics(currentRouteList.length));

      shuffleTimeout = setTimeout(() => startSequence(selected), 600);
    }

    function filterRoutes() {
      const params = new URLSearchParams(window.location.search);
      const targetTheme = params.get('theme');
      let list = ROUTE_POOL.filter(r => r.enabled && r.url);
      if (targetTheme) list = list.filter(r => r.theme === targetTheme);
      if (list.length === 0) return [];
      const lastUrl = localStorage.getItem(STORAGE_KEY);
      const filteredList = list.filter(r => r.url !== lastUrl);
      return filteredList.length > 0 ? filteredList : list;
    }

    function setupTheme() {
      const params = new URLSearchParams(window.location.search);
      const theme = params.get('theme') || 'default';
      document.body.className = `theme-${theme}`;
    }

    function renderCards(list) {
      gridEl.innerHTML = "";
      list.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'pick-card';
        if (item.image) card.style.backgroundImage = `url('${item.image}')`;
        card.innerHTML = `<div class="weight-indicator">LV.${item.weight}</div><span>${item.label}</span>`;
        card.dataset.url = item.url;
        gridEl.appendChild(card);
      });
    }

    function updateGridMetrics(count) {
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const compact = viewportWidth < 760;
      let cols = 3;

      if (count <= 4) cols = compact ? 2 : 2;
      else if (count <= 9) cols = compact ? 2 : 3;
      else if (count <= 16) cols = compact ? 3 : 4;
      else if (count <= 25) cols = compact ? 3 : 5;
      else cols = compact ? 4 : 6;

      const statusHeight = document.getElementById('status-container').offsetHeight || 110;
      const gap = viewportWidth < 600 ? 8 : 13;
      const rows = Math.max(1, Math.ceil(count / cols));
      const verticalPadding = viewportWidth < 600 ? 42 : 64;
      const availableHeight = Math.max(220, viewportHeight - statusHeight - verticalPadding);
      const cardHeight = Math.max(72, Math.min(150, Math.floor((availableHeight - gap * (rows - 1)) / rows)));

      gridEl.style.setProperty('--cols', cols);
      gridEl.style.setProperty('--card-h', `${cardHeight}px`);
    }

    function pickOne(list) {
      const totalWeight = list.reduce((sum, item) => sum + item.weight, 0);
      let random = Math.random() * totalWeight;
      for (const item of list) {
        if (random < item.weight) return item;
        random -= item.weight;
      }
      return list[0];
    }

    function startSequence(selected) {
      const cards = document.querySelectorAll('.pick-card');
      const totalSteps = 22 + Math.floor(Math.random() * 8);
      let currentStep = 0;
      let currentIndex = -1;

      // 자동 추천될 위너 미리 파악
      const winnerCards = Array.from(cards).filter(c => c.dataset.url === selected.url);
      const winnerCard = winnerCards[Math.floor(Math.random() * winnerCards.length)];

      statusEl.innerText = "SELECTING";

      function shuffle() {
        if (isFinalized || isStopped) return; // 수동 클릭으로 종료됐거나 STOP으로 중단됨

        if (currentStep >= totalSteps) {
          finalize(winnerCard, selected.url);
          return;
        }

        cards.forEach(c => c.classList.remove('active'));
        
        let nextIndex;
        if (currentStep === totalSteps - 1) {
          winnerCard.classList.add('active');
        } else {
          do { nextIndex = Math.floor(Math.random() * cards.length); } 
          while (nextIndex === currentIndex && cards.length > 1);
          currentIndex = nextIndex;
          cards[currentIndex].classList.add('active');
        }

        currentStep++;
        const progress = currentStep / totalSteps;
        const delay = 40 + Math.pow(progress, 5) * 800;
        shuffleTimeout = setTimeout(shuffle, delay);
      }
      shuffle();
    }

    function finalize(winnerCard, targetUrl) {
      if (isFinalized) return;
      isFinalized = true;

      stopBtn.classList.add('hidden');
      gridEl.classList.add('finalized');
      
      const cards = document.querySelectorAll('.pick-card');
      cards.forEach(c => c.classList.remove('active'));

      winnerCard.classList.add('winner');
      statusEl.innerText = "STAGE START";
      
      localStorage.setItem(STORAGE_KEY, targetUrl);

      setTimeout(() => {
        window.location.replace(resolveSafeUrl(targetUrl));
      }, 1200);
    }

    init();
  </script>
</body>
</html>
