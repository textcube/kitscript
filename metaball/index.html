<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaball Masking - YouTube & Generative Geometry</title>
    <meta name="description" content="검은 마스크에 메타볼 모양의 구멍을 뚫어 유튜브 영상이나 제너러티브 노드 그래프를 들여다보는 단일 파일 비주얼라이저. Marching squares로 매 프레임 윤곽을 다시 계산합니다.">
    <meta property="og:title" content="Metaball Masking - YouTube & Generative Geometry">
    <meta property="og:description" content="검은 마스크에 메타볼 모양의 구멍을 뚫어 유튜브 영상이나 노드 그래프를 들여다보는 비주얼라이저.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23000000'/%3E%3Ccircle cx='24' cy='30' r='16' fill='none' stroke='%2300ffaa' stroke-width='4'/%3E%3Ccircle cx='42' cy='38' r='11' fill='none' stroke='%2300ffaa' stroke-width='4'/%3E%3C/svg%3E">
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: rgba(10, 10, 15, 0.95);
            --accent-color: #00ffaa;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* 배경 레이어 (유튜브) */
        #video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            display: block;
        }

        /* YouTube API가 생성하는 iframe 스타일 */
        #yt-player {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 메인 캔버스 */
        #canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
        }

        /* 제어판 */
        #control-panel {
            position: absolute;
            top: 20px; right: 20px;
            width: 280px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            z-index: 100;
            color: var(--text-color);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
        }

        #control-panel.hidden {
            transform: translateX(400px);
            opacity: 0;
        }

        #panel-toggle {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 101;
            width: 36px; height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: var(--panel-bg);
            color: var(--accent-color);
            font-size: 16px;
            cursor: pointer;
        }

        .panel-header {
            font-weight: 900;
            font-size: 14px;
            margin-bottom: 25px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-group { margin-bottom: 20px; }

        .control-label {
            font-size: 11px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .control-label span:last-child { color: var(--accent-color); opacity: 1; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .select-group {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.5);
            padding: 4px;
            border-radius: 8px;
        }

        .select-btn {
            flex: 1;
            padding: 8px;
            font-size: 11px;
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .select-btn.active {
            background: var(--accent-color);
            color: black;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 5px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 11px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"].input-invalid {
            border-color: #ff4444;
        }

        .apply-btn {
            background: rgba(0, 255, 170, 0.2);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 8px;
            padding: 0 12px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .apply-btn:hover {
            background: var(--accent-color);
            color: black;
        }

        /* 소셜 링크 도크 */
        .social-dock {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            padding: 0;
        }

        .social-btn:hover {
            background: rgba(0, 255, 170, 0.15);
            color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 255, 170, 0.2);
            border-color: var(--accent-color);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 사운드 버튼 전용 스타일 */
        .social-btn.sound-on {
            color: var(--accent-color);
            background: rgba(0, 255, 170, 0.1);
            border-color: rgba(0, 255, 170, 0.4);
        }

        #ui-hint {
            position: absolute;
            bottom: 25px; left: 25px;
            font-size: 11px;
            color: white;
            opacity: 0.3;
            z-index: 100;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            #control-panel {
                top: auto;
                bottom: 20px;
                left: 20px;
                right: 20px;
                width: auto;
                max-height: 65vh;
                overflow-y: auto;
                padding: 18px;
            }

            #control-panel.hidden {
                transform: translateY(400px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            #control-panel { transition: none; }
        }
    </style>
</head>
<body>

        <div class="control-group">

            <button id="btn-sound" class="social-btn" title="Sound On/Off" aria-label="Toggle sound">
                <svg id="icon-sound-off" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>

            </button>

            <a href="https://kitscript.com/pickme" target="_blank" rel="noopener noreferrer" class="social-btn" title="Home">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

            <a href="https://youtube.com/@textcube" target="_blank" rel="noopener noreferrer" class="social-btn" title="YouTube">

            <a href="https://github.com/textcube" target="_blank" rel="noopener noreferrer" class="social-btn" title="GitHub">

                </svg>

    <div id="ui-hint">COMMANDS: [H] TOGGLE UI | [R] RESET NODES</div>

    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const ytContainer = document.getElementById('video-container');
        const panel = document.getElementById('control-panel');
        const panelToggle = document.getElementById('panel-toggle');

        const config = {
            bgMode: 'youtube',
            numBalls: 12,
            baseRadius: 90,
            threshold: 1.0,
            cellSize: 16, // 기본 셀 크기를 16으로 상향하여 대화면 부하 감소
            opacity: 1.0,
            speed: 1.2,
            numNodes: 60,
            nodeConnectDist: 150,
            isMuted: true,
            ytId: 'ahizOQx1Ovw'
        };

        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        let width, height, rows, cols, dpr = 1;
        let balls = [];
        let nodes = [];
        let field = new Float32Array(0);
        let player;
        let ytReady = false;
        let lastTime = 0;

        // --- YouTube API ---

        const YT_ID_RE = /^[A-Za-z0-9_-]{11}$/;

        function extractYouTubeId(raw) {
            const v = raw.trim();
            if (YT_ID_RE.test(v)) return v;
            try {
                const url = new URL(v);
                if (/(^|\.)youtu\.be$/.test(url.hostname)) {
                    const id = url.pathname.slice(1);
                    if (YT_ID_RE.test(id)) return id;
                } else if (/(^|\.)youtube\.com$/.test(url.hostname)) {
                    const qId = url.searchParams.get('v');
                    if (qId && YT_ID_RE.test(qId)) return qId;
                    const m = url.pathname.match(/\/(?:embed|shorts)\/([A-Za-z0-9_-]{11})/);
                    if (m) return m[1];
                }
            } catch (e) { /* not a URL */ }
            return null;
        }

        function onYouTubeIframeAPIReady() {
            ytReady = true;
            player = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                videoId: config.ytId,
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    controls: 0,
                    loop: 1,
                    playlist: config.ytId,
                    rel: 0,
                    playsinline: 1,
                    modestbranding: 1,
                    iv_load_policy: 3
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        setTimeout(() => {
            if (!ytReady && config.bgMode === 'youtube') setBgMode('generative');
        }, 6000);

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // --- Global Functions ---

        function setBgMode(mode) {
            config.bgMode = mode;
            document.querySelectorAll('.select-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.querySelector(`.select-btn[data-mode="${mode}"]`);
            if (btn) btn.classList.add('active');

            if (mode === 'youtube') {
                ytContainer.style.display = 'block';
                document.getElementById('yt-controls').style.display = 'block';
            } else {
                ytContainer.style.display = 'none';
                document.getElementById('yt-controls').style.display = 'none';
            }
        }

        function toggleSound() {
            if (!player || typeof player.mute !== 'function') return;

            const btn = document.getElementById('btn-sound');
            const iconOn = document.getElementById('icon-sound-on');
            const iconOff = document.getElementById('icon-sound-off');

            if (config.isMuted) {
                player.unMute();
                config.isMuted = false;
                iconOn.style.display = 'block';
                iconOff.style.display = 'none';
                btn.classList.add('sound-on');
            } else {
                player.mute();
                config.isMuted = true;
                iconOn.style.display = 'none';
                iconOff.style.display = 'block';
                btn.classList.remove('sound-on');
            }
        }

        function flashInvalid(el) {
            el.classList.remove('input-invalid');
            void el.offsetWidth;
            el.classList.add('input-invalid');
            setTimeout(() => el.classList.remove('input-invalid'), 500);
        }

        function updateYouTubeVideo() {
            const idInput = document.getElementById('input-ytid');
            const id = extractYouTubeId(idInput.value);
            if (!id) { flashInvalid(idInput); return; }
            idInput.value = id;
            config.ytId = id;
            if (player && typeof player.loadPlaylist === 'function') {
                player.loadPlaylist({ playlist: [id], loop: true });
            }
        }

        // --- Core Classes ---

        class Ball {
            constructor() { this.init(); }
            init() {
                this.scale = 0.7 + Math.random() * 0.7;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
            }
            update(dt) {
                this.x += this.vx * config.speed * dt;
                this.y += this.vy * config.speed * dt;
                if (this.x < 0 && this.vx < 0) this.vx *= -1;
                if (this.x > width && this.vx > 0) this.vx *= -1;
                if (this.y < 0 && this.vy < 0) this.vy *= -1;
                if (this.y > height && this.vy > 0) this.vy *= -1;
                if (this.x < 0) this.x = 0; else if (this.x > width) this.x = width;
                if (this.y < 0) this.y = 0; else if (this.y > height) this.y = height;
            }
        }

        class GeoNode {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
        }

        // --- System Logic ---

        function computeGrid() {
            cols = Math.ceil(width / config.cellSize) + 1;
            rows = Math.ceil(height / config.cellSize) + 1;
            field = new Float32Array(cols * rows);
        }

        function init() {
            width = window.innerWidth || 1;
            height = window.innerHeight || 1;
            dpr = Math.min(window.devicePixelRatio || 1, 1.5);

            canvas.width = Math.round(width * dpr);
            canvas.height = Math.round(height * dpr);
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            computeGrid();
            syncBalls();
            syncNodes();
        }

        function syncBalls() {
            if (balls.length < config.numBalls) {
                while(balls.length < config.numBalls) balls.push(new Ball());
            } else balls.length = config.numBalls;
        }

        function syncNodes() {
            if (nodes.length < config.numNodes) {
                while(nodes.length < config.numNodes) nodes.push(new GeoNode());
            } else nodes.length = config.numNodes;
        }

        function lerp(x1, y1, x2, y2, v1, v2) {
            const t = (config.threshold - v1) / (v2 - v1);
            return { x: x1 + t * (x2 - x1), y: y1 + t * (y2 - y1) };
        }

        function fillPolyO(targetPath, pts) {
            if (pts.length < 3) return;
            targetPath.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) targetPath.lineTo(pts[i].x, pts[i].y);
            targetPath.closePath();
        }

        function drawGenerativeBG(dt) {
            ctx.strokeStyle = 'rgba(0, 255, 170, 0.4)';
            ctx.fillStyle = 'rgba(0, 255, 170, 0.8)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < nodes.length; i++) {
                const n1 = nodes[i]; n1.update(dt);
                ctx.beginPath(); ctx.arc(n1.x, n1.y, 1.5, 0, Math.PI * 2); ctx.fill();
                for (let j = i + 1; j < nodes.length; j++) {
                    const n2 = nodes[j];
                    const dx = n1.x - n2.x; const dy = n1.y - n2.y;
                    const d2 = dx * dx + dy * dy;
                    if (d2 < config.nodeConnectDist * config.nodeConnectDist) {
                        const alpha = 1 - (Math.sqrt(d2) / config.nodeConnectDist);
                        ctx.beginPath(); ctx.strokeStyle = `rgba(0, 255, 170, ${alpha * 0.5})`;
                        ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                    }
                }
            }
        }

        function buildMaskPath() {
            const path = new Path2D();
            const th = config.threshold;
            for (let i = 0; i < cols - 1; i++) {
                const base = i * rows, baseNext = (i + 1) * rows;
                for (let j = 0; j < rows - 1; j++) {
                    const v0 = field[base + j], v1 = field[baseNext + j], v2 = field[baseNext + j + 1], v3 = field[base + j + 1];
                    const in0 = v0 >= th, in1 = v1 >= th, in2 = v2 >= th, in3 = v3 >= th;
                    let state = 0;
                    if (in0) state |= 8;
                    if (in1) state |= 4;
                    if (in2) state |= 2;
                    if (in3) state |= 1;
                    if (state === 0) continue;

                    const x = i * config.cellSize, y = j * config.cellSize, s = config.cellSize;
                    let t, r, b, l;
                    if (in0 !== in1) t = lerp(x, y, x + s, y, v0, v1);
                    if (in1 !== in2) r = lerp(x + s, y, x + s, y + s, v1, v2);
                    if (in3 !== in2) b = lerp(x, y + s, x + s, y + s, v3, v2);
                    if (in0 !== in3) l = lerp(x, y, x, y + s, v0, v3);
                    const pTL = {x, y}, pTR = {x:x+s, y}, pBR = {x:x+s, y:y+s}, pBL = {x, y:y+s};

                    switch (state) {
                        case 1:  fillPolyO(path, [l, b, pBL]); break;
                        case 2:  fillPolyO(path, [r, b, pBR]); break;
                        case 3:  fillPolyO(path, [l, r, pBR, pBL]); break;
                        case 4:  fillPolyO(path, [t, r, pTR]); break;
                        case 5:  fillPolyO(path, [t, r, pTR]); fillPolyO(path, [b, l, pBL]); break;
                        case 6:  fillPolyO(path, [t, b, pBR, pTR]); break;
                        case 7:  fillPolyO(path, [t, l, pBL, pBR, pTR]); break;
                        case 8:  fillPolyO(path, [t, l, pTL]); break;
                        case 9:  fillPolyO(path, [t, b, pBL, pTL]); break;
                        case 10: fillPolyO(path, [t, l, pTL]); fillPolyO(path, [b, r, pBR]); break;
                        case 11: fillPolyO(path, [t, r, pBR, pBL, pTL]); break;
                        case 12: fillPolyO(path, [r, l, pTL, pTR]); break;
                        case 13: fillPolyO(path, [r, b, pBL, pTL, pTR]); break;
                        case 14: fillPolyO(path, [l, b, pBR, pTR, pTL]); break;
                        case 15: fillPolyO(path, [pTL, pTR, pBR, pBL]); break;
                    }
                }
            }
            return path;
        }

        function updateField() {
            field.fill(0);
            for (let i = 0; i < balls.length; i++) {
                const ball = balls[i];
                const rad = ball.scale * config.baseRadius;
                const rad2 = rad * rad;
                const cutoff = 4 * rad;
                const iMin = Math.max(0, Math.floor((ball.x - cutoff) / config.cellSize));
                const iMax = Math.min(cols - 1, Math.ceil((ball.x + cutoff) / config.cellSize));
                const jMin = Math.max(0, Math.floor((ball.y - cutoff) / config.cellSize));
                const jMax = Math.min(rows - 1, Math.ceil((ball.y + cutoff) / config.cellSize));
                for (let gi = iMin; gi <= iMax; gi++) {
                    const gx = gi * config.cellSize;
                    const dx = gx - ball.x;
                    const base = gi * rows;
                    for (let gj = jMin; gj <= jMax; gj++) {
                        const gy = gj * config.cellSize;
                        const dy = gy - ball.y;
                        field[base + gj] += rad2 / (dx * dx + dy * dy + 1);
                    }
                }
            }
        }

        function draw(now) {
            if (width <= 0 || height <= 0) { requestAnimationFrame(draw); return; }
            if (!lastTime) lastTime = now;
            const elapsed = now - lastTime;
            lastTime = now;
            const dt = reduceMotion ? 0 : Math.min(elapsed / (1000 / 60), 2);

            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, width, height);

            for (const b of balls) b.update(dt);
            updateField();
            const maskPath = buildMaskPath();

            ctx.fillStyle = `rgba(0, 0, 0, ${config.opacity})`;
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fill(maskPath);
            ctx.globalCompositeOperation = 'source-over';

            if (config.bgMode === 'generative') {
                ctx.save();
                ctx.clip(maskPath);
                drawGenerativeBG(dt);
                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        function setupUI() {
            const controls = [
                { id: 'input-opacity', key: 'opacity', disp: 'val-opacity' },
                { id: 'input-count', key: 'numBalls', disp: 'val-count' },
                { id: 'input-radius', key: 'baseRadius', disp: 'val-radius' },
                { id: 'input-threshold', key: 'threshold', disp: 'val-threshold' },
                { id: 'input-nodes', key: 'numNodes', disp: 'val-nodes' },
                { id: 'input-grid', key: 'cellSize', disp: 'val-grid' }
            ];

            controls.forEach(c => {
                const el = document.getElementById(c.id);
                el.setAttribute('aria-valuetext', el.value);
                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    config[c.key] = val;
                    document.getElementById(c.disp).innerText = val;
                    e.target.setAttribute('aria-valuetext', val);
                    if (c.key === 'numBalls') syncBalls();
                    if (c.key === 'numNodes') syncNodes();
                    if (c.key === 'cellSize') computeGrid();
                });
            });

            document.querySelectorAll('.select-btn').forEach(btn => {
                btn.addEventListener('click', () => setBgMode(btn.dataset.mode));
            });

            document.getElementById('btn-sound').addEventListener('click', toggleSound);

            document.getElementById('btn-update-yt').addEventListener('click', updateYouTubeVideo);
            document.getElementById('input-ytid').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') updateYouTubeVideo();
            });

            function setPanelHidden(hidden) {
                panel.classList.toggle('hidden', hidden);
                panel.toggleAttribute('inert', hidden);
                panelToggle.setAttribute('aria-expanded', String(!hidden));
            }

            panelToggle.addEventListener('click', () => {
                setPanelHidden(!panel.classList.contains('hidden'));
            });

            window.addEventListener('keydown', (e) => {
                if (e.isComposing) return;
                if (e.target && e.target.closest && e.target.closest('input, textarea')) return;

                if (e.key.toLowerCase() === 'h') {
                    setPanelHidden(!panel.classList.contains('hidden'));
                }
                if (e.key.toLowerCase() === 'r') nodes.forEach(n => n.init());
            });
        }

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(init, 150);
        });

        setupUI();
        init();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
