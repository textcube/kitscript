        // --- Touch-aware guide text (item 6) ---
        function isCoarsePointer() {
            return window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        }

        function applyTouchAwareGuideText() {
            // Reused by the on-screen zoom buttons too, so coarse-pointer detection lives in one
            // place: toggling body.coarse-pointer here shows #zoom-controls via CSS (see rule).
            document.body.classList.toggle('coarse-pointer', isCoarsePointer());
            if (!isCoarsePointer()) return;
            document.getElementById('guide-move').innerText = '🚶 탭해서 이동';
            document.getElementById('guide-watch').innerText = '✨ 두 번 탭해서 보기';
            document.getElementById('guide-zoom').innerText = '🤏 핀치 줌';
        }

        // --- On-screen zoom buttons (touch discoverability for the wheel/pinch zoom) ---
        // ZOOM_BUTTON_STEP/_REPEAT_MS live up near MIN_FOV/MAX_FOV (not here) because initZoomButtons()
        // is invoked synchronously from inside init(), which runs (via the init(); call) before the
        // script's top-to-bottom execution ever reaches this point in the file — a const/let declared
        // here would still be in its temporal dead zone when initZoomButtons() first reads it.
        let zoomButtonInterval = null;

        function stepTargetFOV(delta) {
            targetFOV = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFOV + delta));
        }

        function stopZoomButtonRepeat() {
            if (zoomButtonInterval !== null) {
                clearInterval(zoomButtonInterval);
                zoomButtonInterval = null;
            }
        }

        function startZoomButtonRepeat(delta) {
            stopZoomButtonRepeat(); // guard: never stack more than one interval
            stepTargetFOV(delta); // immediate step on tap, then repeat while held
            zoomButtonInterval = setInterval(() => stepTargetFOV(delta), ZOOM_BUTTON_REPEAT_MS);
        }

        function initZoomButtons() {
            const zoomInBtn = document.getElementById('zoom-in-btn');
            const zoomOutBtn = document.getElementById('zoom-out-btn');
            if (!zoomInBtn || !zoomOutBtn) return;

            const wire = (btn, delta) => {
                btn.addEventListener('pointerdown', (e) => {
                    e.stopPropagation(); // keep this off the canvas/window nav & pinch handlers
                    startZoomButtonRepeat(delta);
                });
                btn.addEventListener('contextmenu', (e) => e.preventDefault());
            };
            wire(zoomInBtn, -ZOOM_BUTTON_STEP);
            wire(zoomOutBtn, ZOOM_BUTTON_STEP);

            // Stop repeating on release no matter where the pointer lets go or leaves the button.
            ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
                zoomInBtn.addEventListener(evt, stopZoomButtonRepeat);
                zoomOutBtn.addEventListener(evt, stopZoomButtonRepeat);
            });
            window.addEventListener('blur', stopZoomButtonRepeat);
        }

        // --- Minimal two-finger pinch → targetFOV, mirroring the wheel handler's deltaY mapping ---
        function onTouchStartPinch(e) {
            if (e.touches.length === 2) {
                pinchLastDist = getTouchDistance(e.touches);
            }
        }

        function onTouchMovePinch(e) {
            if (e.touches.length !== 2) return;
            const dist = getTouchDistance(e.touches);
            if (pinchLastDist !== null) {
                const delta = pinchLastDist - dist; // fingers spreading (zoom in) -> negative delta
                targetFOV = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFOV + delta * 0.15));
                if (e.cancelable) e.preventDefault();
            }
            pinchLastDist = dist;
        }

        function onTouchEndPinch(e) {
            if (e.touches.length < 2) pinchLastDist = null;
        }

        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        /**
         * 3. NAVIGATION & LOGIC
         */
        function findPath(startId, endId) {
            const queue = [[startId]], visited = new Set();
            while (queue.length > 0) {
                const path = queue.shift();
                const node = path[path.length - 1];
                if (node === endId) return path;
                if (!visited.has(node)) {
                    visited.add(node);
                    const neighbors = WORLD_DATA.nodes.find(n => n.id === node).neighbors;
                    neighbors.forEach(neighbor => queue.push([...path, neighbor]));
                }
            }
            return null;
        }

        async function navigateTo(targetId) {
            if (isMoving || isInspecting || currentNodeId === targetId) return;
            isMoving = true;
            const path = findPath(currentNodeId, targetId);
            if (!path) { isMoving = false; return; }

            for (let i = 1; i < path.length; i++) {
                const nextNode = WORLD_DATA.nodes.find(n => n.id === path[i]);
                await new Promise(res => {
                    new TWEEN.Tween(playerGroup.position)
                        .to({ x: nextNode.pos[0], z: nextNode.pos[2] }, 600)
                        .easing(TWEEN.Easing.Quadratic.InOut)
                        .onComplete(res)
                        .start();
                });
                currentNodeId = path[i];
                document.getElementById('current-node').innerText = nextNode.label;
                updateNodeTrackerActive();
            }
            isMoving = false;
        }

        /**
         * 4. INTERACTION HANDLERS
         */
        function handlePointerDown(e) {
            if (isMoving || isInspecting) return;

            updatePointer(e);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects, true);

            if (intersects.length === 0) return;

            const hit = intersects[0];
            const obj = hit.object;

            if (obj.userData.isNode) {
                navigateTo(obj.userData.id);
            } else if (obj.userData.isFloor) {
                handleRoadClick(hit.point);
            }
        }

        function onDoubleClick(e) {
            if (isMoving || isInspecting) return;

            updatePointer(e);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects, true);

            if (intersects.length === 0) return;

            const hitObject = intersects[0].object;
            if (!hitObject.userData.isContent) return;

            const focusTarget = hitObject.userData.focusTarget || hitObject;
            focusOnWindow(focusTarget);
        }

        function updatePointer(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function focusOnWindow(obj) {
            isInspecting = true;
            originalCamState.pos.copy(camera.position);
            originalCamState.rot.copy(camera.rotation);
            originalCamState.fov = camera.fov;

            const worldPos = new THREE.Vector3();
            obj.getWorldPosition(worldPos);

            // 카메라 포커싱 (정면 거리 3.8 유닛 확보)
            new TWEEN.Tween(camera.position)
                .to({ x: worldPos.x + 3.8, y: 1.8, z: worldPos.z }, 900)
                .easing(TWEEN.Easing.Cubic.Out)
                .start();

            new TWEEN.Tween(camera.rotation)
                .to({ y: Math.PI / 2, x: 0, z: 0 }, 900)
                .easing(TWEEN.Easing.Cubic.Out)
                .onComplete(() => {
                    showModal(obj.userData.data);
                })
                .start();
        }

        function showModal(data) {
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-desc').innerText = data.desc;
            document.getElementById('modal-link').href = data.link;
            
            const mediaBox = document.getElementById('modal-media');
            if (data.youtubeId) {
                mediaBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.youtubeId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } else {
                mediaBox.innerHTML = `<img src="${data.media}" alt="Project Detail Image">`;
            }
            document.getElementById('modal').style.display = 'flex';
            onFirstModalOpen();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('modal-media').innerHTML = ""; 
            
            new TWEEN.Tween(camera.position)
                .to({ x: originalCamState.pos.x, y: originalCamState.pos.y, z: originalCamState.pos.z }, 800)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();

            new TWEEN.Tween(camera.rotation)
                .to({ x: originalCamState.rot.x, y: originalCamState.rot.y, z: originalCamState.rot.z }, 800)
                .easing(TWEEN.Easing.Cubic.InOut)
                .onComplete(() => {
                    isInspecting = false;
                })
                .start();
        }

        function handleRoadClick(hitPoint) {
            const pZ = playerGroup.position.z;
            const cZ = hitPoint.z;
            const idx = WORLD_DATA.nodes.findIndex(n => n.id === currentNodeId);
            if (cZ < pZ - 1 && idx < WORLD_DATA.nodes.length - 1) navigateTo(WORLD_DATA.nodes[idx+1].id);
            else if (cZ > pZ + 1 && idx > 0) navigateTo(WORLD_DATA.nodes[idx-1].id);
        }

        function onMouseMove(e) {
            updatePointer(e);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects, true);
            document.body.style.cursor = (intersects.length > 0) ? 'pointer' : 'default';

            // Item 5: brighten the hovered shop's neon frame + show a floating tooltip near the
            // cursor. Skipped on touch devices (no true hover), per spec.
            if (isCoarsePointer()) return;
            const hit = intersects.find(i => i.object.userData && i.object.userData.isContent);
            if (hit) {
                setHoveredFrameSign(hit.object.userData.frameSign || null);
                showHoverTip(e.clientX, e.clientY, hit.object.userData.tooltipTitle || '');
            } else {
                setHoveredFrameSign(null);
                hideHoverTip();
            }
        }

        // Escape must close the modal even though modal-open state IS isInspecting (which every
        // other key handler below early-returns on) — so it is checked first, before that guard.
        function onKeyDown(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('modal');
                if (modal.style.display === 'flex') {
                    closeModal();
                }
                return;
            }
            if (isMoving || isInspecting) return;
            const idx = WORLD_DATA.nodes.findIndex(n => n.id === currentNodeId);
            if ((e.key === 'w' || e.key === 'ArrowUp') && idx < WORLD_DATA.nodes.length - 1) navigateTo(WORLD_DATA.nodes[idx+1].id);
            if ((e.key === 's' || e.key === 'ArrowDown') && idx > 0) navigateTo(WORLD_DATA.nodes[idx-1].id);
        }

        // Backdrop click closes the modal (item 1b). e.target === the #modal element itself means
        // the click landed on the dark backdrop, not inside .modal-content (clicks there stop
        // propagating to #modal because .modal-content sits on top / is a distinct element).
        function onModalBackdropClick(e) {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        }

        function onWheel(e) {
            if (e.cancelable) e.preventDefault();
            targetFOV = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFOV + e.deltaY * 0.04));
        }

        function resetPosition() { targetFOV = 55; navigateTo("n1"); }
        function onWindowResize() {
            scheduleResize();
        }

        function resizeRendererToViewport() {
            if (!camera || !renderer) return;
            const { width, height } = getViewportSize();
            camera.aspect = width / height;
            camera.fov = getEffectiveTargetFOV();
            camera.updateProjectionMatrix();
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
            renderer.setSize(width, height, false);
            renderer.domElement.style.width = `${width}px`;
            renderer.domElement.style.height = `${height}px`;
        }

        function scheduleResize() {
            resizeRendererToViewport();
            if (resizeTimer) clearTimeout(resizeTimer);
            requestAnimationFrame(resizeRendererToViewport);
            resizeTimer = setTimeout(resizeRendererToViewport, 120);
            setTimeout(resizeRendererToViewport, 350);
            setTimeout(resizeRendererToViewport, 700);
        }

        /**
         * 5. ENGINE LOOP
         */
        function animate(time) {
            requestAnimationFrame(animate);
            time = time || 0; // first call from the top-level animate(); has no rAF timestamp yet
            TWEEN.update(time);

            if (!isInspecting) {
                const desiredPos = playerGroup.position.clone().add(getResponsiveCamOffset());
                camera.position.lerp(desiredPos, 0.08);
                const lookTarget = playerGroup.position.clone().add(new THREE.Vector3(-2, 1.8, -3));
                camera.lookAt(lookTarget);
            }

            const effectiveTargetFOV = getEffectiveTargetFOV();
            if (Math.abs(camera.fov - effectiveTargetFOV) > 0.01) {
                camera.fov += (effectiveTargetFOV - camera.fov) * 0.1;
                camera.updateProjectionMatrix();
            }

            nodes.forEach((n, i) => {
                const isAhead = WORLD_DATA.nodes[i].pos[2] < playerGroup.position.z - 0.5;
                n.material.opacity = (isAhead ? 0.45 : 0.2) + Math.sin(time * 0.005) * 0.1;
            });

            const t = time * 0.001;
            neonSigns.forEach(sign => {
                const wobble = Math.sin(t * 1.3 + sign.seed) * Math.sin(t * 0.7 + sign.seed * 2);
                if (sign.isText) {
                    // Gentle breathing only (never below ~0.9× base) so the title never becomes unreadable.
                    sign.mat.emissiveIntensity = sign.base * (0.94 + 0.06 * wobble);
                } else {
                    let intensity = (sign.base || 5) * (0.85 + 0.15 * wobble);
                    if (Math.random() < 0.003) intensity *= 0.2;
                    // hoverBoost is an object reference ({hoverBoost: 1|~1.6}) shared with the
                    // shop window/clickzone userData so onMouseMove can flip it without touching
                    // this loop's own per-frame intensity math.
                    if (sign.hoverBoost) intensity *= sign.hoverBoost.hoverBoost;
                    sign.mat.emissiveIntensity = intensity;
                }
            });

            updateTraffic(time);

            neonFloorReflections.forEach(strip => {
                const wobble = Math.sin(t * 1.3 + strip.seed) * Math.sin(t * 0.7 + strip.seed * 2);
                strip.mat.opacity = strip.base * (0.94 + 0.06 * wobble);
            });

            if (dustPoints) {
                const posAttr = dustPoints.geometry.attributes.position;
                const arr = posAttr.array;
                for (let i = 0; i < dustSeeds.length; i++) {
                    const seed = dustSeeds[i];
                    const bx = dustBasePositions[i * 3];
                    const by = dustBasePositions[i * 3 + 1];
                    const bz = dustBasePositions[i * 3 + 2];
                    // Slow sine wobble on x/z plus a very slow upward drift that wraps back to the
                    // bottom of the y range once a particle rises past it, so the corridor never runs
                    // out of dust up top.
                    arr[i * 3] = bx + Math.sin(t * 0.15 + seed) * 0.4;
                    arr[i * 3 + 2] = bz + Math.cos(t * 0.12 + seed * 1.7) * 0.4;
                    let y = by + ((t * 0.05 + seed) % 5.7);
                    if (y > 6) y -= 5.7;
                    arr[i * 3 + 1] = y;
                }
                posAttr.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
