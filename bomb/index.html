<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Invasion: Bomb Edition</title>
    <style>
        :root {
            --bg-color: #050507;
            --accent-color: #00ffcc;
            --danger-color: #ff3366;
            --text-color: #f0f0f0;
            --panel-bg: rgba(15, 15, 20, 0.95);
            --border-color: rgba(0, 255, 204, 0.3);
            --yt-color: #ff0000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 메인 HUD 패널 */
        .hud-panel {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--panel-bg);
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            pointer-events: auto;
            width: 240px; 
            backdrop-filter: blur(10px);
        }

        /* 브랜드 및 소셜 패널 (우측 상단) */
        .brand-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--panel-bg);
            padding: 15px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            pointer-events: auto;
            text-align: right;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 900;
            color: var(--accent-color);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .game-title-small {
            font-size: 11px;
            opacity: 0.6;
            margin-top: -5px;
        }

        .social-links {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-link {
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-yt {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4d4d;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .btn-yt:hover { background: #ff0000; color: white; }

        .btn-home {
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
        }

        .btn-home:hover { background: var(--accent-color); color: black; }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            opacity: 0.7;
        }

        .value {
            font-size: 28px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .health-bar-wrapper {
            width: 100%;
            height: 6px;
            background: #1a1a1a;
            margin: 15px 0 5px 0;
            border-radius: 3px;
            overflow: hidden;
        }

        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--danger-color), #ff80a0);
            transition: width 0.4s;
        }

        .controls-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .toggle-btn:hover { color: var(--text-color); }

        .toggle-btn input {
            cursor: pointer;
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            text-align: center;
        }

        #overlay h1 {
            font-size: 56px;
            font-weight: 900;
            color: var(--accent-color);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        #overlay .brand-title {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        #overlay p {
            margin-bottom: 30px;
            color: #888;
            max-width: 500px;
            font-size: 14px;
            line-height: 1.6;
        }

        .overlay-links {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .countdown {
            font-size: 18px;
            color: var(--danger-color);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }

        #audio-status-icon {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--panel-bg);
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <!-- HUD -->
        <div class="hud-panel">
            <div class="stats-row">
                <span class="label">Wave</span>
                <span id="wave-val" class="value">1</span>
            </div>
            <div class="stats-row">
                <span class="label">Score</span>
                <span id="score-val" class="value">0</span>
            </div>
            
            <div class="health-bar-wrapper">
                <div id="health-fill"></div>
            </div>
            <div class="label" style="font-size: 9px;">Fortress Integrity</div>
            
            <div class="controls-panel">
                <label class="toggle-btn">
                    <input type="checkbox" id="auto-hunt-checkbox" checked>
                    <span>Auto-Targeting System</span>
                </label>
                <label class="toggle-btn">
                    <input type="checkbox" id="sound-checkbox">
                    <span>Master Audio</span>
                </label>
            </div>
            <div id="cooldown-status" style="font-size: 11px; margin-top: 12px; color: var(--accent-color); font-weight: bold;">STANDBY</div>
        </div>

        <!-- Brand & Social -->
        <div class="brand-panel">
            <div class="brand-name">BuntGames</div>
            <div class="game-title-small">Eternal Invasion: Bomb Edition</div>
            <div class="social-links">
                <a href="https://www.youtube.com/@textcube" target="_blank" class="btn-link btn-yt">YouTube</a>
                <a href="https://kitscript.com/game" target="_blank" class="btn-link btn-home">Website</a>
            </div>
        </div>

        <div id="audio-status-icon">Mute</div>
    </div>

    <div id="overlay" class="hidden">
        <div class="brand-title">BUNTGAMES PRESENTS</div>
        <h1 id="title-text">Invasion Critical</h1>
        <p>Your fortress has been breached. Tactical systems are rebooting for the next deployment.</p>
        <div id="restart-counter" class="countdown"></div>
        
        <div class="overlay-links">
            <a href="https://www.youtube.com/@textcube" target="_blank" class="btn-link btn-yt" style="font-size: 14px; padding: 10px 20px;">YouTube Subscribe</a>
            <a href="https://kitscript.com/game" target="_blank" class="btn-link btn-home" style="font-size: 14px; padding: 10px 20px;">Play More Games</a>
        </div>
    </div>
</div>

<script>
/**
 * AUDIO ENGINE
 */
const AudioEngine = {
    ctx: null,
    enabled: false,
    init() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    playSound(freq, type, duration, vol) {
        if (!this.enabled || !this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    playShot() { this.playSound(800, 'square', 0.1, 0.05); },
    playExplosion() { this.playSound(150, 'sawtooth', 0.6, 0.15); },
    playUI() { this.playSound(1200, 'sine', 0.05, 0.1); }
};

/**
 * CONFIGURATION
 */
const CONFIG = {
    BASE_HEALTH: 100,
    BOMB_COOLDOWN: 8000,
    PROJECTILE_SPEED: 0.008,
    EXPLOSION_RADIUS: 190,
    CURVE_INTENSITY: 0.65,
    GUN_RANGE: 320,
    GUN_COOLDOWN: 220, 
    GUN_DAMAGE: 0.8,
    LIGHT_RADIUS: 750, 
    BRIGHT_ZONE_RADIUS: 320, 
    ENEMY_TYPES: {
        ZOMBIE: { speed: 0.125, health: 2.2, color: '#4a5d4a', size: 16, score: 20, style: 'zombie' },
        SKELETON: { speed: 0.25, health: 1.2, color: '#d1d1d1', size: 14, score: 30, style: 'skeleton' },
        PUMPKIN: { speed: 0.09, health: 14.0, color: '#e67e22', size: 30, score: 80, style: 'pumpkin' },
        GHOST: { speed: 0.175, health: 1.8, color: '#ffffff', size: 18, score: 50, style: 'ghost' },
        VAMPIRE: { speed: 0.45, health: 6.0, color: '#1a1a1a', size: 22, score: 150, style: 'vampire' }
    },
    SPAWN_INTERVAL_BASE: 7000, 
    SPAWN_GROUP_SIZE: 6,
    RESTART_DELAY: 7000
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreVal = document.getElementById('score-val');
const waveVal = document.getElementById('wave-val');
const healthFill = document.getElementById('health-fill');
const overlay = document.getElementById('overlay');
const restartCounter = document.getElementById('restart-counter');
const autoHuntCheckbox = document.getElementById('auto-hunt-checkbox');
const soundCheckbox = document.getElementById('sound-checkbox');
const cooldownStatus = document.getElementById('cooldown-status');
const audioIcon = document.getElementById('audio-status-icon');

// STATE
let width, height;
let playerPos = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 };
let isPlaying = false;
let score = 0;
let baseHealth = CONFIG.BASE_HEALTH;
let wave = 1;
let enemies = [];
let projectiles = [];
let bullets = [];
let explosions = [];
let particles = [];
let ambiParticles = [];
let floatingTexts = [];
let lastSpawn = 0;
let lastShot = 0;
let lastGunShot = 0;
let difficultyFactor = 1;
let curveDirection = 1;
let restartTimer = null;
let turretAngle = 0;

/**
 * CORE LOGIC
 */
function init() {
    resize();
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mousePos.x = e.clientX - rect.left;
        mousePos.y = e.clientY - rect.top;
    });
    canvas.addEventListener('mousedown', () => {
        if (!isPlaying || autoHuntCheckbox.checked) return;
        tryFire(mousePos);
    });

    soundCheckbox.addEventListener('change', () => {
        if (!AudioEngine.ctx) AudioEngine.init();
        AudioEngine.enabled = soundCheckbox.checked;
        audioIcon.innerText = AudioEngine.enabled ? 'Audio' : 'Mute';
        AudioEngine.playUI();
    });

    for(let i=0; i<40; i++) {
        ambiParticles.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            s: Math.random() * 2 + 0.5,
            v: Math.random() * 0.2 + 0.1
        });
    }

    startGame();
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    playerPos = { x: width / 2, y: height - 100 };
}

function startGame() {
    if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
    score = 0; baseHealth = CONFIG.BASE_HEALTH; wave = 1; difficultyFactor = 1;
    enemies = []; projectiles = []; bullets = []; explosions = []; particles = []; floatingTexts = [];
    isPlaying = true;
    overlay.classList.add('hidden');
    updateUI();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    isPlaying = false;
    overlay.classList.remove('hidden');
    let timeLeft = CONFIG.RESTART_DELAY / 1000;
    restartCounter.innerText = `Rebooting in ${timeLeft}s...`;
    const countInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) restartCounter.innerText = `Rebooting in ${timeLeft}s...`;
        else clearInterval(countInterval);
    }, 1000);
    restartTimer = setTimeout(() => { clearInterval(countInterval); startGame(); }, CONFIG.RESTART_DELAY);
}

function tryFire(target) {
    const now = Date.now();
    if (now - lastShot > CONFIG.BOMB_COOLDOWN) {
        const fixedTarget = { x: target.x, y: target.y };
        projectiles.push(new Projectile(playerPos, fixedTarget, curveDirection));
        lastShot = now; curveDirection *= -1;
        AudioEngine.playShot();
    }
}

function updateDefenses() {
    const now = Date.now();
    let nearestEnemy = null;
    let minDist = Infinity;
    for (const enemy of enemies) {
        const d = Math.hypot(enemy.x - playerPos.x, enemy.y - playerPos.y);
        if (d < minDist) { minDist = d; nearestEnemy = enemy; }
    }
    
    if (nearestEnemy) {
        const targetAngle = Math.atan2(nearestEnemy.y - playerPos.y, nearestEnemy.x - playerPos.x);
        let diff = targetAngle - turretAngle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        turretAngle += diff * 0.15;

        if (autoHuntCheckbox.checked) {
            const enemyCoords = { x: nearestEnemy.x, y: nearestEnemy.y };
            tryFire(enemyCoords);
            mousePos = enemyCoords;
        }
        
        if (minDist < CONFIG.GUN_RANGE && now - lastGunShot > CONFIG.GUN_COOLDOWN) {
            bullets.push(new Bullet(playerPos, nearestEnemy));
            lastGunShot = now;
            AudioEngine.playShot();
        }
    } else {
        const mouseAngle = Math.atan2(mousePos.y - playerPos.y, mousePos.x - playerPos.x);
        let diff = mouseAngle - turretAngle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        turretAngle += diff * 0.05;
    }
}

/**
 * RENDER FUNCTIONS
 */
function drawBackground() {
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#050507';
    ctx.fillRect(0, 0, width, height);
    
    ctx.strokeStyle = 'rgba(0, 255, 204, 0.04)';
    ctx.lineWidth = 1;
    const gridSize = 60;
    for(let x = 0; x < width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
    for(let y = 0; y < height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    for(let p of ambiParticles) {
        p.y += p.v; if(p.y > height) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawLighting() {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    
    const baseGlow = ctx.createRadialGradient(
        playerPos.x, playerPos.y, 0, 
        playerPos.x, playerPos.y, CONFIG.LIGHT_RADIUS
    );
    baseGlow.addColorStop(0, 'rgba(0, 255, 204, 0.35)'); 
    baseGlow.addColorStop(CONFIG.BRIGHT_ZONE_RADIUS / CONFIG.LIGHT_RADIUS, 'rgba(0, 255, 204, 0.15)');
    baseGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    
    ctx.fillStyle = baseGlow;
    ctx.fillRect(0, 0, width, height);

    const beamWidth = 0.55;
    const beamGrad = ctx.createRadialGradient(playerPos.x, playerPos.y, 0, playerPos.x, playerPos.y, CONFIG.GUN_RANGE * 1.8);
    beamGrad.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
    beamGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    
    ctx.beginPath(); 
    ctx.moveTo(playerPos.x, playerPos.y);
    ctx.arc(playerPos.x, playerPos.y, CONFIG.GUN_RANGE * 1.8, turretAngle - beamWidth/2, turretAngle + beamWidth/2);
    ctx.closePath(); 
    ctx.fillStyle = beamGrad; 
    ctx.fill();
    
    ctx.restore();
}

function drawBase() {
    ctx.save();
    const now = Date.now();
    const bombProg = Math.min(1, (now - lastShot) / CONFIG.BOMB_COOLDOWN);

    ctx.save();
    ctx.translate(playerPos.x, playerPos.y);
    ctx.lineWidth = 10;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.beginPath();
    ctx.arc(0, 0, 110, 0, Math.PI * 2);
    ctx.stroke();

    if (bombProg < 1) {
        ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)';
        ctx.beginPath();
        ctx.arc(0, 0, 110, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * bombProg));
        ctx.stroke();
    } else {
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ffcc';
        ctx.strokeStyle = '#00ffcc';
        ctx.beginPath();
        ctx.arc(0, 0, 110, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();

    ctx.translate(playerPos.x, playerPos.y);
    ctx.shadowBlur = 50; ctx.shadowColor = 'rgba(0, 255, 204, 0.45)';
    ctx.fillStyle = '#111116';
    ctx.beginPath();
    for(let i=0; i<8; i++) {
        const angle = i * Math.PI / 4; const r = 90;
        const x = Math.cos(angle) * r; const y = Math.sin(angle) * r;
        if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#2a2a35'; ctx.lineWidth = 4; ctx.stroke();
    
    const corePulse = 1 + Math.sin(Date.now() * 0.005) * 0.1;
    ctx.rotate(Date.now() * 0.0005);
    ctx.strokeStyle = bombProg >= 1 ? 'rgba(0, 255, 204, 0.9)' : 'rgba(0, 255, 204, 0.4)'; 
    ctx.setLineDash([15, 30]);
    ctx.beginPath(); ctx.arc(0, 0, 70 * corePulse, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.resetTransform();
    ctx.translate(playerPos.x, playerPos.y);
    ctx.rotate(turretAngle);
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.roundRect(-40, -30, 70, 60, 10); ctx.fill();
    ctx.strokeStyle = bombProg >= 1 ? '#00ffcc' : '#444'; ctx.lineWidth = 1; ctx.stroke();
    
    ctx.fillStyle = '#111';
    ctx.fillRect(25, -20, 50, 14); ctx.fillRect(25, 6, 50, 14);
    
    if (Date.now() - lastGunShot < 50) {
        ctx.fillStyle = '#ffeb3b';
        ctx.fillRect(70, -18, 10, 10);
        ctx.fillRect(70, 8, 10, 10);
    }
    
    ctx.restore();
}

/**
 * ENTITY CLASSES
 */
class Bullet {
    constructor(start, target) {
        this.x = start.x; this.y = start.y;
        const angle = Math.atan2(target.y - start.y, target.x - start.x);
        this.vx = Math.cos(angle) * 15; this.vy = Math.sin(angle) * 15;
        this.life = 50;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.life--;
        for (const enemy of enemies) {
            if (Math.hypot(enemy.x - this.x, enemy.y - this.y) < enemy.size + 10) {
                enemy.health -= CONFIG.GUN_DAMAGE; return false;
            }
        }
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - this.vx, this.y - this.vy); ctx.stroke();
        ctx.restore();
    }
}

class Enemy {
    constructor(type, ox, oy) {
        const s = CONFIG.ENEMY_TYPES[type];
        this.type = type; 
        this.health = s.health * difficultyFactor; 
        this.maxHealth = this.health;
        this.speed = s.speed * (1 + (difficultyFactor-1)*0.12); 
        this.color = s.color; 
        this.size = s.size; 
        this.score = s.score;
        this.style = s.style;
        this.walkPhase = Math.random() * Math.PI * 2;
        
        const side = Math.floor(Math.random()*3); 
        if(side===0){ // 상단
            this.x = Math.random()*width; 
            this.y = -100; 
        } else if(side===1){ // 좌측
            this.x = -100; 
            this.y = Math.random()*(height - 200); 
        } else { // 우측
            this.x = width+100; 
            this.y = Math.random()*(height - 200); 
        }
        
        this.x += ox; this.y += oy;
    }
    
    update() {
        const dx = playerPos.x - this.x, dy = playerPos.y - this.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        this.x += (dx/d)*this.speed; this.y += (dy/d)*this.speed;
        this.walkPhase += this.speed * 0.25;
        if(d < 60) { baseHealth -= 10; this.health = 0; createExplosion(this.x, this.y, '#ff3366'); }
    }
    
    draw() {
        ctx.save();
        const cycle = this.walkPhase;
        const legSweep = Math.sin(cycle) * this.size;
        const bounce = Math.abs(Math.sin(cycle)) * (this.style === 'pumpkin' ? 8 : 4);
        const tilt = Math.sin(cycle) * 0.15;

        ctx.translate(this.x, this.y - bounce);
        ctx.rotate(tilt);

        ctx.save(); ctx.resetTransform();
        ctx.translate(this.x, this.y + this.size);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(0, 5, this.size*1.2, this.size*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        const headSize = this.size * 0.7;

        switch(this.style) {
            case 'zombie':
                ctx.fillStyle = '#4a5d4a';
                ctx.fillRect(-6, this.size-5 + legSweep, 5, 12);
                ctx.fillRect(2, this.size-5 + Math.sin(cycle*0.5)*8, 5, 12);
                ctx.beginPath(); ctx.roundRect(-this.size*0.8, -this.size, this.size*1.6, this.size*1.9, 3); ctx.fill();
                ctx.fillRect(this.size*0.6, -this.size*0.4, 16, 5); 
                ctx.fillStyle = '#800'; ctx.fillRect(-this.size*0.9, -this.size*0.3, 4, 4); 
                ctx.fillStyle = '#4a5d4a'; ctx.beginPath(); ctx.arc(0, -this.size*1.2, this.size*0.6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff3300'; ctx.beginPath(); ctx.arc(-3, -this.size*1.3, 2.5, 0, Math.PI*2); ctx.fill();
                break;

            case 'skeleton':
                ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(-5, this.size-5); ctx.lineTo(-5 + legSweep*0.5, this.size+10+legSweep); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(5, this.size-5); ctx.lineTo(5 - legSweep*0.5, this.size+10-legSweep); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -this.size); ctx.lineTo(0, this.size-5); ctx.stroke();
                for(let i=0; i<3; i++) { ctx.beginPath(); ctx.moveTo(-this.size*0.7, -this.size*0.4+i*6); ctx.lineTo(this.size*0.7, -this.size*0.4+i*6); ctx.stroke(); }
                ctx.fillStyle = '#e0e0e0'; ctx.beginPath(); ctx.roundRect(-this.size*0.5, -this.size*1.7, this.size, this.size*0.8, 5); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-3, -this.size*1.4, 3, 0, Math.PI*2); ctx.arc(3, -this.size*1.4, 3, 0, Math.PI*2); ctx.fill();
                break;

            case 'pumpkin':
                ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 5;
                ctx.beginPath(); ctx.moveTo(-10, 10); ctx.lineTo(-15 + legSweep, 25 + legSweep); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(10, 10); ctx.lineTo(15 - legSweep, 25 - legSweep); ctx.stroke();
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                grad.addColorStop(0, '#f39c12'); grad.addColorStop(1, '#d35400');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.ellipse(0, 0, this.size*1.2, this.size, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffdb1a';
                ctx.beginPath(); ctx.moveTo(-15, -8); ctx.lineTo(-5, -5); ctx.lineTo(-10, -18); ctx.closePath(); ctx.fill(); 
                ctx.beginPath(); ctx.moveTo(15, -8); ctx.lineTo(5, -5); ctx.lineTo(10, -18); ctx.closePath(); ctx.fill(); 
                ctx.beginPath(); ctx.moveTo(-15, 5); ctx.quadraticCurveTo(0, 15, 15, 5); ctx.lineTo(10, 8); ctx.lineTo(0, 5); ctx.lineTo(-10, 8); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#27ae60'; ctx.fillRect(-5, -this.size-5, 10, 10);
                break;

            case 'ghost':
                ctx.globalAlpha = 0.65;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(0, -this.size*0.3, this.size, Math.PI, 0);
                ctx.lineTo(this.size, this.size);
                for(let i=0; i<=4; i++) {
                    const x = this.size - (i * (this.size*2/4));
                    const y = this.size + Math.sin(cycle*3 + i) * 10;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(-this.size, -this.size*0.3); ctx.fill();
                ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(-5, -this.size*0.5, 4, 0, Math.PI*2); ctx.arc(6, -this.size*0.5, 4, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
                break;

            case 'vampire':
                ctx.fillStyle = '#000'; ctx.fillRect(-6, this.size-5+legSweep, 5, 10); ctx.fillRect(1, this.size-5-legSweep, 5, 10);
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.moveTo(-this.size-15, this.size+5); ctx.lineTo(0, -this.size*0.5); ctx.lineTo(this.size+15, this.size+5); ctx.quadraticCurveTo(0, this.size+15, -this.size-15, this.size+5); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(-15, -15); ctx.lineTo(15, -15); ctx.lineTo(5, -5); ctx.lineTo(-5, -5); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#c0392b'; ctx.fillRect(-5, -15, 10, 10); 
                ctx.fillStyle = '#f0f0f0'; ctx.beginPath(); ctx.arc(0, -this.size-5, this.size*0.6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(-3, -this.size-7, 2, 0, Math.PI*2); ctx.arc(3, -this.size-7, 2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.fillRect(-3.5, -this.size-2, 2, 3); ctx.fillRect(1.5, -this.size-2, 2, 3);
                break;
        }

        if(this.health < this.maxHealth) {
            ctx.fillStyle = '#111'; ctx.fillRect(-this.size, -this.size-35, this.size*2, 6);
            ctx.fillStyle = '#00ffcc'; ctx.fillRect(-this.size, -this.size-35, (this.size*2)*(this.health/this.maxHealth), 6);
        }
        ctx.restore();
    }
}

class Projectile {
    constructor(p0, p2, dir) {
        this.p0 = {...p0}; this.p2 = {...p2}; 
        this.p1 = getControlPoint(p0, this.p2, dir);
        this.t = 0; this.speed = CONFIG.PROJECTILE_SPEED; this.x = p0.x; this.y = p0.y; this.history = [];
    }
    update() {
        this.history.push({x: this.x, y: this.y}); if(this.history.length > 30) this.history.shift();
        this.t += this.speed;
        const pos = getQuadraticBezierPoint(this.t, this.p0, this.p1, this.p2);
        this.x = pos.x; this.y = pos.y;
        if(this.t >= 1) { explosions.push(new Explosion(this.x, this.y)); AudioEngine.playExplosion(); return false; }
        return true;
    }
    draw() {
        ctx.save();
        ctx.setLineDash([2, 4]); ctx.strokeStyle = 'rgba(255, 51, 102, 0.4)';
        ctx.beginPath(); ctx.arc(this.p2.x, this.p2.y, 15, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.beginPath(); ctx.moveTo(this.history[0]?.x, this.history[0]?.y);
        for(let p of this.history) ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = 'rgba(0, 255, 204, 0.45)'; ctx.lineWidth = 8; ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ffcc';
        ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class Explosion {
    constructor(x, y) {
        this.x = x; this.y = y; this.radius = 0; this.maxRadius = CONFIG.EXPLOSION_RADIUS; this.life = 1; this.damaged = new Set();
        for(let i=0; i<70; i++) particles.push(new Particle(x, y, '#00ffcc'));
    }
    update() {
        this.life -= 0.015; this.radius = (1-this.life) * this.maxRadius;
        enemies.forEach(e => {
            if(!this.damaged.has(e) && Math.hypot(e.x-this.x, e.y-this.y) < this.radius + e.size) {
                e.health -= 20; this.damaged.add(e);
                if(e.health <= 0) { score += Math.floor(e.score); createFloatingText(e.x, e.y, `+${e.score}`); }
            }
        });
        return this.life > 0;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = this.life;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 12; ctx.stroke();
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
        g.addColorStop(0, 'rgba(0, 255, 204, 0.8)'); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.fill(); ctx.restore();
    }
}

class Particle {
    constructor(x, y, c) {
        this.x = x; this.y = y; const a = Math.random()*Math.PI*2, f = Math.random()*10+5;
        this.vx = Math.cos(a)*f; this.vy = Math.sin(a)*f; this.life = 1; this.c = c;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= 0.02; return this.life > 0; }
    draw() { ctx.save(); ctx.fillStyle = this.c; ctx.globalAlpha = this.life; ctx.fillRect(this.x, this.y, 4, 4); ctx.restore(); }
}

/**
 * UTILS & LOOP
 */
function createExplosion(x, y, c) { for(let i=0; i<20; i++) particles.push(new Particle(x, y, c)); }
function createFloatingText(x, y, text) { floatingTexts.push({ x, y, text, life: 1.0 }); }

function spawnWave() {
    const now = Date.now();
    const rate = Math.max(1500, CONFIG.SPAWN_INTERVAL_BASE - (wave * 400));
    if(now - lastSpawn > rate) {
        lastSpawn = now;
        const g = CONFIG.SPAWN_GROUP_SIZE + Math.floor(wave*1.5);
        for(let i = 0; i < g; i++) {
            const types = Object.keys(CONFIG.ENEMY_TYPES);
            const type = types[Math.floor(Math.random() * types.length)];
            enemies.push(new Enemy(type, (Math.random()-0.5)*200, (Math.random()-0.5)*200));
        }
        if(score > wave * wave * 800) { wave++; difficultyFactor += 0.35; createFloatingText(width/2, height/2, "THREAT INCREASED"); }
    }
}

function updateUI() {
    scoreVal.innerText = score.toLocaleString(); waveVal.innerText = wave;
    healthFill.style.width = `${Math.max(0, (baseHealth / CONFIG.BASE_HEALTH) * 100)}%`;
    if(baseHealth <= 0 && isPlaying) gameOver();
}

function gameLoop() {
    if(!isPlaying) return;
    ctx.clearRect(0, 0, width, height);
    drawBackground();
    drawLighting(); 
    spawnWave();
    updateDefenses();
    drawBase();
    const now = Date.now();
    const prog = Math.min(1, (now - lastShot) / CONFIG.BOMB_COOLDOWN);
    cooldownStatus.innerText = prog >= 1 ? "TACTICAL BOMB READY" : "RELOADING...";
    cooldownStatus.style.color = prog >= 1 ? "#00ffcc" : "#666";
    if(isPlaying) {
        ctx.save();
        ctx.setLineDash([10, 20]); ctx.beginPath(); ctx.moveTo(playerPos.x, playerPos.y);
        const p1 = getControlPoint(playerPos, mousePos, curveDirection);
        for(let t=0; t<=1; t+=0.05) { const pt = getQuadraticBezierPoint(t, playerPos, p1, mousePos); ctx.lineTo(pt.x, pt.y); }
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 + prog*0.3})`; ctx.stroke(); ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(mousePos.x, mousePos.y, 25, 0, Math.PI*2);
        ctx.strokeStyle = prog < 1 ? 'rgba(51, 51, 51, 0.5)' : '#00ffcc'; ctx.lineWidth = 4; ctx.stroke();
        ctx.restore();
    }
    bullets = bullets.filter(b => { const a = b.update(); b.draw(); return a; });
    projectiles = projectiles.filter(p => { const a = p.update(); p.draw(); return a; });
    explosions = explosions.filter(e => { const a = e.update(); e.draw(); return a; });
    enemies = enemies.filter(e => { if(e.health <= 0) return false; e.update(); e.draw(); return true; });
    particles = particles.filter(p => { const a = p.update(); p.draw(); return a; });
    ctx.save(); ctx.font = 'bold 20px Inter'; ctx.textAlign = 'center';
    floatingTexts = floatingTexts.filter(t => { t.y -= 1; t.life -= 0.02; ctx.globalAlpha = t.life; ctx.fillStyle = 'gold'; ctx.fillText(t.text, t.x, t.y); return t.life > 0; });
    ctx.restore(); updateUI(); requestAnimationFrame(gameLoop);
}

function getQuadraticBezierPoint(t, p0, p1, p2) {
    return { x: (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x, y: (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y };
}

function getControlPoint(p0, p2, dir) {
    const midX = (p0.x + p2.x) / 2, midY = (p0.y + p2.y) / 2;
    const dx = p2.x - p0.x, dy = p2.y - p0.y, dist = Math.sqrt(dx * dx + dy * dy);
    const px = -dy / dist, py = dx / dist;
    const intensity = dist * CONFIG.CURVE_INTENSITY * dir;
    return { x: midX + px * intensity, y: midY + py * intensity };
}

init();
</script>
