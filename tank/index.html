<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Invasion: Tank Edition</title>
    <style>
        :root {
            --allied-color: #00e5ff;
            --enemy-color: #ff3d00;
            --bg-dark: #05050a;
            --panel-bg: rgba(10, 15, 30, 0.7);
            --accent: #ffd600;
            --danger: #ff1744;
            --glass-border: rgba(255, 255, 255, 0.1);
            --warp-color: #d500f9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 1200px;
            height: 600px;
            background: #000;
            overflow: hidden;
            border: 1px solid #1a1a2e;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        #game-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%);
            background-size: 100% 3px, 100% 100%;
            pointer-events: none;
            z-index: 50;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .top-branding-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, rgba(0, 229, 255, 0.1), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--glass-border);
            z-index: 70;
            backdrop-filter: blur(5px);
        }

        .brand-left { display: flex; align-items: center; gap: 15px; }
        .bunt-logo { font-weight: 900; font-size: 16px; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px var(--allied-color); }
        .game-subtitle { font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        .brand-right { display: flex; gap: 10px; pointer-events: auto; }
        .icon-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 4px; color: #fff; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .icon-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--allied-color); box-shadow: 0 0 10px var(--allied-color); transform: translateY(-1px); }
        .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .hud { position: absolute; top: 55px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 60; }
        .base-stats { background: var(--panel-bg); backdrop-filter: blur(12px); padding: 10px 20px; border-radius: 4px; border: 1px solid var(--glass-border); border-left: 4px solid var(--allied-color); min-width: 140px; }
        .base-stats.enemy { border-left: 1px solid var(--glass-border); border-right: 4px solid var(--enemy-color); text-align: right; }

        .tank-status { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--panel-bg); backdrop-filter: blur(15px); padding: 15px 35px; border-radius: 12px; display: flex; gap: 25px; align-items: center; border: 1px solid var(--glass-border); pointer-events: auto; z-index: 60; }
        .stat-group { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
        .bar-container { width: 110px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hp-fill { background: var(--allied-color); box-shadow: 0 0 10px var(--allied-color); }
        .energy-fill { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .circle-cd-container { position: relative; width: 44px; height: 44px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); transition: 0.3s; cursor: pointer; }
        .circular-progress { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            background: conic-gradient(var(--cd-color, var(--allied-color)) var(--pct, 0%), transparent 0); 
            mask: radial-gradient(transparent 62%, black 64%); 
            -webkit-mask: radial-gradient(transparent 58%, black 60%);
            transform: scaleX(-1);
        }
        .circle-label { font-size: 8px; font-weight: 900; color: rgba(255,255,255,0.4); text-align: center; z-index: 2; pointer-events: none; }
        .circle-cd-container.ready { border-color: var(--cd-color, var(--allied-color)); box-shadow: 0 0 15px var(--cd-color, var(--allied-color)); background: rgba(255,255,255,0.05); }
        .circle-cd-container.ready .circle-label { color: #fff; text-shadow: 0 0 8px var(--cd-color, var(--allied-color)); }
        .circle-cd-container:active { transform: scale(0.95); }

        .skills { display: flex; gap: 12px; }
        .skill-wrapper { position: relative; }
        .skill-key-hint { position: absolute; top: -8px; right: -2px; background: #222; padding: 1px 4px; border-radius: 3px; font-size: 8px; border: 1px solid var(--glass-border); z-index: 2; color: #fff; }

        .controls-top { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: auto; }
        button { background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); color: rgba(255,255,255,0.8); border: 1px solid var(--glass-border); padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; transition: 0.2s; }
        button:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

        #msg-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 5, 15, 0.95); padding: 60px; border-radius: 4px; text-align: center; display: none; border: 1px solid var(--allied-color); z-index: 100; box-shadow: 0 0 100px rgba(0,0,0,1); backdrop-filter: blur(10px); }
        .label { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .value { font-size: 15px; font-weight: 200; color: #fff; letter-spacing: 1px; }

        #init-loader { position: absolute; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
        @keyframes load-move { from { left: -100%; } to { left: 100%; } }

        /* 신규 재시작 버튼 스타일 */
        .restart-btn { 
            margin-top: 30px; 
            background: transparent; 
            border: 1px solid var(--allied-color); 
            color: var(--allied-color); 
            padding: 12px 30px; 
            font-size: 12px; 
            letter-spacing: 2px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: all 0.3s;
            text-shadow: 0 0 10px var(--allied-color);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }
        .restart-btn:hover {
            background: var(--allied-color);
            color: #000;
            box-shadow: 0 0 30px var(--allied-color);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-branding-bar">
        <div class="brand-left">
            <span class="bunt-logo">BUNTGAMES</span>
            <span class="game-subtitle">Eternal Invasion: Tank Edition</span>
        </div>
        <div class="brand-right">
            <a href="https://kitscript.com/game/" target="_blank" class="icon-btn" title="Homepage">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </a>
            <a href="https://youtube.com/@textcube" target="_blank" class="icon-btn" title="YouTube Channel">
                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
        </div>
    </div>

    <div id="init-loader">
        <div class="label" style="margin-bottom: 10px;">Tactical Deployment...</div>
        <div style="width: 200px; height: 1px; background: rgba(0, 229, 255, 0.2); position: relative; overflow: hidden;">
            <div style="width: 50%; height: 100%; background: var(--allied-color); position: absolute; animation: load-move 1s infinite;"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div id="allied-base-panel" class="base-stats">
            <div class="label">Operational Status</div>
            <div class="value" id="allied-base-hp">100%</div>
        </div>
        <div class="controls-top">
            <button id="sound-toggle">AUDIO: OFF</button>
            <button onclick="location.reload()">REBOOT</button>
            <button id="ai-toggle">AUTO-PILOT: ON</button>
        </div>
        <div id="enemy-base-panel" class="base-stats enemy">
            <div class="label">Target Integrity</div>
            <div class="value" id="enemy-base-hp">100%</div>
        </div>
    </div>

    <div class="tank-status">
        <div class="stat-group">
            <div class="label">Armor</div>
            <div class="bar-container"><div id="tank-hp-bar" class="bar-fill hp-fill" style="width: 100%"></div></div>
        </div>
        <div class="stat-group">
            <div class="label">Energy</div>
            <div class="bar-container"><div id="tank-energy-bar" class="bar-fill energy-fill" style="width: 100%"></div></div>
        </div>
        
        <div class="stat-group">
            <div id="warp-action-container" class="circle-cd-container" title="Warp to Base (R or B)">
                <div id="warp-action-circle" class="circular-progress" style="--pct: 100%; --cd-color: var(--warp-color)"></div>
                <div class="circle-label">WARP</div>
            </div>
        </div>

        <div class="skills">
            <div class="skill-wrapper">
                <span class="skill-key-hint">1</span>
                <div id="skill-1-container" class="circle-cd-container">
                    <div id="skill-1-circle" class="circular-progress" style="--pct: 100%"></div>
                    <div class="circle-label">STRK</div>
                </div>
            </div>
            <div class="skill-wrapper">
                <span class="skill-key-hint">2</span>
                <div id="skill-2-container" class="circle-cd-container">
                    <div id="skill-2-circle" class="circular-progress" style="--pct: 100%"></div>
                    <div class="circle-label">EMP</div>
                </div>
            </div>
            <div class="skill-wrapper">
                <span class="skill-key-hint">3</span>
                <div id="skill-3-container" class="circle-cd-container">
                    <div id="skill-3-circle" class="circular-progress" style="--pct: 100%"></div>
                    <div class="circle-label">MSL</div>
                </div>
            </div>
        </div>
    </div>

    <div id="msg-overlay">
        <h1 id="msg-title" style="font-size: 48px; font-weight: 100; letter-spacing: 10px; margin-bottom: 5px;">MISSION OVER</h1>
        <p id="msg-body" style="color: var(--allied-color); letter-spacing: 2px; margin-top: 0;">STATUS: NEUTRALIZED</p>
        <p style="color: #666; font-size: 11px; margin-top: 40px; font-weight: 800;">AUTO-REDEPLOY IN <span id="restart-timer" style="color: var(--accent);">7</span> SECONDS...</p>
        <button class="restart-btn" onclick="location.reload()">REDEPLOY NOW</button>
    </div>
</div>

<script>
/**
 * AUDIO ENGINE
 */
const AudioEngine = (() => {
    let ctx = null; let enabled = false;
    const init = () => { if (ctx) return; ctx = new (window.AudioContext || window.webkitAudioContext)(); };
    const playTone = (freq, duration, type = 'sine', volume = 0.1) => {
        if (!enabled || !ctx) return;
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq / 2, ctx.currentTime + duration);
        gain.gain.setValueAtTime(volume, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + duration);
    };
    return {
        init: init,
        toggle: () => { init(); enabled = !enabled; if (ctx && ctx.state === 'suspended') ctx.resume(); return enabled; },
        shoot: () => playTone(400, 0.08, 'square', 0.03),
        heavyShoot: () => playTone(120, 0.25, 'sawtooth', 0.06),
        explode: () => playTone(50, 0.8, 'triangle', 0.15),
        warp: () => playTone(800, 1.2, 'sine', 0.05),
        hit: () => playTone(180, 0.05, 'sawtooth', 0.03)
    };
})();

/**
 * CONFIG & STATE
 */
const CONFIG = {
    WIDTH: 1200, HEIGHT: 600,
    BASE_HP: 3000, 
    TANK_HP: 600, 
    TANK_ENERGY: 100,
    TANK_RANGE: 220, TANK_SKILL_RANGE: 180, 
    SECONDARY_CD: 120, WARP_TIME: 180,
    SPAWN_RATE: 100,
    ULT1_CD: 800, ULT2_CD: 1000, ULT3_CD: 1200,
    MAX_SHARDS: 100, 
    COLORS: { allied: '#00e5ff', enemy: '#ff3d00', accent: '#ffd600' }
};

const state = {
    running: false, entities: [], projectiles: [], shards: [], floatingTexts: [], muzzleFlashes: [],
    rangeEffects: [], stars: [], nebulae: [], player: null, enemyTank: null,
    bases: { allied: null, enemy: null }, keys: {}, frame: 0, spawnTimer: 0, aiEnabled: true
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CONFIG.WIDTH; canvas.height = CONFIG.HEIGHT;

/**
 * UTILITY FUNCTIONS
 */
const dist = (a, b) => Math.sqrt((a.x - b.x)**2 + (a.y - b.y)**2);
const angleBetween = (a, b) => Math.atan2(b.y - a.y, b.x - a.x);
const lerp = (a, b, t) => a + (b - a) * t;
const lerpAngle = (a, b, t) => { let d = b - a; while (d < -Math.PI) d += Math.PI * 2; while (d > Math.PI) d -= Math.PI * 2; return a + d * t; };

/**
 * EFFECTS CLASSES
 */
class Shard {
    constructor(x, y, color, speed) {
        this.x = x; this.y = y; this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const vel = 1 + Math.random() * speed;
        this.vx = Math.cos(angle) * vel;
        this.vy = Math.sin(angle) * vel;
        this.rotation = Math.random() * Math.PI * 2;
        this.vRot = (Math.random() - 0.5) * 0.2;
        this.size = 1.5 + Math.random() * 3.5;
        this.life = 1.0;
        this.decay = 0.01 + Math.random() * 0.015;
        this.type = Math.floor(Math.random() * 3); 
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.rotation += this.vRot;
        this.life -= this.decay;
        this.vx *= 0.98; this.vy *= 0.98;
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        if (this.type === 0) {
            ctx.moveTo(0, -this.size); ctx.lineTo(this.size, this.size); ctx.lineTo(-this.size, this.size);
        } else if (this.type === 1) {
            ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
        } else {
            ctx.moveTo(0, -this.size); ctx.lineTo(this.size/1.5, 0); ctx.lineTo(0, this.size); ctx.lineTo(-this.size/1.5, 0);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }
}

function spawnShards(x, y, color, count, speed) {
    for(let i=0; i<count; i++) {
        if (state.shards.length > CONFIG.MAX_SHARDS) state.shards.shift();
        state.shards.push(new Shard(x, y, color, speed));
    }
}

class RangeImpact {
    constructor(x, y, radius, type, color) {
        this.x = x; this.y = y; this.radius = radius;
        this.type = type; this.color = color;
        this.life = 60; this.maxLife = 60;
        this.currentRadius = type === 'EMP' ? 10 : radius;
    }
    update() {
        this.life--;
        if (this.type === 'EMP') this.currentRadius = lerp(this.currentRadius, this.radius, 0.15);
    }
    draw(ctx) {
        const alpha = (this.life / this.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha * 0.4;
        ctx.shadowBlur = 15; ctx.shadowColor = this.color;
        if (this.type === 'STRK') {
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x - 75, this.y - 75, 150, 150);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = alpha * 0.08;
            ctx.fillRect(this.x - 75, this.y - 75, 150, 150);
        } else if (this.type === 'EMP') {
            ctx.beginPath();
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.arc(this.x, this.y, this.currentRadius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = this.color;
            ctx.globalAlpha = alpha * 0.1;
            ctx.fill();
        }
        ctx.restore();
    }
}

class MuzzleFlash {
    constructor(x, y, angle, color, size = 15) {
        this.x = x; this.y = y; this.angle = angle; this.color = color;
        this.life = 6; this.maxLife = 6;
        this.size = size;
    }
    update() { this.life--; }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.globalAlpha = alpha;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(this.size, -this.size/2); ctx.lineTo(this.size * 1.2, 0); ctx.lineTo(this.size, this.size/2); ctx.closePath(); ctx.fill();
        ctx.restore();
    }
}

class TacticalText {
    constructor(x, y, text, color) {
        this.x = x; this.y = y; this.text = text; this.color = color;
        this.life = 1.0; this.vy = -0.6;
    }
    update() { this.y += this.vy; this.life -= 0.015; }
    draw(ctx) {
        ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
        ctx.font = '800 10px Inter'; ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y); ctx.restore();
    }
}

/**
 * GAME ENTITIES
 */

class Projectile {
    constructor(x, y, angle, speed, damage, ownerSide, color, isMissile = false, maxRange = 1000) {
        this.startX = x; this.startY = y; this.x = x; this.y = y;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.damage = damage; this.ownerSide = ownerSide; this.color = color;
        this.life = 300; this.isMissile = isMissile; this.target = null; this.maxRange = maxRange;
    }
    update() {
        if (this.isMissile && this.target && this.target.hp > 0 && !this.target.dying) {
            const targetAngle = angleBetween(this, this.target);
            const currentAngle = Math.atan2(this.vy, this.vx);
            const newAngle = lerpAngle(currentAngle, targetAngle, 0.12);
            const speed = Math.sqrt(this.vx**2 + this.vy**2);
            this.vx = Math.cos(newAngle) * speed; this.vy = Math.sin(newAngle) * speed;
        }
        this.x += this.vx; this.y += this.vy; this.life--;
        const traveled = Math.sqrt((this.x - this.startX)**2 + (this.y - this.startY)**2);
        if (traveled > this.maxRange) this.life = 0;
        
        for(let i=0; i<state.entities.length; i++) {
            const e = state.entities[i];
            if (e.side !== this.ownerSide && !e.dead && !e.dying && dist(this, e) < (e.radius || 15)) {
                e.takeDamage(this.damage); this.life = 0;
                spawnShards(this.x, this.y, this.color, 3, 2);
                break;
            }
        }
    }
    draw(ctx) {
        ctx.save(); ctx.shadowBlur = 5; ctx.shadowColor = this.color; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.isMissile ? 4 : 2, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
}

class Unit {
    constructor(x, y, side) {
        this.x = x; this.y = y; this.side = side;
        this.hp = 100; this.maxHp = 100;
        this.color = side === 'allied' ? CONFIG.COLORS.allied : CONFIG.COLORS.enemy;
        this.dead = false;
        this.dying = false; 
        this.deathTimer = 0;
        this.maxDeathTimer = 45; 
        this.radius = 12; this.isMoving = false; this.hitTimer = 0;
    }
    takeDamage(amt) {
        if (this.dead || this.dying) return;
        this.hp -= amt; AudioEngine.hit(); 
        this.hitTimer = 48; 
        if (this.hp <= 0) this.triggerDeath();
    }
    triggerDeath() {
        if (this.dying) return;
        this.dying = true;
        this.deathTimer = this.maxDeathTimer;
        AudioEngine.explode();
        spawnShards(this.x, this.y, this.color, 8, 3);
    }
    updateDeathSequence() {
        if (!this.dying) return;
        this.deathTimer--;
        if (this.deathTimer % 6 === 0) spawnShards(this.x + (Math.random()-0.5)*20, this.y + (Math.random()-0.5)*20, '#fff', 2, 2);
        if (this.deathTimer <= 0) {
            this.dying = false;
            this.dead = true;
            AudioEngine.explode();
            spawnShards(this.x, this.y, this.color, 12, 5);
            spawnShards(this.x, this.y, '#fff', 4, 7);
        }
    }
    drawHPBar(ctx, width, height, offset) {
        if (this.dead || this.dying) return;
        const pct = Math.max(0, this.hp / this.maxHp);
        ctx.save(); ctx.translate(this.x, this.y + offset);
        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(-width/2, 0, width, height);
        ctx.fillStyle = pct > 0.3 ? this.color : '#ff3d00'; ctx.fillRect(-width/2, 0, width * pct, height);
        ctx.restore();
    }
    drawThruster(ctx, x, y, angle, length, width, color) {
        if (!this.isMoving || this.dying) return;
        ctx.save(); ctx.translate(x, y); ctx.rotate(angle + Math.PI);
        const grad = ctx.createLinearGradient(0, 0, length, 0);
        grad.addColorStop(0, color); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.moveTo(0, -width/2); ctx.lineTo(length, 0); ctx.lineTo(0, width/2); ctx.fill();
        ctx.restore();
    }
    isFlashing() { return this.hitTimer > 0 && Math.floor(this.hitTimer / 8) % 2 === 0; }
}

class Base extends Unit {
    constructor(x, y, side) { 
        super(x, y, side); 
        this.hp = CONFIG.BASE_HP; this.maxHp = CONFIG.BASE_HP; 
        this.radius = 60; 
        this.rotation = 0;
    }
    update() {
        this.updateDeathSequence();
        if (this.hitTimer > 0) this.hitTimer--;
        this.rotation += 0.015;
    }
    draw(ctx) {
        if (this.dead) return;
        ctx.save(); 
        const flashing = this.isFlashing();
        const color = flashing ? '#fff' : this.color;
        const hpPct = this.hp / this.maxHp;

        ctx.translate(this.x, this.y);
        
        ctx.save();
        ctx.rotate(this.rotation);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.setLineDash([20, 15]);
        ctx.beginPath();
        ctx.arc(0, 0, 65, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.rotate(-this.rotation * 1.5);
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.5;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.arc(0, 0, 45, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        const coreSize = 25 + Math.sin(state.frame * 0.1) * 3;
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, coreSize);
        grad.addColorStop(0, color);
        grad.addColorStop(0.7, color);
        grad.addColorStop(1, 'transparent');
        
        ctx.save();
        ctx.globalAlpha = 0.3 + (hpPct * 0.5);
        ctx.fillStyle = grad;
        ctx.shadowBlur = 20 * hpPct;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.arc(0, 0, coreSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<6; i++) {
            const a = (i/6) * Math.PI*2;
            const px = Math.cos(a) * 55;
            const py = Math.sin(a) * 55;
            if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        ctx.restore();
        this.drawHPBar(ctx, 120, 8, -90);
    }
}

class Soldier extends Unit {
    constructor(x, y, side) {
        super(x, y, side); this.speed = 0.8 + Math.random() * 0.4; this.range = 140; this.fireRate = 90;
        this.cooldown = 0; this.radius = 12; this.angle = side === 'allied' ? 0 : Math.PI; this.turretAngle = this.angle; this.targetY = 100 + Math.random() * 400;
        this.barrelLen = 16;
    }
    update() {
        if (this.dead) return;
        if (this.dying) { this.updateDeathSequence(); return; }
        let target = this.findTarget(); this.isMoving = true;
        if (target && dist(this, target) < this.range) {
            this.isMoving = false; this.turretAngle = lerpAngle(this.turretAngle, angleBetween(this, target), 0.15);
            if (this.cooldown <= 0) { this.fire(target); this.cooldown = this.fireRate; }
        } else {
            const goalX = this.side === 'allied' ? CONFIG.WIDTH - 100 : 100;
            const moveDir = angleBetween(this, { x: goalX, y: this.targetY });
            this.x += Math.cos(moveDir) * this.speed; this.y += Math.sin(moveDir) * this.speed;
            this.angle = lerpAngle(this.angle, moveDir, 0.1); this.turretAngle = lerpAngle(this.turretAngle, this.angle, 0.05);
        }
        if (this.cooldown > 0) this.cooldown--;
        if (this.hitTimer > 0) this.hitTimer--;
    }
    findTarget() { return state.entities.filter(e => e.side !== this.side && !e.dead && !e.dying).sort((a,b) => dist(this,a) - dist(this,b))[0]; }
    fire(target) { 
        state.projectiles.push(new Projectile(this.x, this.y, this.turretAngle, 7, 10, this.side, this.color, false, this.range + 50)); 
        state.muzzleFlashes.push(new MuzzleFlash(this.x + Math.cos(this.turretAngle) * this.barrelLen, this.y + Math.sin(this.turretAngle) * this.barrelLen, this.turretAngle, this.color, 12));
        AudioEngine.shoot(); 
    }
    draw(ctx) {
        if (this.dead) return;
        this.drawThruster(ctx, this.x, this.y, this.angle, 25, 10, this.color);
        const flashing = this.isFlashing();
        ctx.save(); 
        if (flashing) ctx.filter = 'brightness(4) contrast(1.2)';
        ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        ctx.strokeStyle = flashing ? '#fff' : this.color;
        ctx.fillStyle = '#111'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(-12, -10, 24, 20, 3); ctx.fill(); ctx.stroke();
        ctx.restore();
        ctx.save(); 
        ctx.translate(this.x, this.y); ctx.rotate(this.turretAngle);
        ctx.fillStyle = '#222'; ctx.strokeStyle = this.color; 
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#555'; ctx.fillRect(0, -2, this.barrelLen, 4); ctx.strokeRect(0, -2, this.barrelLen, 4);
        ctx.restore();
        this.drawHPBar(ctx, 24, 3, -25);
    }
}

class AITank extends Unit {
    constructor(x, y, side) {
        super(x, y, side); this.hp = CONFIG.TANK_HP; this.maxHp = CONFIG.TANK_HP; this.energy = CONFIG.TANK_ENERGY; this.maxEnergy = CONFIG.TANK_ENERGY;
        this.angle = side === 'allied' ? 0 : Math.PI; this.turretAngle = this.angle; this.radius = 28; this.speed = 1.6; 
        this.warpTimer = 0; this.isWarping = false; this.cooldowns = { primary: 0, secondary: 0, ult1: 0, ult2: 0, ult3: 0 };
        this.aiControl = true; this.recoil = 0; this.targetY = y;
        this.barrelLen = 35;
    }
    update() {
        if (this.dead) { if (state.frame % 300 === 0) this.respawn(); return; }
        if (this.dying) { this.updateDeathSequence(); return; }
        
        if (this.isWarping) { 
            this.warpTimer++; 
            if (this.warpTimer >= CONFIG.WARP_TIME) this.finishWarp(); 
            return; 
        }
        
        const homeBase = this.side === 'allied' ? state.bases.allied : state.bases.enemy;
        if (dist(this, homeBase) < 120) { 
            if (this.hp < this.maxHp) this.hp += 0.8; 
            if (this.energy < this.maxEnergy) this.energy += 1.6; 
        }
        
        const lastX = this.x; const lastY = this.y;
        if (this.aiControl) this.handleAIBehavior(); else if (this === state.player) this.handleManualControl();
        
        const currentSpeed = Math.sqrt((this.x - lastX)**2 + (this.y - lastY)**2);
        this.isMoving = currentSpeed > 0.05;
        if (this.isMoving) this.angle = lerpAngle(this.angle, Math.atan2(this.y - lastY, this.x - lastX), 0.15);
        
        this.x = Math.max(50, Math.min(CONFIG.WIDTH - 50, this.x)); this.y = Math.max(50, Math.min(CONFIG.HEIGHT - 50, this.y));
        
        let target = this.findTarget(CONFIG.TANK_RANGE * 1.5);
        if (target) {
            const targetDist = dist(this, target);
            this.turretAngle = lerpAngle(this.turretAngle, angleBetween(this, target), 0.15);
            
            if (targetDist <= CONFIG.TANK_RANGE) {
                if (this.cooldowns.primary <= 0) { this.firePrimary(); this.cooldowns.primary = 22; }
            }
            
            if (this.energy >= 10 && this.cooldowns.secondary <= 0 && targetDist <= CONFIG.TANK_SKILL_RANGE) { 
                this.fireSecondary(target); 
                this.energy -= 10; 
                this.cooldowns.secondary = CONFIG.SECONDARY_CD; 
            }
        } else this.turretAngle = lerpAngle(this.turretAngle, this.angle, 0.05);
        
        this.recoil = lerp(this.recoil, 0, 0.1);
        Object.keys(this.cooldowns).forEach(k => { if(this.cooldowns[k] > 0) this.cooldowns[k]--; });
        if (this.hitTimer > 0) this.hitTimer--;
    }
    handleAIBehavior() {
        const alliedSoldiers = state.entities.filter(e => e.side === this.side && e instanceof Soldier && !e.dead && !e.dying);
        const enemies = state.entities.filter(e => e.side !== this.side && !e.dead && !e.dying);

        if (enemies.filter(e => dist(this, e) < 140).length >= 2) this.useUlt2();
        if (enemies.filter(e => dist(this, e) < 250).length >= 3) { this.useUlt1(); this.useUlt3(); }
        
        let target = this.findTarget(CONFIG.WIDTH);
        let goalX;
        
        let frontlineX = this.side === 'allied' ? 150 : CONFIG.WIDTH - 150;
        if (alliedSoldiers.length > 0) {
            if (this.side === 'allied') frontlineX = Math.max(...alliedSoldiers.map(s => s.x));
            else frontlineX = Math.min(...alliedSoldiers.map(s => s.x));
        }

        if (target) {
            const optimalDist = CONFIG.TANK_RANGE * 1.0; 
            let tacticalX = this.side === 'allied' ? frontlineX - 80 : frontlineX + 80;
            if (this.side === 'allied') goalX = Math.min(tacticalX, target.x - optimalDist);
            else goalX = Math.max(tacticalX, target.x + optimalDist);
        } else {
            goalX = this.side === 'allied' ? frontlineX - 80 : frontlineX + 80;
            if (this.side === 'allied') goalX = Math.max(goalX, CONFIG.WIDTH * 0.15);
            else goalX = Math.min(goalX, CONFIG.WIDTH * 0.85);
        }

        if (Math.abs(this.x - goalX) > 10) {
            const dir = goalX > this.x ? 1 : -1;
            const moveSpeed = Math.abs(this.x - goalX) < 50 ? this.speed * 0.5 : this.speed;
            this.x += dir * moveSpeed;
        }
        this.y += (this.targetY - this.y) * 0.03;
    }
    handleManualControl() {
        let mx = 0, my = 0;
        if (state.keys['KeyW'] || state.keys['ArrowUp']) my -= 1; if (state.keys['KeyS'] || state.keys['ArrowDown']) my += 1;
        if (state.keys['KeyA'] || state.keys['ArrowLeft']) mx -= 1; if (state.keys['KeyD'] || state.keys['ArrowRight']) mx += 1;
        if (mx !== 0 || my !== 0) { const a = Math.atan2(my, mx); this.x += Math.cos(a) * this.speed; this.y += Math.sin(a) * this.speed; }
    }
    respawn() { 
        this.dead = false; this.dying = false; this.hp = this.maxHp; this.energy = this.maxEnergy; 
        const b = this.side === 'allied' ? state.bases.allied : state.bases.enemy; 
        this.x = b.x; this.y = b.y; 
    }
    findTarget(max) { return state.entities.filter(e => e.side !== this.side && !e.dead && !e.dying && dist(this, e) <= max).sort((a, b) => dist(this, a) - dist(this, b))[0]; }
    firePrimary() { 
        this.recoil = 8; 
        state.projectiles.push(new Projectile(this.x, this.y, this.turretAngle, 11, 20, this.side, this.color, false, CONFIG.TANK_RANGE)); 
        state.muzzleFlashes.push(new MuzzleFlash(this.x + Math.cos(this.turretAngle) * (this.barrelLen - this.recoil), this.y + Math.sin(this.turretAngle) * (this.barrelLen - this.recoil), this.turretAngle, this.color, 18));
        AudioEngine.shoot(); 
    }
    fireSecondary(t) { 
        this.recoil = 15; 
        const impactColor = this.side === 'allied' ? CONFIG.COLORS.accent : CONFIG.COLORS.enemy;
        const p = new Projectile(this.x, this.y, this.turretAngle, 9, 50, this.side, impactColor, true, CONFIG.TANK_RANGE * 1.6); 
        p.target = t; state.projectiles.push(p); 
        state.muzzleFlashes.push(new MuzzleFlash(this.x + Math.cos(this.turretAngle) * (this.barrelLen - this.recoil), this.y + Math.sin(this.turretAngle) * (this.barrelLen - this.recoil), this.turretAngle, impactColor, 24));
        AudioEngine.heavyShoot(); 
    }
    
    startWarp() { 
        if (this.isWarping || this.dead || this.dying) return; 
        this.isWarping = true; 
        this.warpTimer = 0; 
        AudioEngine.warp(); 
        state.floatingTexts.push(new TacticalText(this.x, this.y - 40, "RTB: WARP INITIATED", "#d500f9")); 
    }
    finishWarp() { 
        const b = this.side === 'allied' ? state.bases.allied : state.bases.enemy; 
        this.x = b.x; 
        this.y = b.y; 
        this.isWarping = false; 
        spawnShards(this.x, this.y, '#d500f9', 20, 5); 
        AudioEngine.explode();
    }
    
    useUlt1() { 
        if (this.cooldowns.ult1 > 0 || this.dead || this.dying) return; 
        const tx = this.side === 'allied' ? this.x + 220 : this.x - 220;
        const impactColor = this.side === 'allied' ? CONFIG.COLORS.accent : CONFIG.COLORS.enemy;
        state.rangeEffects.push(new RangeImpact(tx, this.y, 75, 'STRK', impactColor));
        state.floatingTexts.push(new TacticalText(this.x, this.y - 40, "TACTICAL STRIKE", impactColor)); 
        for (let i=0; i<8; i++) { setTimeout(() => this.explosionAt(tx + (Math.random()-0.5)*150, this.y + (Math.random()-0.5)*150, 100, 70, impactColor), i * 120); } 
        this.cooldowns.ult1 = CONFIG.ULT1_CD; 
    }
    useUlt2() { 
        if (this.cooldowns.ult2 > 0 || this.dead || this.dying) return; 
        const impactColor = this.side === 'allied' ? this.color : CONFIG.COLORS.enemy;
        state.rangeEffects.push(new RangeImpact(this.x, this.y, 220, 'EMP', impactColor));
        state.floatingTexts.push(new TacticalText(this.x, this.y - 40, "EMP DISRUPTION", impactColor)); 
        this.explosionAt(this.x, this.y, 220, 30, impactColor); 
        this.cooldowns.ult2 = CONFIG.ULT2_CD; 
    }
    useUlt3() { 
        if (this.cooldowns.ult3 > 0 || this.dead || this.dying) return; 
        const impactColor = this.side === 'allied' ? CONFIG.COLORS.accent : CONFIG.COLORS.enemy;
        state.floatingTexts.push(new TacticalText(this.x, this.y - 40, "MISSILE SALVO", impactColor)); 
        state.entities.filter(e => e.side !== this.side && !e.dead && !e.dying && dist(this, e) < 500).slice(0, 8).forEach((t, i) => { 
            setTimeout(() => { 
                const p = new Projectile(this.x, this.y, Math.random()*Math.PI*2, 6, 60, this.side, impactColor, true, 600); 
                p.target = t; state.projectiles.push(p); AudioEngine.heavyShoot(); 
            }, i * 90); 
        }); 
        this.cooldowns.ult3 = CONFIG.ULT3_CD; 
    }
    explosionAt(x, y, r, d, c) { 
        AudioEngine.explode(); 
        spawnShards(x, y, c, 5, 3); 
        state.entities.forEach(e => { if (e.side !== this.side && !e.dead && !e.dying && dist({x,y}, e) < r) e.takeDamage(d); }); 
    }
    draw(ctx) {
        if (this.dead) return;
        const flashing = this.isFlashing();
        const offsetX = Math.cos(this.angle + Math.PI/2) * 12; const offsetY = Math.sin(this.angle + Math.PI/2) * 12;
        this.drawThruster(ctx, this.x + offsetX, this.y + offsetY, this.angle, 40, 15, this.color);
        this.drawThruster(ctx, this.x - offsetX, this.y - offsetY, this.angle, 40, 15, this.color);
        
        ctx.save(); 
        if (flashing) ctx.filter = 'brightness(4) contrast(1.5)';
        ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.fillStyle = '#0a0a0a'; ctx.strokeStyle = flashing ? '#fff' : this.color; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.roundRect(-28, -20, 56, 40, 5); ctx.fill(); ctx.stroke();
        ctx.restore(); 
        ctx.save();
        ctx.translate(this.x, this.y); ctx.rotate(this.turretAngle); ctx.translate(-this.recoil, 0); 
        ctx.fillStyle = '#111'; ctx.strokeStyle = this.color; 
        ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#444'; ctx.fillRect(0, -6, this.barrelLen, 12); ctx.strokeRect(0, -6, this.barrelLen, 12); 
        ctx.restore();
        this.drawHPBar(ctx, 60, 6, -55);
        if (this.isWarping) { 
            ctx.save(); 
            ctx.strokeStyle = '#d500f9'; 
            ctx.lineWidth = 4; 
            ctx.setLineDash([10, 5]); 
            ctx.beginPath(); 
            ctx.arc(this.x, this.y, 55 + Math.sin(state.frame * 0.2) * 8, 0, Math.PI * 2); 
            ctx.stroke(); 
            ctx.restore(); 
        }
    }
}

/**
 * BACKGROUND
 */
function initBackground() {
    state.stars = [];
    for(let i=0; i<150; i++) state.stars.push({ x: Math.random() * CONFIG.WIDTH, y: Math.random() * CONFIG.HEIGHT, size: Math.random() * 2, speed: 0.1 + Math.random() * 0.4, opacity: 0.2 + Math.random() * 0.8 });
    const colors = ['rgba(0, 229, 255, 0.05)', 'rgba(255, 61, 0, 0.03)', 'rgba(156, 39, 176, 0.04)'];
    state.nebulae = [];
    for(let i=0; i<5; i++) state.nebulae.push({ x: Math.random() * CONFIG.WIDTH, y: Math.random() * CONFIG.HEIGHT, r: 200 + Math.random() * 300, color: colors[i % colors.length] });
}

function drawBackground() {
    ctx.fillStyle = '#05050a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    state.nebulae.forEach(n => {
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        grad.addColorStop(0, n.color); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.03)'; ctx.lineWidth = 1;
    for(let i=0; i<canvas.width; i+=120) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
    for(let i=0; i<canvas.height; i+=120) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
    ctx.fillStyle = '#fff';
    state.stars.forEach(s => {
        ctx.globalAlpha = s.opacity;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        s.x -= s.speed; if(s.x < 0) s.x = CONFIG.WIDTH;
    });
    ctx.globalAlpha = 1.0;
}

/**
 * ENGINE LOOP
 */
function update() {
    state.frame++; state.spawnTimer++;
    if (state.spawnTimer >= CONFIG.SPAWN_RATE) {
        state.spawnTimer = 0;
        state.entities.push(new Soldier(120, 100 + Math.random() * 400, 'allied'));
        state.entities.push(new Soldier(CONFIG.WIDTH - 120, 100 + Math.random() * 400, 'enemy'));
    }
    for(let i=state.entities.length-1; i>=0; i--) state.entities[i].update && state.entities[i].update();
    for(let i=state.projectiles.length-1; i>=0; i--) state.projectiles[i].update();
    for(let i=state.shards.length-1; i>=0; i--) state.shards[i].update();
    for(let i=state.floatingTexts.length-1; i>=0; i--) state.floatingTexts[i].update();
    for(let i=state.muzzleFlashes.length-1; i>=0; i--) state.muzzleFlashes[i].update();
    for(let i=state.rangeEffects.length-1; i>=0; i--) state.rangeEffects[i].update();
    state.entities = state.entities.filter(e => !e.dead || e instanceof Base || e instanceof AITank);
    state.projectiles = state.projectiles.filter(p => p.life > 0);
    state.shards = state.shards.filter(p => p.life > 0);
    state.floatingTexts = state.floatingTexts.filter(t => t.life > 0);
    state.muzzleFlashes = state.muzzleFlashes.filter(f => f.life > 0);
    state.rangeEffects = state.rangeEffects.filter(r => r.life > 0);
    if (state.bases.enemy.hp <= 0) endGame("MISSION CLEAR", "TARGET HUB DESTROYED");
    if (state.bases.allied.hp <= 0) endGame("MISSION FAILED", "PROTOCOL BREACHED: BASE LOST");
    if (state.frame % 2 === 0) {
        document.getElementById('allied-base-hp').innerText = Math.max(0, Math.floor((state.bases.allied.hp/CONFIG.BASE_HP)*100)) + '%';
        document.getElementById('enemy-base-hp').innerText = Math.max(0, Math.floor((state.bases.enemy.hp/CONFIG.BASE_HP)*100)) + '%';
        document.getElementById('tank-hp-bar').style.width = (state.player.hp / state.player.maxHp) * 100 + '%';
        document.getElementById('tank-energy-bar').style.width = (state.player.energy / state.player.maxEnergy) * 100 + '%';
        
        const warpEl = document.getElementById(`warp-action-circle`);
        const warpContainer = document.getElementById(`warp-action-container`);
        if (state.player.isWarping) {
            const warpPct = (state.player.warpTimer / CONFIG.WARP_TIME) * 100;
            warpEl.style.setProperty('--pct', `${warpPct}%`);
            warpContainer.classList.remove('ready');
        } else {
            warpEl.style.setProperty('--pct', `100%`);
            warpContainer.classList.add('ready');
        }

        updateCD('skill-1', state.player.cooldowns.ult1, CONFIG.ULT1_CD);
        updateCD('skill-2', state.player.cooldowns.ult2, CONFIG.ULT2_CD);
        updateCD('skill-3', state.player.cooldowns.ult3, CONFIG.ULT3_CD);
    }
}

function updateCD(id, current, max) {
    const el = document.getElementById(`${id}-circle`);
    const container = document.getElementById(`${id}-container`);
    if (!el || !container) return;
    const pct = current > 0 ? ((max - current) / max) * 100 : 100;
    el.style.setProperty('--pct', `${pct}%`);
    if (current <= 0) container.classList.add('ready');
    else container.classList.remove('ready');
}

function draw() {
    drawBackground();
    state.rangeEffects.forEach(r => r.draw(ctx)); 
    state.entities.forEach(e => e.draw(ctx));
    state.projectiles.forEach(p => p.draw(ctx));
    state.muzzleFlashes.forEach(f => f.draw(ctx));
    state.shards.forEach(p => p.draw(ctx));
    state.floatingTexts.forEach(t => t.draw(ctx));
}

function loop() { if (!state.running) return; update(); draw(); requestAnimationFrame(loop); }

function startGame() {
    initBackground(); 
    state.bases.allied = new Base(80, CONFIG.HEIGHT/2, 'allied');
    state.bases.enemy = new Base(CONFIG.WIDTH - 80, CONFIG.HEIGHT/2, 'enemy');
    state.player = new AITank(200, CONFIG.HEIGHT/2, 'allied');
    state.enemyTank = new AITank(CONFIG.WIDTH - 200, CONFIG.HEIGHT/2, 'enemy');
    state.entities = [state.bases.allied, state.bases.enemy, state.player, state.enemyTank];
    state.running = true;
    document.getElementById('init-loader').style.display = 'none';
    loop();
}

function endGame(title, body) {
    if (!state.running) return;
    state.running = false; 
    document.getElementById('msg-title').innerText = title; 
    document.getElementById('msg-body').innerText = body; 
    document.getElementById('msg-overlay').style.display = 'block';
    
    // 카운트다운 로직
    let count = 7;
    const timerDisplay = document.getElementById('restart-timer');
    timerDisplay.innerText = count;
    
    const countdownInterval = setInterval(() => {
        count--;
        if (count >= 0) {
            timerDisplay.innerText = count;
        }
        if (count <= 0) {
            clearInterval(countdownInterval);
            location.reload();
        }
    }, 1000);
}

window.addEventListener('click', () => AudioEngine.init());
window.addEventListener('keydown', e => {
    state.keys[e.code] = true;
    if (['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
        state.player.aiControl = false;
        document.getElementById('ai-toggle').innerText = "AUTO-PILOT: OFF";
    }
    if (e.code === 'KeyR' || e.code === 'KeyB') state.player.startWarp();
    if (e.code === 'Digit1') state.player.useUlt1();
    if (e.code === 'Digit2') state.player.useUlt2();
    if (e.code === 'Digit3') state.player.useUlt3();
});
window.addEventListener('keyup', e => state.keys[e.code] = false);

document.getElementById('ai-toggle').addEventListener('click', (e) => {
    state.player.aiControl = !state.player.aiControl;
    e.target.innerText = state.player.aiControl ? "AUTO-PILOT: ON" : "AUTO-PILOT: OFF";
});
document.getElementById('sound-toggle').addEventListener('click', (e) => {
    AudioEngine.init();
    const isOn = AudioEngine.toggle();
    e.target.innerText = isOn ? "AUDIO: ON" : "AUDIO: OFF";
});
document.getElementById('warp-action-container').addEventListener('click', () => state.player.startWarp());
document.getElementById('skill-1-container').addEventListener('click', () => state.player.useUlt1());
document.getElementById('skill-2-container').addEventListener('click', () => state.player.useUlt2());
document.getElementById('skill-3-container').addEventListener('click', () => state.player.useUlt3());
window.onload = startGame;
</script>
</body>
</html>
