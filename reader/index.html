<head>

  <title>BuntStream Pro | Cinematic Typing Overlay (Local Storage)</title>
  <style>
    :root {
      --accent: #00f2ff;
      --text-color: #ffffff;
      --font-size: 42px;
      --font-family: 'Pretendard', -apple-system, sans-serif;
      --glass: rgba(255, 255, 255, 0.05);
      --text-shadow: 0 4px 15px rgba(0,0,0,0.9);
      --dimming: 0.4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      color: var(--text-color); font-family: var(--font-family);
    }

    .video-background {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    .video-background iframe {
      position: absolute; top: 50%; left: 50%;
      width: 100vw; height: 100vh;
      transform: translate(-50%, -50%);
      @media (min-aspect-ratio: 16/9) { height: 56.25vw; }
      @media (max-aspect-ratio: 16/9) { width: 177.78vh; }
      filter: brightness(var(--dimming)) contrast(1.1);
    }

    .overlay {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
    }

    .text-stage {
      position: fixed; inset: 0; z-index: 2;
      padding: 0 10vw; 
      display: flex; flex-direction: column;
      justify-content: flex-start; 
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 100%);
    }

    .text-container {
      width: 100%;
      display: flex; flex-direction: column;
      gap: 1.8rem;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform;
      margin-top: 75vh; 
    }

    .line {
      font-size: var(--font-size);
      font-weight: 800; line-height: 1.5;
      text-shadow: var(--text-shadow);
      white-space: pre-wrap; word-break: keep-all;
      opacity: 0.7; transition: opacity 0.4s, color 0.4s;
    }

    .line.current {
      opacity: 1; color: #fff;
    }

    .current::after {
      content: '_';
      display: inline-block; margin-left: 10px;
      color: var(--accent);
      animation: blink 0.8s infinite steps(2);
    }

    @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* UI 요소 */
    .floating-ui {
      position: fixed; top: 2rem; right: 2rem; z-index: 100;
      display: flex; flex-direction: column; gap: 0.8rem;
    }

    .icon-btn {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--glass); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; display: flex; justify-content: center; align-items: center;
      cursor: pointer; backdrop-filter: blur(15px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .icon-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); }
    .icon-btn label { font-size: 0.55rem; position: absolute; bottom: 4px; opacity: 0.8; font-weight: 900; letter-spacing: -0.5px; }

    /* 설정 모달 */
    .modal {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(30px);
      display: none; justify-content: center; align-items: center; padding: 2rem;
    }

    .modal.show { display: flex; animation: fadeIn 0.3s ease; }

    .settings-content {
      background: #0a0a0a; width: 100%; max-width: 750px;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
      padding: 3.5rem; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group.full { grid-column: span 2; }
    .form-group label { display: block; font-size: 0.7rem; opacity: 0.5; margin-bottom: 0.5rem; text-transform: uppercase; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: #151515; border: 1px solid #252525;
      border-radius: 12px; color: #fff; padding: 1rem;
    }
    .form-group textarea { height: 160px; resize: none; font-size: 0.9rem; }

    .primary-btn { background: var(--accent); color: #000; border: none; padding: 1.2rem; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 1rem; }

    #msgBox {
      position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #000; padding: 1rem 3.5rem; border-radius: 50px;
      font-weight: 900; z-index: 2000; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

AI는 정교하고 빠르게, 이미 학습된 산출물들을 통계학적으로 배껴내는 도구다.

AI로 무언가를 만든다는 것은 거창한 창조라기보다, 인류가 축적해온 지식과 패턴을 압축해서 재조합하는 행위에 가깝다. 그래서 많은 결과물이 창작이라기보다는 정교한 리믹스처럼 보인다. 이건 AI만의 문제가 아니라 인간 창작도 본질적으로 크게 다르지 않다. 다만 인간은 느리고 불완전한 과정 속에서 시행착오와 고뇌를 거치며 자신의 맥락을 덧붙이고, AI는 그 과정을 생략한 채 결과를 빠르게 내놓는다. 그래서 매끈하지만 가볍고, 그럴듯하지만 비슷한 결과들이 쏟아진다.

문제는 여기서부터 시작된다. 대부분의 사람들은 그럴듯한 결과에 만족한다. 프롬프트를 복사하고, 이미 만들어진 패턴을 조합하고, 적당히 수정해서 “이 정도면 됐다”고 멈춘다. 이 상태는 창작이라기보다 고급 소비에 가깝다. 겉으로는 생산처럼 보이지만 실제로는 남의 생각을 유통하는 파이프에 머무른다. AI는 잘 배끼는 도구이기 때문에, 잘 학습시킬수록 더 그럴듯한 결과를 빠르게 만들어낸다. 하지만 그럴듯함은 장점이면서 동시에 한계다. 통계적 평균으로 수렴하기 때문이다. 반대로 덜 그럴듯한 결과, 어설프고 틀린 결과 속에서 오히려 새로운 가능성이 열리기도 한다.

그래서 진짜 차이는 도구가 아니라 선택에서 발생한다. 무엇을 남기고 무엇을 버릴지, 어디서 틀릴지, 무엇을 끝까지 밀어붙일지에 대한 판단이 결과를 결정한다. 결국 모든 것은 선택으로 귀결된다. 그리고 그 선택 능력은 타고나는 것이 아니라 경험 속에서 만들어진다. 시도하고, 실패하고, 재배치하는 과정을 반복하면서 선택의 정확도가 올라간다. 많이 만든 사람이 아니라 많이 버려본 사람이 선택을 잘하게 된다.

이 과정에서 가장 큰 장애물은 자존심이다. 내가 믿었던 것이 틀렸을 수도 있다는 사실을 받아들이는 순간, 기존의 선택 기준이 무너진다. 그래서 사람은 방어하고, 합리화하고, 같은 패턴을 반복한다. 하지만 그 두려움을 내려놓는 순간, 비로소 업데이트가 시작된다. 막상 그 문턱을 넘고 나면 별 것 아닌 경우가 많다. 대부분의 장벽은 실제 난이도보다 심리적 저항이 더 크기 때문이다. 넘기 전에는 벽이지만, 넘고 나면 턱에 불과하다.

또 하나 중요한 건 기준의 위치다. 기준을 외부에 두면 흔들린다. 트렌드, 타인의 성과, 숫자에 따라 판단이 계속 바뀌기 때문이다. 반대로 내부 기준이 있으면 흔들리긴 해도 무너지지 않는다. 외부는 참고하고 내부가 결정하는 구조가 되어야 한다. 이 기준은 한 번에 만들어지지 않는다. 반복적인 담금질 과정 속에서 단단해진다. 너무 조급하면 얕게 굳고, 너무 느긋하면 형태가 잡히지 않는다. 시도는 빠르게 하되 확정은 늦추는 리듬이 필요하다.

여기서 행복의 기준이 개입한다. 결과에 만족을 두면 과정은 고통이 된다. 반대로 과정에 만족을 두면 담금질 자체가 즐거워진다. 같은 일을 하면서도 누군가는 버티고, 누군가는 쌓아간다. 결국 어디에서 보상을 느끼느냐에 따라 지속 가능성이 결정된다. 외부 기준과 조급함, 극한 상황이 겹치면 빠른 답을 찾을 수는 있다. 하지만 그건 벼락치기와 같다. 한 번의 성과는 만들 수 있지만 구조가 남지 않는다. 재현 가능하지 않고, 반복할 수 없으며, 결국 동기를 소진시킨다.

동기는 가장 중요한 연료다. 의미, 통제감, 성장감이 유지될 때 자연스럽게 지속된다. 하지만 외부 기준에 끌리고, 조급함에 밀리고, 극한으로 몰리면 이 구조가 무너진다. 빠른 성과를 얻는 대신 다시 움직일 힘을 잃는다. 그래서 중요한 것은 속도가 아니라 연료 관리다. 오늘 잘했는가보다 내일도 할 수 있는가가 더 중요하다.

결국 모든 이야기는 하나로 모인다. 해답은 어디에 존재하는 것이 아니라 만들어지는 것이다. 빠르게 찾았다고 좋은 것도 아니고, 늦게 찾았다고 나쁜 것도 아니다. 각각 얻는 것이 있고 잃는 것이 있다. 중요한 건 언제 빠르게 가고 언제 느리게 가야 하는지를 아는 것, 그리고 무엇을 기준으로 선택할 것인지 스스로 결정하는 것이다.

AI는 95%를 평준화시켰다. 나머지 5%는 인간에게 남겨졌다. 그 5%는 기술이 아니라 선택이고, 선택은 경험으로 만들어지며, 경험은 실패와 재배치 속에서 축적된다. 그리고 그 모든 과정의 시작점은 하나다.

자존심을 내려놓고,
내가 틀릴 수도 있다는 사실을 받아들이는 것.

거기서부터 비로소,
남의 답이 아니라 자신의 답을 만들어내는 흐름이 시작된다.

우리는 AI를 잘 쓰는 방법을 이야기하지만, 그 본질은 생각보다 단순할지도 모른다. AI는 무에서 유를 창조하지 않는다. 이미 학습된 방대한 데이터 속에서 그럴듯한 조합을 빠르게 만들어낼 뿐이다. 그래서 차이를 만드는 것은 도구가 아니라, 그것을 어떻게 활용하느냐에 달려 있다. 많은 사람들이 하네스, 프롬프트 공학, 컨텍스트 엔지니어링 같은 기술에 집중하지만, 정작 중요한 것은 값싸고 빠른 실험과 검증일지 모른다. 이미 기록되고 학습된 것이라면 누구나 접근할 수 있는 조건에 놓여 있다. 그렇다면 결국 방향은 명확해진다. 설계가 아니라, 실험과 검증에 얼마나 가까이 가 있느냐의 문제다.

설계는 우리가 알고 있는 것의 범주에서 출발한다. 그래서 안정적이지만 동시에 평균으로 수렴하기 쉽다. 반대로 실험은 모르는 영역까지 포함한다. 실패는 많지만 분산이 커지고, 그 안에서 의외성이 발생한다. 보통의 혁신은 바로 그 의외성에서 시작된다. 남들이 대수롭지 않게 여기는 것, 혹은 남들과 다른 길에서 나온다. 하지만 의외성만으로는 부족하다. 그것을 끝까지 밀어붙이는 반복과 검증이 뒤따르지 않으면 그저 스쳐 지나가는 아이디어로 남는다.

그래서 혁신은 답이 아니라 물음표에서 시작된다. 모두가 느낌표를 던질 때, 확신과 결론을 말할 때, 물음표를 던지는 일은 쉽지 않다. 물음표는 잘 돌아가는 시스템에 찬물을 끼얹는 행동처럼 보이기도 한다. 때로는 배척되고, 소외되기도 한다. 하지만 그 질문이 없다면 시스템은 결국 굳어버린다. 문제는 대부분의 사람들이 혁신을 원한다고 말하면서도 실제로는 3상 임상까지 끝난 혁신, 즉 이미 검증되고 안전한 결과만을 원한다는 데 있다. 불확실한 질문은 피하고, 정리된 답을 소비하는 것이 더 편하기 때문이다.

그래서 선택이 필요해진다. 세상에는 볼거리가 넘쳐난다. 무엇을 볼 것인가, 그리고 그중에서 무엇에 물음표를 던질 것인가. 우리는 이미 큐레이션된 정보를 소비하는 데 익숙해져 있다. 하지만 그것은 남의 기준이다. 이제는 무엇을 선택하고 무엇을 의심할 것인가에 대한 나만의 기준이 필요해진다. 결국 문제는 기준이다. 그 기준을 남에게 둘 것인가, 아니면 나에게 둘 것인가. 남의 기준을 따르면 편해진다. 하지만 그 순간 선택권도 함께 넘겨진다.

문제는 사회라는 구조 자체가 서로에게 영향을 주고받는 시스템이라는 점이다. 우리는 끊임없이 타인의 생각과 기준에 노출되고, 쉽게 감염된다. 그래서 기준을 나에게 두는 일은 생각보다 어렵다. 완전히 끊어내는 것은 불가능에 가깝다. 그래서 필요한 것은 리셋이 아니라 리프레시다. 기준은 한 번 세운다고 유지되지 않는다. 계속해서 흔들리고, 그래서 계속해서 다시 정리해야 한다.

방법은 의외로 단순하다. 산책을 하거나, 물을 바라보거나, 몰입할 수 있는 무언가에 몸을 맡기는 것. 낚시를 하거나, 산을 오르거나, 바람을 타거나, 몸을 움직이고 감각을 되찾는 일들. 누군가는 모든 것을 내려놓고 세계 일주를 선택하기도 하고, 누군가는 성지 순례를 하거나 무전 여행을 떠난다. 누군가는 마라톤을 뛰고, 누군가는 무도에 심취한다. 또 누군가는 스포츠 댄스나 사교 댄스를 통해 리듬 속에서 자신을 정리한다. 그 방식은 끝없이 다양하지만, 결국 하나로 수렴된다. 자신의 기준을 다시 세우는 과정이다.

그 과정 속에서 우리는 일상의 나를 잠시 지우거나 잊는다. 완전히 없애는 것이 아니라, 잠시 거리를 두는 것이다. 그리고 그 틈에서 변화가 일어난다. 미처 생각하지 못했던 것들이 떠오르고, 억지로 짜낸 것이 아니라 불현듯 튀어나온다. 찾으려 할 때는 보이지 않던 것들이, 비워낸 순간에 모습을 드러낸다. 그 생각들이 때로는 새로운 방향이 되고, 새로운 선택이 된다.

결국 혁신은 특별한 능력에서 나오지 않는다. 물음표를 던지는 용기, 실험을 반복하는 태도, 그리고 기준을 다시 세우는 과정 속에서 자연스럽게 만들어진다. 그리고 그 시작은 언제나 하나다. 이미 넘쳐나는 답이 아니라, 아직 던지지 않은 질문에서.

도장 안에는 사범님의 날카로운 외침이 울려 퍼지고, 열다섯 소녀 한지민은 땀으로 젖은 도복을 만지며 다시 자세를 가다듬지만, 강철처럼 단단한 주먹과 바람을 가르는 발차기, 검은띠 3단이라는 탄탄한 재능에도 불구하고 마음속에는 설명하기 어려운 갈등이 점점 깊어지고 있었다. 방과 후마다 스마트폰 화면 속 반짝이는 K-pop 아이돌 무대를 바라보며 환호와 조명, 춤과 음악이 어우러진 세계에 대한 동경은 커져만 갔고, 친구 미나가 전국대회가 코앞이라고 걱정스럽게 말해도 지민은 고개를 저으며 감정을 숨겼지만, 밤하늘을 바라보며 “태권도가 내 인생의 전부여야 할까?”라고 스스로에게 던지는 질문은 이미 그녀의 길을 흔들기 시작했다.

어느 늦은 오후, 공연장 옆 공원에서 스트레스를 풀기 위해 품새를 연습하던 지민은 무심코 K-pop 멜로디를 흥얼거리며 태권도 동작을 이어나가고 있었고, 그 순간 “잠깐, 거기 소녀!”라는 목소리와 함께 나타난 유명 기획사 김PD는 지민의 움직임을 유심히 바라보며 “태권도와 K-pop의 결합, 너에게서 완성형을 봤다”고 말했다. 전통과 가족의 기대라는 단단한 틀 안에서 살아온 지민에게 이 제안은 충격이었고, 태권도의 길과 새로운 가능성이라는 두 갈래 길 앞에서 그녀는 처음으로 스스로 선택해야 하는 현실과 마주하게 되었으며, 집으로 돌아가는 발걸음마다 마음속 갈등은 더욱 선명해졌다.

저녁 식탁 위의 무거운 공기를 뚫고 지민이 “저… 태권도 아이돌을 해보고 싶어요”라고 말하자 아빠는 격하게 반대했지만, 지민은 “태권도를 버리는 게 아니라 새로운 방식으로 알리는 거예요”라며 떨리는 목소리로 자신의 꿈을 털어놓았다. 결국 엄마의 조용한 지지가 지민에게 용기를 주었고, 지민은 김PD에게 자신만의 방식으로 도전하겠다고 전화를 걸었으며, 태권도 선수 미나, 춤에 강한 유진, 작곡에 재능 있는 소라와 함께 태권도 프린세스라는 팀을 만들며 새로운 여정을 시작했다.

데뷔 무대의 조명이 켜지던 순간, 지민과 팀원들은 태권도의 힘, K-pop의 리듬, 무대의 에너지를 하나로 결합해 혁신적인 퍼포먼스를 선보였고, 발차기와 포즈, 주먹 지르기가 음악의 비트와 완벽하게 맞물리며 관객의 폭발적인 환호를 이끌어냈다. 평론가들은 “전례 없는 조합”, “무술을 예술로 승화한 무대”라고 극찬했으며, 무엇보다 지민을 놀라게 한 것은 관객석 한가운데서 눈물을 흘리고 있는 아빠의 모습이었다. 공연이 끝나고 무대로 다가온 아빠는 지민을 끌어안으며 “미안하다, 아가야. 네 꿈을 제대로 보지 못했다”고 말했고, 지민은 “아빠, 저는 그냥 태권도를 더 멀리 전하고 싶은 거예요”라고 미소로 답했다.

그날 이후 태권도 프린세스는 폭발적인 인기를 얻으며 단숨에 스타로 떠올랐고, 그들의 음악은 태권도의 정신인 예의, 염치, 인내, 극기를 현대적 감성으로 재해석해 전 세계 팬들에게 깊은 울림을 전했다. 지민은 국가대표 선수이자 아이돌이라는 두 세계를 모두 품어내며 “꿈은 하나로 정해진 게 아니다. 열정이 가리키는 곳이 곧 나의 길이다”라는 메시지를 자신 있게 전했고, 그렇게 태권도의 힘과 음악의 마법이 만나는 새로운 전설이 전 세계로 퍼져나가기 시작했다.

이야기의 연금술사 — 몬테크리스토 소라 백작 2세

미래의 어느 왕국.

그 안에서 장면이 형상화되기 시작했다.

하늘은 구름이 아니라 데이터 스트림으로 흘렀고,

호수는 블록체인처럼 투명한 코드의 층으로 반짝였다.

그 위로, 한 존재가 내려왔다.

그녀의 날개는 수많은 NFT 조각으로 엮여 있었고,

그 빛은 현실과 가상을 동시에 물들였다.

걸그룹 데뷔를 기다리며 쌓은 10년의 인내와 열정, 이제 클럽 DJ로 스스로 무대를 만든다

그녀는 초등학교를 막 졸업하던 해 연습생이 되었고, 그 순간부터 열 살 끝자락에서 스무 살의 문턱까지 인생의 대부분을 연습실에서 보냈다. 학교 종소리보다 연습실 바닥을 치는 운동화 소리를 더 많이 들었고, 친구들의 대학 합격 소식보다 월말평가 점수를 더 자주 확인했다. 새로운 팀이 만들어졌다가 해체되고, 데뷔조가 구성되었다가 전원 교체되는 순간들을 수없이 반복하면서 그녀는 어느 순간 자신에게 묻기 시작했다. “나는 정말 내 꿈을 위해 달리고 있는 걸까, 아니면 누군가가 원하는 꿈을 대신 만들어주고 있는 걸까?” 그 질문은 10년이라는 시간을 관통하며 그녀 마음 깊은 곳을 흔들었다.

체력은 아직 충분했고, 춤도 노래도 누구에게도 밀리지 않을 자신이 있었지만, 마음은 더 이상 버틸 곳이 없었다. 실력은 충분하다는 말은 늘 들었지만, 이유는 항상 모호한 한마디로 정리되었다. “이미지가 조금 아쉽다.” 그 말은 오랜 시간 그녀의 자신감을 갉아먹었고, 눈물로 버틴 밤들이 쌓여갈수록 데뷔의 가능은 더 멀어져 보였다. 그러던 어느 날, 거울 앞에서 숨을 몰아쉬며 연습을 멈춘 순간, 그녀는 처음으로 스스로에게 솔직하게 말했다. “나는 더 이상 기다리기만 하는 사람이 되고 싶지 않아.”

그러던 어느 날 지인의 작업실에서 우연히 들려온 전자음과 리듬은 잠들어 있던 감정을 흔들어 깨웠다. 가수가 되지 못한 자신을 원망하던 마음이 이상하게도 그 리듬에 맞춰 가볍게 흔들렸고, 그녀는 그 순간 깨달았다. 무대를 버리고 싶었던 게 아니라, 무대를 기다리는 방식이 틀려 있었던 것이라고. 춤과 음악, 표현력과 리듬을 모두 담아낼 수 있는 새로운 길이 있었다. 그녀는 K-POP 스타일 클럽 DJ를 선택했고, 10년 동안 갈고 닦았던 퍼포먼스 감각은 DJ 부스 위에서 예상 밖의 빛을 내기 시작했다. 춤을 추며 믹싱하고, 비트에 맞춰 표정을 만들고, 관객의 숨결에 반응하며 무대를 이끄는 모든 동작이 자연스럽게 이어졌다. 누군가의 선택을 기다리는 사람이 아니라 스스로 무대를 만드는 사람이 된 것이다.

처음 무대에 섰을 때 느꼈던 떨림은 그 어떤 데뷔 평가보다 강했지만, 그 불안은 두려움이 아니라 설렘의 떨림이었다. 조명이 떨어지고 첫 드롭이 터지는 순간 관객은 그녀의 몸짓과 표정, 손끝의 작은 움직임까지 따라가기 시작했고, 그녀는 그날 확신했다. “나는 무대를 포기한 적이 없어. 이제야 내 진짜 첫 무대가 시작된 거야.” 데뷔는 이루지 못했지만, 그보다 더 진짜에 가까운 나의 무대를 발견한 밤이었다.

10년을 버티며 견뎌온 시간은 결코 헛되지 않았다. 그 시간은 실패가 아니라 준비였고, 길을 잃은 것이 아니라 자신만의 길을 찾기 위한 과정이었다. 그녀는 이제 말한다. “내가 원했던 건 데뷔라는 명함이 아니었어. 무대 위에서 나답게 숨 쉬는 순간이었어.” 그리고 그 깨달음은 그녀를 이전보다 더 멀리, 더 자유롭게, 더 빛나는 곳으로 이끌기 시작했다. 10년 동안 기다리기만 했던 연습생의 시간은 끝났고, 이제는 스스로 무대를 선택하는 아티스트로서의 여정이 막 시작된 것이다.

극로덕옥서세가(克魯德沃書世家)

조선 말엽,
세상이 점차 글로 움직이기 시작하던 무렵이었다.

장부가 곡식을 대신하고,
문서가 인심을 대신하던 시대에
한양 장터에 낯선 족보 하나가 떠돌았다.

두툼한 장지 위에 붉은 인장이 찍혀 있었고
그 위에는 이렇게 쓰여 있었다.

“극로덕옥서세가라.
이 족보를 드는 자,
밤낮으로 붓을 놓지 아니하는 서동 셋을 거느리리라.”

사람들은 술렁였다.

“밤낮으로 글을 짓는다 하니,
잠을 자도 집안이 굴러가겠구나.”

“이제는 붓이 하인이 되는 세상이라더라.”

그리하여 부유한 상인 몇이
그 족보를 사들였다.

족보를 산 집은
대문에 방을 붙였다.

“본 가문은 극로덕옥서세가요,
서동 셋이 밤낮으로 장부를 다스리노라.”

집 안은 늘 밝았다.

서동 셋이 번갈아 붓을 잡고

        <div class="form-group"><label>Typing Speed (ms)</label><input type="number" id="speedInput" value="60" /></div>
        <div class="form-group"><label>Line Delay (ms)</label><input type="number" id="delayInput" value="1500" /></div>
      </div>
      <button class="primary-btn" id="applyBtn">APPLY & SAVE LOCALLY</button>
      <button onclick="document.getElementById('settingsModal').classList.remove('show')" style="background:none; border:none; color:#555; width:100%; margin-top:1.2rem; cursor:pointer; font-weight:700;">CLOSE</button>
    </div>
  </div>

  <script>
    class TypingOverlay {
      constructor() {
        this.container = document.getElementById('textContainer');
        this.stage = document.querySelector('.text-stage');
        this.player = document.getElementById('ytPlayer');
        this.msgBox = document.getElementById('msgBox');
        
        this.STORAGE_KEY = 'buntstream_settings';
        this.isPaused = false;
        this.isTabHidden = false; 
        this.isMuted = true;
        this.currentSessionId = 0; 
        
        this.speed = 60;
        this.delay = 1500;
        this.commaDelay = 1000;
        this.restartDelaySeconds = 7;
        this.audioCtx = null;

        this.initEvents();
        this.loadSettings();
      }

      /**
       * 로컬 저장소에서 설정 불러오기
       */
      loadSettings() {
        const savedData = localStorage.getItem(this.STORAGE_KEY);
        if (savedData) {
          try {
            const data = JSON.parse(savedData);
            this.populateUI(data);
            this.applyToEngine(data);
            this.showMsg("SETTINGS LOADED FROM CACHE");
          } catch (e) {
            console.error("Failed to parse settings", e);
            this.start();
          }
        } else {
          this.start();
        }
      }

      /**
       * 로컬 저장소에 설정 저장
       */
      saveSettings() {
        const data = {
          ytId: document.getElementById('ytIdInput').value.trim(),
          fontFamily: document.getElementById('fontFamilyInput').value,
          textColor: document.getElementById('textColorInput').value,
          fontSize: parseInt(document.getElementById('fontSizeInput').value),
          accentColor: document.getElementById('accentColorInput').value,
          dimming: parseInt(document.getElementById('dimmingInput').value),
          script: document.getElementById('scriptInput').value,
          speed: parseInt(document.getElementById('speedInput').value),
          delay: parseInt(document.getElementById('delayInput').value)
        };

        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
        this.applyToEngine(data);
        this.showMsg("SETTINGS SAVED LOCALLY");
        document.getElementById('settingsModal').classList.remove('show');
      }

      populateUI(data) {
        if (data.ytId) document.getElementById('ytIdInput').value = data.ytId;
        if (data.fontFamily) document.getElementById('fontFamilyInput').value = data.fontFamily;
        if (data.textColor) document.getElementById('textColorInput').value = data.textColor;
        if (data.fontSize) document.getElementById('fontSizeInput').value = data.fontSize;
        if (data.accentColor) document.getElementById('accentColorInput').value = data.accentColor;
        if (data.dimming) document.getElementById('dimmingInput').value = data.dimming;
        if (data.script) document.getElementById('scriptInput').value = data.script;
        if (data.speed) document.getElementById('speedInput').value = data.speed;
        if (data.delay) document.getElementById('delayInput').value = data.delay;
      }

      applyToEngine(data) {
        const root = document.documentElement;
        if (data.textColor) root.style.setProperty('--text-color', data.textColor);
        if (data.accentColor) root.style.setProperty('--accent', data.accentColor);
        if (data.fontSize) root.style.setProperty('--font-size', data.fontSize + 'px');
        if (data.fontFamily) root.style.setProperty('--font-family', data.fontFamily);
        if (data.dimming) root.style.setProperty('--dimming', data.dimming / 100);

        if (data.ytId) {
          const currentSrc = this.player.src;
          const newSrc = `https://www.youtube.com/embed/${data.ytId}?autoplay=1&mute=${this.isMuted?1:0}&controls=0&loop=1&playlist=${data.ytId}&modestbranding=1&rel=0&enablejsapi=1`;
          if (!currentSrc.includes(data.ytId)) {
            this.player.src = newSrc;
          }
        }
        
        this.speed = parseInt(data.speed) || 60;
        this.delay = parseInt(data.delay) || 1500;

        this.start();
      }

      initEvents() {
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.add('show');
        document.getElementById('playPauseBtn').onclick = () => this.togglePause();
        document.getElementById('pasteBtn').onclick = () => this.handlePaste();
        document.getElementById('soundBtn').onclick = () => this.toggleSound();
        document.getElementById('applyBtn').onclick = () => this.saveSettings();

        document.getElementById('homeBtn').onclick = () => window.open('https://kitscript.com/game/pickme/', '_blank');
        document.getElementById('youtubeBtn').onclick = () => window.open('https://youtube.com/@textcube', '_blank');

        document.addEventListener('visibilitychange', () => { this.isTabHidden = document.hidden; });
        window.addEventListener('paste', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          const text = e.clipboardData.getData('text');
          if (text) { 
            document.getElementById('scriptInput').value = text; 
            this.showMsg("SYNCED & SAVING...");
            this.saveSettings(); 
          }
        });
      }

      playTypeSound() {
        if (this.isMuted || this.isPaused || this.isTabHidden) return;
        if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(140 + Math.random() * 40, this.audioCtx.currentTime);
        gain.gain.setValueAtTime(0.06, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.04);
        osc.connect(gain); gain.connect(this.audioCtx.destination);
        osc.start(); osc.stop(this.audioCtx.currentTime + 0.04);
      }

      toggleSound() {
        this.isMuted = !this.isMuted;
        document.getElementById('soundBtn').querySelector('span').innerText = this.isMuted ? '🔈' : '🔊';
        this.player.contentWindow.postMessage(JSON.stringify({ event: 'command', func: this.isMuted ? 'mute' : 'unMute', args: '' }), '*');
        if (!this.isMuted && this.audioCtx?.state === 'suspended') this.audioCtx.resume();
        this.showMsg(this.isMuted ? "MUTED" : "SOUND ON");
      }

      showMsg(text) {
        this.msgBox.textContent = text; this.msgBox.style.display = 'block';
        setTimeout(() => { this.msgBox.style.display = 'none'; }, 2000);
      }

      async handlePaste() {
        try {
          const text = await navigator.clipboard.readText();
          if (text) { 
            document.getElementById('scriptInput').value = text; 
            this.showMsg("SYNCED & SAVING...");
            this.saveSettings();
          }
        } catch (err) { this.showMsg("USE CTRL+V TO PASTE"); }
      }

      async sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
      async checkPause() { while (this.isPaused || this.isTabHidden) await this.sleep(100); }

      togglePause() {
        this.isPaused = !this.isPaused;
        document.getElementById('playPauseBtn').querySelector('span').innerText = this.isPaused ? '▶' : '⏸';
      }

      async start() {
        this.currentSessionId++;
        const mySessionId = this.currentSessionId;
        this.container.innerHTML = '';
        this.container.style.transform = 'translateY(0)';
        this.isPaused = false;
        
        const scriptRaw = document.getElementById('scriptInput').value;
        const lines = scriptRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

        let idx = 0;
        while (idx < lines.length && mySessionId === this.currentSessionId) {
          await this.checkPause();
          const lineEl = document.createElement('div');
          lineEl.className = 'line current';
          this.container.appendChild(lineEl);
          
          for (let char of lines[idx]) {
            if (mySessionId !== this.currentSessionId) return;
            await this.checkPause();
            lineEl.textContent += char;
            this.playTypeSound();
            this.autoScroll(); 
            await this.sleep(char === ',' ? this.commaDelay : this.speed);
          }
          lineEl.classList.remove('current');
          idx++;
          await this.sleep(this.delay);
          this.autoScroll();
        }

        if (mySessionId === this.currentSessionId) await this.handleRestart(mySessionId);
      }

      async handleRestart(sessionId) {
        const cd = document.createElement('div');
        cd.className = 'line current';
        cd.style.color = 'var(--accent)';
        this.container.appendChild(cd);
        for (let i = this.restartDelaySeconds; i > 0; i--) {
          if (sessionId !== this.currentSessionId) return;
          await this.checkPause();
          cd.textContent = `RESTARTING IN ${i}...`;
          this.autoScroll();
          await this.sleep(1000);
        }
        if (sessionId === this.currentSessionId) this.start();
      }

      autoScroll() {
        const lastLine = this.container.lastElementChild;
        if (!lastLine) return;
        const stageH = this.stage.clientHeight;
        const lastLineBottom = lastLine.offsetTop + lastLine.offsetHeight;
        const offset = Math.max(0, lastLineBottom);
        this.container.style.transform = `translateY(-${offset}px)`;
      }
    }

    window.onload = () => { window.app = new TypingOverlay(); };
  </script>
