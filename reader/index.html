<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextCast Reader v2</title>
  <style>
    :root {
      --accent: #00f2ff;
      --urgent: #ff476f;
      --resume: #ffd166;
      --text-color: #ffffff;
      --font-size: 42px;
      --font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --glass: rgba(255, 255, 255, 0.06);
      --panel: rgba(10, 10, 10, 0.92);
      --line: rgba(255, 255, 255, 0.14);
      --muted: rgba(255, 255, 255, 0.62);
      --text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
      --dimming: 0.4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text-color);
      font-family: var(--font-family);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .video-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: #000;
    }

    .video-background iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vh;
      transform: translate(-50%, -50%);
      filter: brightness(var(--dimming)) contrast(1.1);
    }

    @media (min-aspect-ratio: 16/9) {
      .video-background iframe { height: 56.25vw; }
    }

    @media (max-aspect-ratio: 16/9) {
      .video-background iframe { width: 177.78vh; }
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 28%, rgba(0, 0, 0, 0.7)),
        radial-gradient(circle, transparent 25%, rgba(0, 0, 0, 0.58) 100%);
      pointer-events: none;
    }

    .topbar {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 0.35rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(5, 8, 10, 0.34);
      backdrop-filter: blur(18px);
      opacity: 0.24;
      transition: opacity 0.2s, background 0.2s, border-color 0.2s;
    }

    .toolbar:hover,
    .toolbar:focus-within {
      opacity: 1;
      background: rgba(5, 8, 10, 0.68);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.82);
      display: grid;
      place-items: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
      position: relative;
      font-weight: 800;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.16);
      color: #fff;
      transform: translateY(-1px);
    }

    .icon-btn span {
      font-size: 1.05rem;
      line-height: 1;
    }

    .icon-btn label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
    }

    .text-stage {
      position: fixed;
      inset: 0;
      z-index: 2;
      padding: 0 10vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
    }

    .status-badge {
      align-self: flex-start;
      margin-bottom: 1.3rem;
      min-height: 1.9rem;
      padding: 0.42rem 0.7rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: rgba(5, 8, 10, 0.42);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.24s, transform 0.24s;
    }

    .status-badge.show {
      opacity: 1;
      transform: translateY(0);
    }

    .status-badge.urgent {
      color: #fff;
      border-color: rgba(255, 71, 111, 0.55);
      background: rgba(255, 71, 111, 0.18);
    }

    .status-badge.resume {
      color: #161616;
      border-color: rgba(255, 209, 102, 0.7);
      background: var(--resume);
      text-shadow: none;
    }

    .text-container {
      width: 100%;
      min-height: min(46vh, 520px);
      position: relative;
    }

    .block,
    .broadcast-line {
      font-size: var(--font-size);
      font-weight: 800;
      line-height: 1.5;
      text-shadow: var(--text-shadow);
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
      opacity: 0.33;
      transition: opacity 0.35s, color 0.35s, transform 0.35s;
    }

    .broadcast-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      min-height: calc(var(--font-size) * 1.5);
      will-change: opacity, transform;
      transition: opacity 0.62s ease, transform 0.62s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .broadcast-line.before-far {
      opacity: 0.12;
      transform: translate3d(0, calc(var(--font-size) * -3.25), 0);
    }

    .broadcast-line.before {
      opacity: 0.42;
      transform: translate3d(0, calc(var(--font-size) * -1.65), 0);
    }

    .broadcast-line.after {
      opacity: 0;
      transform: translate3d(0, calc(var(--font-size) * 1.8), 0);
    }

    .broadcast-line.leaving {
      opacity: 0;
      transform: translate3d(0, calc(var(--font-size) * -5.2), 0);
    }

    .block.current,
    .broadcast-line.current {
      opacity: 1;
      color: #fff;
      transform: translate3d(0, 0, 0);
    }

    .block.current::after,
    .broadcast-line.current::after {
      content: '_';
      display: inline-block;
      margin-left: 10px;
      color: var(--accent);
      animation: blink 0.8s infinite steps(2);
    }

    @keyframes blink {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .bottombar {
      position: fixed;
      left: 1rem;
      right: 1rem;
      bottom: 1rem;
      z-index: 100;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 1rem;
      align-items: end;
      opacity: 0.36;
      transition: opacity 0.2s;
    }

    .bottombar:hover {
      opacity: 0.92;
    }

    .now-playing {
      min-width: 0;
      width: fit-content;
      max-width: min(720px, 100%);
      padding: 0.75rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(5, 8, 10, 0.42);
      backdrop-filter: blur(16px);
    }

    .now-playing strong {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(0.9rem, 1.4vw, 1.05rem);
      font-weight: 900;
    }

    .now-playing span {
      display: block;
      color: var(--muted);
      margin-top: 0.25rem;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .metrics {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .metric {
      min-width: 86px;
      padding: 0.62rem 0.72rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(5, 8, 10, 0.42);
      backdrop-filter: blur(16px);
      text-align: right;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 0.2rem;
      font-size: 0.9rem;
      font-weight: 900;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(24px);
      padding: 1.5rem;
    }

    .modal.show {
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.22s ease;
    }

    .settings-content {
      width: min(1180px, 100%);
      height: min(820px, 100%);
      background: rgba(8, 10, 12, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
    }

    .settings-head {
      padding: 1.1rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--line);
    }

    .settings-head h2 {
      color: var(--accent);
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .settings-head p {
      color: var(--muted);
      margin-top: 0.2rem;
      font-size: 0.7rem;
      font-weight: 800;
    }

    .settings-body {
      min-height: 0;
      display: block;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .settings-tabs {
      display: flex;
      gap: 0.4rem;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 10, 12, 0.96);
      flex: 0 0 auto;
      align-items: center;
    }

    .settings-pane {
      display: flex;
      scroll-margin-top: 78px;
    }

    .settings-pane.active {
      display: flex;
      min-height: 0;
    }

    .settings-tab {
      height: 38px;
      min-height: 38px;
      max-height: 38px;
      flex: 1 1 0;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-weight: 900;
      padding: 0 0.8rem;
      line-height: 1;
      transition: background 0.16s, border-color 0.16s, color 0.16s;
    }

    .settings-tab.active {
      background: var(--accent);
      border-color: transparent;
      color: #000;
    }

    .store-panel,
    .editor-panel,
    .style-panel {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .store-panel {
      border-right: 0;
    }

    .editor-panel,
    .style-panel {
      border-top: 1px solid var(--line);
    }

    .panel-tools {
      padding: 0.9rem;
      display: grid;
      gap: 0.75rem;
      border-bottom: 1px solid var(--line);
    }

    .split-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .field {
      display: grid;
      gap: 0.4rem;
    }

    .field label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    input,
    textarea,
    select {
      width: 100%;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 8px;
      color: #fff;
      padding: 0.78rem 0.82rem;
      outline: none;
      transition: border-color 0.16s, background 0.16s;
    }

    textarea {
      resize: none;
      min-height: 220px;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.07);
    }

    .document-list {
      min-height: 0;
      overflow-y: auto;
      padding: 0.75rem;
      display: grid;
      gap: 0.65rem;
    }

    .doc-row {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
      color: #fff;
      padding: 0.85rem;
      text-align: left;
      display: grid;
      gap: 0.4rem;
      transition: background 0.16s, border-color 0.16s, transform 0.16s;
    }

    .doc-row:hover {
      background: rgba(255, 255, 255, 0.065);
      border-color: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .doc-row.active {
      border-color: var(--accent);
      background: rgba(0, 242, 255, 0.08);
    }

    .doc-row.disabled {
      opacity: 0.5;
    }

    .doc-row strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 900;
    }

    .doc-meta {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
    }

    .editor-panel,
    .style-panel {
      padding: 0.95rem;
      gap: 1rem;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 180px 120px;
      gap: 0.75rem;
      align-items: end;
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .editor-actions {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 1rem;
    }

    .text-btn {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: #fff;
      padding: 0.76rem 0.9rem;
      font-weight: 900;
      transition: background 0.16s, border-color 0.16s, color 0.16s;
    }

    .text-btn:hover {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.085);
    }

    .primary-btn {
      background: var(--accent);
      color: #000;
      border-color: transparent;
    }

    .danger-btn {
      color: #fff;
      border-color: rgba(255, 71, 111, 0.4);
      background: rgba(255, 71, 111, 0.13);
    }

    .toggle {
      min-height: 45px;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      color: #fff;
      font-weight: 900;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    #msgBox {
      position: fixed;
      bottom: 6.4rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #000;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: 900;
      z-index: 2000;
      display: none;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      text-align: center;
      max-width: min(92vw, 680px);
    }

    .urgent-composer {
      position: fixed;
      left: 50%;
      bottom: 5.4rem;
      z-index: 120;
      width: min(720px, calc(100vw - 2rem));
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .urgent-composer.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    .urgent-composer-inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.55rem;
      align-items: end;
      padding: 0.55rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(5, 8, 10, 0.72);
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    #urgentInput {
      min-height: 46px;
      max-height: 140px;
      resize: none;
      overflow-y: auto;
      border-color: rgba(255, 71, 111, 0.34);
      background: rgba(255, 255, 255, 0.055);
      line-height: 1.45;
    }

    #urgentInput:focus {
      border-color: var(--urgent);
    }

    #sendUrgentBtn {
      min-width: 58px;
      height: 46px;
      padding: 0 0.9rem;
      border-color: rgba(255, 71, 111, 0.5);
      background: rgba(255, 71, 111, 0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 820px) {
      .modal {
        padding: 0;
        overflow-y: auto;
        align-items: stretch;
        -webkit-overflow-scrolling: touch;
      }

      .modal.show {
        display: block;
        align-items: stretch;
      }

      .settings-content {
        width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        height: auto;
        max-height: none;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        overflow: visible;
      }

      .settings-head {
        position: sticky;
        top: 0;
        z-index: 2;
        background: rgba(8, 10, 12, 0.98);
        padding: 0.85rem 0.95rem;
      }

      .settings-head p {
        display: none;
      }

      .settings-tabs {
        position: sticky;
        top: 65px;
        z-index: 2;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-items: center;
        gap: 0.45rem;
        padding: 0.6rem 0.75rem;
        background: rgba(8, 10, 12, 0.98);
        border-bottom: 1px solid var(--line);
      }

      .settings-tab {
        height: 40px;
        min-height: 40px;
        max-height: 40px;
      }

      .settings-body {
        display: block;
        overflow: visible;
        padding-bottom: calc(1rem + env(safe-area-inset-bottom));
      }

      .store-panel,
      .editor-panel,
      .style-panel {
        overflow: visible;
        min-height: auto;
      }

      .editor-panel,
      .style-panel {
        border-top: 0;
      }

      .settings-pane {
        display: none;
      }

      .settings-pane.active {
        display: flex;
        min-height: calc(100svh - 132px);
      }

      .document-list {
        max-height: 30svh;
        overflow-y: auto;
      }

      textarea {
        min-height: 160px;
      }

      .editor-actions {
        position: sticky;
        bottom: 0;
        z-index: 1;
        margin: 0 -0.95rem;
        padding: 0.8rem 0.95rem calc(0.8rem + env(safe-area-inset-bottom));
        background: rgba(8, 10, 12, 0.98);
        border-top: 1px solid var(--line);
      }

      .editor-actions .text-btn {
        flex: 1 1 calc(50% - 0.65rem);
      }

      .toolbar {
        max-width: 186px;
      }

      .icon-btn {
        width: 48px;
        height: 48px;
        border-radius: 12px;
      }

      .text-stage {
        padding: 5rem 6vw 7rem;
      }

      .block {
        font-size: clamp(26px, 8vw, var(--font-size));
      }

      .bottombar {
        grid-template-columns: 1fr;
      }

      .metrics {
        justify-content: stretch;
      }

      .urgent-composer {
        bottom: 8.2rem;
      }

      .metric {
        flex: 1;
        min-width: 90px;
        text-align: left;
      }

      .store-panel {
        min-height: 260px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .editor-grid,
      .style-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="video-background">
    <iframe
      id="ytPlayer"
      src="https://www.youtube.com/embed/kFnxuOnbHU0?autoplay=1&mute=1&controls=0&loop=1&playlist=kFnxuOnbHU0&modestbranding=1&rel=0&enablejsapi=1"
      allow="autoplay; encrypted-media"
      title="Ambient background"
    ></iframe>
  </div>

  <div class="overlay"></div>

  <header class="topbar">
    <nav class="toolbar" aria-label="Reader controls">
      <button class="icon-btn" id="playPauseBtn" title="Play / Pause"><span>Ⅱ</span><label>PLAY</label></button>
      <button class="icon-btn" id="nextBtn" title="Next document"><span>↷</span><label>NEXT</label></button>
      <button class="icon-btn" id="pasteBtn" title="Add clipboard text as an urgent message"><span>!</span><label>URGENT</label></button>
      <button class="icon-btn" id="soundBtn" title="Toggle typing sound"><span>♪</span><label>SOUND</label></button>
      <button class="icon-btn" id="settingsBtn" title="Settings"><span>⚙</span><label>SET</label></button>
    </nav>
  </header>

  <main class="text-stage" aria-live="polite">
    <div id="statusBadge" class="status-badge"></div>
    <div id="textContainer" class="text-container"></div>
  </main>

  <footer class="bottombar">
    <div class="now-playing">
      <strong id="currentTitle">Standby</strong>
      <span id="currentMeta">Add a document or enable documents in the broadcast queue.</span>
    </div>
    <div class="metrics">
      <div class="metric"><span>Block</span><strong id="blockMetric">0 / 0</strong></div>
      <div class="metric"><span>Queue</span><strong id="queueMetric">0</strong></div>
      <div class="metric"><span>Store</span><strong id="storeMetric">0</strong></div>
    </div>
  </footer>

  <div id="urgentComposer" class="urgent-composer" aria-label="Urgent message input">
    <div class="urgent-composer-inner">
      <textarea id="urgentInput" rows="1" placeholder="Type urgent message"></textarea>
      <button class="text-btn" id="sendUrgentBtn" title="Add to urgent queue">!</button>
    </div>
  </div>

  <div id="msgBox">SYSTEM NOTIFIED</div>

  <section id="settingsModal" class="modal" aria-label="Settings panel">
    <div class="settings-content">
      <div class="settings-head">
        <div>
          <h2>TextCast Reader v2</h2>
          <p>Document Store / Play Queue / Urgent Queue / Player</p>
        </div>

  <script>
    const CATEGORIES = ['normal', 'notice', 'ad', 'quote', 'character', 'urgent'];

    const defaultDocumentText = `A quiet text broadcast begins.

Long documents are no longer stacked into the DOM.
Documents live in the Document Store,
and the Player reads only docId and blockIndex from the Play Queue.

Text added with Ctrl+V, the urgent paste button, or the urgent input composer
enters the Urgent Queue immediately.
The current broadcast remembers its position so it can return to the start of the interrupted block.

When urgent playback ends,
the original broadcast resumes from the interrupted block.`;

    function uid(prefix = 'id') {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function formatDate(value) {
      if (!value) return 'never';
      return new Date(value).toLocaleString('ko-KR', { hour12: false });
    }

    function splitIntoBlocks(text) {
      const normalized = String(text || '').replace(/\r\n/g, '\n').trim();
      if (!normalized) return [];

      const paragraphs = normalized.split(/\n{2,}/).map((part) => part.trim()).filter(Boolean);
      const blocks = [];
      paragraphs.forEach((paragraph) => {
        if (paragraph.length <= 220) {
          blocks.push(paragraph);
          return;
        }

        const sentences = paragraph
          .split(/(?<=[.!?。！？…]|[.!?]["')\]])\s+|(?<=다[.!?]?)\s+/)
          .map((part) => part.trim())
          .filter(Boolean);

        if (sentences.length <= 1) {
          for (let i = 0; i < paragraph.length; i += 180) {
            blocks.push(paragraph.slice(i, i + 180).trim());
          }
          return;
        }

        let buffer = '';
        sentences.forEach((sentence) => {
          const next = buffer ? `${buffer} ${sentence}` : sentence;
          if (next.length > 240 && buffer) {
            blocks.push(buffer);
            buffer = sentence;
          } else {
            buffer = next;
          }
        });
        if (buffer) blocks.push(buffer);
      });

      return blocks;
    }

    function createDocument({ title, text, category = 'normal', enabled = true }) {
      const safeText = String(text || '').trim();
      const createdAt = nowIso();
      return {
        id: uid('doc'),
        title: title || 'Untitled Document',
        text: safeText,
        category: CATEGORIES.includes(category) ? category : 'normal',
        enabled: Boolean(enabled),
        blocks: splitIntoBlocks(safeText),
        playCount: 0,
        lastPlayedAt: null,
        createdAt,
        updatedAt: createdAt
      };
    }

    class TextCastStorage {
      constructor() {
        this.key = 'textcast_reader_v2_store';
        this.settingsKey = 'textcast_reader_v2_settings';
        this.legacyKey = 'buntstream_settings';
      }

      loadDocuments() {
        const saved = this.readJson(this.key);
        if (Array.isArray(saved) && saved.length) {
          return saved.filter((doc) => !doc.transientUrgent).map((doc) => ({
            ...doc,
            enabled: doc.enabled !== false,
            blocks: Array.isArray(doc.blocks) && doc.blocks.length ? doc.blocks : splitIntoBlocks(doc.text)
          }));
        }

        const legacy = this.readJson(this.legacyKey);
        const seedText = legacy?.script || defaultDocumentText;
        const seedDoc = createDocument({
          title: 'Welcome Broadcast',
          text: seedText,
          category: 'normal',
          enabled: true
        });
        this.saveDocuments([seedDoc]);
        return [seedDoc];
      }

      saveDocuments(documents) {
        const persistentDocuments = documents.filter((doc) => !doc.transientUrgent);
        try {
          localStorage.setItem(this.key, JSON.stringify(persistentDocuments));
          return true;
        } catch (error) {
          console.warn('Document storage quota exceeded. Retrying with compact metadata.', error);
          const compactDocuments = persistentDocuments.map((doc) => ({
            ...doc,
            playCount: Number(doc.playCount || 0),
            lastPlayedAt: doc.lastPlayedAt || null,
            blocks: splitIntoBlocks(doc.text)
          }));
          try {
            localStorage.setItem(this.key, JSON.stringify(compactDocuments));
            return true;
          } catch (retryError) {
            console.error('Unable to save documents to localStorage.', retryError);
            return false;
          }
        }
      }

      loadSettings() {
        const saved = this.readJson(this.settingsKey);
        const legacy = this.readJson(this.legacyKey);
        return {
          ytId: saved?.ytId || legacy?.ytId || 'kFnxuOnbHU0',
          fontFamily: saved?.fontFamily || legacy?.fontFamily || "'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
          textColor: saved?.textColor || legacy?.textColor || '#ffffff',
          fontSize: Number(saved?.fontSize || legacy?.fontSize || 42),
          accentColor: saved?.accentColor || legacy?.accentColor || '#00f2ff',
          dimming: Number(saved?.dimming || legacy?.dimming || 40),
          speed: Number(saved?.speed || legacy?.speed || 42),
          delay: Number(saved?.delay || legacy?.delay || 1500)
        };
      }

      saveSettings(settings) {
        localStorage.setItem(this.settingsKey, JSON.stringify(settings));
      }

      clear() {
        localStorage.removeItem(this.key);
        localStorage.removeItem(this.settingsKey);
      }

      readJson(key) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          console.warn(`Failed to read ${key}`, error);
          return null;
        }
      }
    }

    class TextCastEngine {
      constructor({ getDocuments, updateDocument, onStateChange, onMessage }) {
        this.getDocuments = getDocuments;
        this.updateDocument = updateDocument;
        this.onStateChange = onStateChange;
        this.onMessage = onMessage;

        this.playQueue = [];
        this.urgentQueue = [];
        this.runtimeDocuments = new Map();
        this.queueIndex = 0;
        this.resumeItem = null;
        this.state = {
          currentDocId: null,
          currentBlockIndex: 0,
          interruptedDocId: null,
          interruptedBlockIndex: 0,
          mode: 'normal'
        };
        this.isPaused = false;
        this.session = 0;
      }

      buildQueueFromStore() {
        const docs = this.getBroadcastDocuments();
        this.playQueue = docs.map((doc) => ({ docId: doc.id, blockIndex: 0, priority: 0 }));
        this.queueIndex = 0;
        this.emit();
      }

      ensureBroadcastQueue() {
        if (!this.playQueue.length || this.queueIndex >= this.playQueue.length) this.buildQueueFromStore();
        return this.playQueue.length > 0 && this.queueIndex < this.playQueue.length;
      }

      queueDocument(docId, blockIndex = 0, priority = 0) {
        const doc = this.findDoc(docId);
        if (!doc || !doc.blocks.length) return;
        this.playQueue.push({ docId, blockIndex, priority });
        this.emit();
      }

      addUrgentDocument(doc) {
        this.runtimeDocuments.set(doc.id, doc);
        this.urgentQueue.push({ docId: doc.id, blockIndex: 0, priority: 100 });
        if (this.state.currentDocId && this.state.mode !== 'urgent') {
          this.state.interruptedDocId = this.state.currentDocId;
          this.state.interruptedBlockIndex = this.state.currentBlockIndex;
        }
        this.session++;
        this.emit();
      }

      togglePause() {
        this.isPaused = !this.isPaused;
        this.emit();
      }

      nextDocument() {
        this.session++;
        this.resumeItem = null;
        this.state.interruptedDocId = null;
        this.state.interruptedBlockIndex = 0;
        this.state.currentDocId = null;
        this.state.currentBlockIndex = 0;
        this.state.mode = 'normal';
        this.emit();
      }

      async run(player) {
        const runId = ++this.session;
        while (runId === this.session) {
          if (this.isPaused || document.hidden) {
            await player.sleep(120);
            continue;
          }

          const item = this.nextItem();
          if (!item) {
            await player.showIdle();
            await player.sleep(500);
            continue;
          }

          const doc = this.findDoc(item.docId);
          if (!doc || !doc.blocks.length) continue;
          if (item.priority < 100 && (doc.enabled === false || doc.transientUrgent)) continue;

          this.state.currentDocId = doc.id;
          this.state.currentBlockIndex = Math.min(item.blockIndex || 0, doc.blocks.length - 1);
          this.state.mode = item.priority >= 100 ? 'urgent' : 'normal';
          this.markPlayed(doc);
          this.emit();

          const finished = await this.playDocument(doc, player, runId);
          if (!finished || runId !== this.session) return;
          await this.afterDocument(doc);
        }
      }

      nextItem() {
        if (this.urgentQueue.length) {
          this.state.mode = 'urgent';
          return this.urgentQueue.shift();
        }

        if (this.resumeItem) {
          const item = this.resumeItem;
          this.resumeItem = null;
          this.state.mode = 'normal';
          return item;
        }

        if (!this.ensureBroadcastQueue()) return null;
        this.state.mode = 'normal';
        return this.playQueue[this.queueIndex++] || null;
      }

      getBroadcastDocuments() {
        return this.getDocuments().filter((doc) => doc.enabled !== false && !doc.transientUrgent && doc.blocks.length);
      }

      async playDocument(doc, player, runId) {
        for (let index = this.state.currentBlockIndex; index < doc.blocks.length; index++) {
          if (runId !== this.session) return false;
          while ((this.isPaused || document.hidden) && runId === this.session) await player.sleep(120);
          if (runId !== this.session) return false;

          if (this.urgentQueue.length && this.state.mode !== 'urgent') {
            this.state.interruptedDocId = doc.id;
            this.state.interruptedBlockIndex = index;
            this.session++;
            this.emit();
            return false;
          }

          this.state.currentBlockIndex = index;
          this.emit();
          await player.renderTextBlock(doc, index, this.state.mode, runId);
        }
        return true;
      }

      async afterDocument(doc) {
        if (this.state.mode === 'urgent' && this.state.interruptedDocId && !this.urgentQueue.length) {
          const interruptedDocId = this.state.interruptedDocId;
          const interruptedBlockIndex = this.state.interruptedBlockIndex;
          this.state.mode = 'normal';
          this.state.currentDocId = interruptedDocId;
          this.state.currentBlockIndex = interruptedBlockIndex;
          this.state.interruptedDocId = null;
          this.state.interruptedBlockIndex = 0;
          this.resumeItem = { docId: interruptedDocId, blockIndex: interruptedBlockIndex, priority: 50 };
          this.onMessage?.('[Broadcast Resumed]');
        }
        this.emit();
      }

      markPlayed(doc) {
        this.updateDocument(doc.id, {
          playCount: Number(doc.playCount || 0) + 1,
          lastPlayedAt: nowIso()
        });
      }

      findDoc(docId) {
        return this.runtimeDocuments.get(docId) || this.getDocuments().find((doc) => doc.id === docId);
      }

      emit() {
        this.onStateChange?.({
          ...this.state,
          queueCount: this.getVisibleQueueCount(),
          urgentCount: this.urgentQueue.length,
          isPaused: this.isPaused
        });
      }

      getVisibleQueueCount() {
        const currentNormal = this.state.mode === 'normal' && this.state.currentDocId ? 1 : 0;
        const pendingNormal = Math.max(0, this.playQueue.length - this.queueIndex);
        return currentNormal + pendingNormal + (this.resumeItem ? 1 : 0);
      }
    }

    class TextLayoutEngine {
      constructor(app) {
        this.app = app;
        this.pretext = null;
        this.cache = new Map();
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
      }

      async init() {
        if (!window.Intl?.Segmenter) {
          console.warn('Pretext requires Intl.Segmenter. Fallback layout is active.');
          return;
        }

        try {
          this.pretext = await import('https://esm.sh/@chenglou/pretext@0.0.7');
          console.info('Pretext layout engine loaded.');
        } catch (error) {
          console.warn('Pretext failed to load. Using fallback layout.', error);
        }
      }

      layoutLines(text) {
        const width = Math.max(240, this.app.renderer?.container.clientWidth || Math.floor(window.innerWidth * 0.78));
        const font = this.app.getCanvasFont();
        const lineHeight = this.app.getLineHeightPx();
        const key = [text, width, font, lineHeight, this.app.settings.accentColor].join('|');
        if (this.cache.has(key)) return this.cache.get(key);

        let lines = null;
        if (this.pretext?.prepareWithSegments && this.pretext?.layoutWithLines) {
          try {
            const prepared = this.pretext.prepareWithSegments(text, font, {
              whiteSpace: 'pre-wrap',
              wordBreak: 'keep-all',
              letterSpacing: 0
            });
            lines = this.pretext.layoutWithLines(prepared, width, lineHeight).lines.map((line) => ({
              text: line.text,
              width: line.width
            }));
          } catch (error) {
            console.warn('Pretext layout failed. Falling back for this block.', error);
          }
        }

        if (!lines) lines = this.fallbackLayoutLines(text, width, font);
        const normalized = lines.length ? lines : [{ text: '', width: 0 }];
        this.cache.set(key, normalized);
        return normalized;
      }

      fallbackLayoutLines(text, maxWidth, font) {
        this.ctx.font = font;
        const source = String(text || '').replace(/\r\n/g, '\n');
        const lines = [];

        source.split('\n').forEach((paragraph, paragraphIndex, paragraphs) => {
          const words = paragraph.split(/(\s+)/).filter((part) => part.length);
          let current = '';

          words.forEach((word) => {
            const candidate = current + word;
            if (this.ctx.measureText(candidate).width <= maxWidth || !current.trim()) {
              current = candidate;
              return;
            }
            lines.push({ text: current.trimEnd(), width: this.ctx.measureText(current).width });
            current = word.trimStart();
          });

          if (current || paragraph.length === 0) {
            lines.push({ text: current.trimEnd(), width: this.ctx.measureText(current).width });
          }
          if (paragraphIndex < paragraphs.length - 1 && paragraph.trim()) {
            lines.push({ text: '', width: 0 });
          }
        });

        return lines;
      }

      clearCache() {
        this.cache.clear();
        this.pretext?.clearCache?.();
      }
    }

    class TextBlockRenderer {
      constructor(app) {
        this.app = app;
        this.container = document.getElementById('textContainer');
        this.statusBadge = document.getElementById('statusBadge');
        this.audioCtx = null;
        this.isMuted = true;
        this.visibleLines = [];
      }

      async renderTextBlock(doc, blockIndex, mode, runId) {
        const text = doc.blocks[blockIndex] || '';
        const lines = this.app.layoutEngine.layoutLines(text);
        this.setBadge(mode === 'urgent' ? '[Urgent]' : '', mode);

        for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
          if (runId !== this.app.engine.session) return;
          const lineText = lines[lineIndex].text || '';
          const current = this.beginCurrentLine(`${doc.id}:${blockIndex}:${lineIndex}`, lineText);

          for (const char of lineText) {
            if (runId !== this.app.engine.session) return;
            while ((this.app.engine.isPaused || document.hidden) && runId === this.app.engine.session) {
              await this.sleep(120);
            }
            current.textContent += char;
            this.playTypeSound();
            await this.sleep(this.getTypingDelay(char));
          }

          await this.sleep(this.getLineHoldDelay(lineText, lineIndex, lines.length));
        }
        await this.sleep(Math.max(180, Math.floor(this.app.settings.delay * 0.35)));
      }

      async showIdle() {
        this.visibleLines = [];
        this.container.innerHTML = '<div class="block current">No enabled documents.</div>';
        this.setBadge('', 'normal');
      }

      beginCurrentLine(key, fullText) {
        this.visibleLines.forEach((item) => {
          item.age += 1;
          this.applyLineAge(item);
        });

        const element = document.createElement('div');
        element.className = 'broadcast-line after';
        element.dataset.lineKey = key;
        element.dataset.fullText = fullText;
        element.textContent = '';
        this.container.appendChild(element);

        const item = { key, element, age: 0 };
        this.visibleLines.unshift(item);
        this.trimLineWindow();
        void element.offsetHeight;
        this.applyLineAge(item);
        return element;
      }

      applyLineAge(item) {
        if (item.age === 0) item.element.className = 'broadcast-line current';
        else if (item.age === 1) item.element.className = 'broadcast-line before';
        else if (item.age === 2) item.element.className = 'broadcast-line before-far';
        else item.element.className = 'broadcast-line leaving';
      }

      trimLineWindow() {
        const staying = [];
        this.visibleLines.forEach((item) => {
          if (item.age <= 2) {
            staying.push(item);
            return;
          }
          setTimeout(() => item.element.remove(), 650);
        });
        this.visibleLines = staying;
      }

      getTypingDelay(char) {
        const base = Math.max(5, Number(this.app.settings.speed) || 42);
        if (/[.!?。！？…]/.test(char)) return base + 420 + Math.random() * 180;
        if (/[,，、;；:：]/.test(char)) return base + 180 + Math.random() * 120;
        if (/\s/.test(char)) return Math.max(12, base * 0.55);
        return base + Math.random() * Math.max(10, base * 0.45);
      }

      getLineHoldDelay(lineText, lineIndex, lineCount) {
        const base = Math.max(120, Number(this.app.settings.delay) || 1500);
        const isLastLine = lineIndex === lineCount - 1;
        const punctuationPause = /[.!?。！？…]$/.test(lineText.trim()) ? 280 : 0;
        return Math.floor(base * (isLastLine ? 0.58 : 0.32)) + punctuationPause;
      }

      setBadge(text, mode) {
        this.statusBadge.textContent = text;
        this.statusBadge.className = `status-badge${text ? ' show' : ''}${mode === 'urgent' ? ' urgent' : ''}${mode === 'resume' ? ' resume' : ''}`;
      }

      toggleSound() {
        this.isMuted = !this.isMuted;
        if (!this.isMuted && this.audioCtx?.state === 'suspended') this.audioCtx.resume();
        return this.isMuted;
      }

      playTypeSound() {
        if (this.isMuted || this.app.engine.isPaused || document.hidden) return;
        if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(135 + Math.random() * 45, this.audioCtx.currentTime);
        gain.gain.setValueAtTime(0.045, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.04);
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        osc.start();
        osc.stop(this.audioCtx.currentTime + 0.04);
      }

      sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
    }

    class TextCastApp {
      constructor() {
        this.storage = new TextCastStorage();
        this.documents = this.storage.loadDocuments();
        this.settings = this.storage.loadSettings();
        this.selectedDocId = this.documents[0]?.id || null;
        this.ytPlayer = document.getElementById('ytPlayer');
        this.layoutEngine = new TextLayoutEngine(this);

        this.engine = new TextCastEngine({
          getDocuments: () => this.documents,
          updateDocument: (id, patch) => this.updateDocument(id, patch, { silentSelect: true }),
          onStateChange: (state) => this.renderPlaybackState(state),
          onMessage: (message) => this.showMessage(message)
        });
        this.renderer = new TextBlockRenderer(this);

        this.bindEvents();
        this.applySettingsToUi();
        this.applySettingsToPage();
        this.renderDocumentList();
        this.loadEditor(this.selectedDocId);
        this.engine.buildQueueFromStore();
        this.engine.run(this.renderer);
        this.layoutEngine.init();
      }

      bindEvents() {
        document.getElementById('settingsBtn').addEventListener('click', () => this.openSettings());
        document.getElementById('closeSettingsBtn').addEventListener('click', () => this.closeSettings());
        document.getElementById('playPauseBtn').addEventListener('click', () => this.togglePause());
        document.getElementById('nextBtn').addEventListener('click', () => this.nextDocument());
        document.getElementById('pasteBtn').addEventListener('click', () => this.handleClipboardUrgent());
        document.getElementById('soundBtn').addEventListener('click', () => this.toggleSound());
        document.getElementById('sendUrgentBtn').addEventListener('click', () => this.submitUrgentComposer());
        document.getElementById('urgentInput').addEventListener('keydown', (event) => this.handleUrgentInputKeydown(event));
        document.getElementById('urgentInput').addEventListener('input', () => this.resizeUrgentInput());
        document.getElementById('newDocBtn').addEventListener('click', () => this.newDocument());
        document.getElementById('saveDocBtn').addEventListener('click', () => this.saveEditorDocument());
        document.getElementById('queueDocBtn').addEventListener('click', () => this.queueSelectedDocument());
        document.getElementById('duplicateDocBtn').addEventListener('click', () => this.duplicateSelectedDocument());
        document.getElementById('deleteDocBtn').addEventListener('click', () => this.deleteSelectedDocument());
        document.getElementById('saveRulesBtn').addEventListener('click', () => this.saveRules());
        document.getElementById('resetStorageBtn').addEventListener('click', () => this.resetStorage());
        document.getElementById('searchInput').addEventListener('input', () => this.renderDocumentList());
        document.getElementById('categoryFilter').addEventListener('change', () => this.renderDocumentList());
        document.querySelectorAll('[data-settings-tab]').forEach((tab) => {
          tab.addEventListener('click', () => this.setSettingsTab(tab.dataset.settingsTab));
        });

        window.addEventListener('paste', (event) => {
          const target = event.target;
          if (target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement) return;
          const text = event.clipboardData?.getData('text');
          if (text?.trim()) this.addUrgentFromText(text);
        });

        window.addEventListener('keydown', (event) => this.handleGlobalKeydown(event));

        document.addEventListener('visibilitychange', () => this.engine.emit());
      }

      openSettings() {
        const modal = document.getElementById('settingsModal');
        const body = document.querySelector('.settings-body');
        modal.classList.add('show');
        this.setSettingsTab('store', { reset: true });
        if (body) body.scrollTop = 0;
        this.renderDocumentList();
      }

      closeSettings() {
        document.getElementById('settingsModal').classList.remove('show');
      }

      setSettingsTab(tabName, options = {}) {
        document.querySelectorAll('[data-settings-tab]').forEach((tab) => {
          tab.classList.toggle('active', tab.dataset.settingsTab === tabName);
        });
        document.querySelectorAll('[data-settings-pane]').forEach((pane) => {
          pane.classList.toggle('active', pane.dataset.settingsPane === tabName);
        });
        if (!window.matchMedia('(max-width: 820px)').matches) {
          const body = document.querySelector('.settings-body');
          const pane = document.querySelector(`[data-settings-pane="${tabName}"]`);
          if (body && pane) {
            const top = pane.offsetTop - body.offsetTop;
            body.scrollTo({ top, behavior: options.reset ? 'auto' : 'smooth' });
          }
          return;
        }
      }

      togglePause() {
        this.engine.togglePause();
        this.updatePlayButton();
      }

      nextDocument() {
        this.engine.nextDocument();
        this.engine.run(this.renderer);
        this.showMessage('Moving to the next document.');
      }

      async handleClipboardUrgent() {
        try {
          const text = await navigator.clipboard.readText();
          if (!text.trim()) {
            this.showMessage('Clipboard does not contain text.');
            return;
          }
          this.addUrgentFromText(text);
        } catch (error) {
          this.showMessage('Use Ctrl+V to paste an urgent message.');
        }
      }

      handleGlobalKeydown(event) {
        const target = event.target;
        const isEditable = target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement || target?.isContentEditable;
        if (isEditable) return;
        if (document.getElementById('settingsModal').classList.contains('show')) return;
        if (event.ctrlKey || event.metaKey || event.altKey) return;
        if (event.key === 'Escape') {
          this.hideUrgentComposer();
          return;
        }
        if (event.key.length !== 1) return;

        event.preventDefault();
        this.showUrgentComposer(event.key);
      }

      handleUrgentInputKeydown(event) {
        if (event.key === 'Escape') {
          event.preventDefault();
          this.hideUrgentComposer();
          return;
        }

        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          this.submitUrgentComposer();
        }
      }

      showUrgentComposer(initialText = '') {
        const composer = document.getElementById('urgentComposer');
        const input = document.getElementById('urgentInput');
        composer.classList.add('show');
        if (initialText) input.value += initialText;
        input.focus();
        input.selectionStart = input.selectionEnd = input.value.length;
        this.resizeUrgentInput();
      }

      hideUrgentComposer() {
        const composer = document.getElementById('urgentComposer');
        const input = document.getElementById('urgentInput');
        composer.classList.remove('show');
        input.value = '';
        this.resizeUrgentInput();
      }

      submitUrgentComposer() {
        const input = document.getElementById('urgentInput');
        const text = input.value.trim();
        if (!text) {
          this.hideUrgentComposer();
          return;
        }
        this.addUrgentFromText(text);
        this.hideUrgentComposer();
      }

      resizeUrgentInput() {
        const input = document.getElementById('urgentInput');
        input.style.height = 'auto';
        input.style.height = `${Math.min(140, Math.max(46, input.scrollHeight))}px`;
      }

      addUrgentFromText(text) {
        const doc = createDocument({
          title: `Urgent ${new Date().toLocaleTimeString('en-US', { hour12: false })}`,
          text,
          category: 'urgent',
          enabled: true
        });
        doc.transientUrgent = true;
        this.engine.addUrgentDocument(doc);
        this.engine.run(this.renderer);
        this.showMessage('Urgent message added to the Urgent Queue.');
      }

      newDocument() {
        const doc = createDocument({
          title: 'New Document',
          text: '',
          category: 'normal',
          enabled: true
        });
        this.documents.unshift(doc);
        this.selectedDocId = doc.id;
        this.persistDocuments();
        this.renderDocumentList();
        this.loadEditor(doc.id);
        this.engine.ensureBroadcastQueue();
      }

      saveEditorDocument() {
        const docId = this.selectedDocId;
        if (!docId) return;
        const text = document.getElementById('docTextInput').value;
        this.updateDocument(docId, {
          title: document.getElementById('docTitleInput').value.trim() || 'Untitled Document',
          text,
          category: document.getElementById('docCategoryInput').value,
          enabled: document.getElementById('docEnabledInput').checked,
          blocks: splitIntoBlocks(text),
          updatedAt: nowIso()
        });
        this.engine.ensureBroadcastQueue();
        this.showMessage('Document saved.');
      }

      updateDocument(docId, patch, options = {}) {
        const index = this.documents.findIndex((doc) => doc.id === docId);
        if (index < 0) return;
        this.documents[index] = { ...this.documents[index], ...patch };
        this.persistDocuments();
        if (!options.silentSelect) this.selectedDocId = docId;
        this.renderDocumentList();
        if (!options.silentSelect) this.loadEditor(docId);
      }

      queueSelectedDocument() {
        if (!this.selectedDocId) return;
        this.engine.queueDocument(this.selectedDocId, 0, 10);
        this.showMessage('Selected document added to the Play Queue.');
      }

      duplicateSelectedDocument() {
        const source = this.currentEditorDoc();
        if (!source) return;
        const doc = createDocument({
          title: `${source.title} copy`,
          text: source.text,
          category: source.category,
          enabled: source.enabled
        });
        this.documents.unshift(doc);
        this.selectedDocId = doc.id;
        this.persistDocuments();
        this.renderDocumentList();
        this.loadEditor(doc.id);
      }

      deleteSelectedDocument() {
        if (!this.selectedDocId) return;
        const doc = this.currentEditorDoc();
        if (!doc) return;
        if (!confirm(`Delete '${doc.title}'?`)) return;
        this.documents = this.documents.filter((item) => item.id !== doc.id);
        this.selectedDocId = this.documents[0]?.id || null;
        this.persistDocuments();
        this.engine.playQueue = this.engine.playQueue.filter((item) => item.docId !== doc.id);
        this.engine.queueIndex = Math.min(this.engine.queueIndex, this.engine.playQueue.length);
        this.engine.ensureBroadcastQueue();
        this.renderDocumentList();
        this.loadEditor(this.selectedDocId);
        this.showMessage('Document deleted.');
      }

      saveRules() {
        this.settings = {
          ytId: document.getElementById('ytIdInput').value.trim() || 'kFnxuOnbHU0',
          fontFamily: document.getElementById('fontFamilyInput').value,
          textColor: document.getElementById('textColorInput').value,
          fontSize: Number(document.getElementById('fontSizeInput').value) || 42,
          accentColor: document.getElementById('accentColorInput').value,
          dimming: Number(document.getElementById('dimmingInput').value) || 40,
          speed: Number(document.getElementById('speedInput').value) || 42,
          delay: Number(document.getElementById('delayInput').value) || 1500
        };
        this.storage.saveSettings(this.settings);
        this.applySettingsToPage();
        this.layoutEngine.clearCache();
        this.showMessage('Playback rules saved.');
      }

      resetStorage() {
        if (!confirm('Reset TextCast v2 local storage?')) return;
        this.storage.clear();
        this.documents = this.storage.loadDocuments();
        this.settings = this.storage.loadSettings();
        this.selectedDocId = this.documents[0]?.id || null;
        this.applySettingsToUi();
        this.applySettingsToPage();
        this.layoutEngine.clearCache();
        this.renderDocumentList();
        this.loadEditor(this.selectedDocId);
        this.engine.buildQueueFromStore();
        this.engine.nextDocument();
        this.engine.run(this.renderer);
        this.showMessage('Local storage reset.');
      }

      currentEditorDoc() {
        return this.documents.find((doc) => doc.id === this.selectedDocId);
      }

      loadEditor(docId) {
        const doc = this.documents.find((item) => item.id === docId);
        const titleInput = document.getElementById('docTitleInput');
        const textInput = document.getElementById('docTextInput');
        const categoryInput = document.getElementById('docCategoryInput');
        const enabledInput = document.getElementById('docEnabledInput');

        if (!doc) {
          titleInput.value = '';
          textInput.value = '';
          categoryInput.value = 'normal';
          enabledInput.checked = true;
          return;
        }

        this.selectedDocId = doc.id;
        titleInput.value = doc.title;
        textInput.value = doc.text;
        categoryInput.value = doc.category;
        enabledInput.checked = doc.enabled;
        this.renderDocumentList();
      }

      renderDocumentList() {
        const list = document.getElementById('documentList');
        const search = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
        const category = document.getElementById('categoryFilter')?.value || 'all';
        const docs = this.documents.filter((doc) => {
          const matchesSearch = !search || `${doc.title} ${doc.text}`.toLowerCase().includes(search);
          const matchesCategory = category === 'all' || doc.category === category;
          return matchesSearch && matchesCategory;
        });

        list.innerHTML = '';
        if (!docs.length) {
          const empty = document.createElement('div');
          empty.className = 'doc-row disabled';
          empty.textContent = 'No documents to display.';
          list.appendChild(empty);
          this.renderStoreMetric();
          return;
        }

        docs.forEach((doc) => {
          const row = document.createElement('button');
          row.type = 'button';
          row.className = `doc-row${doc.id === this.selectedDocId ? ' active' : ''}${doc.enabled ? '' : ' disabled'}`;
          row.innerHTML = `
            <strong>${this.escapeHtml(doc.title)}</strong>
            <span class="doc-meta">
              <span>${doc.category}</span>
              <span>${doc.blocks.length} blocks</span>
              <span>${doc.playCount || 0} plays</span>
              <span>${doc.enabled ? 'enabled' : 'disabled'}</span>
            </span>
          `;
          row.addEventListener('click', () => {
            this.loadEditor(doc.id);
            if (window.matchMedia('(max-width: 820px)').matches) this.setSettingsTab('edit');
          });
          list.appendChild(row);
        });
        this.renderStoreMetric();
      }

      renderPlaybackState(state) {
        const doc = this.documents.find((item) => item.id === state.currentDocId);
        document.getElementById('currentTitle').textContent = doc?.title || 'Standby';
        document.getElementById('currentMeta').textContent = doc
          ? `${doc.category} / ${doc.playCount || 0} plays / last ${formatDate(doc.lastPlayedAt)}`
          : 'Waiting for enabled documents to enter the Play Queue.';
        document.getElementById('blockMetric').textContent = doc ? `${state.currentBlockIndex + 1} / ${doc.blocks.length}` : '0 / 0';
        document.getElementById('queueMetric').textContent = `${state.queueCount + state.urgentCount}`;
        this.renderStoreMetric();
        this.updatePlayButton();
      }

      renderStoreMetric() {
        document.getElementById('storeMetric').textContent = `${this.documents.length}`;
      }

      updatePlayButton() {
        const button = document.getElementById('playPauseBtn');
        button.querySelector('span').textContent = this.engine.isPaused ? '▶' : 'Ⅱ';
      }

      toggleSound() {
        const muted = this.renderer.toggleSound();
        document.getElementById('soundBtn').querySelector('span').textContent = muted ? '♪' : '♫';
        this.ytPlayer.contentWindow?.postMessage(JSON.stringify({ event: 'command', func: muted ? 'mute' : 'unMute', args: '' }), '*');
        this.showMessage(muted ? 'Typing sound off.' : 'Typing sound on.');
      }

      getCanvasFont() {
        const size = Number(this.settings.fontSize) || 42;
        const family = this.settings.fontFamily || "'Pretendard', sans-serif";
        return `800 ${size}px ${family}`;
      }

      getLineHeightPx() {
        const size = Number(this.settings.fontSize) || 42;
        return size * 1.5;
      }

      applySettingsToUi() {
        document.getElementById('ytIdInput').value = this.settings.ytId;
        document.getElementById('fontFamilyInput').value = this.settings.fontFamily;
        document.getElementById('textColorInput').value = this.settings.textColor;
        document.getElementById('fontSizeInput').value = this.settings.fontSize;
        document.getElementById('accentColorInput').value = this.settings.accentColor;
        document.getElementById('dimmingInput').value = this.settings.dimming;
        document.getElementById('speedInput').value = this.settings.speed;
        document.getElementById('delayInput').value = this.settings.delay;
      }

      applySettingsToPage() {
        const root = document.documentElement;
        root.style.setProperty('--text-color', this.settings.textColor);
        root.style.setProperty('--accent', this.settings.accentColor);
        root.style.setProperty('--font-size', `${this.settings.fontSize}px`);
        root.style.setProperty('--font-family', this.settings.fontFamily);
        root.style.setProperty('--dimming', this.settings.dimming / 100);

        const id = this.settings.ytId;
        const newSrc = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}&modestbranding=1&rel=0&enablejsapi=1`;
        if (!String(this.ytPlayer.src || '').includes(id)) this.ytPlayer.src = newSrc;
      }

      persistDocuments() {
        const saved = this.storage.saveDocuments(this.documents);
        if (!saved) this.showMessage('Local storage is full. Changes could not be saved.');
        return saved;
      }

      showMessage(text) {
        const box = document.getElementById('msgBox');
        box.textContent = text;
        box.style.display = 'block';
        clearTimeout(this.messageTimer);
        this.messageTimer = setTimeout(() => {
          box.style.display = 'none';
        }, 2200);

        if (text === '[Broadcast Resumed]') {
          this.renderer.setBadge('[Broadcast Resumed]', 'resume');
          setTimeout(() => {
            if (this.engine.state.mode !== 'urgent') this.renderer.setBadge('', 'normal');
          }, 1800);
        }
      }

      escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    }

    window.addEventListener('load', () => {
      window.textCast = new TextCastApp();
    });
  </script>
</body>
