<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="An arcade territory capture game inspired by Qix and Volfied.">
    <meta property="og:title" content="Eternal Invasion: Zone Edition">
    <meta property="og:description" content="Capture 80% of the zone while dodging bouncing invaders.">
    <meta property="og:type" content="website">
    <title>ETERNAL INVASION: ZONE EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --panel: #111; }
        * { box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            margin: 0; background: #050505; color: #fff; overflow-x: hidden;
            font-family: 'Press Start 2P', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            touch-action: manipulation; user-select: none;
        }
        .header-bar {
            width: 100%; padding: 12px 24px; border-bottom: 4px solid #333; background: var(--panel);
            display: flex; justify-content: space-between; align-items: center; gap: 16px; z-index: 60;
        }
        .header-stack { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        .brand-logo {
            color: var(--neon-pink); text-shadow: 0 0 8px var(--neon-pink);
            margin: 0; font-size: clamp(10px, 2.4vw, 14px); line-height: 1.5;
        }
        .nav-row { display: flex; gap: 16px; }
        .nav-link { font-size: 8px; color: #aaa; transition: color 0.2s; pointer-events: auto; text-decoration: none; }
        .nav-link:hover { color: var(--neon-blue); }
        .retro-btn {
            background: linear-gradient(to bottom, #444, #111); border: 2px solid #888;
            box-shadow: 0 4px 0 #000; transition: transform 0.1s; cursor: pointer;
        }
        .retro-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .sound-button { padding: 8px; color: #fff; font: inherit; font-size: 8px; display: flex; gap: 8px; align-items: center; }
        .sound-on { color: #4ade80; }
        .sound-off { color: #ef4444; }
        .game-shell {
            position: relative; border: 8px solid #1f2937; border-radius: 2px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); margin-top: 16px;
            max-width: calc(100vw - 24px);
        }
        .crt-overlay {
            position: absolute; inset: 0;
            background:
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.02), rgba(0,255,0,0.05));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 50;
        }
        canvas {
            display: block; width: min(600px, calc(100vw - 24px)); height: auto; aspect-ratio: 4 / 3;
            image-rendering: pixelated; background: #000;
        }
        .game-ui {
            position: absolute; inset: 0 0 auto 0; width: 100%; padding: 16px;
            display: flex; justify-content: space-between; align-items: flex-start; z-index: 10;
            font-size: clamp(7px, 1.8vw, 10px); line-height: 1.7; text-shadow: 0 0 5px var(--neon-blue);
            pointer-events: none;
        }
        .hud-stack { display: flex; flex-direction: column; gap: 4px; }
        .hud-center { text-align: center; }
        .hud-right { text-align: right; }
        .cyan { color: #22d3ee; }
        .yellow { color: #facc15; }
        .pink { color: #ec4899; }
        .progress-track { width: clamp(96px, 22vw, 128px); height: 12px; background: #111827; border: 1px solid #164e63; }
        .progress-fill { height: 100%; background: #22d3ee; transition: width 0.2s linear; }
        .message-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.82);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 40; text-align: center; padding: 20px;
        }
        .message-title { margin: 0 0 10px; color: #fff; font-size: clamp(16px, 4vw, 24px); line-height: 1.5; text-transform: uppercase; }
        .countdown { color: #facc15; font-size: 8px; margin: 0 0 24px; text-transform: uppercase; line-height: 1.6; }
        .retry-button { padding: 12px 24px; color: #fff; font: inherit; font-size: 12px; text-transform: uppercase; }
        .auto-badge {
            position: absolute; bottom: 20px; right: 20px; padding: 8px 12px;
            border: 2px solid var(--neon-pink); color: var(--neon-pink); font-size: 10px; z-index: 60;
            background: rgba(0,0,0,0.8);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 0.5s infinite; }
        .hidden { display: none !important; }
        .mobile-controls { margin: 18px 0 14px; display: none; gap: 36px; align-items: center; justify-content: center; width: 100%; }
        .dpad { display: grid; grid-template-columns: repeat(3, 48px); gap: 8px; }
        .control-button { width: 48px; height: 48px; color: #fff; font: inherit; font-size: 18px; line-height: 1; display: grid; place-items: center; }
        .turbo-button {
            width: 80px; height: 80px; border-radius: 50%; color: #fff; font: inherit; font-size: 8px;
            background: linear-gradient(to bottom, #7f1d1d, #111);
        }
        @media (max-width: 1023px) {
            body { min-height: 100dvh; justify-content: space-between; }
            .mobile-controls { display: flex; }
        }
        @media (max-width: 520px) {
            .header-bar { padding: 10px 12px; align-items: flex-start; }
            .nav-row { gap: 10px; }
            .sound-button { padding: 7px; }
            .game-shell { border-width: 4px; margin-top: 10px; }
            .game-ui { padding: 10px; }
            .mobile-controls { gap: 22px; margin-top: 12px; }
            .dpad { grid-template-columns: repeat(3, 44px); gap: 7px; }
            .control-button { width: 44px; height: 44px; }
            .turbo-button { width: 72px; height: 72px; }
            .auto-badge { right: 8px; bottom: 8px; font-size: 8px; padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <header class="header-bar">
        <div class="header-stack">
            <h1 class="brand-logo">ETERNAL INVASION: ZONE EDITION</h1>
            <div class="nav-row">
                <a href="https://kitscript.com/game" target="_blank" class="nav-link">HOME</a>
                <a href="http://www.youtube.com/@textcube" target="_blank" class="nav-link">YOUTUBE</a>
            </div>
        </div>
        <button id="soundToggle" class="retro-btn sound-button">
            SOUND: <span id="soundStatus" class="sound-off">OFF</span>
        </button>
    </header>

    <main class="game-shell">
        <div class="crt-overlay"></div>
        <div class="game-ui">
            <div class="hud-stack">
                <span class="cyan">PROGRESS</span>
                <div class="progress-track"><div id="progressBar" class="progress-fill" style="width: 0%"></div></div>
                <span id="percentageText">0%</span>
            </div>
            <div class="hud-center">
                <div class="yellow">SCORE</div>
                <div id="scoreText">000000</div>
                <div id="levelText" class="cyan">ZONE 1</div>
            </div>
            <div class="hud-right">
                <div class="pink">LIVES</div>
                <div id="livesText" class="pink">@@@</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="600" height="450"></canvas>
        <div id="messageOverlay" class="message-overlay hidden">
            <h2 id="messageTitle" class="message-title"></h2>
            <p id="countdownMsg" class="countdown">Restarting in 7s...</p>
            <button id="retryBtn" class="retro-btn retry-button">Manual Restart</button>
        </div>
        <div id="autoBadge" class="auto-badge blink hidden">AUTO HUNTING...</div>
    </main>

    <div class="mobile-controls">
        <div class="dpad">
            <div></div>
            <button class="retro-btn control-button" data-dir="0,-1">U</button>
            <div></div>
            <button class="retro-btn control-button" data-dir="-1,0">L</button>
            <button class="retro-btn control-button" data-dir="0,1">D</button>
            <button class="retro-btn control-button" data-dir="1,0">R</button>
        </div>
        <button class="retro-btn turbo-button" data-turbo>TURBO</button>
    </div>

    <script>
        const GRID_W = 100;
        const GRID_H = 75;
        const CELL = 6;
        const FIXED_STEP_MS = 1000 / 60;
        const MAX_UPDATES_PER_FRAME = 5;
        const AUTO_RESUME_TIME = 5000;
        const INVULN_TIME = 2000;
        const TARGET_CAPTURE = 80;

        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        function playTone(freq, type, duration, vol = 0.1) {
            if (!window.game || !game.soundEnabled) return;
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') return;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(vol, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        }
        const SFX = {
            move: () => playTone(120, 'square', 0.05, 0.01),
            capture: () => { playTone(523, 'triangle', 0.1); setTimeout(() => playTone(1046, 'triangle', 0.2), 50); },
            enemyDie: () => { playTone(300, 'sawtooth', 0.1, 0.2); playTone(150, 'sawtooth', 0.3, 0.2); },
            hit: () => playTone(80, 'sawtooth', 0.6, 0.3),
            win: () => { [523, 659, 783, 1046, 1318].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.4), i * 100)); }
        };

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1.0; this.color = color;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= 0.04; }
        }

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.offScreenCanvas = document.createElement('canvas');
                this.offScreenCanvas.width = this.canvas.width;
                this.offScreenCanvas.height = this.canvas.height;
                this.offCtx = this.offScreenCanvas.getContext('2d');
                this.patternCanvas = document.createElement('canvas');
                this.patternCanvas.width = this.canvas.width;
                this.patternCanvas.height = this.canvas.height;
                this.soundEnabled = false;
                this.animationFrame = null;
                this.accumulator = 0;
                this.lastFrameTime = 0;
                this.score = 0;
                this.level = 1;
                this.highScore = Number(localStorage.getItem('zoneHighScore') || 0);
                this.bindControls();
                this.createProceduralBackground();
                this.restart(true);
            }

            bindControls() {
                document.getElementById('retryBtn').addEventListener('click', () => { this.clearTimers(); this.restart(true); });
                document.getElementById('soundToggle').addEventListener('click', () => this.toggleSound());
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Shift') this.toggleTurbo(true, true);
                    if (e.key.startsWith('Arrow')) {
                        e.preventDefault();
                        this.setDirectionFromKey(e.key);
                    }
                });
                window.addEventListener('keyup', (e) => {
                    if (e.key === 'Shift') this.toggleTurbo(false, true);
                });
                document.querySelectorAll('[data-dir]').forEach((button) => {
                    button.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        const [dx, dy] = button.dataset.dir.split(',').map(Number);
                        this.setDirection(dx, dy, true);
                    });
                });
                const turbo = document.querySelector('[data-turbo]');
                const turboOff = (e) => { e.preventDefault(); this.toggleTurbo(false, true); };
                turbo.addEventListener('pointerdown', (e) => { e.preventDefault(); this.toggleTurbo(true, true); });
                turbo.addEventListener('pointerup', turboOff);
                turbo.addEventListener('pointercancel', turboOff);
                turbo.addEventListener('pointerleave', turboOff);
            }

            clearTimers() {
                if (this.restartTimer) clearTimeout(this.restartTimer);
                if (this.restartInterval) clearInterval(this.restartInterval);
                this.restartTimer = null;
                this.restartInterval = null;
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                const status = document.getElementById('soundStatus');
                status.innerText = this.soundEnabled ? 'ON' : 'OFF';
                status.className = this.soundEnabled ? 'sound-on' : 'sound-off';
                if (this.soundEnabled) getAudioCtx().resume();
            }

            toggleTurbo(enabled, isManual = false) {
                if (isManual) this.disableAutoMode();
                this.turbo = enabled;
            }

            setDirectionFromKey(key) {
                if (key === 'ArrowUp') this.setDirection(0, -1, true);
                else if (key === 'ArrowDown') this.setDirection(0, 1, true);
                else if (key === 'ArrowLeft') this.setDirection(-1, 0, true);
                else if (key === 'ArrowRight') this.setDirection(1, 0, true);
            }

            setDirection(dx, dy, isManual = false) {
                if (!this.player) return;
                if (isManual) this.disableAutoMode();
                if (this.player.isDrawing && this.player.dx === -dx && this.player.dy === -dy) return;
                if (!this.player.isDrawing) {
                    if (this.player.dx === -dx && dx !== 0) return;
                    if (this.player.dy === -dy && dy !== 0) return;
                }
                this.player.dx = dx;
                this.player.dy = dy;
                if (dx !== 0 || dy !== 0) this.player.lastMoveTime = performance.now();
            }

            disableAutoMode() {
                this.lastManualInputTime = performance.now();
                if (!this.isAutoMode) return;
                this.isAutoMode = false;
                if (this.player) {
                    this.player.dx = 0;
                    this.player.dy = 0;
                }
                document.getElementById('autoBadge').classList.add('hidden');
            }

            createProceduralBackground() {
                const bctx = this.patternCanvas.getContext('2d');
                bctx.fillStyle = '#101025';
                bctx.fillRect(0, 0, this.patternCanvas.width, this.patternCanvas.height);
                for (let i = 0; i < 150; i++) {
                    bctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 50%, 0.15)`;
                    bctx.beginPath();
                    bctx.arc(Math.random() * this.patternCanvas.width, Math.random() * this.patternCanvas.height, Math.random() * 30, 0, Math.PI * 2);
                    bctx.fill();
                }
            }

            restart(resetCampaign = false) {
                this.clearTimers();
                if (resetCampaign) {
                    this.score = 0;
                    this.level = 1;
                }
                this.startRound();
                if (!this.animationFrame) this.animationFrame = requestAnimationFrame((t) => this.gameLoop(t));
            }

            startRound() {
                this.isRunning = true;
                this.isGameOver = false;
                this.isAutoMode = true;
                this.turbo = false;
                this.lastManualInputTime = performance.now();
                this.grid = Array(GRID_H).fill().map(() => Array(GRID_W).fill(0));
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        if (x === 0 || x === GRID_W - 1 || y === 0 || y === GRID_H - 1) this.grid[y][x] = 1;
                    }
                }
                const startX = Math.floor(GRID_W / 2);
                const startY = GRID_H - 1;
                const now = performance.now();
                this.player = {
                    x: startX, y: startY, dx: 0, dy: 0, isDrawing: false,
                    lastSafeX: startX, lastSafeY: startY, spawnTime: now, lastMoveTime: now,
                    hitCooldownUntil: now + INVULN_TIME
                };
                const speed = 1 + (this.level - 1) * 0.09;
                this.enemies = [
                    { x: 30, y: 30, vx: 0.38 * speed, vy: 0.35 * speed, type: 'boss', r: 1.2, mass: 1 },
                    { x: 70, y: 45, vx: -0.35 * speed, vy: -0.42 * speed, type: 'boss', r: 1.2, mass: 1 },
                    { x: 15, y: 15, vx: 0.48 * speed, vy: 0.45 * speed, type: 'spark', r: 0.8, mass: 0.5 }
                ];
                if (this.level >= 3) {
                    this.enemies.push({ x: 82, y: 18, vx: -0.42 * speed, vy: 0.39 * speed, type: 'spark', r: 0.8, mass: 0.5 });
                }
                this.lives = 3;
                this.captured = 0;
                this.particles = [];
                this.moveFrameCounter = 0;
                this.aiStepCount = 0;
                this.aiState = 'IDLE';
                this.stuckTimer = 0;
                this.hitThisTick = false;
                document.getElementById('messageOverlay').classList.add('hidden');
                document.getElementById('autoBadge').classList.remove('hidden');
                this.updateOffScreen();
                this.updateUI();
            }

            isBoundary(x, y) {
                if (!this.grid[y] || this.grid[y][x] !== 1) return false;
                return [[0,1],[0,-1],[1,0],[-1,0]].some(([dx, dy]) => {
                    const nx = x + dx;
                    const ny = y + dy;
                    return nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && this.grid[ny][nx] === 0;
                });
            }

            updateOffScreen() {
                this.offCtx.clearRect(0, 0, this.offScreenCanvas.width, this.offScreenCanvas.height);
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        if (this.grid[y][x] !== 1) continue;
                        if (this.isBoundary(x, y)) {
                            this.offCtx.fillStyle = '#00f3ff';
                            this.offCtx.fillRect(x * CELL, y * CELL, CELL, CELL);
                        } else {
                            this.offCtx.drawImage(this.patternCanvas, x * CELL, y * CELL, CELL, CELL, x * CELL, y * CELL, CELL, CELL);
                        }
                    }
                }
            }

            getMinDistToEnemy() {
                return this.enemies.reduce((min, e) => Math.min(min, Math.hypot(e.x - this.player.x, e.y - this.player.y)), 999);
            }

            isEnemyInSquare(size) {
                return this.enemies.some((e) => Math.abs(e.x - this.player.x) <= size && Math.abs(e.y - this.player.y) <= size);
            }

            runAutoHunter() {
                if (!this.isAutoMode || !this.isRunning) return;
                const minDist = this.getMinDistToEnemy();
                const directions = [[0,1],[0,-1],[1,0],[-1,0]];
                if (!this.player.isDrawing && this.grid[this.player.y][this.player.x] === 1 && !this.isBoundary(this.player.x, this.player.y)) {
                    this.snapToNearestBoundary();
                    return;
                }
                if (this.player.isDrawing && (this.isEnemyInSquare(15) || this.aiState === 'PANIC_RETURN')) {
                    this.aiState = 'PANIC_RETURN';
                    this.snapToNearestBoundary();
                    return;
                }
                if (this.aiState === 'IDLE') {
                    if (!this.isEnemyInSquare(15) && minDist > 22) {
                        const possible = directions.filter(([dx, dy]) => {
                            const nx = this.player.x + dx, ny = this.player.y + dy;
                            return nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && this.grid[ny][nx] === 0;
                        });
                        if (possible.length) {
                            const [dx, dy] = possible[Math.floor(Math.random() * possible.length)];
                            this.setDirection(dx, dy);
                            this.aiStepCount = 4 + Math.floor(Math.random() * 5);
                            this.aiState = 'HUNT_OUT';
                            return;
                        }
                    }
                    const patrolDirs = directions.filter(([dx, dy]) => {
                        const nx = this.player.x + dx, ny = this.player.y + dy;
                        return nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && this.isBoundary(nx, ny);
                    });
                    if (patrolDirs.length) {
                        let bestDir = patrolDirs[0], maxDistance = -1;
                        patrolDirs.forEach((dir) => {
                            const tx = this.player.x + dir[0], ty = this.player.y + dir[1];
                            const distance = this.enemies.reduce((min, e) => Math.min(min, Math.hypot(e.x - tx, e.y - ty)), 999);
                            if (distance > maxDistance) { maxDistance = distance; bestDir = dir; }
                        });
                        if ((this.player.dx === 0 && this.player.dy === 0) || Math.random() > 0.94) this.setDirection(bestDir[0], bestDir[1]);
                    }
                } else {
                    this.aiStepCount--;
                    if (this.aiStepCount <= 0) {
                        if (this.aiState === 'HUNT_OUT') {
                            const turns = this.player.dx !== 0 ? [[0,1],[0,-1]] : [[1,0],[-1,0]];
                            const [dx, dy] = turns[Math.floor(Math.random() * turns.length)];
                            this.setDirection(dx, dy);
                            this.aiStepCount = 4 + Math.floor(Math.random() * 5);
                            this.aiState = 'HUNT_SIDE';
                        } else {
                            this.aiState = 'PANIC_RETURN';
                            this.snapToNearestBoundary();
                        }
                    }
                }
            }

            snapToNearestBoundary() {
                const queue = [[this.player.x, this.player.y]];
                const visited = new Set([`${this.player.x},${this.player.y}`]);
                const parent = {};
                let target = null;
                while (queue.length) {
                    const [cx, cy] = queue.shift();
                    if (this.isBoundary(cx, cy)) { target = [cx, cy]; break; }
                    for (const [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                        const nx = cx + dx, ny = cy + dy;
                        if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H || visited.has(`${nx},${ny}`)) continue;
                        if (this.player.isDrawing && this.grid[ny][nx] === 2) continue;
                        visited.add(`${nx},${ny}`);
                        parent[`${nx},${ny}`] = [cx, cy];
                        queue.push([nx, ny]);
                    }
                }
                if (!target) {
                    this.aiState = 'IDLE';
                    return;
                }
                let curr = target;
                while (parent[`${curr[0]},${curr[1]}`] && (parent[`${curr[0]},${curr[1]}`][0] !== this.player.x || parent[`${curr[0]},${curr[1]}`][1] !== this.player.y)) {
                    curr = parent[`${curr[0]},${curr[1]}`];
                }
                this.player.dx = curr[0] - this.player.x;
                this.player.dy = curr[1] - this.player.y;
            }

            update(now) {
                if (!this.isRunning) return;
                this.hitThisTick = false;
                if (!this.isAutoMode && !this.player.isDrawing && now - this.lastManualInputTime > AUTO_RESUME_TIME) {
                    this.isAutoMode = true;
                    document.getElementById('autoBadge').classList.remove('hidden');
                }
                if (this.isAutoMode) this.runAutoHunter();
                const moveDelay = this.turbo ? 2 : 4;
                this.moveFrameCounter++;
                if (this.moveFrameCounter >= moveDelay) {
                    this.movePlayer(now);
                    this.moveFrameCounter = 0;
                }
                this.moveEnemies(now);
                this.particles = this.particles.filter((p) => { p.update(); return p.life > 0; });
            }

            movePlayer(now) {
                const oldX = this.player.x, oldY = this.player.y;
                if (this.player.dx === 0 && this.player.dy === 0) return;
                const nx = this.player.x + this.player.dx;
                const ny = this.player.y + this.player.dy;
                if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) {
                    this.player.dx = 0; this.player.dy = 0; return;
                }
                const cell = this.grid[ny][nx];
                if (cell === 1) {
                    this.player.x = nx;
                    this.player.y = ny;
                    if (this.player.isDrawing) {
                        this.completeCapture();
                        this.player.isDrawing = false;
                        if (this.isAutoMode) { this.aiState = 'IDLE'; this.aiStepCount = 0; }
                    }
                    this.player.lastSafeX = nx;
                    this.player.lastSafeY = ny;
                } else if (cell === 0) {
                    this.player.isDrawing = true;
                    this.grid[ny][nx] = 2;
                    this.player.x = nx;
                    this.player.y = ny;
                    if (Math.random() > 0.8) SFX.move();
                } else if (cell === 2) {
                    this.playerHit(now);
                }
                if (oldX === this.player.x && oldY === this.player.y && this.isAutoMode) {
                    this.stuckTimer++;
                    if (this.stuckTimer > 20) { this.snapToNearestBoundary(); this.stuckTimer = 0; }
                } else {
                    this.stuckTimer = 0;
                }
            }

            hitsWall(x, y) {
                const gx = Math.max(0, Math.min(GRID_W - 1, Math.floor(x)));
                const gy = Math.max(0, Math.min(GRID_H - 1, Math.floor(y)));
                return gx <= 0 || gx >= GRID_W - 1 || gy <= 0 || gy >= GRID_H - 1 || (this.grid[gy] && this.grid[gy][gx] === 1);
            }

            moveEnemies(now) {
                for (const e of this.enemies) {
                    const nextX = e.x + e.vx;
                    const nextY = e.y + e.vy;
                    const hitX = this.hitsWall(nextX, e.y);
                    const hitY = this.hitsWall(e.x, nextY);
                    if (hitX) e.vx *= -1;
                    else e.x = nextX;
                    if (hitY) e.vy *= -1;
                    else e.y = nextY;
                    if (hitX && hitY) {
                        e.x += e.vx;
                        e.y += e.vy;
                    }
                    const curX = Math.max(0, Math.min(GRID_W - 1, Math.floor(e.x)));
                    const curY = Math.max(0, Math.min(GRID_H - 1, Math.floor(e.y)));
                    const hitTrail = this.grid[curY][curX] === 2;
                    const hitPlayer = this.player.isDrawing && Math.hypot(e.x - this.player.x, e.y - this.player.y) < 1.5;
                    if (hitTrail || hitPlayer) this.playerHit(now);
                }
                this.resolveEnemyCollisions();
            }

            resolveEnemyCollisions() {
                for (let i = 0; i < this.enemies.length; i++) {
                    for (let j = i + 1; j < this.enemies.length; j++) {
                        const e1 = this.enemies[i], e2 = this.enemies[j];
                        const dx = e2.x - e1.x, dy = e2.y - e1.y;
                        const distance = Math.hypot(dx, dy) || 0.0001;
                        const minDistance = e1.r + e2.r;
                        if (distance >= minDistance) continue;
                        const nx = dx / distance, ny = dy / distance;
                        const rvx = e2.vx - e1.vx, rvy = e2.vy - e1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;
                        if (velAlongNormal > 0) continue;
                        let impulse = -(1 + 1.0) * velAlongNormal;
                        impulse /= (1 / e1.mass + 1 / e2.mass);
                        e1.vx -= (impulse * nx) / e1.mass;
                        e1.vy -= (impulse * ny) / e1.mass;
                        e2.vx += (impulse * nx) / e2.mass;
                        e2.vy += (impulse * ny) / e2.mass;
                        const correction = (minDistance - distance) / (1 / e1.mass + 1 / e2.mass) * 0.55;
                        e1.x -= (correction * nx) / e1.mass;
                        e1.y -= (correction * ny) / e1.mass;
                        e2.x += (correction * nx) / e2.mass;
                        e2.y += (correction * ny) / e2.mass;
                    }
                }
            }

            completeCapture() {
                const visited = Array(GRID_H).fill().map(() => Array(GRID_W).fill(false));
                const islands = [];
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        if (this.grid[y][x] !== 0 || visited[y][x]) continue;
                        const cells = [];
                        const queue = [[x, y]];
                        visited[y][x] = true;
                        while (queue.length) {
                            const [cx, cy] = queue.shift();
                            cells.push({ x: cx, y: cy });
                            for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                                const nx = cx + dx, ny = cy + dy;
                                if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && this.grid[ny][nx] === 0 && !visited[ny][nx]) {
                                    visited[ny][nx] = true;
                                    queue.push([nx, ny]);
                                }
                            }
                        }
                        islands.push(cells);
                    }
                }
                islands.sort((a, b) => b.length - a.length);
                let gainedCells = 0;
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        if (this.grid[y][x] === 2) { this.grid[y][x] = 1; gainedCells++; }
                    }
                }
                for (let i = 1; i < islands.length; i++) {
                    gainedCells += islands[i].length;
                    islands[i].forEach((cell) => { this.grid[cell.y][cell.x] = 1; });
                }
                this.score += Math.floor(gainedCells * (40 + this.level * 10));
                this.enemies = this.enemies.filter((e) => {
                    const gx = Math.floor(e.x), gy = Math.floor(e.y);
                    if (this.grid[gy] && this.grid[gy][gx] === 1) {
                        this.createExplosion(e.x * CELL, e.y * CELL, '#ff0055');
                        this.score += 20000 * this.level;
                        SFX.enemyDie();
                        return false;
                    }
                    return true;
                });
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('zoneHighScore', String(this.highScore));
                }
                this.updateOffScreen();
                this.updateProgress();
                SFX.capture();
                if (this.isAutoMode) this.snapToNearestBoundary();
            }

            createExplosion(x, y, color) {
                for (let i = 0; i < 25; i++) this.particles.push(new Particle(x, y, color));
            }

            playerHit(now = performance.now()) {
                if (this.hitThisTick || now < this.player.hitCooldownUntil || this.isGameOver) return;
                this.hitThisTick = true;
                SFX.hit();
                this.createExplosion(this.player.x * CELL, this.player.y * CELL, '#ffffff');
                this.lives--;
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) if (this.grid[y][x] === 2) this.grid[y][x] = 0;
                }
                this.player.x = this.player.lastSafeX;
                this.player.y = this.player.lastSafeY;
                this.player.dx = 0;
                this.player.dy = 0;
                this.player.isDrawing = false;
                this.player.spawnTime = now;
                this.player.lastMoveTime = now;
                this.player.hitCooldownUntil = now + INVULN_TIME;
                this.aiStepCount = 0;
                this.aiState = 'IDLE';
                this.updateOffScreen();
                this.updateUI();
                if (this.lives <= 0) this.endGame('GAME OVER', false);
            }

            updateProgress() {
                let total = 0;
                this.grid.forEach((row) => row.forEach((cell) => { if (cell === 1) total++; }));
                this.captured = (total / (GRID_W * GRID_H)) * 100;
                this.updateUI();
                if (this.captured >= TARGET_CAPTURE) this.endGame('TARGET REACHED!', true);
                else if (this.enemies.length === 0) this.endGame('INVADERS CLEARED!', true);
            }

            updateUI() {
                document.getElementById('percentageText').innerText = `${Math.floor(this.captured)}%`;
                document.getElementById('progressBar').style.width = `${Math.min(100, this.captured)}%`;
                document.getElementById('livesText').innerText = '@'.repeat(Math.max(0, this.lives));
                document.getElementById('scoreText').innerText = String(this.score).padStart(6, '0');
                document.getElementById('levelText').innerText = `ZONE ${this.level}  HI ${String(this.highScore).padStart(6, '0')}`;
            }

            endGame(msg, advanceLevel) {
                if (this.isGameOver) return;
                this.isRunning = false;
                this.isGameOver = true;
                document.getElementById('autoBadge').classList.add('hidden');
                if (advanceLevel) SFX.win();
                const overlay = document.getElementById('messageOverlay');
                const countdown = document.getElementById('countdownMsg');
                document.getElementById('messageTitle').innerText = msg;
                overlay.classList.remove('hidden');
                let timeLeft = advanceLevel ? 3 : 7;
                countdown.innerText = advanceLevel ? `Next zone in ${timeLeft}s...` : `Restarting in ${timeLeft}s...`;
                this.restartInterval = setInterval(() => {
                    timeLeft--;
                    countdown.innerText = advanceLevel ? `Next zone in ${timeLeft}s...` : `Restarting in ${timeLeft}s...`;
                    if (timeLeft <= 0) clearInterval(this.restartInterval);
                }, 1000);
                this.restartTimer = setTimeout(() => {
                    if (advanceLevel) {
                        this.level++;
                        this.startRound();
                    } else {
                        this.restart(true);
                    }
                }, (advanceLevel ? 3 : 7) * 1000);
            }

            gameLoop(timestamp) {
                if (!this.lastFrameTime) this.lastFrameTime = timestamp;
                this.accumulator += Math.min(250, timestamp - this.lastFrameTime);
                this.lastFrameTime = timestamp;
                let updates = 0;
                while (this.accumulator >= FIXED_STEP_MS && updates < MAX_UPDATES_PER_FRAME) {
                    this.update(timestamp);
                    this.accumulator -= FIXED_STEP_MS;
                    updates++;
                }
                if (updates === MAX_UPDATES_PER_FRAME) this.accumulator = 0;
                this.draw(timestamp);
                this.animationFrame = requestAnimationFrame((t) => this.gameLoop(t));
            }

            draw(now = performance.now()) {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(this.offScreenCanvas, 0, 0);
                this.ctx.fillStyle = this.turbo ? '#ff0' : '#0ff';
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        if (this.grid[y][x] === 2) this.ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
                    }
                }
                this.particles.forEach((p) => {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.fillRect(p.x, p.y, 4, 4);
                });
                this.ctx.globalAlpha = 1;
                this.enemies.forEach((e) => {
                    this.ctx.shadowBlur = 15;
                    this.ctx.shadowColor = e.type === 'boss' ? '#ff0055' : '#ffff00';
                    this.ctx.fillStyle = this.ctx.shadowColor;
                    this.ctx.beginPath();
                    this.ctx.arc(e.x * CELL, e.y * CELL, e.r * CELL, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                this.ctx.shadowBlur = 0;
                let showPlayer = true;
                if (now < this.player.hitCooldownUntil || now - this.player.lastMoveTime > 2000) {
                    showPlayer = Math.floor(now / 150) % 2 === 0;
                }
                if (this.isAutoMode) {
                    this.ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)';
                    this.ctx.lineWidth = 1;
                    const s = 15 * CELL;
                    this.ctx.strokeRect(this.player.x * CELL - s, this.player.y * CELL - s, s * 2, s * 2);
                }
                if (showPlayer) {
                    this.ctx.fillStyle = this.isAutoMode ? '#ff00ff' : '#fff';
                    this.ctx.shadowColor = this.ctx.fillStyle;
                    this.ctx.shadowBlur = 10;
                    this.ctx.fillRect(this.player.x * CELL - 2, this.player.y * CELL - 2, CELL + 4, CELL + 4);
                    this.ctx.shadowBlur = 0;
                }
            }
        }

        window.game = new Game();
    </script>
</body>
</html>
