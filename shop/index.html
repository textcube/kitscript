<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETRO MENU FACTORY - v5.9 BAKE_ENGINE_UPGRADED</title>
    <!-- 폰트 로드: 영문 Press Start 2P / 한글 둥근모 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.css">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-magenta: #ff00ff;
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --arcade-black: #050505;
            --ui-dark: #0a0a0a;
            --border-color: #333;
            --main-font: 'Press Start 2P', cursive;
            --kr-font: 'NeoDunggeunmo', cursive;
            --green-glow: 0 0 15px rgba(57, 255, 20, 0.6);
            --magenta-glow: 0 0 10px rgba(255, 0, 255, 0.5);
            --blue-glow: 0 0 10px rgba(0, 242, 255, 0.5);
            --red-glow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0;
            background-color: var(--arcade-black);
            color: var(--neon-green);
            font-family: var(--main-font);
            -webkit-font-smoothing: none;
            font-smooth: never;
            font-size: 11px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10000;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.15;
        }

        /* Top Bar */
        .top-bar {
            background: #000;
            border-bottom: 2px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .title {
            color: var(--neon-green);
            text-shadow: var(--green-glow);
            font-size: 14px;
            letter-spacing: 1px;
            margin-right: 10px;
        }

        /* Brand Icon Buttons */
        .brand-icon-btn {
            width: 32px; height: 32px;
            border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            background: #000; cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }
        .brand-icon-btn svg { width: 18px; height: 18px; fill: #444; transition: 0.2s; }

        .brand-icon-btn.youtube:hover { border-color: var(--neon-red); box-shadow: var(--red-glow); }
        .brand-icon-btn.youtube:hover svg { fill: var(--neon-red); }

        .brand-icon-btn.home:hover { border-color: var(--neon-blue); box-shadow: var(--blue-glow); }
        .brand-icon-btn.home:hover svg { fill: var(--neon-blue); }

        .controls { display: flex; gap: 10px; }
        .btn {
            background: #000;
            border: 1px solid #444;
            color: #888;
            padding: 8px 16px;
            cursor: pointer;
            font-family: var(--main-font);
            font-size: 8px;
            transition: 0.1s;
            text-transform: uppercase;
        }
        .btn:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: var(--green-glow); }
        .btn.bake {
            background: var(--neon-green);
            color: #000;
            border-color: var(--neon-green);
            font-weight: bold;
        }

        /* Main Container */
        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            background: #080808;
            border-right: 2px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar-label {
            font-size: 9px;
            color: #555;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
            letter-spacing: 1px;
            margin-top: 25px;
        }
        .sidebar-label:first-child { margin-top: 0; }

        .add-small-btn {
            color: var(--neon-green);
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
            transition: 0.2s;
        }
        .add-small-btn:hover { text-shadow: var(--green-glow); transform: scale(1.2); }

        /* Config Zones */
        .config-zone { margin-bottom: 20px; }
        .config-zone label { display: block; font-size: 7px; color: #444; margin-bottom: 5px; }
        .config-zone input {
            width: 100%; background: #000; border: 1px solid #222;
            color: var(--neon-blue); font-family: var(--main-font);
            padding: 10px; font-size: 8px; outline: none;
        }
        .config-zone input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        /* Category Manager Area */
        .cat-editor-zone {
            display: flex; gap: 5px; margin-bottom: 25px;
        }
        .cat-editor-zone input {
            flex-grow: 1; background: #000; border: 1px solid #333;
            color: var(--neon-green); font-family: var(--main-font);
            padding: 10px; font-size: 8px; outline: none;
        }
        .cat-editor-zone input:focus { border-color: var(--neon-green); box-shadow: var(--green-glow); }

        .category-tabs { margin-bottom: 30px; }
        .cat-tab-wrapper { position: relative; margin-bottom: 8px; display: flex; gap: 4px; height: 40px; }
        .cat-tab {
            flex-grow: 1; text-align: left; padding: 0 12px;
            background: #000; border: 1px solid #1a1a1a;
            color: #444; font-size: 8px; cursor: pointer;
            font-family: var(--main-font);
            transition: 0.2s;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            line-height: 38px;
        }
        .cat-tab:hover { color: #888; border-color: #333; }
        .cat-tab.active { border-color: var(--neon-magenta); color: var(--neon-magenta); background: rgba(255, 0, 255, 0.05); }

        .cat-inline-input {
            flex-grow: 1; background: #111; border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta); font-family: var(--main-font);
            padding: 0 11px; font-size: 8px; outline: none;
            box-shadow: var(--magenta-glow);
            line-height: 38px;
        }

        .cat-tool-btn {
            width: 38px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 1px solid #222; color: #444;
            cursor: pointer; font-size: 10px;
        }
        .cat-tool-btn:hover { color: var(--neon-green); border-color: var(--neon-green); }
        .cat-tool-btn.del:hover { color: #f00; border-color: #f00; }

        /* Grid System */
        .menu-grid {
            padding: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 50px;
            overflow-y: auto;
            background: #000;
            background-image:
                linear-gradient(rgba(57, 255, 20, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57, 255, 20, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            align-content: start;
        }

        /* Card Styling */
        .card {
            background: #0c0c0c;
            border: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            position: relative;
            transition: 0.2s;
            overflow: hidden;
            box-shadow: 8px 8px 0 var(--border-color);
        }

        .card.small { min-height: 400px; grid-column: span 1; }
        .card.medium { min-height: 550px; grid-column: span 1; }
        .card.large { min-height: 550px; grid-column: span 2; }

        .card:hover { border-color: var(--neon-green); box-shadow: 8px 8px 0 var(--neon-green); }

        .card-img {
            width: 100%; background: #111; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .small .card-img { height: 180px; }
        .medium .card-img { height: 300px; }
        .large .card-img { height: 300px; }

        .card-img::before {
            content: "ASSET_VIEW";
            color: #1a1a1a; font-size: 10px; font-family: var(--main-font);
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; z-index: 5; position: absolute; top: 0; left: 0; }

        .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; gap: 12px; position: relative; }
        .large .card-content { padding: 35px; gap: 18px; }

        .card-cat-tag { font-size: 8px; color: var(--neon-magenta); opacity: 0.6; }
        .card-name { font-size: 14px; color: var(--neon-blue); }
        .large .card-name { font-size: 18px; }

        .desc-qr-wrap { display: flex; gap: 15px; align-items: flex-start; }
        .card-desc { font-family: var(--kr-font); font-size: 13px; color: #777; line-height: 1.7; min-height: 50px; word-break: keep-all; flex: 1; }
        .large .card-desc { font-size: 15px; }

        .card-qr-box {
            width: 70px; height: 70px;
            background: #fff; border: 2px solid var(--neon-green);
            padding: 3px; box-shadow: var(--green-glow);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .card-qr-box img { width: 100%; height: 100%; image-rendering: pixelated; }

        .card-price { font-size: 24px; color: var(--neon-green); margin-top: auto; font-weight: bold; }
        .large .card-price { font-size: 32px; }

        .badge {
            position: absolute; top: 15px; right: 15px;
            background: var(--neon-green); color: #000;
            padding: 6px 12px; font-size: 9px; font-weight: bold;
            z-index: 10;
        }

        .card-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; margin-top: 15px; background: #222; border: 1px solid #222; }
        .action-btn {
            background: #0c0c0c; border: none; color: #444;
            padding: 12px 0; cursor: pointer; font-family: var(--main-font); font-size: 8px;
            transition: 0.1s;
        }
        .action-btn:hover { background: #1a1a1a; color: var(--neon-green); }

        /* Modal Area */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: #000; border: 1px solid var(--neon-green);
            padding: 40px; width: 500px; box-shadow: var(--green-glow);
            max-height: 90vh; overflow-y: auto;
        }
        .modal.confirm-modal { width: 420px; border-color: var(--neon-red); box-shadow: var(--red-glow); }
        .confirm-message { font-family: var(--kr-font); font-size: 14px; color: #ccc; line-height: 1.7; margin: 20px 0; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #444; font-size: 8px; font-family: var(--main-font); }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; background: #080808; border: 1px solid #222;
            padding: 15px; color: var(--neon-green); font-family: var(--kr-font); outline: none; font-size: 14px;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--neon-green); background: #000; }

        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: #000; border: 1px solid var(--neon-green);
            padding: 15px 30px; color: var(--neon-green);
            box-shadow: var(--green-glow); z-index: 9999; display: none; font-size: 9px;
        }

        .preset-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .preset-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px; border: 1px solid #1a1a1a;
            cursor: pointer; background: #000; color: #555; font-size: 8px;
        }
        .preset-item:hover { color: #888; border-color: #333; }
        .preset-item.active { border-color: var(--neon-green); color: var(--neon-green); background: rgba(57, 255, 20, 0.05); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-zone">
            <div class="title" id="mainTitleDisplay">RETRO MENU FACTORY</div>
            <!-- Branded Link Buttons -->
            <a href="https://youtube.com/@kitscript" target="_blank" class="brand-icon-btn youtube" title="YouTube Channel">
                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <a href="https://kitscript.com" target="_blank" class="brand-icon-btn home" title="Official Homepage">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </a>
            <span style="font-size: 8px; color: #444; margin-left: 10px;" id="sysVersionDisplay">SYSTEM_v5.9_BOOTING...</span>
        </div>
        <div class="controls">
            <button class="btn" id="resetBtn">RESET</button>
            <button class="btn" id="samplesBtn">SAMPLES</button>
            <button class="btn" id="saveBtn">SAVE</button>
            <button class="btn" id="exportBtn">EXPORT</button>
            <button class="btn" id="importBtn">IMPORT</button>
            <button class="btn bake" id="bakeBtn">BAKE</button>
        </div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <span class="sidebar-label">GLOBAL_CONFIG</span>
            <div class="config-zone">
                <label for="storeNameInput">STORE_NAME (BAKE_TITLE)</label>
                <input type="text" id="storeNameInput" placeholder="STORE_NAME...">
            </div>
            <div class="config-zone">
                <label for="shopUrlInput">LANDING_PAGE_URL (QR_TARGET)</label>
                <input type="text" id="shopUrlInput" placeholder="https://...">
            </div>

            <span class="sidebar-label">CATEGORY_MANAGER</span>
            <div class="cat-editor-zone">
                <input type="text" id="catInput" placeholder="NEW_CAT_NAME...">

            </div>

            <div class="category-tabs" id="catListContainer">
                <!-- Dynamic tabs -->
            </div>

            <span class="sidebar-label">
                QUICK_PRESETS
                <span class="add-small-btn" id="newItemBtn" title="CREATE_NEW_ASSET">[+]</span>
            </span>
            <div id="presetContainer" class="preset-list">
                <!-- Preset items rendered by JS -->
            </div>
        </aside>

        <main class="menu-grid" id="menuGrid"></main>
    </div>

    <!-- Modal Area -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="sidebar-label" id="modalTitle" style="color:var(--neon-green); border-color:var(--neon-green)">ASSET_PROPERTY_EDITOR</div>
            <div class="input-group">
                <label for="editName">STRING_NAME</label>
                <input type="text" id="editName">
            </div>
            <div class="input-group">
                <label for="editSize">LAYOUT_규격 (SIZE)</label>
                <select id="editSize">
                    <option value="small">SMALL (컴팩트 / 1-Col)</option>
                    <option value="medium" selected>MEDIUM (표준 / 1-Col)</option>
                    <option value="large">LARGE (히어로 / 2-Col)</option>
                </select>

            <div class="input-group">
                <label for="editCategorySelect">TYPE_CATEGORY</label>
                <select id="editCategorySelect"></select>

            <div class="input-group">
                <label for="editPrice">VAL_PRICE (₩)</label>
                <input type="text" id="editPrice">
            </div>
            <div class="input-group">
                <label for="editDesc">TEXT_DESCRIPTION</label>
                <textarea id="editDesc" rows="3"></textarea>
            </div>
            <div class="input-group">
                <label for="editBadge">FLAG_STATUS</label>
                <select id="editBadge">
                    <option value="">NULL</option>
                    <option value="NEW">NEW</option>
                    <option value="BEST">BEST</option>
                    <option value="SOLD OUT">SOLD OUT</option>
                </select>
            </div>
            <div class="controls" style="margin-top:20px;">
                <button class="btn bake" id="saveEditBtn">WRITE_COMMIT</button>
                <button class="btn" id="cancelEditBtn">CANCEL_OPS</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog (replaces confirm()/alert()) -->
    <div class="modal-overlay" id="confirmOverlay">
        <div class="modal confirm-modal">
            <div class="sidebar-label" style="color:var(--neon-red); border-color:var(--neon-red)">CONFIRM_ACTION</div>
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="controls">
                <button class="btn bake" id="confirmYesBtn">CONFIRM</button>
                <button class="btn" id="confirmNoBtn">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">SYSTEM_LOG: READY</div>
    <input type="file" id="fileInput" style="display:none" accept="image/*">
    <input type="file" id="importInput" style="display:none" accept="application/json">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration Fallback
        let firebaseConfig = null;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        } catch (e) { firebaseConfig = null; }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'retro-menu-factory-v5';

        const DEFAULT_CATS = ['PIZZA', 'PASTA', 'SIDE', 'DRINK'];
        const PIZZA_DATA = [
            { presetId: 'preset-margherita', name: "Margherita", cat: "PIZZA", desc: "나폴리 정통 화덕 피자. 토마토 소스, 모짜렐라, 바질.", price: "18,000", size: "large" },
            { presetId: 'preset-diavola', name: "Diavola", cat: "PIZZA", desc: "매콤한 살라미와 페페론치노가 가미된 중독성 강한 피자.", price: "21,000", size: "medium" },
            { presetId: 'preset-pomodoro', name: "Pomodoro", cat: "PASTA", desc: "신선한 방울토마토와 바질로 맛을 낸 깔끔한 파스타.", price: "15,000", size: "medium" },
            { presetId: 'preset-house-salad', name: "House Salad", cat: "SIDE", desc: "매일 아침 배송되는 신선한 야채와 발사믹 드레싱.", price: "9,000", size: "small" }
        ];

        function escapeHtml(str) {
            return String(str ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }

        function slugifyId(str, prefix, idx) {
            const s = String(str ?? '').replace(/[^a-zA-Z0-9_-]/g, '');
            return s || `${prefix}${idx}`;
        }

        function slugifyFilename(str) {
            const s = String(str ?? '').toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            return s || 'menu';
        }

        function isDataImage(str) {
            return typeof str === 'string' && /^data:image\//i.test(str);
        }

        function validShopUrl(url) {
            const s = typeof url === 'string' ? url.trim() : '';
            return /^https?:\/\//i.test(s) ? s : '#';
        }

        class RetroMenuApp {
            constructor() {
                this.state = {
                    storeName: "OKSUDONG HWADUK PIZZA",
                    shopUrl: "https://kitscript.com/game/shop",
                    items: [],
                    categories: [...DEFAULT_CATS],
                    user: null,
                    editingId: null,
                    filter: 'ALL',
                    renamingCat: null
                };
                this._persistTimer = null;
                this._toastTimer = null;
                this._shopUrlTimer = null;
                this._unsubscribeSnapshot = null;
                // Check if Firebase is available
                this.isDemoMode = !firebaseConfig || !firebaseConfig.apiKey;
                window.app = this;
                this.bindEvents();
                this.init();
            }

            bindEvents() {
                document.getElementById('resetBtn').addEventListener('click', () => this.newProject());
                document.getElementById('samplesBtn').addEventListener('click', () => this.loadSample());
                document.getElementById('saveBtn').addEventListener('click', () => this.saveToCloud());
                document.getElementById('bakeBtn').addEventListener('click', () => this.bakeHTML());
                document.getElementById('exportBtn').addEventListener('click', () => this.exportProject());
                document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importInput').click());
                document.getElementById('importInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    e.target.value = '';
                    if (file) this.importProject(file);
                });

                document.getElementById('storeNameInput').addEventListener('input', (e) => this.updateStoreName(e.target.value));
                document.getElementById('shopUrlInput').addEventListener('input', (e) => this.updateShopUrl(e.target.value));

                document.getElementById('addCatBtn').addEventListener('click', () => this.addCategory());
                document.getElementById('catInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); this.addCategory(); }
                });

                document.getElementById('newItemBtn').addEventListener('click', () => this.openNewItemModal());

                document.getElementById('saveEditBtn').addEventListener('click', () => this.saveEdit());
                document.getElementById('cancelEditBtn').addEventListener('click', () => this.closeModal());

                document.getElementById('catListContainer').addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;
                    const action = btn.dataset.action;
                    const cat = btn.dataset.cat;
                    if (action === 'filter') this.setFilter(cat);
                    else if (action === 'rename') this.startRename(cat);
                    else if (action === 'delete') this.delCategory(cat);
                });

                document.getElementById('menuGrid').addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;
                    const id = btn.dataset.id;
                    const action = btn.dataset.action;
                    if (action === 'img') this.changeImage(id);
                    else if (action === 'edit') this.openEdit(id);
                    else if (action === 'delete') this.deleteItem(id);
                });

                document.getElementById('presetContainer').addEventListener('click', (e) => {
                    const el = e.target.closest('[data-preset-id]');
                    if (!el) return;
                    this.togglePreset(el.dataset.presetId);
                });
            }

            async init() {
                if (this.isDemoMode) {
                    this.setupLocalDemo();
                    return;
                }

                try {
                    const fbApp = initializeApp(firebaseConfig);
                    const auth = getAuth(fbApp);
                    this.db = getFirestore(fbApp);

                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else { await signInAnonymously(auth); }
                    };

                    await initAuth();

                    onAuthStateChanged(auth, (user) => {
                        this.state.user = user;
                        if (user) {
                            document.getElementById('sysVersionDisplay').textContent = "SYSTEM_v5.9_CLOUD_SYNC";
                            this.syncCloud();
                            this.showToast("CLOUD_SYNC_ACTIVE");
                        }
                    });
                    this.renderAll();
                } catch (error) {
                    console.error("Firebase init failed, fallback to demo:", error);
                    this.setupLocalDemo();
                }
            }

            setupLocalDemo() {
                this.isDemoMode = true;
                document.getElementById('sysVersionDisplay').textContent = "SYSTEM_v5.9_LOCAL_DEMO";
                this.showToast("LOCAL_DEMO_MODE");

                // Load from localStorage if exists
                const saved = localStorage.getItem('retro_menu_v5_demo');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        this.state.items = data.items || [];
                        this.state.categories = data.categories || [...DEFAULT_CATS];
                        this.state.storeName = data.storeName || "OKSUDONG HWADUK PIZZA";
                        this.state.shopUrl = data.shopUrl || "https://kitscript.com/game/shop";
                    } catch (e) { console.error("Local load fail", e); }
                }
                this.renderAll();
            }

            syncCloud() {
                if (this.isDemoMode || !this.state.user) return;
                if (this._unsubscribeSnapshot) { this._unsubscribeSnapshot(); this._unsubscribeSnapshot = null; }
                const userDoc = doc(this.db, 'artifacts', appId, 'users', this.state.user.uid, 'settings', 'menuData');
                this._unsubscribeSnapshot = onSnapshot(userDoc, (snap) => {
                    if (this.isEditingLocally()) return;
                    if (snap.exists()) {
                        const data = snap.data();
                        this.state.items = data.items || [];
                        this.state.categories = data.categories || [...DEFAULT_CATS];
                        this.state.storeName = data.storeName || "OKSUDONG HWADUK PIZZA";
                        this.state.shopUrl = data.shopUrl || "https://kitscript.com/game/shop";
                        this.renderAll();
                    }
                }, (err) => console.error("Snapshot error:", err));
            }

            isEditingLocally() {
                const overlay = document.getElementById('modalOverlay');
                return overlay.style.display === 'flex' || !!this.state.renamingCat;
            }

            async saveToCloud() {
                clearTimeout(this._persistTimer);
                await this.doSave();
            }

            persist() {
                clearTimeout(this._persistTimer);
                this._persistTimer = setTimeout(() => { this.doSave(); }, 300);
            }

            async doSave() {
                if (this.isDemoMode) {
                    try {
                        localStorage.setItem('retro_menu_v5_demo', JSON.stringify({
                            items: this.state.items,
                            categories: this.state.categories,
                            storeName: this.state.storeName,
                            shopUrl: this.state.shopUrl
                        }));
                        this.showToast("LOCAL_STORAGE_SAVED");
                    } catch (e) {
                        console.error(e);
                        if (e && e.name === 'QuotaExceededError') this.showToast("SAVE_FAIL: STORAGE_QUOTA_EXCEEDED");
                        else this.showToast("SAVE_FAIL: LOCAL_ERROR");
                    }
                    return;
                }
                if (!this.state.user) return;
                try {
                    const userDoc = doc(this.db, 'artifacts', appId, 'users', this.state.user.uid, 'settings', 'menuData');
                    await setDoc(userDoc, {
                        items: this.state.items,
                        categories: this.state.categories,
                        storeName: this.state.storeName,
                        shopUrl: this.state.shopUrl
                    });
                    this.showToast("CLOUD_SAVE_SUCCESS");
                } catch (e) { console.error(e); this.showToast("SAVE_FAIL: CHECK_CONFIG"); }
            }

            updateStoreName(val) {
                this.state.storeName = val;
                this.renderUIOnly();
                this.persist();
            }

            updateShopUrl(val) {
                this.state.shopUrl = val;
                clearTimeout(this._shopUrlTimer);
                this._shopUrlTimer = setTimeout(() => {
                    this.renderGrid();
                    this.persist();
                }, 300);
            }

            addCategory() {
                const input = document.getElementById('catInput');
                const name = input.value.trim().toUpperCase();
                if (name && !this.state.categories.includes(name)) {
                    this.state.categories.push(name);
                    input.value = '';
                    this.renderAll();
                    this.persist();
                    this.showToast(`CAT [${name}] ADDED`);
                }
            }

            startRename(cat) {
                this.state.renamingCat = cat;
                this.renderCategories();
                requestAnimationFrame(() => {
                    const input = document.querySelector('#catListContainer .cat-inline-input');
                    if (input) { input.focus(); input.select(); }
                });
            }

            handleRenameKey(e, oldName) {
                if (e.key === 'Enter') this.confirmRename(oldName, e.target.value.trim().toUpperCase());
                else if (e.key === 'Escape') { this.state.renamingCat = null; this.renderCategories(); }
            }

            confirmRename(oldName, newName) {
                if (!this.state.renamingCat) return;
                if (!newName || oldName === newName) { this.state.renamingCat = null; this.renderCategories(); return; }
                if (this.state.categories.includes(newName)) { this.showToast("ERR: DUPLICATED"); this.state.renamingCat = null; this.renderCategories(); return; }

                this.state.categories = this.state.categories.map(c => c === oldName ? newName : c);
                this.state.items = this.state.items.map(i => i.category === oldName ? { ...i, category: newName } : i);
                if (this.state.filter === oldName) this.state.filter = newName;

                this.state.renamingCat = null;
                this.renderAll();
                this.persist();
            }

            delCategory(name) {
                const remaining = this.state.categories.filter(c => c !== name);
                const targetCat = remaining[0] || null;
                const affectedCount = this.state.items.filter(i => i.category === name).length;
                let msg = `DELETE CATEGORY [${name}]?`;
                if (affectedCount > 0) {
                    msg = targetCat
                        ? `DELETE [${name}]? ${affectedCount} ITEM(S) WILL MOVE TO [${targetCat}].`
                        : `DELETE [${name}]? ${affectedCount} ITEM(S) WILL BECOME UNCATEGORIZED.`;
                }
                this.confirmDialog(msg).then(ok => {
                    if (!ok) return;
                    this.state.categories = remaining;
                    if (this.state.filter === name) this.state.filter = 'ALL';
                    if (targetCat) {
                        this.state.items = this.state.items.map(i => i.category === name ? { ...i, category: targetCat } : i);
                    }
                    this.renderAll();
                    this.persist();
                });
            }

            setFilter(f) { this.state.filter = f; this.renderAll(); }

            renderAll() {
                this.renderUIOnly();
                this.renderCategories();
                this.renderPresets();
                this.renderGrid();
                this.updateModalSelect();
            }

            renderUIOnly() {
                document.getElementById('storeNameInput').value = this.state.storeName;
                document.getElementById('shopUrlInput').value = this.state.shopUrl;
                document.getElementById('mainTitleDisplay').textContent = this.state.storeName || 'RETRO MENU FACTORY';
            }

            renderCategories() {
                const container = document.getElementById('catListContainer');
                container.replaceChildren();

                const allWrapper = document.createElement('div');
                allWrapper.className = 'cat-tab-wrapper';
                const allBtn = document.createElement('button');
                allBtn.type = 'button';
                allBtn.className = 'cat-tab' + (this.state.filter === 'ALL' ? ' active' : '');
                allBtn.textContent = 'ALL_RESOURCES';
                allBtn.dataset.action = 'filter';
                allBtn.dataset.cat = 'ALL';
                allWrapper.appendChild(allBtn);
                container.appendChild(allWrapper);

                this.state.categories.forEach(cat => {
                    const isEditing = this.state.renamingCat === cat;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'cat-tab-wrapper';

                    if (isEditing) {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'cat-inline-input';
                        input.value = cat;
                        input.addEventListener('keydown', (e) => this.handleRenameKey(e, cat));
                        input.addEventListener('blur', () => this.confirmRename(cat, input.value.trim().toUpperCase()));
                        wrapper.appendChild(input);
                    } else {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'cat-tab' + (this.state.filter === cat ? ' active' : '');
                        btn.textContent = cat;
                        btn.dataset.action = 'filter';
                        btn.dataset.cat = cat;
                        wrapper.appendChild(btn);
                    }

                    const renameBtn = document.createElement('span');
                    renameBtn.className = 'cat-tool-btn';
                    renameBtn.textContent = '✎';
                    renameBtn.dataset.action = 'rename';
                    renameBtn.dataset.cat = cat;
                    wrapper.appendChild(renameBtn);

                    const delBtn = document.createElement('span');
                    delBtn.className = 'cat-tool-btn del';
                    delBtn.textContent = 'X';
                    delBtn.dataset.action = 'delete';
                    delBtn.dataset.cat = cat;
                    wrapper.appendChild(delBtn);

                    container.appendChild(wrapper);
                });
            }

            updateModalSelect() {
                const select = document.getElementById('editCategorySelect');
                if (!select) return;
                select.replaceChildren();
                this.state.categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat;
                    select.appendChild(opt);
                });
            }

            renderPresets() {
                const container = document.getElementById('presetContainer');
                container.replaceChildren();
                PIZZA_DATA.forEach(p => {
                    const active = this.isItemInWorkspace(p.presetId);
                    const item = document.createElement('div');

                    if (active) {
                        const mark = document.createElement('span');
                        mark.style.cssText = 'position:absolute;left:2px;top:-1px;color:var(--neon-green);font-size:10px;';
                        mark.textContent = 'X';
                        box.appendChild(mark);
                    }
                    item.appendChild(box);

                    const label = document.createElement('span');
                    label.textContent = p.name.toUpperCase();
                    item.appendChild(label);

                    container.appendChild(item);
                });

            isItemInWorkspace(presetId) { return this.state.items.some(i => i.presetId === presetId); }

            togglePreset(presetId) {
                const idx = this.state.items.findIndex(i => i.presetId === presetId);
                if (idx > -1) {
                    this.state.items.splice(idx, 1);
                } else {
                    const preset = PIZZA_DATA.find(p => p.presetId === presetId);
                    if (!preset) return;
                    const cat = this.state.categories.includes(preset.cat) ? preset.cat : (this.state.categories[0] || preset.cat);
                    this.state.items.push({
                        id: crypto.randomUUID(),
                        presetId: preset.presetId,
                        name: preset.name, desc: preset.desc, price: preset.price,
                        category: cat, badge: "", image: "", size: preset.size || "medium"
                    });
                }
                this.renderAll();
                this.persist();
            }

            openNewItemModal() {
                if (this.state.categories.length === 0) {
                    this.showToast("ERR: CREATE_A_CATEGORY_FIRST");
                    return;
                }
                this.state.editingId = null;

                document.getElementById('editPrice').value = "";

                document.getElementById('editBadge').value = "";

                if (!item) return;
                this.state.editingId = id;
                this.updateModalSelect();
                document.getElementById('modalTitle').textContent = "ASSET_PROPERTY_EDITOR";

                document.getElementById('editDesc').value = item.desc;
                document.getElementById('editBadge').value = item.badge || "";

            saveEdit() {
                const nameInput = document.getElementById('editName').value.trim();
                if (!nameInput) { this.showToast("ERR: NAME_REQUIRED"); return; }
                if (this.state.editingId === null) {
                    this.state.items.push({

                        price: document.getElementById('editPrice').value, desc: document.getElementById('editDesc').value,
                        badge: document.getElementById('editBadge').value, category: document.getElementById('editCategorySelect').value,
                        size: document.getElementById('editSize').value, image: ""
                    });

                    const idx = this.state.items.findIndex(i => i.id === this.state.editingId);
                    if (idx > -1) {
                        this.state.items[idx] = {
                            ...this.state.items[idx], name: nameInput,

                            size: document.getElementById('editSize').value
                        };
                    }
                }
                this.renderAll();

            deleteItem(id) {
                const item = this.state.items.find(i => i.id === id);
                const label = item ? item.name : 'ITEM';
                this.confirmDialog(`DELETE ITEM [${label}]?`).then(ok => {
                    if (!ok) return;
                    this.state.items = this.state.items.filter(i => i.id !== id);
                    this.renderAll();
                    this.persist();
                });
            }

            changeImage(id) {
                const input = document.getElementById('fileInput');
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    input.value = '';
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        const img = new Image();
                        img.onload = () => {
                            const MAX = 1024;
                            let w = img.width, h = img.height;
                            if (w > MAX || h > MAX) {
                                if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
                                else { w = Math.round(w * MAX / h); h = MAX; }
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                            this.state.items = this.state.items.map(i => i.id === id ? { ...i, image: dataUrl } : i);
                            this.renderAll();
                            this.persist();
                        };
                        img.onerror = () => this.showToast("ERR: IMAGE_LOAD_FAILED");
                        img.src = re.target.result;
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            }

            newProject() {
                this.confirmDialog("RESET_WORKSPACE? ALL_UNSAVED_DATA_WILL_BE_LOST.").then(ok => {
                    if (!ok) return;
                    this.state.items = []; this.state.categories = [...DEFAULT_CATS];
                    this.state.storeName = "OKSUDONG HWADUK PIZZA"; this.state.shopUrl = "https://kitscript.com/game/shop";
                    this.renderAll();
                    this.persist();
                });
            }

            exportProject() {
                const data = {
                    storeName: this.state.storeName,
                    shopUrl: this.state.shopUrl,
                    categories: this.state.categories,
                    items: this.state.items
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${slugifyFilename(this.state.storeName)}-project.json`;
                a.click();
                URL.revokeObjectURL(url);
                this.showToast("PROJECT_EXPORTED");
            }

            importProject(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data || typeof data !== 'object') throw new Error('invalid project file');
                        if (typeof data.storeName === 'string') this.state.storeName = data.storeName;
                        if (typeof data.shopUrl === 'string') this.state.shopUrl = data.shopUrl;
                        if (Array.isArray(data.categories)) this.state.categories = data.categories.map(c => String(c));
                        if (Array.isArray(data.items)) {
                            this.state.items = data.items.map(i => ({
                                id: (i && typeof i.id === 'string' && i.id) ? i.id : crypto.randomUUID(),
                                presetId: (i && typeof i.presetId === 'string') ? i.presetId : undefined,
                                name: String((i && i.name) || ''),
                                desc: String((i && i.desc) || ''),
                                price: String((i && i.price) || ''),
                                category: String((i && i.category) || ''),
                                badge: String((i && i.badge) || ''),
                                image: (i && isDataImage(i.image)) ? i.image : '',
                                size: (i && ['small', 'medium', 'large'].includes(i.size)) ? i.size : 'medium'
                            }));
                        }
                        this.state.editingId = null;
                        this.state.renamingCat = null;
                        this.state.filter = 'ALL';
                        this.renderAll();
                        this.persist();
                        this.showToast("PROJECT_IMPORTED");
                    } catch (err) {
                        console.error(err);
                        this.showToast("ERR: INVALID_PROJECT_FILE");
                    }
                };
                reader.readAsText(file);
            }

            showToast(msg) {
                const t = document.getElementById('toast');
                t.textContent = `[SYS] ${msg}`;
                t.style.display = 'block';
                if (this._toastTimer) clearTimeout(this._toastTimer);
                this._toastTimer = setTimeout(() => { t.style.display = 'none'; this._toastTimer = null; }, 2000);
            }

            confirmDialog(message) {
                return new Promise(resolve => {
                    const overlay = document.getElementById('confirmOverlay');
                    document.getElementById('confirmMessage').textContent = message;
                    overlay.style.display = 'flex';

                    const yesBtn = document.getElementById('confirmYesBtn');
                    const noBtn = document.getElementById('confirmNoBtn');

                    const cleanup = (result) => {
                        overlay.style.display = 'none';
                        yesBtn.removeEventListener('click', onYes);
                        noBtn.removeEventListener('click', onNo);
                        overlay.removeEventListener('click', onOverlayClick);
                        document.removeEventListener('keydown', onKey);
                        resolve(result);
                    };
                    const onYes = () => cleanup(true);
                    const onNo = () => cleanup(false);
                    const onOverlayClick = (e) => { if (e.target === overlay) cleanup(false); };
                    const onKey = (e) => { if (e.key === 'Escape') cleanup(false); };

                    yesBtn.addEventListener('click', onYes);
                    noBtn.addEventListener('click', onNo);
                    overlay.addEventListener('click', onOverlayClick);
                    document.addEventListener('keydown', onKey);
                });
            }

            bakeHTML() {
                this.showToast("BAKING...");
                const storeNameRaw = (this.state.storeName || "RETRO MENU").toUpperCase();
                const storeName = escapeHtml(storeNameRaw);
                const shopUrlSafe = validShopUrl(this.state.shopUrl);
                const shopUrl = escapeHtml(shopUrlSafe);
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(shopUrlSafe === '#' ? '' : shopUrlSafe)}`;

                const knownCats = new Set(this.state.categories);
                const usedIds = new Set();
                const uniqueId = (base) => {
                    let id = base, n = 2;
                    while (usedIds.has(id)) { id = `${base}-${n++}`; }
                    usedIds.add(id);
                    return id;
                };

                const buildCard = (item) => {
                    const sizeClass = ['small', 'medium', 'large'].includes(item.size) ? item.size : 'medium';
                    const badgeHtml = item.badge ? `<div class="badge">${escapeHtml(item.badge)}</div>` : '';
                    const imgHtml = (item.image && isDataImage(item.image)) ? `<img src="${escapeHtml(item.image)}">` : '';
                    return `<div class="card ${sizeClass}">
                            ${badgeHtml}
                            <div class="card-img">${imgHtml}</div>
                            <div class="card-content">
                                <div class="card-title">${escapeHtml((item.name || '').toUpperCase())}</div>
                                <div class="desc-qr-wrap">
                                    <div class="card-desc">${escapeHtml(item.desc)}</div>
                                    <div class="card-qr-box"><img src="${qrUrl}" alt="QR"></div>
                                </div>
                                <div class="card-price">${escapeHtml('₩ ' + (item.price || ''))}</div>
                            </div>
                        </div>`;
                };

                const sectionParts = [];
                const navParts = [];

                this.state.categories.forEach((cat, idx) => {
                    const catItems = this.state.items.filter(i => i.category === cat);
                    if (catItems.length === 0) return;
                    const sectionId = uniqueId(slugifyId(cat, 'cat-', idx));
                    const cards = catItems.map(buildCard).join('');
                    sectionParts.push(`<section id="${sectionId}" class="menu-section"><h2 class="section-title">${escapeHtml(cat)}</h2><div class="grid">${cards}</div></section>`);
                    navParts.push(`<a href="#${sectionId}">${escapeHtml(cat)}</a>`);
                });

                const uncategorizedItems = this.state.items.filter(i => !knownCats.has(i.category));
                if (uncategorizedItems.length > 0) {
                    const sectionId = uniqueId('uncategorized');
                    const cards = uncategorizedItems.map(buildCard).join('');
                    sectionParts.push(`<section id="${sectionId}" class="menu-section"><h2 class="section-title">UNCATEGORIZED</h2><div class="grid">${cards}</div></section>`);
                    navParts.push(`<a href="#${sectionId}">UNCATEGORIZED</a>`);
                }

                const sectionsHtml = sectionParts.join('');
                const navLinksHtml = navParts.join('');

                const template = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${storeName}</title><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.css"><style>
                    :root { --ng: #39ff14; --nm: #ff00ff; --nb: #00f2ff; --bg: #050505; }
                    html { scroll-behavior: smooth; }
                    body { background: var(--bg); color: var(--ng); font-family: 'NeoDunggeunmo', cursive; padding: 0; margin: 0; overflow-x: hidden; }
                    body::after { content: " "; display: block; position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 10000; background-size: 100% 4px; pointer-events: none; opacity: 0.2; }
                    nav { position: sticky; top: 0; background: #000; border-bottom: 2px solid #333; padding: 0 40px; height: 80px; display: flex; align-items: center; justify-content: space-between; z-index: 500; font-family: 'Press Start 2P', cursive; font-size: 10px; }
                    .nav-links { display: flex; gap: 30px; } .nav-links a { color: #666; text-decoration: none; transition: 0.2s; } .nav-links a:hover { color: var(--ng); }
                    .order-btn { background: var(--nm); color: white; border: none; padding: 12px 24px; font-family: 'Press Start 2P', cursive; font-size: 9px; cursor: pointer; text-decoration: none; box-shadow: 0 0 10px var(--nm); }
                    .header { text-align: center; padding: 120px 20px; background: #000; font-family: 'Press Start 2P', cursive; border-bottom: 2px solid var(--ng); }
                    .header h1 { font-size: 32px; text-shadow: 0 0 10px var(--ng); margin: 0; text-transform: uppercase; }
                    section { padding: 100px 40px; max-width: 1400px; margin: 0 auto; scroll-margin-top: 80px; }
                    .section-title { font-family: 'Press Start 2P', cursive; font-size: 18px; color: var(--nm); margin-bottom: 60px; border-left: 10px solid var(--nm); padding-left: 20px; text-transform: uppercase; }

                    /* BAKE GRID ENGINE (Synced with Editor) */
                    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 50px; align-content: start; }
                    .card { background: #0c0c0c; border: 1px solid #333; position: relative; box-shadow: 10px 10px 0 var(--ng); display: flex; flex-direction: column; overflow: hidden; }

                    /* Multi-Scale Class Definitions */
                    .card.small { min-height: 400px; grid-column: span 1; }
                    .card.medium { min-height: 550px; grid-column: span 1; }
                    .card.large { min-height: 550px; grid-column: span 2; }

                    .card-img { background: #000; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
                    .small .card-img { height: 180px; }
                    .medium .card-img, .large .card-img { height: 300px; }

                    .card-img img { width: 100%; height: 100%; object-fit: cover; }
                    .card-content { padding: 35px; display: flex; flex-direction: column; flex-grow: 1; position: relative; }
                    .card-title { font-family: 'Press Start 2P', cursive; color: var(--nb); font-size: 16px; margin-bottom: 20px; }
                    .large .card-title { font-size: 20px; }

                    .desc-qr-wrap { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 30px; }
                    .card-desc { font-size: 15px; color: #888; line-height: 1.8; word-break: keep-all; flex: 1; }
                    .card-qr-box { width: 85px; height: 85px; background: #fff; border: 3px solid var(--ng); padding: 5px; box-shadow: 0 0 15px var(--ng); flex-shrink: 0; }
                    .card-qr-box img { width: 100%; height: 100%; image-rendering: pixelated; }
                    .card-price { color: var(--ng); font-size: 26px; margin-top: auto; font-weight: bold; }
                    .large .card-price { font-size: 34px; }
                    .badge { position: absolute; top: 20px; right: 20px; background: var(--ng); color: black; padding: 10px 18px; font-size: 11px; font-weight: bold; }

                    /* Responsive Fallback */
                    @media (max-width: 950px) {
                        .grid { grid-template-columns: 1fr; }
                        .card.large { grid-column: span 1; }
                        nav { height: auto; padding: 25px; flex-direction: column; gap: 25px; }
                        .nav-links { flex-wrap: wrap; justify-content: center; }
                    }
                </style></head><body>
                    <nav><div class="nav-links">${navLinksHtml}</div><a href="${shopUrl}" target="_blank" class="order-btn">[ORDER_NOW]</a></nav>
                    <div class="header"><h1>${storeName}</h1></div>
                    ${sectionsHtml}
                </body></html>`;

                const blob = new Blob([template], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `${slugifyFilename(this.state.storeName)}.html`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        const app = new RetroMenuApp();
    </script>
</body>
</html>
