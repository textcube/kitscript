<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 폰트 로드: 영문 Press Start 2P / 한글 둥근모 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.css">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-magenta: #ff00ff;
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --arcade-black: #050505;
            --ui-dark: #0a0a0a;
            --border-color: #333;
            --main-font: 'Press Start 2P', cursive;
            --kr-font: 'NeoDunggeunmo', cursive;
            --green-glow: 0 0 15px rgba(57, 255, 20, 0.6);
            --magenta-glow: 0 0 15px rgba(255, 0, 255, 0.6);
            --blue-glow: 0 0 15px rgba(0, 242, 255, 0.6);
            --red-glow: 0 0 25px rgba(255, 0, 60, 0.9);
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0; background-color: var(--arcade-black); color: var(--neon-green);
            font-family: var(--main-font); -webkit-font-smoothing: none; font-smooth: never;
            font-size: 11px; overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        /* Scanline Effect */
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10000; background-size: 100% 4px; pointer-events: none; opacity: 0.15;
        }

        /* FX Animations */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -5px); }
            30% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, 5px); }
            70% { transform: translate(5px, -5px); }
            100% { transform: translate(0, 0); }
        }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes flash {
            0% { background: rgba(255, 255, 255, 0); }
            20% { background: rgba(255, 255, 255, 0.15); }
            100% { background: rgba(255, 255, 255, 0); }
        }
        .reveal-flash-screen { position: fixed; inset: 0; z-index: 9999; pointer-events: none; }
        .active-flash { animation: flash 0.4s ease-out; }

        /* 광과민성 대응: 저감 모드에서는 명멸/흔들림 애니메이션을 전부 무효화 */
        @media (prefers-reduced-motion: reduce) {
            .shake, .count-slam, .active-flash { animation: none !important; }
        }

        /* Top Bar */
        .top-bar {
            background: #000; border-bottom: 2px solid var(--border-color); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .title { color: var(--neon-green); text-shadow: var(--green-glow); font-size: 14px; letter-spacing: 1px; }

        .brand-icon-btn {
            width: 32px; height: 32px; border: 1px solid #333; display: flex; align-items: center; justify-content: center;
            background: #000; cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .brand-icon-btn svg { width: 18px; height: 18px; fill: #444; }
        .brand-icon-btn:hover svg { fill: var(--neon-magenta); }

        /* 구운 페이지 헤더용 (BAKE 산출물이 이 스타일 블록을 통째로 복사해 사용) */
        .header-title { font-family: var(--main-font); color: var(--neon-green); text-shadow: var(--green-glow); font-size: 14px; letter-spacing: 1px; }
        .header-home {
            width: 32px; height: 32px; border: 1px solid #333; display: flex; align-items: center; justify-content: center;
            background: #000; text-decoration: none;
        }
        .header-home svg { width: 18px; height: 18px; fill: #444; }
        .header-home:hover svg { fill: var(--neon-magenta); }

        .mode-switcher { display: flex; background: #111; padding: 4px; border: 1px solid #222; gap: 4px; }
        .mode-btn {

        }
        .mode-btn.active { background: #222; color: var(--neon-blue); text-shadow: var(--blue-glow); }

        .controls { display: flex; gap: 10px; }

        .btn.bake { background: var(--neon-green); color: #000; border-color: var(--neon-green); font-weight: bold; }
        .btn.active-blue { color: var(--neon-blue); border-color: var(--neon-blue); box-shadow: var(--blue-glow); }

        /* Main Container */
        .main-container { display: grid; grid-template-columns: 420px 1fr; flex-grow: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { background: #080808; border-right: 2px solid var(--border-color); padding: 30px; overflow-y: auto; }
        .sidebar-label {

        .add-cat-zone { display: flex; gap: 5px; margin-bottom: 20px; }

        /* Content Area */
        .content-area { position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .menu-grid { padding: 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 50px; overflow-y: auto; background: #000; flex-grow: 1; }

        /* --- QUIZ PLAYER --- */
        #quizPlayer {
            position: absolute; inset: 0; background: #000; z-index: 50; display: none;

        @keyframes countSlam {

            20% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }

        .quiz-countdown-wrapper {

        .quiz-answer-zone {

        .quiz-answer-zone.reveal { opacity: 1; transform: translateY(0); }

        .ans-side-info {
            flex: 0 0 30%; background: var(--neon-blue); color: #000; padding: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: flex-end;

        .ans-name { font-size: 15px; font-weight: bold; margin-bottom: 5px; text-align: right; line-height: 1.2; }
        .ans-meta { font-size: 7px; opacity: 0.8; }
        .ans-main-desc { flex: 1; padding: 15px 20px; text-align: left; font-family: var(--kr-font); font-size: 16px; color: #fff; line-height: 1.4; display: flex; align-items: center; }

        /* Card System */
        .card { background: #0c0c0c; border: 1px solid var(--border-color); display: flex; flex-direction: column; transition: 0.2s; position: relative; box-shadow: 6px 6px 0 var(--border-color); }

        .card.small { grid-column: span 1; }
        .card.medium { grid-column: span 1; }

        .card-img { background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .small .card-img { height: 180px; }
        .medium .card-img { height: 280px; }
        .large .card-img { height: 280px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .img-remove-btn {
            position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; padding: 0;
            background: #000; border: 1px solid var(--neon-red); color: var(--neon-red);
            cursor: pointer; font-family: var(--main-font); font-size: 12px; line-height: 1; z-index: 5;
        }
        .img-remove-btn:hover { box-shadow: var(--red-glow); }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-name { font-size: 12px; color: var(--neon-blue); margin-bottom: 10px; }
        .card-desc { font-family: var(--kr-font); color: #777; font-size: 13px; line-height: 1.6; flex-grow: 1; }
        .card-year { font-size: 20px; color: var(--neon-green); font-weight: bold; margin-top: 15px; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; margin-top: 15px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { background: #000; border: 2px solid var(--neon-green); padding: 40px; width: 500px; box-shadow: var(--green-glow); }

        /* 확인 모달 스타일 */
        #confirmModal { border-color: var(--neon-red); box-shadow: var(--red-glow); text-align: center; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #000; border: 1px solid var(--neon-green); padding: 10px 20px; color: var(--neon-green); z-index: 2000; display: none; }
    </style>
</head>

    <script type="module">
        const LS_KEY = 'RETRO_QUIZ_FACTORY_DATA_v6';

        function escapeHtml(str) {
            return String(str ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }

        function isDataImage(str) {
            return typeof str === 'string' && /^data:image\//i.test(str);
        }

        function validShopUrl(url) {
            const s = typeof url === 'string' ? url.trim() : '';
            return /^https?:\/\//i.test(s) ? s : '#';
        }

        function slugifyFilename(str) {
            const s = String(str ?? '').toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            return s || 'retro-quiz';
        }

        function cloneItems(list) {
            if (typeof structuredClone === 'function') return structuredClone(list);
            return JSON.parse(JSON.stringify(list));
        }

        const SAMPLE_ITEMS = [
            { id: 'S1', name: "Bubble Bobble", cat: "GAME", year: "1986", desc: "버블로 적을 가두고 터뜨리는 협동 액션 게임. 전설적인 스테이지 배경음악이 유명합니다.", hint: "방울을 쏘는 공룡 형제", meta: "1986 / TAITO", size: "large", image: "" },
            { id: 'S2', name: "Galaga", cat: "GAME", year: "1981", desc: "남코의 전설적인 고정 화면형 슈팅 게임. 적의 트랙터 빔에 잡힌 기체를 되찾아 듀얼 파이터로 변신!", hint: "적에게 잡혀가면 2대가 됨", meta: "1981 / NAMCO", size: "medium", image: "" }
        ];

        class ArcadeSound {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.enabled = false;
            }
            playTone(freq, dur, type = 'square', vol = 0.1) {
                if (!this.enabled) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
            playTick() { if (!this.enabled) return; if (this.ctx.state === 'suspended') this.ctx.resume(); this.playTone(880, 0.1, 'square', 0.05); }
            playWarning() { if (!this.enabled) return; if (this.ctx.state === 'suspended') this.ctx.resume(); this.playTone(1760, 0.1, 'square', 0.05); }
            playReveal() {
                if (!this.enabled) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.playTone(523.25, 0.1); setTimeout(() => this.playTone(659.25, 0.1), 100); setTimeout(() => this.playTone(783.99, 0.3), 200);
            }
        }

        class RetroMenuApp {
            constructor() {
                this.state = {
                    currentMode: 'edit',
                    storeName: "RETRO GAME FACTORY",
                    shopUrl: "https://kitscript.com/game/quiz/",
                    items: [],
                    categories: ["GAME", "SNACK", "DRINK"],
                    quizSettings: { countdown: 5, reveal: 3 },
                    filter: 'ALL'
                };
                this.quizState = {
                    activeIndex: 0, shuffledItems: [], timerId: null, intervalId: null,
                    paused: false, phase: null, count: 0, revealDeadline: 0, revealRemainingMs: 0
                };
                this.editingId = null;
                this.sound = new ArcadeSound();
                this._persistTimer = null;
                this._toastTimer = null;
                window.app = this;
                this.bindEvents();
                this.init();
            }

            bindEvents() {
                document.getElementById('mode-edit').addEventListener('click', () => this.setMode('edit'));
                document.getElementById('mode-menu').addEventListener('click', () => this.setMode('menu'));
                document.getElementById('mode-quiz').addEventListener('click', () => this.setMode('quiz'));

                document.getElementById('saveBtn').addEventListener('click', () => this.manualSave());
                document.getElementById('bakeBtn').addEventListener('click', () => this.bake('quiz'));

                document.getElementById('storeNameInput').addEventListener('input', (e) => this.updateStoreName(e.target.value));
                document.getElementById('shopUrlInput').addEventListener('input', (e) => this.updateShopUrl(e.target.value));
                document.getElementById('quizCountdownSeconds').addEventListener('input', () => this.updateQuizSettings());
                document.getElementById('quizRevealSeconds').addEventListener('input', () => this.updateQuizSettings());

                document.getElementById('addNewItemBtn').addEventListener('click', () => this.openNewItemModal());
                document.getElementById('loadSamplesBtn').addEventListener('click', () => this.loadSamples());

                document.getElementById('addCatBtn').addEventListener('click', () => this.addCategory());
                document.getElementById('catInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); this.addCategory(); }
                });

                document.getElementById('catListContainer').addEventListener('click', (e) => {
                    const el = e.target.closest('[data-action]');
                    if (!el) return;
                    const action = el.dataset.action; const cat = el.dataset.cat;
                    if (action === 'filter') this.setFilter(cat);
                    else if (action === 'delete') this.delCat(cat);
                });

                document.getElementById('menuGrid').addEventListener('click', (e) => {
                    const el = e.target.closest('[data-action]');
                    if (!el) return;
                    const id = el.dataset.id; const action = el.dataset.action;
                    if (action === 'edit') this.openEdit(id);
                    else if (action === 'img') this.pickImg(id);
                    else if (action === 'delete') this.deleteItem(id);
                    else if (action === 'removeimg') this.removeImage(id);
                });

                document.getElementById('saveEditBtn').addEventListener('click', () => this.saveEdit());
                document.getElementById('cancelEditBtn').addEventListener('click', () => this.closeModal());

                document.getElementById('quizExitBtn').addEventListener('click', () => this.setMode('edit'));
                document.getElementById('quizSkipBtn').addEventListener('click', () => this.nextQuiz());
                document.getElementById('pauseToggleBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('soundToggleBtn').addEventListener('click', () => this.toggleSound());

                document.addEventListener('keydown', (e) => {
                    const tag = (document.activeElement && document.activeElement.tagName) || '';
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
                    if (this.state.currentMode !== 'quiz') return;
                    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); this.nextQuiz(); }
                    else if (e.key === 'p' || e.key === 'P') { this.togglePause(); }
                    else if (e.key === 'Escape') { this.setMode('edit'); }
                    else if (e.key === 's' || e.key === 'S') { this.toggleSound(); }
                });
            }

            migrateItem(raw) {
                const item = { ...raw };
                if (item.year === undefined && item.price !== undefined) item.year = item.price;
                if (!item.id) item.id = crypto.randomUUID();
                return item;
            }

            init() {
                const localData = localStorage.getItem(LS_KEY);
                if (localData) {
                    try {
                        const parsed = JSON.parse(localData);
                        if (parsed && typeof parsed === 'object') {
                            if (typeof parsed.storeName === 'string') this.state.storeName = parsed.storeName;
                            if (typeof parsed.shopUrl === 'string') this.state.shopUrl = parsed.shopUrl;
                            if (Array.isArray(parsed.categories)) this.state.categories = parsed.categories.map(c => String(c));
                            if (parsed.quizSettings && typeof parsed.quizSettings === 'object') {
                                this.state.quizSettings = { ...this.state.quizSettings, ...parsed.quizSettings };
                            }
                            if (Array.isArray(parsed.items)) this.state.items = parsed.items.map(i => this.migrateItem(i));
                        }
                    } catch (e) {
                        console.error("Data Load Error", e);
                    }
                }

                this.renderAll();
                this.showToast("LOCAL_SYNC_READY");
            }

            persist() {
                clearTimeout(this._persistTimer);
                this._persistTimer = setTimeout(() => this.saveData(), 300);
            }

            manualSave() {
                clearTimeout(this._persistTimer);
                this.saveData();
            }

            saveData() {
                try {
                    localStorage.setItem(LS_KEY, JSON.stringify({
                        storeName: this.state.storeName,
                        shopUrl: this.state.shopUrl,
                        categories: this.state.categories,
                        quizSettings: this.state.quizSettings,
                        items: this.state.items
                    }));
                    this.showToast("DATA_SAVED_LOCALLY");
                } catch (e) {
                    console.error(e);
                    if (e && e.name === 'QuotaExceededError') this.showToast("SAVE_FAIL: STORAGE_QUOTA_EXCEEDED");
                    else this.showToast("SAVE_FAIL: LOCAL_ERROR");
                }
            }

            loadSamples() {
                const fresh = cloneItems(SAMPLE_ITEMS).map(i => ({ ...i, id: crypto.randomUUID() }));
                this.state.items = this.state.items.concat(fresh);
                this.renderAll();
                this.persist();
                this.showToast("SAMPLES_LOADED");
            }

            deleteItem(id) {
                const item = this.state.items.find(i => i.id === id);
                const label = item ? item.name : 'ITEM';
                this.confirmDialog(`[${label}] 아이템을 정말 삭제하시겠습니까?`, "CONFIRM_ITEM_DELETE").then(ok => {
                    if (!ok) return;
                    this.state.items = this.state.items.filter(i => i.id !== id);
                    this.renderGrid();
                    this.persist();
                    this.showToast("ITEM_DELETED");
                });
            }

            delCat(c) {
                const remaining = this.state.categories.filter(x => x !== c);
                const targetCat = remaining[0] || null;
                const affected = this.state.items.filter(i => i.cat === c).length;
                let msg = `[${c}] 카테고리를 삭제하시겠습니까?`;
                if (affected > 0) {
                    msg = targetCat
                        ? `[${c}] 삭제 시 ${affected}개 아이템이 [${targetCat}]로 이동합니다.`
                        : `[${c}] 삭제 시 ${affected}개 아이템이 미분류가 됩니다.`;
                }
                this.confirmDialog(msg, "CONFIRM_CAT_DELETE").then(ok => {
                    if (!ok) return;
                    this.state.categories = remaining;
                    this.state.items = this.state.items.map(i => i.cat === c ? { ...i, cat: targetCat || '' } : i);
                    if (this.state.filter === c) this.state.filter = 'ALL';
                    this.renderAll();
                    this.persist();
                    this.showToast("CATEGORY_REMOVED");
                });
            }

            confirmDialog(message, label = "CONFIRM_ACTION") {
                return new Promise(resolve => {
                    const overlay = document.getElementById('confirmOverlay');
                    document.getElementById('confirmLabel').textContent = label;
                    document.getElementById('confirmMsg').textContent = message;
                    overlay.style.display = 'flex';

                    const yesBtn = document.getElementById('confirmYesBtn');
                    const noBtn = document.getElementById('confirmNoBtn');

                    const cleanup = (result) => {
                        overlay.style.display = 'none';
                        yesBtn.removeEventListener('click', onYes);
                        noBtn.removeEventListener('click', onNo);
                        overlay.removeEventListener('click', onOverlayClick);
                        document.removeEventListener('keydown', onKey);
                        resolve(result);
                    };
                    const onYes = () => cleanup(true);
                    const onNo = () => cleanup(false);
                    const onOverlayClick = (e) => { if (e.target === overlay) cleanup(false); };
                    const onKey = (e) => { if (e.key === 'Escape') cleanup(false); };

                    yesBtn.addEventListener('click', onYes);
                    noBtn.addEventListener('click', onNo);
                    overlay.addEventListener('click', onOverlayClick);
                    document.addEventListener('keydown', onKey);
                });
            }

            setMode(mode) {
                this.state.currentMode = mode;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                const btn = document.getElementById('mode-'+mode); if (btn) btn.classList.add('active');
                const qp = document.getElementById('quizPlayer'); const mg = document.getElementById('menuGrid');
                if (mode === 'quiz') {
                    if (qp) qp.style.display = 'flex'; if (mg) mg.style.display = 'none';
                    this.startQuiz();
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    }
                } else {
                    if (qp) qp.style.display = 'none'; if (mg) mg.style.display = 'grid';
                    this.stopQuiz(); this.renderGrid();
                    if (document.fullscreenElement && document.exitFullscreen) {
                        document.exitFullscreen().catch(() => {});
                    }
                }
            }

            toggleSound() {
                this.sound.enabled = !this.sound.enabled;
                const btn = document.getElementById('soundToggleBtn');
                if (btn) {
                    btn.textContent = `SOUND: ${this.sound.enabled ? "ON" : "OFF"}`;
                    if (this.sound.enabled) btn.classList.add('active-blue');
                    else btn.classList.remove('active-blue');
                }
            }

            detectAlpha(ctx, w, h) {
                try {
                    const data = ctx.getImageData(0, 0, w, h).data;
                    for (let i = 3; i < data.length; i += 4 * 37) {
                        if (data[i] < 255) return true;
                    }
                    return false;
                } catch (e) { return false; }
            }

            async compressImage(base64Str, maxWidth = 800, maxHeight = 800) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } }
                        else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        const hasAlpha = this.detectAlpha(ctx, width, height);
                        const isSmall = img.width <= 512 && img.height <= 512;
                        if (hasAlpha || isSmall) resolve(canvas.toDataURL('image/png'));
                        else resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = () => reject(new Error('IMAGE_LOAD_FAILED'));
                    img.src = base64Str;
                });
            }

            startQuiz() {
                this.stopQuiz();
                if (this.state.items.length === 0) {
                    this.showToast("아이템을 먼저 추가하세요");
                    this.setMode('edit');
                    return;
                }
                this.quizState.shuffledItems = [...this.state.items].sort(() => Math.random() - 0.5);
                this.quizState.activeIndex = 0;
                this.quizState.paused = false;
                const btn = document.getElementById('pauseToggleBtn'); if (btn) btn.textContent = 'PAUSE';
                this.runLoop();
            }

            stopQuiz() {
                if (this.quizState.timerId) clearTimeout(this.quizState.timerId);
                if (this.quizState.intervalId) clearInterval(this.quizState.intervalId);
                this.quizState.phase = null;
            }

            runLoop() {
                if (this.quizState.activeIndex >= this.quizState.shuffledItems.length) { this.startQuiz(); return; }
                this.renderQuizSlide();
            }

            renderMedia(container, item) {
                container.replaceChildren();
                if (item.image && isDataImage(item.image)) {
                    const img = document.createElement('img');
                    img.src = item.image;
                    container.appendChild(img);
                } else {
                    const label = document.createElement('div');
                    label.className = 'big-hint-label';
                    label.textContent = 'MISSION_HINT';
                    const hint = document.createElement('div');
                    hint.className = 'big-hint-text';
                    hint.textContent = item.hint || 'NO HINT PROVIDED';
                    container.appendChild(label);
                    container.appendChild(hint);
                }
            }

            renderQuizSlide() {
                const item = this.quizState.shuffledItems[this.quizState.activeIndex];
                const ansZone = document.getElementById('quizAnswerZone');
                const media = document.getElementById('quizMedia');
                const idxDisp = document.getElementById('quizIndex');
                const statusDisp = document.getElementById('quizStatus');
                const card = document.getElementById('quizCard');
                if (ansZone) ansZone.classList.remove('reveal');
                if (card) card.classList.remove('shake');
                const currentStageStr = (this.quizState.activeIndex + 1).toString().padStart(2, '0');
                const totalStagesStr = this.quizState.shuffledItems.length.toString().padStart(2, '0');
                if (idxDisp) idxDisp.textContent = `STAGE ${currentStageStr}/${totalStagesStr}`;
                if (statusDisp) statusDisp.textContent = item.cat || 'QUIZ';
                if (media) this.renderMedia(media, item);

                this.quizState.phase = 'countdown';
                this.quizState.count = Math.max(2, Number(this.state.quizSettings.countdown) || 5);
                this.updateCountdownUI(this.quizState.count);
                if (!this.quizState.paused) this.startCountdownInterval();
            }

            startCountdownInterval() {
                clearInterval(this.quizState.intervalId);
                this.quizState.intervalId = setInterval(() => {
                    this.quizState.count--;
                    this.updateCountdownUI(this.quizState.count);
                    if (this.quizState.count <= 0) {
                        clearInterval(this.quizState.intervalId);
                        this.revealAnswer(this.quizState.shuffledItems[this.quizState.activeIndex]);
                    }
                }, 1000);
            }

            updateCountdownUI(count) {
                const el = document.getElementById('quizCountdownDisplay'); if (!el) return;
                el.textContent = count.toString().padStart(2, '0');
                el.classList.remove('count-slam'); void el.offsetWidth; el.classList.add('count-slam');
                if (count <= 3 && count > 0) { el.classList.add('warning'); this.sound.playWarning(); }
                else { el.classList.remove('warning'); this.sound.playTick(); }
            }

            revealAnswer(item) {
                const ansZone = document.getElementById('quizAnswerZone');
                const card = document.getElementById('quizCard');
                const flash = document.getElementById('flashOverlay');
                document.getElementById('ansName').textContent = (item && typeof item.name === 'string' ? item.name : '').toUpperCase();
                document.getElementById('ansMeta').textContent = (item && item.meta) || "UNKNOWN / 19XX";
                document.getElementById('ansDesc').textContent = (item && item.desc) || '';
                flash.classList.add('active-flash'); card.classList.add('shake');
                setTimeout(() => flash.classList.remove('active-flash'), 400);
                if (ansZone) ansZone.classList.add('reveal');
                this.sound.playReveal();
                this.quizState.phase = 'reveal';
                if (!this.quizState.paused) {
                    this.scheduleRevealAdvance(Math.max(1, Number(this.state.quizSettings.reveal) || 3) * 1000);
                }
            }

            scheduleRevealAdvance(ms) {
                clearTimeout(this.quizState.timerId);
                this.quizState.revealDeadline = Date.now() + ms;
                this.quizState.timerId = setTimeout(() => {
                    this.quizState.activeIndex++;
                    this.runLoop();
                }, ms);
            }

            togglePause() {
                if (!this.quizState.shuffledItems.length) return;
                this.quizState.paused = !this.quizState.paused;
                const btn = document.getElementById('pauseToggleBtn');
                if (btn) btn.textContent = this.quizState.paused ? 'RESUME' : 'PAUSE';
                if (this.quizState.paused) {
                    if (this.quizState.phase === 'countdown') clearInterval(this.quizState.intervalId);
                    else if (this.quizState.phase === 'reveal') {
                        clearTimeout(this.quizState.timerId);
                        this.quizState.revealRemainingMs = Math.max(0, this.quizState.revealDeadline - Date.now());
                    }
                    this.showToast("PAUSED");
                } else {
                    if (this.quizState.phase === 'countdown') this.startCountdownInterval();
                    else if (this.quizState.phase === 'reveal') this.scheduleRevealAdvance(this.quizState.revealRemainingMs);
                    this.showToast("RESUMED");
                }
            }

            nextQuiz() {
                this.stopQuiz();
                this.quizState.paused = false;
                const btn = document.getElementById('pauseToggleBtn'); if (btn) btn.textContent = 'PAUSE';
                this.quizState.activeIndex++;
                this.runLoop();
            }

            renderAll() {
                this.renderGrid(); this.renderCategories();
                document.getElementById('storeNameInput').value = this.state.storeName;
                document.getElementById('shopUrlInput').value = this.state.shopUrl;
                document.getElementById('quizCountdownSeconds').value = this.state.quizSettings.countdown;
                document.getElementById('quizRevealSeconds').value = this.state.quizSettings.reveal;
            }

            renderGrid() {
                const grid = document.getElementById('menuGrid'); if (!grid) return;
                const items = this.state.items; const filtered = this.state.filter === 'ALL' ? items : items.filter(i => i.cat === this.state.filter);
                grid.replaceChildren();

                filtered.forEach(item => {
                    const sizeClass = ['small', 'medium', 'large'].includes(item.size) ? item.size : 'medium';
                    const card = document.createElement('div');
                    card.className = `card ${sizeClass}`;
                    card.dataset.id = item.id;

                    const imgWrap = document.createElement('div');
                    imgWrap.className = 'card-img';
                    if (item.image && isDataImage(item.image)) {
                        const img = document.createElement('img');
                        img.src = item.image;
                        imgWrap.appendChild(img);
                        if (this.state.currentMode === 'edit') {
                            const rmBtn = document.createElement('button');
                            rmBtn.type = 'button'; rmBtn.className = 'img-remove-btn'; rmBtn.textContent = '×'; rmBtn.title = 'REMOVE IMAGE';
                            rmBtn.dataset.action = 'removeimg'; rmBtn.dataset.id = item.id;
                            imgWrap.appendChild(rmBtn);
                        }
                    } else {
                        const placeholder = document.createElement('div');
                        placeholder.style.cssText = 'color:#222;font-size:10px;';
                        placeholder.textContent = 'NO_IMAGE';
                        imgWrap.appendChild(placeholder);
                    }
                    card.appendChild(imgWrap);

                    const content = document.createElement('div');
                    content.className = 'card-content';

                    const catTag = document.createElement('div');
                    catTag.style.cssText = 'font-size: 8px; color: var(--neon-magenta); margin-bottom: 5px;';
                    catTag.textContent = item.cat || 'UNCATEGORIZED';
                    content.appendChild(catTag);

                    const name = document.createElement('div');
                    name.className = 'card-name';
                    name.textContent = item.name || '';
                    content.appendChild(name);

                    const desc = document.createElement('div');
                    desc.className = 'card-desc';
                    desc.textContent = item.desc || '';
                    content.appendChild(desc);

                    const year = document.createElement('div');
                    year.className = 'card-year';
                    year.textContent = item.year || '';
                    content.appendChild(year);

                    if (this.state.currentMode === 'edit') {
                        const actions = document.createElement('div');
                        actions.className = 'card-actions';
                        [['edit', 'EDIT'], ['img', 'IMG'], ['delete', 'DEL']].forEach(([action, label]) => {
                            const btn = document.createElement('button');
                            btn.type = 'button'; btn.className = 'btn'; btn.textContent = label;
                            btn.dataset.action = action; btn.dataset.id = item.id;
                            if (action === 'delete') btn.style.color = 'var(--neon-red)';
                            actions.appendChild(btn);
                        });
                        content.appendChild(actions);
                    }

                    card.appendChild(content);
                    grid.appendChild(card);
                });
            }

            renderCategories() {
                const container = document.getElementById('catListContainer'); if (!container) return;
                container.replaceChildren();

                const allBtn = document.createElement('button');
                allBtn.type = 'button'; allBtn.className = 'cat-tab' + (this.state.filter === 'ALL' ? ' active' : '');
                allBtn.textContent = 'ALL'; allBtn.dataset.action = 'filter'; allBtn.dataset.cat = 'ALL';
                container.appendChild(allBtn);

                this.state.categories.forEach(c => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'cat-tab-wrapper';

                    const btn = document.createElement('button');
                    btn.type = 'button'; btn.className = 'cat-tab' + (this.state.filter === c ? ' active' : '');
                    btn.textContent = c; btn.dataset.action = 'filter'; btn.dataset.cat = c;
                    wrapper.appendChild(btn);

                    const delBtn = document.createElement('span');
                    delBtn.className = 'cat-tool-btn'; delBtn.textContent = 'X';
                    delBtn.dataset.action = 'delete'; delBtn.dataset.cat = c;
                    wrapper.appendChild(delBtn);

                    container.appendChild(wrapper);
                });
            }

            openNewItemModal() { this.editingId = null; this.setupModal(); const modal = document.getElementById('modalOverlay'); if (modal) modal.style.display = 'flex'; }
            openEdit(id) { const item = this.state.items.find(i => i.id === id); if (!item) return; this.editingId = id; this.setupModal(item); const modal = document.getElementById('modalOverlay'); if (modal) modal.style.display = 'flex'; }

            setupModal(item = null) {
                const catSel = document.getElementById('editCat');
                if (catSel) {
                    catSel.replaceChildren();
                    this.state.categories.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c; opt.textContent = c;
                        catSel.appendChild(opt);
                    });
                }
                document.getElementById('editName').value = item ? item.name : "";
                document.getElementById('editCat').value = item ? item.cat : this.state.categories[0];
                document.getElementById('editHint').value = item ? (item.hint || "") : "";
                document.getElementById('editMeta').value = item ? (item.meta || "") : "";
                document.getElementById('editYear').value = item ? (item.year || "") : "";
                document.getElementById('editDesc').value = item ? item.desc : "";
                document.getElementById('editSize').value = item ? item.size : "medium";
            }

            saveEdit() {
                const data = {
                    name: document.getElementById('editName').value,
                    cat: document.getElementById('editCat').value,
                    hint: document.getElementById('editHint').value,
                    meta: document.getElementById('editMeta').value,
                    year: document.getElementById('editYear').value,
                    desc: document.getElementById('editDesc').value,
                    size: document.getElementById('editSize').value
                };
                if (this.editingId) {
                    const idx = this.state.items.findIndex(i => i.id === this.editingId);
                    if (idx > -1) this.state.items[idx] = { ...this.state.items[idx], ...data };
                } else {
                    this.state.items.push({ ...data, id: crypto.randomUUID(), image: "" });
                }
                this.closeModal(); this.renderGrid(); this.persist();
            }

            closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
            setFilter(f) { this.state.filter = f; this.renderAll(); }
            updateStoreName(v) { this.state.storeName = v; this.persist(); }
            updateShopUrl(v) { this.state.shopUrl = v; this.persist(); }

            updateQuizSettings() {
                const countdownRaw = Number(document.getElementById('quizCountdownSeconds').value);
                const revealRaw = Number(document.getElementById('quizRevealSeconds').value);
                const countdown = Math.max(2, Number.isFinite(countdownRaw) ? countdownRaw : 5);
                const reveal = Math.max(1, Number.isFinite(revealRaw) ? revealRaw : 3);
                this.state.quizSettings = { ...this.state.quizSettings, countdown, reveal };
                this.persist();
            }

            addCategory() {
                const input = document.getElementById('catInput'); if (!input) return;
                const v = input.value.toUpperCase().trim();
                if (v && !this.state.categories.includes(v)) {
                    this.state.categories.push(v);
                    input.value = '';
                    this.renderCategories();
                    this.persist();
                    this.showToast(`CATEGORY [${v}] ADDED`);
                }
            }

            pickImg(id) {
                const input = document.getElementById('fileInput');
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    input.value = '';
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async re => {
                        const item = this.state.items.find(i => i.id === id);
                        if (!item) return;
                        this.showToast("OPTIMIZING_IMAGE...");
                        try {
                            const compressed = await this.compressImage(re.target.result);
                            item.image = compressed;
                            this.renderGrid(); this.persist();
                            this.showToast("IMAGE_UPDATED");
                        } catch (err) {
                            console.error(err);
                            this.showToast("ERR: IMAGE_LOAD_FAILED");
                        }
                    };
                    reader.onerror = () => this.showToast("ERR: FILE_READ_FAILED");
                    reader.readAsDataURL(file);

                input.click();

            removeImage(id) {
                const item = this.state.items.find(i => i.id === id);

                this.renderGrid(); this.persist();

            bake(type) {

                    desc: i.desc || '', hint: i.hint || '', meta: i.meta || '', size: i.size || 'medium',

                }));
                // 태그 탈출 차단: '<'를 유니코드 이스케이프로 치환해 데이터 안에서 스크립트 블록을 끝낼 수 없게 한다.

                const template = `<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>${storeName} - STANDALONE QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.css">
    <style>${css}
        #quizPlayer { display: flex; position: static; height: calc(100vh - 60px); overflow-x: hidden; }
        .standalone-header {
            height: 60px; background: #000; border-bottom: 2px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; position: relative; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="flashOverlay" class="reveal-flash-screen"></div>

        function renderMedia(container, item) {

            if (item.image && isDataImage(item.image)) {

                container.appendChild(img);

            }, 1000);

        });
        window.onload = runLoop;
    <\/script>
</body>
</html>`;
                const blob = new Blob([template], {type: 'text/html'});

                URL.revokeObjectURL(url);

        }

    </script>
</body>
</html>
