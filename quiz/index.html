<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETRO QUIZ FACTORY - v6.5.27 LOCAL_STORAGE_SYNC</title>
    <!-- 폰트 로드: 영문 Press Start 2P / 한글 둥근모 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.css">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-magenta: #ff00ff;
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --arcade-black: #050505;
            --ui-dark: #0a0a0a;
            --border-color: #333;
            --main-font: 'Press Start 2P', cursive;
            --kr-font: 'NeoDunggeunmo', cursive;
            --green-glow: 0 0 15px rgba(57, 255, 20, 0.6);
            --magenta-glow: 0 0 15px rgba(255, 0, 255, 0.6);
            --blue-glow: 0 0 15px rgba(0, 242, 255, 0.6);
            --red-glow: 0 0 25px rgba(255, 0, 60, 0.9);
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0; background-color: var(--arcade-black); color: var(--neon-green);
            font-family: var(--main-font); -webkit-font-smoothing: none; font-smooth: never;
            font-size: 11px; overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        /* Scanline Effect */
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10000; background-size: 100% 4px; pointer-events: none; opacity: 0.15;
        }

        /* FX Animations */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -5px); }
            30% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, 5px); }
            70% { transform: translate(5px, -5px); }
            100% { transform: translate(0, 0); }
        }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes flash {
            0% { background: rgba(255, 255, 255, 0); }
            20% { background: rgba(255, 255, 255, 0.4); }
            100% { background: rgba(255, 255, 255, 0); }
        }
        .reveal-flash-screen { position: fixed; inset: 0; z-index: 9999; pointer-events: none; }
        .active-flash { animation: flash 0.4s ease-out; }

        /* Top Bar */
        .top-bar {
            background: #000; border-bottom: 2px solid var(--border-color); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .title { color: var(--neon-green); text-shadow: var(--green-glow); font-size: 14px; letter-spacing: 1px; }

        .brand-icon-btn {
            width: 32px; height: 32px; border: 1px solid #333; display: flex; align-items: center; justify-content: center;
            background: #000; cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .brand-icon-btn svg { width: 18px; height: 18px; fill: #444; }
        .brand-icon-btn:hover svg { fill: var(--neon-magenta); }

        .mode-switcher { display: flex; background: #111; padding: 4px; border: 1px solid #222; gap: 4px; }
        .mode-btn {
            background: transparent; border: none; color: #444; padding: 8px 16px;
            cursor: pointer; font-family: var(--main-font); font-size: 8px; transition: 0.2s;
        }
        .mode-btn.active { background: #222; color: var(--neon-blue); text-shadow: var(--blue-glow); }

        .controls { display: flex; gap: 10px; }
        .btn {
            background: #000; border: 1px solid #444; color: #888; padding: 8px 16px;
            cursor: pointer; font-family: var(--main-font); font-size: 8px; text-transform: uppercase;
        }
        .btn:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: var(--green-glow); }
        .btn.bake { background: var(--neon-green); color: #000; border-color: var(--neon-green); font-weight: bold; }
        .btn.active-blue { color: var(--neon-blue); border-color: var(--neon-blue); box-shadow: var(--blue-glow); }

        /* Main Container */
        .main-container { display: grid; grid-template-columns: 420px 1fr; flex-grow: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { background: #080808; border-right: 2px solid var(--border-color); padding: 30px; overflow-y: auto; }
        .sidebar-label {
            font-size: 10px; color: #555; margin-bottom: 25px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; letter-spacing: 1px; margin-top: 35px;
        }
        .sidebar-label:first-child { margin-top: 0; }

        .config-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .config-row label { font-size: 8px; color: #444; flex: 1; padding-right: 10px; }
        .config-row input, .config-row select { 
            width: 230px; background: #000; border: 1px solid #333; color: var(--neon-blue); 
            font-family: var(--main-font); padding: 14px; font-size: 10px; text-align: right;
            outline: none; transition: 0.2s;
        }

        .add-cat-zone { display: flex; gap: 5px; margin-bottom: 20px; }
        .add-cat-zone input { 
            flex: 1; background: #000; border: 1px solid #222; color: var(--neon-blue); padding: 14px; 
            font-family: var(--main-font); font-size: 10px; 
        }

        .category-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .cat-tab-wrapper { display: flex; align-items: center; background: #111; border: 1px solid #222; transition: 0.2s; }
        .cat-tab-wrapper:hover { border-color: #555; }
        .cat-tab { background: transparent; border: none; color: #555; padding: 8px 12px; font-family: var(--main-font); font-size: 8px; cursor: pointer; }
        .cat-tab.active { color: var(--neon-magenta); text-shadow: var(--magenta-glow); }
        .cat-tool-btn { color: #333; padding-right: 8px; cursor: pointer; font-size: 10px; font-family: var(--main-font); }
        .cat-tool-btn:hover { color: var(--neon-red); }

        /* Content Area */
        .content-area { position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .menu-grid { padding: 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 50px; overflow-y: auto; background: #000; flex-grow: 1; }

        /* --- QUIZ PLAYER --- */
        #quizPlayer {
            position: absolute; inset: 0; background: #000; z-index: 50; display: none;
            flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px;
            overflow-x: hidden; overflow-y: auto;
        }

        .quiz-card {
            width: 100%; max-width: 850px; background: #0c0c0c; border: 4px solid var(--neon-magenta);
            padding: 20px; box-shadow: var(--magenta-glow); position: relative;
            display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; overflow: hidden;
        }

        @keyframes countSlam {
            0% { transform: scale(4); opacity: 0; }
            20% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .count-slam { animation: countSlam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; will-change: transform, opacity; }

        .quiz-countdown-wrapper {
            height: 100px; width: 100%; display: flex; align-items: center; justify-content: center;
            overflow: hidden; margin-bottom: 10px;
        }

        .quiz-countdown-display { 
            font-family: var(--main-font); font-size: 80px; color: var(--neon-magenta); 
            text-shadow: var(--magenta-glow); display: flex; align-items: center; justify-content: center;
        }
        .quiz-countdown-display.warning { color: var(--neon-red); text-shadow: var(--red-glow); }

        .quiz-image-box { 
            width: 100%; max-height: 45vh; min-height: 250px; background: #000; border: 2px solid #222; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; flex-shrink: 1; position: relative;
        }
        .quiz-image-box img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }

        .big-hint-text {
            font-family: var(--kr-font); color: #fff; font-size: 28px; text-align: center;
            padding: 40px; text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            line-height: 1.5; letter-spacing: 1px;
        }
        .big-hint-label {
            position: absolute; top: 10px; left: 10px; font-family: var(--main-font);
            font-size: 8px; color: var(--neon-blue); opacity: 0.6;
        }

        .quiz-answer-zone { 
            opacity: 0; transform: translateY(20px); transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; border: 2px solid var(--neon-blue); background: #000; box-shadow: var(--blue-glow);
            min-height: 110px; flex-shrink: 0;
        }
        .quiz-answer-zone.reveal { opacity: 1; transform: translateY(0); }
        
        .ans-side-info { 
            flex: 0 0 30%; background: var(--neon-blue); color: #000; padding: 15px; 
            display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
            font-family: var(--main-font);
        }
        .ans-name { font-size: 15px; font-weight: bold; margin-bottom: 5px; text-align: right; line-height: 1.2; }
        .ans-meta { font-size: 7px; opacity: 0.8; }
        .ans-main-desc { flex: 1; padding: 15px 20px; text-align: left; font-family: var(--kr-font); font-size: 16px; color: #fff; line-height: 1.4; display: flex; align-items: center; }

        /* Card System */
        .card { background: #0c0c0c; border: 1px solid var(--border-color); display: flex; flex-direction: column; transition: 0.2s; position: relative; box-shadow: 6px 6px 0 var(--border-color); }
        .card:hover { border-color: var(--neon-green); box-shadow: 6px 6px 0 var(--neon-green); }
        .card.large { grid-column: span 2; }
        .card-img { height: 280px; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-name { font-size: 12px; color: var(--neon-blue); margin-bottom: 10px; }
        .card-desc { font-family: var(--kr-font); color: #777; font-size: 13px; line-height: 1.6; flex-grow: 1; }
        .card-price { font-size: 20px; color: var(--neon-green); font-weight: bold; margin-top: 15px; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; margin-top: 15px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { background: #000; border: 2px solid var(--neon-green); padding: 40px; width: 500px; box-shadow: var(--green-glow); }
        
        /* 확인 모달 스타일 */
        #confirmModal { border-color: var(--neon-red); box-shadow: var(--red-glow); text-align: center; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #000; border: 1px solid var(--neon-green); padding: 10px 20px; color: var(--neon-green); z-index: 2000; display: none; }
    </style>
</head>

    <script type="module">
        const LS_KEY = 'RETRO_QUIZ_FACTORY_DATA_v6';

        const SAMPLE_ITEMS = [
            { id: 'S1', name: "Bubble Bobble", cat: "GAME", price: "1986", desc: "버블로 적을 가두고 터뜨리는 협동 액션 게임. 전설적인 스테이지 배경음악이 유명합니다.", hint: "방울을 쏘는 공룡 형제", meta: "1986 / TAITO", size: "large" },
            { id: 'S2', name: "Galaga", cat: "GAME", price: "1981", desc: "남코의 전설적인 고정 화면형 슈팅 게임. 적의 트랙터 빔에 잡힌 기체를 되찾아 듀얼 파이터로 변신!", hint: "적에게 잡혀가면 2대가 됨", meta: "1981 / NAMCO", size: "medium" }
        ];

        class ArcadeSound {
            constructor() { 
                this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
                this.enabled = false;
            }
            playTone(freq, dur, type = 'square', vol = 0.1) {
                if (!this.enabled) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
            playTick() { if(this.ctx.state === 'suspended') this.ctx.resume(); this.playTone(880, 0.1, 'square', 0.05); }
            playWarning() { if(this.ctx.state === 'suspended') this.ctx.resume(); this.playTone(1760, 0.1, 'square', 0.05); }
            playReveal() {
                if(this.ctx.state === 'suspended') this.ctx.resume();
                this.playTone(523.25, 0.1); setTimeout(() => this.playTone(659.25, 0.1), 100); setTimeout(() => this.playTone(783.99, 0.3), 200);
            }
        }

        class RetroMenuApp {
            constructor() {
                this.state = {
                    currentMode: 'edit', 
                    storeName: "RETRO GAME FACTORY", 
                    shopUrl: "https://kitscript.com/game/quiz/",
                    items: [], 
                    categories: ["GAME", "SNACK", "DRINK"], 
                    quizSettings: { countdown: 5, reveal: 3 }, 
                    filter: 'ALL'
                };
                this.quizState = { activeIndex: 0, shuffledItems: [], timerId: null, intervalId: null };
                this.sound = new ArcadeSound();
                this.pendingDelete = { id: null, type: null };
                window.app = this;
                this.init();
            }

            init() {
                // LocalStorage 로드
                const localData = localStorage.getItem(LS_KEY);
                if (localData) {
                    try {
                        const parsed = JSON.parse(localData);
                        this.state = { ...this.state, ...parsed };
                    } catch (e) {
                        console.error("Data Load Error", e);
                    }
                }

                if (this.state.items.length === 0) {
                    this.state.items = [...SAMPLE_ITEMS];
                }

                this.renderAll();
                this.showToast("LOCAL_SYNC_READY");
            }

            saveData() {
                // LocalStorage 저장
                localStorage.setItem(LS_KEY, JSON.stringify({
                    storeName: this.state.storeName,
                    shopUrl: this.state.shopUrl,
                    categories: this.state.categories,
                    quizSettings: this.state.quizSettings,
                    items: this.state.items
                }));
                this.showToast("DATA_SAVED_LOCALLY");
            }

            deleteItem(id) {
                this.pendingDelete = { id: id, type: 'ITEM' };
                document.getElementById('confirmLabel').innerText = "CONFIRM_ITEM_DELETE";
                document.getElementById('confirmMsg').innerText = "해당 아이템을 정말 삭제하시겠습니까?";
                document.getElementById('confirmOverlay').style.display = 'flex';
            }

            delCat(c) {
                this.pendingDelete = { id: c, type: 'CATEGORY' };
                document.getElementById('confirmLabel').innerText = "CONFIRM_CAT_DELETE";
                document.getElementById('confirmMsg').innerText = `[${c}] 카테고리를 삭제하시겠습니까?`;
                document.getElementById('confirmOverlay').style.display = 'flex';
            }

            executeDelete() {
                const { id, type } = this.pendingDelete;
                if (!id) return;

                if (type === 'ITEM') {
                    this.state.items = this.state.items.filter(i => i.id !== id);
                    this.renderGrid();
                    this.showToast("ITEM_DELETED");
                } else if (type === 'CATEGORY') {
                    this.state.categories = this.state.categories.filter(x => x !== id);
                    this.renderCategories();
                    this.showToast("CATEGORY_REMOVED");
                }
                
                this.saveData();
                this.closeConfirm();
            }

            closeConfirm() {
                this.pendingDelete = { id: null, type: null };
                document.getElementById('confirmOverlay').style.display = 'none';
            }

            setMode(mode) {
                this.state.currentMode = mode;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                const btn = document.getElementById('mode-'+mode); if (btn) btn.classList.add('active');
                const qp = document.getElementById('quizPlayer'); const mg = document.getElementById('menuGrid');
                if (mode === 'quiz') { if (qp) qp.style.display = 'flex'; if (mg) mg.style.display = 'none'; this.startQuiz(); }
                else { if (qp) qp.style.display = 'none'; if (mg) mg.style.display = 'grid'; this.stopQuiz(); this.renderGrid(); }
            }

            toggleSound() {
                this.sound.enabled = !this.sound.enabled;
                const btn = document.getElementById('soundToggleBtn');
                if (btn) {
                    btn.innerText = `SOUND: ${this.sound.enabled ? "ON" : "OFF"}`;
                    if (this.sound.enabled) btn.classList.add('active-blue');
                    else btn.classList.remove('active-blue');
                }
            }

            async compressImage(base64Str, maxWidth = 800, maxHeight = 800) {
                return new Promise((resolve) => {
                    const img = new Image(); img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } }
                        else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                });
            }

            startQuiz() { this.stopQuiz(); const source = this.state.items.length > 0 ? this.state.items : SAMPLE_ITEMS; this.quizState.shuffledItems = [...source].sort(() => Math.random() - 0.5); this.quizState.activeIndex = 0; this.runLoop(); }
            stopQuiz() { if (this.quizState.timerId) clearTimeout(this.quizState.timerId); if (this.quizState.intervalId) clearInterval(this.quizState.intervalId); }
            runLoop() { if (this.quizState.activeIndex >= this.quizState.shuffledItems.length) { this.startQuiz(); return; } this.renderQuizSlide(); }

            renderQuizSlide() {
                const item = this.quizState.shuffledItems[this.quizState.activeIndex];
                const countDisp = document.getElementById('quizCountdownDisplay');
                const ansZone = document.getElementById('quizAnswerZone');
                const media = document.getElementById('quizMedia');
                const idxDisp = document.getElementById('quizIndex');
                const card = document.getElementById('quizCard');
                if (ansZone) ansZone.classList.remove('reveal');
                card.classList.remove('shake');
                const currentStageStr = (this.quizState.activeIndex + 1).toString().padStart(2, '0');
                const totalStagesStr = this.quizState.shuffledItems.length.toString().padStart(2, '0');
                if (idxDisp) idxDisp.innerText = `STAGE ${currentStageStr}/${totalStagesStr}`;
                if (media) { 
                    if (item.image) { media.innerHTML = `<img src="${item.image}">`; } 
                    else { media.innerHTML = `<div class="big-hint-label">MISSION_HINT</div><div class="big-hint-text">${item.hint || 'NO HINT PROVIDED'}</div>`; }
                }
                let count = parseInt(this.state.quizSettings.countdown) || 5; this.updateCountdownUI(count);
                this.quizState.intervalId = setInterval(() => { count--; this.updateCountdownUI(count); if (count <= 0) { clearInterval(this.quizState.intervalId); this.revealAnswer(item); } }, 1000);
            }

            updateCountdownUI(count) {
                const el = document.getElementById('quizCountdownDisplay'); if (!el) return;
                el.innerText = count.toString().padStart(2, '0');
                el.classList.remove('count-slam'); void el.offsetWidth; el.classList.add('count-slam');
                if (count <= 3 && count > 0) { el.classList.add('warning'); this.sound.playWarning(); } 
                else { el.classList.remove('warning'); this.sound.playTick(); }
            }

            revealAnswer(item) {
                const ansZone = document.getElementById('quizAnswerZone');
                const card = document.getElementById('quizCard');
                const flash = document.getElementById('flashOverlay');
                document.getElementById('ansName').innerText = item.name.toUpperCase();
                document.getElementById('ansMeta').innerText = item.meta || "UNKNOWN / 19XX";
                document.getElementById('ansDesc').innerText = item.desc;
                flash.classList.add('active-flash'); card.classList.add('shake');
                setTimeout(() => flash.classList.remove('active-flash'), 400);
                if (ansZone) ansZone.classList.add('reveal');
                this.sound.playReveal();
                this.quizState.timerId = setTimeout(() => { this.quizState.activeIndex++; this.runLoop(); }, (parseInt(this.state.quizSettings.reveal) || 3) * 1000);
            }

            nextQuiz() { this.stopQuiz(); this.quizState.activeIndex++; this.runLoop(); }

            renderAll() { this.renderGrid(); this.renderCategories(); document.getElementById('storeNameInput').value = this.state.storeName; document.getElementById('shopUrlInput').value = this.state.shopUrl; document.getElementById('quizCountdownSeconds').value = this.state.quizSettings.countdown; document.getElementById('quizRevealSeconds').value = this.state.quizSettings.reveal; }

            renderGrid() {
                const grid = document.getElementById('menuGrid'); if (!grid) return;
                const items = this.state.items; const filtered = this.state.filter === 'ALL' ? items : items.filter(i => i.cat === this.state.filter);
                grid.innerHTML = filtered.map(item => `<div class="card ${item.size || 'medium'}"><div class="card-img">${item.image ? `<img src="${item.image}">` : '<div style="color:#222;font-size:10px;">NO_IMAGE</div>'}</div><div class="card-content"><div style="font-size: 8px; color: var(--neon-magenta); margin-bottom: 5px;">${item.cat}</div><div class="card-name">${item.name}</div><div class="card-desc">${item.desc}</div><div class="card-price">₩ ${item.price}</div>${this.state.currentMode === 'edit' ? `<div class="card-actions"><button class="btn" onclick="app.openEdit('${item.id}')">EDIT</button><button class="btn" onclick="app.pickImg('${item.id}')">IMG</button><button class="btn" onclick="app.deleteItem('${item.id}')" style="color:var(--neon-red)">DEL</button></div>` : ''}</div></div>`).join('');
            }

            renderCategories() {
                const container = document.getElementById('catListContainer'); if (!container) return;
                container.innerHTML = `<button class="cat-tab ${this.state.filter === 'ALL' ? 'active' : ''}" onclick="app.setFilter('ALL')">ALL</button>` + this.state.categories.map(c => `<div class="cat-tab-wrapper"><button class="cat-tab ${this.state.filter === c ? 'active' : ''}" onclick="app.setFilter('${c}')">${c}</button><span class="cat-tool-btn" onclick="app.delCat('${c}')">X</span></div>`).join('');
            }

            openNewItemModal() { this.editingId = null; this.setupModal(); const modal = document.getElementById('modalOverlay'); if (modal) modal.style.display = 'flex'; }
            openEdit(id) { const item = this.state.items.find(i => i.id === id); if (!item) return; this.editingId = id; this.setupModal(item); const modal = document.getElementById('modalOverlay'); if (modal) modal.style.display = 'flex'; }
            setupModal(item = null) {
                const catSel = document.getElementById('editCat'); if (catSel) catSel.innerHTML = this.state.categories.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('editName').value = item ? item.name : ""; document.getElementById('editCat').value = item ? item.cat : this.state.categories[0];
                document.getElementById('editHint').value = item ? (item.hint || "") : ""; document.getElementById('editMeta').value = item ? (item.meta || "") : "";
                document.getElementById('editPrice').value = item ? item.price : ""; document.getElementById('editDesc').value = item ? item.desc : "";
                document.getElementById('editSize').value = item ? item.size : "medium";
            }

            saveEdit() {
                const data = { name: document.getElementById('editName').value, cat: document.getElementById('editCat').value, hint: document.getElementById('editHint').value, meta: document.getElementById('editMeta').value, price: document.getElementById('editPrice').value, desc: document.getElementById('editDesc').value, size: document.getElementById('editSize').value };
                if (this.editingId) { const idx = this.state.items.findIndex(i => i.id === this.editingId); if (idx > -1) this.state.items[idx] = {...this.state.items[idx], ...data}; }
                else { this.state.items.push({...data, id: 'ID'+Date.now() + Math.random().toString(36).substr(2,4), image: ""}); }
                this.closeModal(); this.renderGrid(); this.saveData();
            }

            closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
            setFilter(f) { this.state.filter = f; this.renderAll(); }
            updateStoreName(v) { this.state.storeName = v; }
            updateShopUrl(v) { this.state.shopUrl = v; }
            updateQuizSettings() { this.state.quizSettings.countdown = document.getElementById('quizCountdownSeconds').value; this.state.quizSettings.reveal = document.getElementById('quizRevealSeconds').value; }
            addCategory() { const input = document.getElementById('catInput'); if (!input) return; const v = input.value.toUpperCase().trim(); if(v && !this.state.categories.includes(v)) { this.state.categories.push(v); input.value=''; this.renderCategories(); this.saveData(); } }
            
            pickImg(id) {
                const input = document.getElementById('fileInput');
                input.onchange = (e) => {
                    if (!e.target.files[0]) return;
                    const reader = new FileReader();
                    reader.onload = async re => {
                        const item = this.state.items.find(i => i.id === id);
                        if (item) {
                            this.showToast("OPTIMIZING_IMAGE...");
                            const compressed = await this.compressImage(re.target.result);
                            item.image = compressed; this.renderGrid(); this.saveData();
                        }
                    };
                    reader.readAsDataURL(e.target.files[0]);
                };
                input.click();
            }
            showToast(m) { const t = document.getElementById('toast'); if (!t) return; t.innerText = `[SYS] ${m}`; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

            bake(type) {
                this.showToast(`BUILDING_${type.toUpperCase()}_ENGINE...`);
                const css = document.querySelector('style').innerHTML;
                const itemsData = JSON.stringify(this.state.items);
                const settings = JSON.stringify(this.state.quizSettings);
                const storeName = this.state.storeName;
                const shopUrl = this.state.shopUrl;

                const template = `<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${storeName} - STANDALONE QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.css">
    <style>${css} 
        #quizPlayer { display: flex; position: static; height: calc(100vh - 60px); overflow-x: hidden; }
        .standalone-header { 
            height: 60px; background: #000; border-bottom: 2px solid #333; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; position: relative; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="flashOverlay" class="reveal-flash-screen"></div>
    <header class="standalone-header">
        <div class="header-title">${storeName}</div>
        <a href="${shopUrl}" target="_blank" class="header-home"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
    </header>
    <div id="quizPlayer">
        <div class="quiz-card" id="quizCard">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px;">
                <div style="font-size:8px; color:var(--neon-blue);">QUIZ</div>
                <div id="quizIndex" style="font-size:8px; color:#444;">STAGE 00/00</div>
            </div>
            <div class="quiz-countdown-wrapper"><div id="quizCountdownDisplay" class="quiz-countdown-display">00</div></div>
            <div id="quizMedia" class="quiz-image-box"></div>
            <div id="quizAnswerZone" class="quiz-answer-zone">
                <div class="ans-side-info">
                    <div id="ansName" class="ans-name"></div>
                    <div id="ansMeta" class="ans-meta"></div>
                </div>
                <div id="ansDesc" class="ans-main-desc"></div>
            </div>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn" onclick="location.reload()">RESTART</button>
            <button class="btn" id="nextBtn">SKIP</button>
            <button id="soundToggleBtn" class="btn">SOUND: OFF</button>
        </div>
    </div>
    <script>
        const items = ${itemsData}; const config = ${settings};
        ${ArcadeSound.toString()}
        const sound = new ArcadeSound();
        let activeIndex = 0; let timerId = null; let intervalId = null;
        const shuffled = [...items].sort(() => Math.random() - 0.5);
        function updateCountdownUI(count) {
            const el = document.getElementById('quizCountdownDisplay');
            el.innerText = count.toString().padStart(2, '0');
            el.classList.remove('count-slam'); void el.offsetWidth; el.classList.add('count-slam');
            if(count <= 3 && count > 0) { el.classList.add('warning'); sound.playWarning(); } 
            else { el.classList.remove('warning'); sound.playTick(); }
        }
        function revealAnswer(item) {
            document.getElementById('ansName').innerText = item.name.toUpperCase();
            document.getElementById('ansMeta').innerText = item.meta || "UNKNOWN";
            document.getElementById('ansDesc').innerText = item.desc;
            document.getElementById('flashOverlay').classList.add('active-flash');
            document.getElementById('quizCard').classList.add('shake');
            document.getElementById('quizAnswerZone').classList.add('reveal');
            sound.playReveal();
            timerId = setTimeout(() => { activeIndex++; runLoop(); }, config.reveal * 1000);
            setTimeout(() => document.getElementById('flashOverlay').classList.remove('active-flash'), 400);
        }
        function runLoop() {
            if(activeIndex >= shuffled.length) { activeIndex = 0; }
            const item = shuffled[activeIndex];
            document.getElementById('quizAnswerZone').classList.remove('reveal');
            document.getElementById('quizCard').classList.remove('shake');
            document.getElementById('quizIndex').innerText = "STAGE " + (activeIndex+1).toString().padStart(2,'0') + "/" + shuffled.length.toString().padStart(2,'0');
            const media = document.getElementById('quizMedia');
            if(item.image) media.innerHTML = '<img src="'+item.image+'">';
            else media.innerHTML = '<div class="big-hint-label">MISSION_HINT</div><div class="big-hint-text">'+(item.hint||'NO HINT')+'</div>';
            let count = config.countdown; updateCountdownUI(count);
            clearInterval(intervalId);
            intervalId = setInterval(() => { count--; updateCountdownUI(count); if(count <= 0) { clearInterval(intervalId); revealAnswer(item); } }, 1000);
        }
        document.getElementById('nextBtn').onclick = () => { clearTimeout(timerId); clearInterval(intervalId); activeIndex++; runLoop(); };
        document.getElementById('soundToggleBtn').onclick = (e) => {
            sound.enabled = !sound.enabled;
            e.target.innerText = "SOUND: " + (sound.enabled ? "ON" : "OFF");
            if(sound.enabled) e.target.classList.add('active-blue'); else e.target.classList.remove('active-blue');
        };
        window.onload = runLoop;
    <\/script>
</body>
</html>`;
                const blob = new Blob([template], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `retro-quiz-standalone.html`;
                a.click();
            }
        }
        window.addEventListener('DOMContentLoaded', () => new RetroMenuApp());
    </script>
</body>
</html>
