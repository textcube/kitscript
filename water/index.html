<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuntOcean | Cinematic Water World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <style>
        :root {
            --accent: #78f3ff;
            --accent-2: #12b9db;
            --bg: #020913;
            --danger: #ff8d4d;
            --panel: rgba(4, 18, 30, 0.72);
            --line: rgba(130, 229, 255, 0.22);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 18%, rgba(39, 119, 148, 0.22), transparent 28%),
                linear-gradient(180deg, #04111d 0%, #061a2a 35%, #052033 62%, #03131f 100%);
            font-family: 'Pretendard', -apple-system, sans-serif;
            color: white;
        }

        #main-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: block; z-index: 1;
        }

        /* HUD as a CSS Grid, named areas, direct children only (city pattern — no display:contents,
           see city/README.md for the iOS Chrome WebKit bug that pattern used to cause). */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
            padding: max(1.4rem, env(safe-area-inset-top)) 2.2rem 0; z-index: 20;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            grid-template-areas:
                "brand actions"
                "location actions";
            column-gap: 1.25rem;
            row-gap: 0.5rem;
            align-items: start;
        }

        .hud-actions { grid-area: actions; pointer-events: auto; padding-right: 0.2rem; }
        .brand-name {
            grid-area: brand; pointer-events: auto;
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 0.32rem;
            color: #d3fcff;
            text-shadow: 0 0 30px rgba(120, 243, 255, 0.26);
            white-space: nowrap;
            min-width: 0;
        }
        .location-info {
            grid-area: location; pointer-events: auto;
            font-size: clamp(0.72rem, 1.8vw, 1rem); color: #81b3c4; text-transform: uppercase;
            letter-spacing: 0.32rem; font-weight: 700; min-width: 0;
        }

        /* Icon-only circular reset button (city pattern: stroke="currentColor" inline SVG, no emoji). */
        .hud-button {
            position: relative;
            pointer-events: auto;
            background: linear-gradient(180deg, rgba(14, 35, 47, 0.9), rgba(6, 16, 26, 0.9));
            border: 1px solid rgba(120, 243, 255, 0.55);
            color: #d8fbff;
            width: 42px;
            height: 42px;
            padding: 0;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(14px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), inset 0 0 0 1px rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .hud-button svg { width: 20px; height: 20px; display: block; }
        .hud-button:hover {
            border-color: rgba(120, 243, 255, 0.9);
            color: #fff;
            box-shadow: 0 16px 50px rgba(10, 184, 216, 0.22), inset 0 0 22px rgba(120, 243, 255, 0.12);
        }

        @media (hover: hover) and (pointer: fine) {
            .hud-button[data-tooltip]::after {
                content: attr(data-tooltip);
                position: absolute;
                top: calc(100% + 10px);
                right: 0;
                background: var(--panel);
                border: 1px solid rgba(120, 243, 255, 0.4);
                color: #eee;
                font-size: 0.72rem;
                font-weight: 600;
                letter-spacing: 0.3px;
                white-space: nowrap;
                padding: 0.4rem 0.7rem;
                border-radius: 8px;
                pointer-events: none;
                opacity: 0;
                transform: translateY(-4px);
                transition: opacity 0.2s, transform 0.2s;
                box-shadow: 0 10px 30px rgba(0,0,0,0.6);
                z-index: 30;
            }
            .hud-button[data-tooltip]:hover::after {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .guide-box {
            position: fixed; bottom: max(2.4rem, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            width: min(calc(100vw - 1.5rem), 980px);
            background: linear-gradient(180deg, rgba(5, 20, 32, 0.88), rgba(3, 13, 22, 0.92)); padding: 1rem 1.8rem;
            border: 1px solid var(--line);
            border-radius: 999px;
            font-size: 0.92rem; display: flex; justify-content: center; align-items: center; flex-wrap: wrap;
            gap: 0.5rem 2rem; pointer-events: none; letter-spacing: 0.16rem;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255,255,255,0.02);
            backdrop-filter: blur(18px);
            box-sizing: border-box;
            z-index: 20;
        }
        .guide-box span { white-space: nowrap; min-width: 0; }

        #modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 7, 14, 0.92); display: none; justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(40px);
            cursor: pointer;
        }

        .modal-content {
            background: linear-gradient(180deg, rgba(5, 21, 31, 0.98), rgba(2, 10, 17, 0.98)); width: 92%; max-width: 1020px; border: 1px solid rgba(120, 243, 255, 0.18);
            border-radius: 28px;
            padding: 3.5rem; position: relative;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.65), 0 0 160px rgba(10, 184, 216, 0.08);
            animation: terminalIn 0.5s ease-out;
            cursor: default;
        }

        @keyframes terminalIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }

        .close-btn {
            position: absolute; top: 1rem; right: 1.6rem; font-size: 4rem; cursor: pointer;
            color: #2a5761; transition: 0.3s; z-index: 130; line-height: 1; border: none; background: none;
        }
        .close-btn:hover { color: var(--accent); transform: rotate(90deg); }

        .modal-media {
            width: 100%; aspect-ratio: 21/9; background: #000;
            margin-bottom: 2.5rem; overflow: hidden; border: 1px solid rgba(120, 243, 255, 0.16);
            border-radius: 18px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
        }
        .modal-media iframe, .modal-media img { width: 100%; height: 100%; border: none; display: block; object-fit: cover; }

        .modal-title { font-size: clamp(2.4rem, 5vw, 4rem); margin-bottom: 1rem; color: #d2fbff; font-weight: 900; letter-spacing: -2px; }
        .modal-desc { color: #82aebb; line-height: 1.9; margin-bottom: 2.2rem; font-size: 1.1rem; max-width: 760px; }
        .modal-link {
            display: inline-block; background: linear-gradient(135deg, #78f3ff, #12b9db); color: #031016;
            padding: 1.2rem 2.4rem; text-decoration: none; font-weight: 900;
            transition: 0.4s; font-size: 1rem; letter-spacing: 0.22rem; border-radius: 999px;
        }
        .modal-link:hover { transform: translateY(-2px); filter: brightness(1.08); }

        #loading {
            position: fixed; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(14, 57, 74, 0.3), rgba(1, 6, 10, 1)); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
            opacity: 1; transition: opacity 0.6s ease;
        }
        #loading.fade-out { opacity: 0; }
        .loading-text { margin-top: 2rem; letter-spacing: 0.5rem; font-size: 1rem; color: var(--accent); font-weight: 900; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* First-reveal fade-up for the HUD/guide box (city pattern). guide-box centers via
           left:50% + translateX(-50%); every transform state below MUST keep translateX(-50%)
           bundled in the same transform value, or the pill silently shifts off-center (a real
           bug city hit — see city/README.md). */
        #hud {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .guide-box {
            opacity: 0;
            transform: translateX(-50%) translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #hud.revealed { opacity: 1; transform: translateY(0); }
        .guide-box.revealed { opacity: 1; transform: translateX(-50%) translateY(0); transition-delay: 0.12s; }
        .guide-box.hidden-by-timer { opacity: 0; transform: translateX(-50%) translateY(8px); pointer-events: none; }

        /* Node tracker: vertical stack of dots on the right edge. */
        #node-tracker {
            position: fixed;
            right: max(0.9rem, env(safe-area-inset-right));
            top: 50%;
            transform: translateY(-50%);
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.85rem;
            pointer-events: auto;
        }
        .node-dot-row { display: flex; align-items: center; gap: 0.6rem; }
        .node-dot-label {
            background: var(--panel);
            border: 1px solid rgba(120, 243, 255, 0.3);
            backdrop-filter: blur(20px);
            color: #ddd;
            font-size: 0.68rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            padding: 0.32rem 0.7rem;
            border-radius: 20px;
            opacity: 0;
            transform: translateX(6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }
        .node-dot-row:hover .node-dot-label { opacity: 1; transform: translateX(0); }
        .node-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #355;
            border: 1px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: 0.25s;
            flex-shrink: 0;
        }
        .node-dot:hover { background: #6ab; }
        .node-dot.active {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 12px 2px rgba(120, 243, 255, 0.8);
        }

        /* On-screen zoom buttons (touch discoverability). */
        #zoom-controls {
            position: fixed;
            right: max(0.9rem, env(safe-area-inset-right));
            bottom: 5.5rem;
            z-index: 25;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }
        body.coarse-pointer #zoom-controls { display: flex; }
        .zoom-btn {
            pointer-events: auto;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--panel);
            border: 1px solid rgba(120, 243, 255, 0.3);
            backdrop-filter: blur(20px);
            color: #ddd;
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: 0.25s;
        }
        .zoom-btn:hover, .zoom-btn:active {
            border-color: rgba(120, 243, 255, 0.6);
            color: #fff;
            box-shadow: 0 0 18px rgba(120, 243, 255, 0.25);
        }

        /* 3D hover tooltip: follows the cursor near a hovered fortress billboard. */
        #hover-tip {
            position: fixed;
            z-index: 30;
            pointer-events: none;
            background: var(--panel);
            border: 1px solid rgba(120, 243, 255, 0.4);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 0.55rem 0.9rem;
            font-size: 0.78rem;
            line-height: 1.4;
            display: none;
            max-width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        #hover-tip .tip-title { color: var(--accent); font-weight: 800; letter-spacing: 0.3px; display: block; }
        #hover-tip .tip-hint { color: #82aebb; font-size: 0.7rem; display: block; margin-top: 0.15rem; }

        @media (max-width: 860px) {
            #hud { padding: max(1rem, env(safe-area-inset-top)) 1.2rem 0; }
            .modal-content { padding: 2rem; }
        }

        @media (max-width: 520px) and (orientation: portrait) {
            #hud {
                grid-template-areas:
                    "brand actions"
                    "location location";
            }
            .brand-name { font-size: clamp(1.5rem, 8vw, 2rem); letter-spacing: 0.18rem; }
            .location-info { font-size: 0.72rem; letter-spacing: 0.16rem; }
            .guide-box {
                width: min(calc(100vw - 1rem), 360px);
                padding: 0.65rem 0.95rem;
                border-radius: 18px;
                align-items: flex-start;
                gap: 0.28rem;
                flex-direction: column;
                letter-spacing: 0.6px;
                font-size: 0.76rem;
            }
            #zoom-controls { right: 0.55rem; bottom: 9.5rem; }
            #node-tracker { right: 0.55rem; gap: 0.65rem; }
            .node-dot-label { display: none; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div style="width: 120px; height: 120px; border: 2px solid var(--accent); animation: spin 4s linear infinite; border-style: dashed;"></div>
        <p class="loading-text">RECONSTRUCTING WORLD...</p>
    </div>

    <canvas id="main-canvas"></canvas>

    <div id="hud">
        <div class="brand-name">BUNT OCEAN</div>
        <div class="hud-actions">
            <button onclick="resetPosition()" class="hud-button" aria-label="시점 초기화" title="시점 초기화" data-tooltip="시점 초기화">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 12a9 9 0 1 0 3.2-6.9" />
                    <polyline points="3 3 3 7 7 7" />
                </svg>
            </button>
        </div>
        <div class="location-info">The Last Archive / <span id="current-node" style="color: #fff;">Sector 01</span></div>
    </div>

    <div class="guide-box" id="guide-box">
        <span id="guide-move">🚢 CLICK SEA TO SAIL</span>
        <span id="guide-watch">📽 DBL-CLICK SCREEN TO SCAN</span>
        <span id="guide-zoom">🎡 ZOOM WHEEL</span>
    </div>

    <div id="node-tracker"></div>

    <div id="zoom-controls">
        <button type="button" class="zoom-btn" id="zoom-in-btn" aria-label="확대">+</button>
        <button type="button" class="zoom-btn" id="zoom-out-btn" aria-label="축소">−</button>
    </div>

    <div id="hover-tip">
        <span class="tip-title" id="hover-tip-title"></span>
        <span class="tip-hint">더블클릭으로 보기</span>
    </div>

    <div id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-media" id="modal-media"></div>
            <h2 class="modal-title" id="modal-title">Project Title</h2>
            <p class="modal-desc" id="modal-desc">Description</p>
            <a href="#" target="_blank" class="modal-link" id="modal-link">ENTER MODULE</a>
        </div>
    </div>

    <script>
        /**
         * 1. 전역 데이터 및 상태
         */
        const WORLD_DATA = {
            nodes: [
                { id: "n0", pos: [8, 0, 40], label: "Outer Harbor" },
                { id: "n1", pos: [8, 0, 15], label: "Main Atoll" },
                { id: "n2", pos: [8, 0, -10], label: "Rust Strait" },
                { id: "n3", pos: [8, 0, -35], label: "Sunken Hub" },
                { id: "n4", pos: [8, 0, -60], label: "Deep Abyss" }
            ],
            // C2 (reverted): forts were briefly alternated x=-25/+25 to break up the "corridor" feel,
            // but the camera rig (CAM_OFFSET is always +x, looking toward -x) meant the +x-side forts
            // had their screens facing the lane (toward -x, i.e. away from the camera) — the camera
            // only ever saw the BACK of those screens, and PlaneGeometry+MeshBasicMaterial defaults to
            // FrontSide, so the raycaster could never hit them: two of four billboards were completely
            // unselectable. Reverted to all x=-25 (one-sided, screens face +x toward the camera/lane),
            // keeping the original z stagger. See "해상 마을" (C7) for the +x-side scenery that now
            // fills the other side instead.
            forts: [
                { id: "f1", pos: [-25, 0, 15], color: 0x00f2ff, content: { title: "Unity Mega Pack", desc: "해상 문명 재건을 위한 최상위 최적화 에셋 팩입니다. 25년 베테랑의 정수가 담긴 고성능 쉐이더와 시스템 아키텍처를 포함합니다.", media: "https://images.unsplash.com/photo-1519608487953-e999c86e7455?w=1200", youtubeId: "OgupBsqNHWw", link: "https://shop.buntgames.com/" } },
                { id: "f2", pos: [-25, 0, -10], color: 0xff4400, content: { title: "Dev Master Class", desc: "포스트 아포칼립스 같은 개발 현장에서 살아남는 법. 56만 유튜버 번트의 실전 코딩과 프로젝트 매니지먼트의 모든 것.", media: "https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=1200", youtubeId: "XkWdnyq87Ww", link: "https://www.youtube.com/@textcube" } },
                { id: "f3", pos: [-25, 0, -35], color: 0x44ff00, content: { title: "Action Framework v2", desc: "거친 파도 위에서도 흔들리지 않는 조작감. 2D/3D 액션 게임 제작을 위한 가장 견고한 프레임워크 베이스.", media: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=1200", link: "https://buntgames.itch.io/" } },
                { id: "f4", pos: [-25, 0, -60], color: 0xffaa00, content: { title: "Star Membership", desc: "번트 오션의 최정예 탐사대원을 위한 특별 보급망입니다. 매달 업데이트되는 상용 에셋과 독점 코칭 세션.", media: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200", link: "https://patreon.com/BuntGames" } }
            ]
        };

        let scene, camera, renderer, raycaster;
        let yachtGroup = new THREE.Group();
        let interactiveObjects = [];
        let currentNodeId = "n1";
        let isMoving = false, isInspecting = false;
        const animators = [];
        const mouse = new THREE.Vector2();
        // rot (Euler) is unused by the tweens now (kept only as a harmless snapshot) — quat is what
        // focusOnBillboard()/closeModal() actually tween back to. See the quaternion-slerp note near
        // focusOnBillboard() for why Euler component tweening was replaced.
        const originalCamState = { pos: new THREE.Vector3(), rot: new THREE.Euler(), quat: new THREE.Quaternion(), fov: 40 };

        const CAM_OFFSET = new THREE.Vector3(18, 12, 25);
        const YACHT_FLOAT_BASE = 2.6;
        let targetFOV = 40;
        const MIN_FOV = 15;
        const MAX_FOV = 100;

        // --- UI/UX state (guide auto-hide/idle, node tracker, hover tooltip, touch pinch) ---
        const GUIDE_HIDE_DELAY_MS = 9000;
        const GUIDE_IDLE_REVIVE_MS = 45000;
        let guideHideTimer = null;
        let guideIdleTimer = null;
        let guideHiddenByTimer = false;
        let hasOpenedModalOnce = false;
        let lastHoveredFort = null;
        let pinchLastDist = null;
        // On-screen zoom button step/repeat, declared here near MIN_FOV/MAX_FOV — water uses
        // window.onload=boot so TDZ risk is lower than city's top-level init() call, but keeping
        // constants near the top avoids the class of bug entirely (see city/README.md TDZ notes).
        const ZOOM_BUTTON_STEP = 8;
        const ZOOM_BUTTON_REPEAT_MS = 120;
        let zoomButtonInterval = null;
        let resizeTimer = null;

        // C4: background cargo ship traffic (city traffic pattern: spawn/despawn + dispose).
        const LIGHTHOUSE_POS = { x: -85, z: -90 };
        let activeShips = [];
        let nextShipSpawn = 6000;
        let lastShipFrameTime = 0;

        function getViewportSize() {
            const visualViewport = window.visualViewport;
            const width = Math.max(1, Math.round(
                (visualViewport && visualViewport.width) ||
                document.documentElement.clientWidth ||
                window.innerWidth
            ));
            const height = Math.max(1, Math.round(
                (visualViewport && visualViewport.height) ||
                document.documentElement.clientHeight ||
                window.innerHeight
            ));
            return { width, height };
        }

        function getResponsiveFOVBoost() {
            const { width, height } = getViewportSize();
            const aspect = width / Math.max(1, height);
            if (aspect >= 1) return 0;
            const portrait = Math.min(1, (1 - aspect) / 0.45);
            return 4 + portrait * 10;
        }

        function getEffectiveTargetFOV() {
            return Math.max(MIN_FOV, Math.min(MAX_FOV, targetFOV + getResponsiveFOVBoost()));
        }

        function getResponsiveCamOffset() {
            const { width, height } = getViewportSize();
            const aspect = width / Math.max(1, height);
            if (aspect >= 1) return CAM_OFFSET;
            const portrait = Math.min(1, (1 - aspect) / 0.45);
            return CAM_OFFSET.clone().add(new THREE.Vector3(
                portrait * 2.4,
                portrait * 1.2,
                portrait * 8.0
            ));
        }

        /**
         * 2. 엔진 초기화
         */
        function boot() {
            const canvas = document.getElementById('main-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Cap at 1.5 instead of 2 (city pattern): halves fragment count on hi-DPI screens with
            // little visible quality loss — this scene is fragment-shader bound.
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
            renderer.outputEncoding = THREE.sRGBEncoding;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05111c);
            scene.fog = new THREE.Fog(0x0a2130, 120, 4200);

            camera = new THREE.PerspectiveCamera(getEffectiveTargetFOV(), window.innerWidth / window.innerHeight, 0.1, 50000);
            raycaster = new THREE.Raycaster();

            // Lighting: 시네마틱 밤바다
            const moon = new THREE.DirectionalLight(0xbdefff, 1.65);
            moon.position.set(-120, 220, -60);
            scene.add(moon);

            // C1: dropped from 1.15 -> 0.62 — at 1.15 the AmbientLight washed the dark sea color
            // out to a flat bright teal (MeshStandardMaterial adds ambient per-fragment regardless
            // of depth/fog), so the scene never actually read as "night ocean". 0.62 keeps enough
            // fill to see the yacht/billboards without flattening the water.
            const fill = new THREE.AmbientLight(0x163142, 0.62);
            scene.add(fill);

            // Only one dynamic PointLight remains in the whole scene (buoy lights were removed —
            // see createMarkerBuoys(); MeshStandardMaterial evaluates every light per-fragment, so
            // fewer lights over the huge ocean/sky planes is the single biggest perf lever here).
            const horizonGlow = new THREE.PointLight(0x34c8ff, 1.8, 1200);
            horizonGlow.position.set(-120, 80, 180);
            scene.add(horizonGlow);

            // 월드 생성
            createOcean();
            createGlitterPath();
            createSpaceStars();
            createScrapAtolls();
            createDetailedYacht();
            createFortressBillboards();
            createMarkerBuoys();
            createLighthouse();
            createIsletsAndWreck();
            createBackgroundLife();
            createVillage();

            const start = WORLD_DATA.nodes.find(n => n.id === currentNodeId);
            yachtGroup.position.set(0, YACHT_FLOAT_BASE, start.pos[2]);
            camera.position.copy(yachtGroup.position).add(getResponsiveCamOffset());
            camera.lookAt(yachtGroup.position.clone().add(new THREE.Vector3(-12, 0, -20)));

            window.addEventListener('resize', onResize);
            window.addEventListener('orientationchange', scheduleResize);
            window.addEventListener('pageshow', scheduleResize);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', scheduleResize);
                window.visualViewport.addEventListener('scroll', scheduleResize);
            }
            document.addEventListener('visibilitychange', () => { if (!document.hidden) scheduleResize(); });

            window.addEventListener('wheel', onWheel, { passive: false });
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('dblclick', onDoubleClick);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('keydown', onKey);
            document.getElementById('modal').addEventListener('click', onModalBackdropClick);

            renderer.domElement.addEventListener('touchstart', onTouchStartPinch, { passive: true });
            renderer.domElement.addEventListener('touchmove', onTouchMovePinch, { passive: false });
            renderer.domElement.addEventListener('touchend', onTouchEndPinch, { passive: true });

            // Idle detection for the guide-box revive.
            window.addEventListener('pointerdown', onUserActivity);
            window.addEventListener('keydown', onUserActivity);
            window.addEventListener('wheel', onUserActivity, { passive: true });

            buildNodeTracker();
            applyTouchAwareGuideText();
            initZoomButtons();

            // Delay so the opacity transition is actually visible (previously hid #loading
            // synchronously, which meant the fade-out CSS never had a chance to play).
            setTimeout(() => {
                const loading = document.getElementById('loading');
                loading.classList.add('fade-out');
                const onFadeDone = () => { loading.style.display = 'none'; };
                loading.addEventListener('transitionend', onFadeDone, { once: true });
                setTimeout(onFadeDone, 700);

                document.getElementById('hud').classList.add('revealed');
                document.getElementById('guide-box').classList.add('revealed');
                scheduleGuideHide();
                resetGuideIdleTimer();
            }, 800);

            animate(0);
        }

        /**
         * 3. 오브젝트 생성 함수
         */

        // Ocean vertex deformation used to run on a single 20000x20000 / 128x128 plane (~16.6k
        // vertices, CPU-deformed every frame) — the single most expensive per-frame cost on this
        // page. Split into a small detail plane that follows the yacht (gets the wave deformation)
        // and a huge static outer plane (no per-vertex work, just the horizon color). The outer
        // plane carries the sea raycast (flat, y=0, fine for click-to-sail); the detail plane is
        // NOT in interactiveObjects.
        const DETAIL_PLANE_SIZE = 600;
        const DETAIL_PLANE_SEGMENTS = 64;

        function createOcean() {
            // C1: darkened slightly (0x08314a -> 0x051f30) to match the lower ambient — with fill
            // at 0.62 the old color still read a bit too bright/teal at the horizon.
            const seaColorMat = () => new THREE.MeshStandardMaterial({
                color: 0x051f30,
                roughness: 0.18,
                metalness: 0.42,
                transparent: true,
                opacity: 0.96
            });

            // (a) Small detailed plane, follows the yacht, gets per-frame CPU wave deformation.
            const detailGeo = new THREE.PlaneGeometry(DETAIL_PLANE_SIZE, DETAIL_PLANE_SIZE, DETAIL_PLANE_SEGMENTS, DETAIL_PLANE_SEGMENTS);
            const detailMat = seaColorMat();
            const detailSea = new THREE.Mesh(detailGeo, detailMat);
            detailSea.rotation.x = -Math.PI / 2;
            detailSea.renderOrder = 1;
            scene.add(detailSea);

            // (b) Huge static outer plane for the horizon — no per-vertex deformation, carries the
            // sea raycast (userData.isSea) since it's flat/y=0 and covers the full clickable area.
            const outerGeo = new THREE.PlaneGeometry(20000, 20000, 1, 1);
            const outerMat = seaColorMat();
            const outerSea = new THREE.Mesh(outerGeo, outerMat);
            outerSea.rotation.x = -Math.PI / 2;
            outerSea.userData = { isSea: true };
            scene.add(outerSea);
            interactiveObjects.push(outerSea);

            const sheen = new THREE.Mesh(
                new THREE.PlaneGeometry(20000, 20000, 1, 1),
                new THREE.MeshBasicMaterial({
                    color: 0x6ef2ff,
                    transparent: true,
                    opacity: 0.06
                })
            );
            sheen.rotation.x = -Math.PI / 2;
            sheen.position.y = 0.25;
            scene.add(sheen);

            const pos = detailGeo.attributes.position;
            animators.push((time) => {
                // Snap the detail plane's x/z under the yacht every frame so it always covers the
                // camera's near field. Feed WORLD-space x/z into the sine functions (localX/localY +
                // plane position) so the wave field is anchored to the world — otherwise the waves
                // would visibly "swim" relative to the world whenever the plane moves with the yacht.
                detailSea.position.x = yachtGroup.position.x;
                detailSea.position.z = yachtGroup.position.z;

                for (let i = 0; i < pos.count; i++) {
                    const worldX = pos.getX(i) + detailSea.position.x;
                    const worldY = pos.getY(i) + detailSea.position.z;
                    const z = Math.sin(worldX * 0.018 + time * 0.00055) * 1.9 +
                              Math.cos(worldY * 0.022 + time * 0.00042) * 1.1 +
                              Math.sin((worldX + worldY) * 0.008 + time * 0.00085) * 1.4;
                    pos.setZ(i, z);
                }
                pos.needsUpdate = true;
                sheen.material.opacity = 0.04 + Math.sin(time * 0.0006) * 0.015;
            });
        }

        // C1: moonlight glitter lane — the moon sits at (-900, 820, -2100); from the default camera
        // (on the +x side of the yacht looking toward -x/-z) that's roughly toward the far -x/-z
        // horizon. A long additive strip lying flat on the water along that azimuth, with a
        // shimmering CanvasTexture animated via UV offset + opacity flicker, reads as its reflection.
        // Banded-scroll rework (see README "구현 이력"): the old approach painted horizontal shimmer
        // bands into a CanvasTexture and scrolled its y-offset. Even slowed 10x this still read as a
        // regular, repeating stripe pattern (a "zebra-striped conveyor belt") and any offset animation
        // at all implied directional flow, which was the user's core complaint ("뭔가 흘러가는 느낌").
        // Replaced with two independent, non-scrolling pieces: (a) a single soft gradient texture with
        // NO internal banding — bright only near the centerline, feathered to fully transparent at the
        // long edges and the two ends, so it reads as a soft glow lane rather than a printed pattern;
        // and (b) a small twinkling Points field scattered inside the lane footprint. Neither piece ever
        // animates a texture offset or a position — only per-point/whole-lane opacity breathes.
        function createGlitterGradientTexture() {
            const w = 128, h = 512;
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, w, h);
            // Cross-lane falloff: bright centerline feathering to transparent at the long edges.
            const cross = ctx.createLinearGradient(0, 0, w, 0);
            cross.addColorStop(0, 'rgba(230,250,255,0)');
            cross.addColorStop(0.5, 'rgba(230,250,255,1)');
            cross.addColorStop(1, 'rgba(230,250,255,0)');
            ctx.fillStyle = cross;
            ctx.fillRect(0, 0, w, h);
            // Along-lane falloff: feather the two ends so the plane doesn't end in a hard edge.
            ctx.globalCompositeOperation = 'destination-in';
            const along = ctx.createLinearGradient(0, 0, 0, h);
            along.addColorStop(0, 'rgba(0,0,0,0)');
            along.addColorStop(0.12, 'rgba(0,0,0,1)');
            along.addColorStop(0.88, 'rgba(0,0,0,1)');
            along.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = along;
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.ClampToEdgeWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.encoding = THREE.sRGBEncoding;
            return tex;
        }

        function createGlitterPath() {
            const glitterTex = createGlitterGradientTexture();

            const geo = new THREE.PlaneGeometry(90, 2600, 1, 1);
            const mat = new THREE.MeshBasicMaterial({
                map: glitterTex,
                color: 0xe8fbff,
                transparent: true,
                opacity: 0.24,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                fog: false
            });
            const lane = new THREE.Mesh(geo, mat);
            lane.rotation.x = -Math.PI / 2;
            // renderOrder above the sea planes (both default to 0 except the detail plane at 1) —
            // without this the huge opaque outer sea plane depth-tested the additive lane away at
            // long distance even though the lane sits slightly above y=0 (confirmed via preview_eval:
            // hiding the sea plane made the lane fully visible; bumping renderOrder instead of hiding
            // fixed it while keeping the sea plane rendering normally).
            lane.renderOrder = 5;
            // Stretch the lane along local -z (before the pivot rotation below) out toward the
            // moon's azimuth in the XZ plane. For a Y-rotation by theta, local (0,0,-1) maps to
            // world (-sin(theta), 0, -cos(theta)); solving -sin(theta)=dx, -cos(theta)=dz for the
            // normalized direction toward the moon (dx,dz) gives theta = atan2(-dx, -dz).
            const moonDirX = -900, moonDirZ = -2100;
            const azimuth = Math.atan2(-moonDirX, -moonDirZ);
            const pivot = new THREE.Group();
            pivot.rotation.y = azimuth;
            lane.position.set(0, 0.3, -1300);
            pivot.add(lane);
            scene.add(pivot);

            animators.push((time) => {
                // Whole-lane opacity breathing only — no texture offset, no position change, so
                // nothing about the lane itself can read as "flowing."
                mat.opacity = 0.2 + Math.sin(time * 0.0009) * 0.06 + Math.sin(time * 0.0031) * 0.03;
            });

            createGlitterSparkles(pivot);
        }

        // Sparkle field: small additive Points scattered inside the lane footprint (inside the same
        // pivot/rotation group as the gradient plane, so they line up with it and share the lane's
        // moon-facing orientation) covering the stretch of sea near the visible route (roughly
        // z -80..50 in lane-local space before the pivot rotation). Positions are fixed at creation —
        // only each point's vertex-color brightness is rewritten per frame, on its own phase/speed, so
        // sparkles twinkle in place with no shared rhythm and no translation whatsoever.
        function createGlitterSparkles(pivot) {
            const count = 120;
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const phases = new Float32Array(count);
            const speeds = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                // Local space, pre-pivot-rotation: lane runs along -z, cross-lane spread narrower than
                // the full 90-unit plane width so sparkles cluster near the bright centerline.
                const lx = (Math.random() - 0.5) * 34;
                const lz = -80 + Math.random() * -1180; // matches the plane's forward-of-lane stretch
                positions[i * 3 + 0] = lx;
                positions[i * 3 + 1] = 0.35 + Math.random() * 0.15;
                positions[i * 3 + 2] = lz;

                colors[i * 3 + 0] = 0.85 + Math.random() * 0.15;
                colors[i * 3 + 1] = 0.94 + Math.random() * 0.06;
                colors[i * 3 + 2] = 1.0;

                phases[i] = Math.random() * Math.PI * 2;
                speeds[i] = 0.0012 + Math.random() * 0.0018;
            }

            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const colorAttr = new THREE.Float32BufferAttribute(colors, 3);
            colorAttr.setUsage(THREE.DynamicDrawUsage);
            geo.setAttribute('color', colorAttr);

            const mat = new THREE.PointsMaterial({
                size: 1.6,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true,
                fog: false
            });

            const points = new THREE.Points(geo, mat);
            points.renderOrder = 6;
            pivot.add(points);

            const baseR = new Float32Array(count), baseG = new Float32Array(count), baseB = new Float32Array(count);
            for (let i = 0; i < count; i++) {
                baseR[i] = colors[i * 3 + 0];
                baseG[i] = colors[i * 3 + 1];
                baseB[i] = colors[i * 3 + 2];
            }

            animators.push((time) => {
                // Per-point independent twinkle: each point's own phase/speed drives a brightness
                // multiplier on its (fixed) base color, written into the color attribute. Only 120
                // floats*3 touched per frame — cheap — and positions are never rewritten.
                const arr = colorAttr.array;
                for (let i = 0; i < count; i++) {
                    const b = 0.35 + Math.max(0, Math.sin(time * speeds[i] + phases[i])) * 0.85;
                    arr[i * 3 + 0] = baseR[i] * b;
                    arr[i * 3 + 1] = baseG[i] * b;
                    arr[i * 3 + 2] = baseB[i] * b;
                }
                colorAttr.needsUpdate = true;
            });
        }

        function createSpaceStars() {
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            const starColors = [];
            const starCount = 1600;
            for (let i = 0; i < starCount; i++) {
                const r = 10000 + Math.random() * 5000;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = Math.abs(r * Math.sin(phi) * Math.sin(theta));
                const z = r * Math.cos(phi);

                starPos.push(x, y, z);

                const c = 0.8 + Math.random() * 0.2;
                starColors.push(c, c, 1.0);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starGeo.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));

            const starMat = new THREE.PointsMaterial({
                size: 2.0,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                depthWrite: false,
                fog: false,
                sizeAttenuation: true
            });
            scene.add(new THREE.Points(starGeo, starMat));

            const moon = new THREE.Mesh(
                new THREE.CircleGeometry(120, 48),
                new THREE.MeshBasicMaterial({ color: 0xe3fbff, transparent: true, opacity: 0.9, fog: false })
            );
            moon.position.set(-900, 820, -2100);
            scene.add(moon);

            const moonHalo = new THREE.Mesh(
                new THREE.CircleGeometry(220, 48),
                new THREE.MeshBasicMaterial({ color: 0x63dfff, transparent: true, opacity: 0.08, fog: false })
            );
            moonHalo.position.set(-900, 820, -2110);
            scene.add(moonHalo);

            animators.push((time) => {
                starMat.opacity = 0.58 + Math.sin(time * 0.001) * 0.18;
            });
        }

        // C6: shared warning-light geometry/materials for atoll towers — cheap since towers are
        // 3000+ units out; a couple of small emissive dots per tower, some blinking on a square-wave.
        const atollWarnGeo = new THREE.SphereGeometry(1.2, 6, 6);
        const atollWarnMatWarm = new THREE.MeshBasicMaterial({ color: 0xffb347 });
        const atollWarnMatRed = new THREE.MeshBasicMaterial({ color: 0xff3b30, transparent: true });

        function createScrapAtolls() {
            const reefMat = new THREE.MeshStandardMaterial({ color: 0x20383f, roughness: 1, metalness: 0.08 });
            const lightMat = new THREE.MeshBasicMaterial({ color: 0x74eaff });

            for (let i = 0; i < 20; i++) {
                const dist = 3000 + Math.random() * 5000;
                const angle = Math.random() * Math.PI * 2;

                const group = new THREE.Group();
                group.position.set(Math.cos(angle) * dist, -14, Math.sin(angle) * dist);

                const blinkers = [];
                const towers = 1 + Math.floor(Math.random() * 3);
                for(let t=0; t<towers; t++) {
                    const h = 50 + Math.random() * 100;
                    const w = 20 + Math.random() * 40;
                    const tower = new THREE.Mesh(new THREE.CylinderGeometry(w * 0.35, w * 0.55, h, 6), reefMat);
                    tower.position.set((Math.random()-0.5)*50, h/2, (Math.random()-0.5)*50);
                    tower.rotation.y = Math.random() * Math.PI;
                    group.add(tower);

                    const l = new THREE.Mesh(new THREE.SphereGeometry(3), lightMat);
                    l.position.set(tower.position.x, h + 5, tower.position.z);
                    group.add(l);

                    // 1-2 tiny warning-light dots per tower; roughly half blink (red, square-wave
                    // opacity with a random phase), the rest stay steady warm.
                    const dotCount = 1 + Math.floor(Math.random() * 2);
                    for (let d = 0; d < dotCount; d++) {
                        const blinking = Math.random() < 0.5;
                        const dot = new THREE.Mesh(atollWarnGeo, blinking ? atollWarnMatRed.clone() : atollWarnMatWarm);
                        dot.position.set(
                            tower.position.x + (Math.random() - 0.5) * w * 0.4,
                            h * (0.4 + Math.random() * 0.5),
                            tower.position.z + (Math.random() - 0.5) * w * 0.4
                        );
                        group.add(dot);
                        if (blinking) blinkers.push({ dot, phase: Math.random() * Math.PI * 2 });
                    }
                }
                scene.add(group);
                animators.push((time) => {
                    group.position.y = -14 + Math.sin(time * 0.0003 + i) * 2.2;
                    blinkers.forEach(b => {
                        b.dot.material.opacity = Math.sin(time * 0.004 + b.phase) > 0 ? 1 : 0.08;
                    });
                });
            }
        }

        function createDetailedYacht() {
            const hullMat = new THREE.MeshStandardMaterial({ color: 0xf7fbff, metalness: 0.42, roughness: 0.2 });
            const lowerHullMat = new THREE.MeshStandardMaterial({ color: 0x163746, metalness: 0.35, roughness: 0.42 });
            // C1: emissiveIntensity nudged 0.45 -> 0.62 to compensate for the lower AmbientLight so
            // the trim still reads clearly against the darker water.
            const trimMat = new THREE.MeshStandardMaterial({ color: 0x5defff, emissive: 0x1fc9dd, emissiveIntensity: 0.62, metalness: 0.2, roughness: 0.22 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x94f8ff, transparent: true, opacity: 0.4, metalness: 0.08, roughness: 0.03 });
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x74f4ff });
            const shadowMat = new THREE.MeshBasicMaterial({ color: 0x03131f, transparent: true, opacity: 0.26 });

            const group = new THREE.Group();

            const shadow = new THREE.Mesh(new THREE.CircleGeometry(3.7, 48), shadowMat);
            shadow.rotation.x = -Math.PI / 2;
            shadow.position.y = -0.02;
            group.add(shadow);

            const centerHull = new THREE.Mesh(new THREE.BoxGeometry(2.9, 1.2, 8.8), hullMat);
            centerHull.position.y = 1.05;
            group.add(centerHull);

            const lowerHull = new THREE.Mesh(new THREE.BoxGeometry(2.55, 0.8, 8.4), lowerHullMat);
            lowerHull.position.y = 0.52;
            group.add(lowerHull);

            const sideHullLeft = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.72, 7.1), hullMat);
            sideHullLeft.position.set(-2.15, 0.68, 0.55);
            group.add(sideHullLeft);

            const sideHullRight = sideHullLeft.clone();
            sideHullRight.position.x = 2.15;
            group.add(sideHullRight);

            const bridgeBase = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.45, 3.6), lowerHullMat);
            bridgeBase.position.set(0, 1.95, -0.15);
            group.add(bridgeBase);

            const canopy = new THREE.Mesh(new THREE.BoxGeometry(1.95, 1.45, 2.7), glassMat);
            canopy.position.set(0, 2.28, -0.7);
            group.add(canopy);

            const roof = new THREE.Mesh(new THREE.BoxGeometry(2.35, 0.16, 3.15), hullMat);
            roof.position.set(0, 3.02, -0.2);
            group.add(roof);

            const deckLine = new THREE.Mesh(new THREE.BoxGeometry(2.78, 0.08, 7.8), trimMat);
            deckLine.position.set(0, 1.68, 0.18);
            group.add(deckLine);

            const sideTrimLeft = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.14, 8.2), trimMat);
            sideTrimLeft.position.set(-1.48, 1.12, 0.08);
            group.add(sideTrimLeft);

            const sideTrimRight = sideTrimLeft.clone();
            sideTrimRight.position.x = 1.48;
            group.add(sideTrimRight);

            const radar = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.35, 0.1), lowerHullMat);
            radar.position.set(0, 3.55, -0.25);
            group.add(radar);

            const radarWing = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.08, 0.12), lowerHullMat);
            radarWing.position.set(0, 4.12, -0.25);
            group.add(radarWing);

            const sternArchLeft = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.1, 0.12), lowerHullMat);
            sternArchLeft.position.set(-1.0, 2.1, 3.0);
            group.add(sternArchLeft);

            const sternArchRight = sternArchLeft.clone();
            sternArchRight.position.x = 1.0;
            group.add(sternArchRight);

            const sternBeam = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.12, 0.12), lowerHullMat);
            sternBeam.position.set(0, 2.58, 3.0);
            group.add(sternBeam);

            const bowLightLeft = new THREE.Mesh(new THREE.SphereGeometry(0.2, 10, 10), glowMat);
            bowLightLeft.position.set(-0.65, 1.25, -4.6);
            group.add(bowLightLeft);

            const bowLightRight = bowLightLeft.clone();
            bowLightRight.position.x = 0.65;
            group.add(bowLightRight);

            const sideMarker = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.18, 0.55), trimMat);
            sideMarker.position.set(1.54, 1.15, -2.2);
            group.add(sideMarker);

            const sternGlow = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.12, 0.18), trimMat);
            sternGlow.position.set(0, 1.05, 4.24);
            group.add(sternGlow);

            const wakeRing = new THREE.Mesh(
                new THREE.TorusGeometry(3.75, 0.14, 16, 72),
                new THREE.MeshBasicMaterial({ color: 0x61f1ff, transparent: true, opacity: 0.42 })
            );
            wakeRing.rotation.x = Math.PI / 2;
            wakeRing.position.y = 0.08;
            group.add(wakeRing);

            // C5: V-wake — two elongated additive strips trailing behind the yacht (stern is +z
            // locally), anchored to yachtGroup so they always trail correctly regardless of heading.
            // Opacity lerps in/out reading isMoving so the wake fades in on navigateTo() and fades
            // back out at rest instead of popping.
            const wakeStripMat = new THREE.MeshBasicMaterial({
                color: 0x8ff5ff,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                fog: false
            });
            const wakeStripGeo = new THREE.PlaneGeometry(1.1, 14, 1, 6);
            // Taper the strip toward the far end by pulling the outer-edge vertices inward, so it
            // reads as a V-wake fanning out from the stern rather than a uniform rectangle.
            (function taperWakeStrip(geo) {
                const p = geo.attributes.position;
                for (let i = 0; i < p.count; i++) {
                    const y = p.getY(i); // -7..7 along length before offset below
                    const t = (y + 7) / 14; // 0 at bow-side end, 1 at stern end
                    const x = p.getX(i);
                    p.setX(i, x * (0.15 + t * 0.85));
                }
                p.needsUpdate = true;
            })(wakeStripGeo);

            const wakeStripLeft = new THREE.Mesh(wakeStripGeo, wakeStripMat);
            wakeStripLeft.rotation.x = -Math.PI / 2;
            wakeStripLeft.position.set(-1.4, 0.06, 7 + 4.4 + 3);
            wakeStripLeft.rotation.z = 0.12;
            group.add(wakeStripLeft);

            const wakeStripRight = new THREE.Mesh(wakeStripGeo, wakeStripMat.clone());
            wakeStripRight.rotation.x = -Math.PI / 2;
            wakeStripRight.position.set(1.4, 0.06, 7 + 4.4 + 3);
            wakeStripRight.rotation.z = -0.12;
            group.add(wakeStripRight);

            // C5: foam speckles — a small Points system near the yacht, repositioned with the
            // detail plane each frame so it stays close as the yacht sails. Very low opacity, subtle
            // drift/twinkle via size/opacity modulation.
            const foamCount = 200;
            const foamPositions = new Float32Array(foamCount * 3);
            for (let i = 0; i < foamCount; i++) {
                foamPositions[i * 3] = (Math.random() - 0.5) * DETAIL_PLANE_SIZE;
                foamPositions[i * 3 + 1] = 0.12 + Math.random() * 0.15;
                foamPositions[i * 3 + 2] = (Math.random() - 0.5) * DETAIL_PLANE_SIZE;
            }
            const foamGeo = new THREE.BufferGeometry();
            foamGeo.setAttribute('position', new THREE.Float32BufferAttribute(foamPositions, 3));
            const foamMat = new THREE.PointsMaterial({
                color: 0xdfffff,
                size: 0.6,
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                fog: false,
                sizeAttenuation: true
            });
            const foamPoints = new THREE.Points(foamGeo, foamMat);
            scene.add(foamPoints);

            yachtGroup.add(group);
            scene.add(yachtGroup);

            animators.push((time) => {
                if (!isMoving) {
                    yachtGroup.rotation.x = Math.sin(time * 0.0007) * 0.05;
                    yachtGroup.rotation.z = Math.cos(time * 0.0009) * 0.06;
                    yachtGroup.position.y = YACHT_FLOAT_BASE + Math.sin(time * 0.0012) * 0.35;
                    wakeRing.scale.x = 1 + Math.sin(time * 0.0015) * 0.04;
                    wakeRing.scale.z = 1 + Math.cos(time * 0.0015) * 0.05;
                    shadow.scale.x = 1 + Math.sin(time * 0.0012) * 0.03;
                    shadow.scale.y = 1 + Math.cos(time * 0.0012) * 0.03;
                }

                const targetWakeOpacity = isMoving ? 0.4 : 0;
                wakeStripMat.opacity += (targetWakeOpacity - wakeStripMat.opacity) * 0.06;
                wakeStripRight.material.opacity += (targetWakeOpacity - wakeStripRight.material.opacity) * 0.06;

                // Keep foam near the yacht (same follow trick as the detail plane) and give it a
                // gentle drift/twinkle.
                foamPoints.position.x = yachtGroup.position.x;
                foamPoints.position.z = yachtGroup.position.z;
                // Calming pass: halved the twinkle rate (0.0017 -> 0.0008) so the speckles don't read
                // as fast drift/shimmer next to the yacht.
                foamMat.opacity = 0.12 + Math.sin(time * 0.0008) * 0.06;
            });
        }

        function createFortressBillboards() {

                // (normal-based, not hardcoded to one side) since that logic is strictly better and

        // C5: shared radial-gradient CanvasTexture for buoy bloom sprites (city's streetlight-halo
        // pattern) — one texture, one additive SpriteMaterial base, reused across all 5 buoys.
        function createBuoyHaloTexture() {
            const size = 128;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            grad.addColorStop(0, 'rgba(200,250,255,0.9)');
            grad.addColorStop(0.4, 'rgba(120,243,255,0.4)');
            grad.addColorStop(1, 'rgba(120,243,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            const texture = new THREE.CanvasTexture(canvas);
            texture.encoding = THREE.sRGBEncoding;
            return texture;
        }

        function createMarkerBuoys() {
            const haloTex = createBuoyHaloTexture();

            WORLD_DATA.nodes.forEach(n => {
                const group = new THREE.Group();
                group.position.set(n.pos[0], 0, n.pos[2]);

                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.6, 4.2, 8), new THREE.MeshStandardMaterial({ color: 0x204d60, metalness: 0.3, roughness: 0.4 }));
                body.position.y = 2.1;
                group.add(body);

                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.55, 10, 10), new THREE.MeshBasicMaterial({ color: 0x78f3ff, transparent: true, opacity: 0.95 }));
                bulb.position.y = 5.2;
                group.add(bulb);

                const halo = new THREE.Mesh(new THREE.SphereGeometry(1.1, 12, 12), new THREE.MeshBasicMaterial({ color: 0x78f3ff, transparent: true, opacity: 0.08 }));
                halo.position.y = 5.2;
                group.add(halo);

                // PointLight removed here (5 buoys -> 5 fewer dynamic lights): the bulb (MeshBasic)
                // + halo already carry the glow via opacity pulse; only the shared horizonGlow
                // PointLight remains in the whole scene.

                // C5: bloom sprite at bulb height, additive, shared texture across all buoys.
                const haloSprite = new THREE.Sprite(new THREE.SpriteMaterial({

                    color: 0x9df6ff,
                    transparent: true,
                    opacity: 0.6,

                }));

                hitbox.userData = { isNode: true, id: n.id, label: n.label };

                scene.add(group);
                animators.push((time) => {
                    group.position.y = Math.sin(time * 0.001 + n.pos[2]) * 0.65;
                    group.rotation.z = Math.cos(time * 0.0007) * 0.08;
                    // Calming pass: this was the single biggest offender — time*0.01 is a ~1.6Hz
                    // strobe at 60fps (a full opacity swing roughly every 0.6s), and the huge 0.3-1.0
                    // range made it read as a fast flashing light rather than a slow buoy pulse.
                    // Slowed ~3x (0.01 -> 0.003) and narrowed the range to 0.55 +/- 0.35.
                    bulb.material.opacity = 0.55 + Math.sin(time * 0.003) * 0.35;

        // C3: lighthouse — tapered tower w/ color bands + rotating additive beam (no real light).
        // Relocated from (45, -22) to the far-left background: at +x it sat on the same side of the
        // lane the camera's view cone never covers (CAM_OFFSET is +x/+z, lookAt biased toward -x/-z —
        // see the CAM_OFFSET note above WORLD_DATA), so the rotating beam was effectively never seen.
        // (-85, -90) sits behind/beyond the village clusters on -x, still swinging its beam across a
        // stretch of sea that's actually in frame.
        // Village scale-up pass: grown 1.5x to anchor the skyline now that the village clusters in
        // front of it read much larger (VILLAGE_CLUSTER_SCALE) — at the old size the lighthouse would
        // have looked undersized relative to its own foreground village.
        const LIGHTHOUSE_SCALE = 1.5;

        function createLighthouse() {
            const group = new THREE.Group();
            group.position.set(LIGHTHOUSE_POS.x, 0, LIGHTHOUSE_POS.z);
            group.scale.setScalar(LIGHTHOUSE_SCALE);

            const bandMatA = new THREE.MeshStandardMaterial({ color: 0xe6e9e6, roughness: 0.7, metalness: 0.05 });
            const bandMatB = new THREE.MeshStandardMaterial({ color: 0xb3222c, roughness: 0.7, metalness: 0.05 });

            const bandHeights = [7, 7, 6];
            let y = 0;
            bandHeights.forEach((h, i) => {
                const rBottom = 3.2 - i * 0.55;
                const rTop = 3.2 - (i + 1) * 0.55;
                const band = new THREE.Mesh(new THREE.CylinderGeometry(rTop, rBottom, h, 14), i % 2 === 0 ? bandMatA : bandMatB);
                band.position.y = y + h / 2;
                group.add(band);
                y += h;
            });

            const housing = new THREE.Mesh(new THREE.CylinderGeometry(1.7, 1.9, 2.4, 12), new THREE.MeshStandardMaterial({ color: 0x1c2630, roughness: 0.5, metalness: 0.3 }));
            housing.position.y = y + 1.2;
            group.add(housing);

            const roof = new THREE.Mesh(new THREE.ConeGeometry(2.1, 1.8, 12), new THREE.MeshStandardMaterial({ color: 0x1c2630, roughness: 0.6 }));
            roof.position.y = y + 2.4 + 0.9;
            group.add(roof);

            // Rotating beam pivot: two additive cones pointing opposite directions, plus a small
            // emissive bulb sphere at the housing center. No THREE.Light involved.
            const beamPivot = new THREE.Group();
            beamPivot.position.y = y + 1.2;
            group.add(beamPivot);

            // Sized relative to the yacht (~9 units long) and the lighthouse's own ~20-unit tower
            // height, not to the km-scale backdrop — a 90-unit beam dwarfed the whole near scene
            // when first tried (visibly filled most of the sky from typical camera distance).
            const beamFadeCanvas = document.createElement('canvas');
            beamFadeCanvas.width = 512;
            beamFadeCanvas.height = 160;
            const beamFadeCtx = beamFadeCanvas.getContext('2d');
            beamFadeCtx.clearRect(0, 0, beamFadeCanvas.width, beamFadeCanvas.height);
            for (let x = 0; x < beamFadeCanvas.width; x++) {
                const t = x / (beamFadeCanvas.width - 1);
                const halfHeight = 6 + t * 66;
                const alpha = Math.pow(1 - t, 1.7) * 0.62;
                const y0 = beamFadeCanvas.height / 2 - halfHeight;
                const y1 = beamFadeCanvas.height / 2 + halfHeight;
                const grad = beamFadeCtx.createLinearGradient(0, y0, 0, y1);
                grad.addColorStop(0, 'rgba(255,255,255,0)');
                grad.addColorStop(0.5, `rgba(255,255,255,${alpha})`);
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                beamFadeCtx.fillStyle = grad;
                beamFadeCtx.fillRect(x, y0, 1, y1 - y0);
            }
            const beamFadeTex = new THREE.CanvasTexture(beamFadeCanvas);
            beamFadeTex.encoding = THREE.sRGBEncoding;

            const beamMat = new THREE.MeshBasicMaterial({
                color: 0xfff3c2,
                map: beamFadeTex,
                transparent: true,
                opacity: 0.42,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                fog: false,
                side: THREE.DoubleSide
            });
            const beamGeo = new THREE.PlaneGeometry(36, 12);
            const beamA = new THREE.Mesh(beamGeo, beamMat);
            beamA.rotation.y = -Math.PI / 2;
            beamA.position.z = 18;
            beamPivot.add(beamA);
            const beamB = new THREE.Mesh(beamGeo, beamMat.clone());
            beamB.material.map = beamFadeTex;
            beamB.rotation.y = Math.PI / 2;
            beamB.position.z = -18;
            beamPivot.add(beamB);

            const bulb = new THREE.Mesh(new THREE.SphereGeometry(1.1, 10, 10), new THREE.MeshBasicMaterial({ color: 0xfff8dc }));
            beamPivot.add(bulb);

            scene.add(group);
            // animators[] only receives `time` (ms) here, not dt, so derive an absolute angle from
            // time directly rather than accumulating a per-frame delta (keeps it framerate-independent).
            animators.push((time) => {
                beamPivot.rotation.y = time * 0.0006;
            });
        }

        // C3: rocky islets + a half-sunken shipwreck, all static, none in interactiveObjects.

        function createIsletsAndWreck() {

            // Half-sunken shipwreck near the first islet: listing hull (rolled boxes, partly below
