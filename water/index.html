        // C7: 해상 마을 (marine village) — moved to the -x background behind/around the billboard
        // forts (still all at x=-25, unmoved — see WORLD_DATA.forts). Stilt-hut clusters + connecting
        // piers + moored boats + a lantern "village center" fill it out so the sail route reads as
        // passing a floating settlement. Everything here is static/non-interactive (not pushed into
        // interactiveObjects) and uses shared geometries/materials across huts — no new PointLights,
        // only emissive meshes + additive sprites (reusing createBuoyHaloTexture's halo texture for
        // the lantern cluster).
        // Relocation history: the first version placed clusters at x=16-22 (near/beyond the +x-side
        // forts before those were reverted to all-x=-25) reasoning that camera distance would carry
        // them into frame once "far enough ahead." In practice they read at best as a speck at the far
        // right screen edge, because CAM_OFFSET(18,12,25) sits the camera at +x/+z relative to the
        // yacht and lookAt aims toward yacht+(-12,1.5,-18) — i.e. the view cone points toward -x/-z,
        // and *any* +x-side scenery is on the same side as the camera itself, so it can only ever
        // appear at the extreme edge of frame or behind the camera, never as a readable background
        // presence (verified via preview_eval angle-from-lookAt checks in the earlier pass).
        // The -x background (x=-45..-70), by contrast, sits deep inside the lookAt cone at every node
        // (the -25 forts prove this — they read as dead-ahead) and is never occluded by the lane or
        // the buoy hitboxes (both near x=0..8).
        // z placement was verified numerically, not eyeballed: for each node z in WORLD_DATA.nodes
        // (40, 15, -10, -35, -60), computed camera.position/lookAt exactly as animate() does, then
        // projected candidate cluster positions through camera.project() to read off NDC x (in-frame
        // iff roughly within [-1, 1]). That surfaced the same rule the original comment guessed at —
        // a cluster only lands on-screen once it's meaningfully AHEAD of the yacht (more negative z)
        // — and gave concrete numbers instead of "35+ units": at x~=-50..-65, an offset of about
        // 40-90 units ahead of the yacht's current z keeps a cluster's NDC x inside roughly
        // [-1.0, 0.4]. z = -8, -35, -65, -100 with this x range gives every one of the 5 nodes at
        // least two clusters comfortably on-screen (confirmed per-node NDC x below); n4 (z=-60, the
        // tightest case) was the reason the last cluster sits as far as z=-100 rather than -70 as
        // first tried — at -70 it projected to NDC x=-1.5..-1.7 (off the left edge) from n4.
        //   n0(z=40):  clusters@-8,-35,-65,-100 -> ndcX -0.37,-0.17,0.37,0.48
        //   n1(z=15):  ndcX -0.95,-0.56,0.13,0.30
        //   n2(z=-10): ndcX -1.92,-1.12,-0.21,0.07
        //   n3(z=-35): ndcX -3.91,-2.02,-0.72,-0.24
        //   n4(z=-60): ndcX -10.25,-3.70,-1.55,-0.69
        // "Barely visible" fix: instead of only bumping individual hut/boat/pier scales, apply one
        // shared scale multiplier to the whole clusterGroup (huts + piers + boats all grow together,
        // proportionally, with zero extra per-mesh code). 1.4x (combined with the hut-local range
        // bump below) turns the previous "specks" into clearly-readable buildings from every node
        // without needing to move the clusters any closer to the lane (which risked opening up
        // billboard-occlusion angles — see the occlusion check in the 구현 이력 below). A first attempt
        // at 2.0x was tried and reverted — screenshots showed huts looming far larger than the
        // billboards themselves, reading as foreground clutter rather than background village
        // presence, even though they never actually occluded a billboard raycast. Waterline math in
        // createStiltHut() is unaffected by this multiplier: waterlineY there is defined relative to
        // the hut's OWN local origin (pre-scale), and clusterGroup.scale scales that whole local frame
        // uniformly including y=0 at the cluster's position.y=0 — so the stilt legs still terminate at
        // the (scaled) waterline plane, which is still the real sea level, just as before.
        const VILLAGE_CLUSTER_SCALE = 1.4;
        const VILLAGE_CLUSTERS = [
            { x: -50, z: -8, count: 4 },
            { x: -62, z: -35, count: 4 },
            { x: -48, z: -65, count: 3 },
            { x: -58, z: -100, count: 4 }
        ];

        const hutBodyGeo = new THREE.BoxGeometry(4.2, 2.6, 4.2);
        const hutRoofGeo = new THREE.ConeGeometry(3.4, 2.2, 4);
        const hutLegGeo = new THREE.CylinderGeometry(0.18, 0.22, 6, 6);
        const hutBodyMat = new THREE.MeshStandardMaterial({ color: 0x5a4634, roughness: 0.85, metalness: 0.05 });
        const hutRoofMat = new THREE.MeshStandardMaterial({ color: 0x3a2c1f, roughness: 0.9, metalness: 0.05 });
        const hutLegMat = new THREE.MeshStandardMaterial({ color: 0x2c2117, roughness: 0.9, metalness: 0.1 });
        // DoubleSide: huts get a random Y rotation, so a single-sided window would be invisible
        // whenever the hut happens to rotate its window wall away from the camera.
        // Brightened 0xffcf8a -> 0xffe0a0 (warmer/lighter) so the windows read clearly against the
        // night fog at village-scenery viewing distance.
        const hutWindowMat = new THREE.MeshBasicMaterial({ color: 0xffe0a0, side: THREE.DoubleSide });
        const pierDeckGeo = new THREE.BoxGeometry(2.2, 0.35, 6);
        const pierPostGeo = new THREE.CylinderGeometry(0.15, 0.18, 5.6, 6);
        const boatHullGeo = new THREE.BoxGeometry(1.3, 0.8, 4.2);
        const boatMat = new THREE.MeshStandardMaterial({ color: 0x6b4a34, roughness: 0.8, metalness: 0.05 });
        const lanternGeo = new THREE.SphereGeometry(0.35, 8, 8);
        const lanternMat = new THREE.MeshBasicMaterial({ color: 0xffcf8a });

        function createStiltHut(scale, rotY, waterlineY) {
            const group = new THREE.Group();

            const legOffsets = [[-1.5, -1.5], [1.5, -1.5], [-1.5, 1.5], [1.5, 1.5]];
            legOffsets.forEach(([lx, lz]) => {
                const leg = new THREE.Mesh(hutLegGeo, hutLegMat);
                leg.position.set(lx, waterlineY - 2.4, lz);
                group.add(leg);
            });

            const body = new THREE.Mesh(hutBodyGeo, hutBodyMat);
            body.position.y = waterlineY + 1.3;
            group.add(body);

            const roof = new THREE.Mesh(hutRoofGeo, hutRoofMat);
            roof.position.y = waterlineY + 2.6 + 1.1;
            roof.rotation.y = Math.PI / 4;
            group.add(roof);

            // Windows sit on the +x face so they face the camera/lane side. The village now sits in
            // the -x background (x=-45..-75) while the camera follows from the yacht's +x/+z side, so
            // the camera is still on the hut's +x side — the same face placement carries over
            // unchanged. (The first version put them at x=-2.11 with a +x normal — i.e. on the far
            // wall facing INTO the hut — so the warm lights were never visible and the village
            // read as unlit at night.)
            const windowCount = 1 + Math.floor(Math.random() * 2);
            for (let w = 0; w < windowCount; w++) {
                // Enlarged 0.6 -> 1.0 (was reading as a barely-visible dot once village scenery sits
                // 30-55 units out; this is local/pre-scale size, so VILLAGE_CLUSTER_SCALE multiplies
                // it again on top).
                const win = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 1.0), hutWindowMat);
                win.position.set(2.11, waterlineY + 1.3 + (w - 0.2) * 0.3, 1.4 - w * 1.4);
                win.rotation.y = Math.PI / 2;
                group.add(win);
            }

            group.scale.setScalar(scale);
            group.rotation.y = rotY;
            return group;
        }

        function createVillage() {
            const haloTex = createBuoyHaloTexture();

            VILLAGE_CLUSTERS.forEach((cluster) => {
                const clusterGroup = new THREE.Group();
                clusterGroup.position.set(cluster.x, 0, cluster.z);
                clusterGroup.scale.setScalar(VILLAGE_CLUSTER_SCALE);
                scene.add(clusterGroup);

                const huts = [];
                for (let i = 0; i < cluster.count; i++) {
                    // Half-circle spread biased AWAY from the lane. Cluster centers are now on -x, so
                    // "away from the lane" is the -x direction (angle centered on PI, not -PI/2 as when
                    // clusters lived on +x) — this keeps huts from drifting back toward x=0 and
                    // crowding the fort billboards at x=-25 or the buoy hitboxes near x=0..8.
                    const angle = Math.PI / 2 + (i / Math.max(1, cluster.count - 1)) * Math.PI + (Math.random() - 0.5) * 0.4;
                    const radius = 6 + Math.random() * 7;
                    // Village now sits ~30-55 units out from the lane as background scenery. This
                    // local per-hut scale (2.1-3.0) is multiplied again by VILLAGE_CLUSTER_SCALE (1.4)
                    // on the parent clusterGroup, giving an effective hut scale of ~3.0-4.2 — the huts
                    // that at the old 1.6-2.4 (no cluster multiplier) read as tiny specks now read as
                    // unmistakable buildings (roof + windows visible at a glance) without the huts
                    // swamping the whole frame (a first pass at cluster-scale 2.0 did exactly that —
                    // screenshots showed huts looming far larger than the billboards, reading as
                    // foreground rather than background scenery, even though they never actually
                    // occluded the billboard raycasts).
                    const scale = 2.1 + Math.random() * 0.9;
                    const waterlineY = 0.6 + Math.random() * 0.5;
                    const hut = createStiltHut(scale, Math.random() * Math.PI * 2, waterlineY);
                    hut.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                    clusterGroup.add(hut);
                    huts.push({ hut, phase: Math.random() * Math.PI * 2, baseY: 0 });
                }

                // Connecting piers/walkways between consecutive huts in the cluster.
                for (let i = 0; i < huts.length; i++) {
                    const a = huts[i].hut.position;
                    const b = huts[(i + 1) % huts.length].hut.position;
                    const mx = (a.x + b.x) / 2;
                    const mz = (a.z + b.z) / 2;
                    const dx = b.x - a.x;
                    const dz = b.z - a.z;
                    const len = Math.sqrt(dx * dx + dz * dz);
                    if (len < 4 || len > 26) continue; // skip degenerate/too-far pairs

                    const pierGroup = new THREE.Group();
                    pierGroup.position.set(mx, 0.55 + Math.random() * 0.3, mz);
                    pierGroup.rotation.y = Math.atan2(dx, dz) + Math.PI / 2;
                    // Reuse the shared deck geometry via per-instance scale instead of building a new
                    // BufferGeometry per pier.
                    const deck = new THREE.Mesh(pierDeckGeo, hutLegMat);
                    deck.scale.set(1, 1, len / 6);
                    pierGroup.add(deck);

                    const post1 = new THREE.Mesh(pierPostGeo, hutLegMat);
                    post1.position.set(0, -2.6, len / 2 - 1);
                    pierGroup.add(post1);
                    const post2 = new THREE.Mesh(pierPostGeo, hutLegMat);
                    post2.position.set(0, -2.6, -(len / 2 - 1));
                    pierGroup.add(post2);

                    clusterGroup.add(pierGroup);
                }

                // Moored small boats bobbing gently near a pier edge.
                const boatCount = 1 + Math.floor(Math.random() * 2);
                const boats = [];
                for (let b = 0; b < boatCount; b++) {
                    const boat = new THREE.Mesh(boatHullGeo, boatMat);
                    const ref = huts[Math.floor(Math.random() * huts.length)].hut.position;
                    boat.position.set(ref.x + 3 + Math.random() * 2, 0.35, ref.z + (Math.random() - 0.5) * 4);
                    boat.rotation.y = Math.random() * Math.PI * 2;
                    clusterGroup.add(boat);
                    boats.push({ boat, phase: Math.random() * Math.PI * 2, baseY: boat.position.y });
                }

                animators.push((time) => {
                    huts.forEach(({ hut, phase }) => {
                        hut.position.y = Math.sin(time * 0.0004 + phase) * 0.18;
                    });
                    boats.forEach(({ boat, phase, baseY }) => {
                        boat.position.y = baseY + Math.sin(time * 0.0006 + phase) * 0.1;
                        boat.rotation.z = Math.sin(time * 0.0005 + phase) * 0.04;
                    });
                });
            });

            // Village-center focal point(s): a taller platform + warm lantern cluster, with an
            // additive halo sprite (reusing the buoy halo texture/pattern). Factored into a helper so
            // two focal points can be placed — one near the z=-5 cluster, one near the z=-70 cluster —
            // giving the now-longer -x village two separate landmark glows along the route instead of
            // just one in the middle.
            function createLanternFocalPoint(x, z) {
                const centerGroup = new THREE.Group();
                centerGroup.position.set(x, 0, z);
                // Scaled up alongside the hut clusters (VILLAGE_CLUSTER_SCALE) so the lantern
                // landmarks stay proportionate to the now-larger huts around them.
                centerGroup.scale.setScalar(VILLAGE_CLUSTER_SCALE);
                scene.add(centerGroup);

                const platform = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 5, 1.2, 10), hutLegMat);
                platform.position.y = 1.6;
                centerGroup.add(platform);
                const platformLegs = [[-3, -3], [3, -3], [-3, 3], [3, 3]];
                platformLegs.forEach(([lx, lz]) => {
                    const leg = new THREE.Mesh(hutLegGeo, hutLegMat);
                    leg.scale.y = 1.4;
                    leg.position.set(lx, -3.4, lz);
                    centerGroup.add(leg);
                });

                const lanternPost = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 4, 6), hutLegMat);
                lanternPost.position.y = 4.2;
                centerGroup.add(lanternPost);

                const lanternCluster = [];
                for (let i = 0; i < 4; i++) {
                    const a = (i / 4) * Math.PI * 2;
                    const lantern = new THREE.Mesh(lanternGeo, lanternMat.clone());
                    lantern.position.set(Math.cos(a) * 1.2, 6.1, Math.sin(a) * 1.2);
                    centerGroup.add(lantern);
                    lanternCluster.push({ lantern, phase: Math.random() * Math.PI * 2 });
                }

                const lanternHalo = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: haloTex,
                    color: 0xffcf8a,
                    transparent: true,
                    opacity: 0.5,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                }));
                // Enlarged 9 -> 13 so the halo still reads as a clear landmark glow at the new
                // village scale/distance (it's inside centerGroup, so VILLAGE_CLUSTER_SCALE would
                // have grown it automatically too, but the base size was bumped as well since a
                // sprite's on-screen size is what actually needs to read at night, not just its
                // world-space radius).
                lanternHalo.scale.set(13, 13, 1);
                lanternHalo.position.y = 6.1;
                centerGroup.add(lanternHalo);

                animators.push((time) => {
                    lanternCluster.forEach(({ lantern, phase }) => {
                        // Same slow-breathe cadence as the calmed buoy pulse (0.003), not a fast strobe.
                        lantern.material.opacity = 0.7 + Math.sin(time * 0.003 + phase) * 0.25;
                    });
                    lanternHalo.material.opacity = 0.42 + Math.sin(time * 0.003) * 0.12;
                });
            }

            createLanternFocalPoint(-58, -35);
            createLanternFocalPoint(-62, -100);
        }

        // Ported from city's disposeObject3D — spawned ships build fresh geometries/materials every
        // time; without this, scene.remove() only detaches them from the graph and the GPU/JS memory
        // leaks a little more with every ship (city had a real leak from skipping this).
        function disposeObject3D(root) {
            root.traverse(obj => {
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
                    materials.forEach(mat => {
                        if (mat.map) mat.map.dispose();
                        if (mat.emissiveMap) mat.emissiveMap.dispose();
                        mat.dispose();
                    });
                }
            });
        }

        // C4: distant cargo ship silhouette — dark hull + bridge block + a few emissive window dots
        // + one masthead light dot. Moves parallel to the horizon (along x, at a fixed far z) so it
        // never nears the play area.
        function createCargoShip(direction, route) {
            const group = new THREE.Group();
            const hullMat = new THREE.MeshBasicMaterial({ color: 0x0a1218 });
            const windowMat = new THREE.MeshBasicMaterial({ color: 0xffdd88 });
            const mastLightMat = new THREE.MeshBasicMaterial({ color: 0xff3b30 });

            const hull = new THREE.Mesh(new THREE.BoxGeometry(20, 3.6, 5.2), hullMat);
            hull.position.y = 1.8;
            group.add(hull);

            const bridge = new THREE.Mesh(new THREE.BoxGeometry(4.2, 4.5, 3.8), hullMat);
            bridge.position.set(direction > 0 ? -6.5 : 6.5, 5.8, 0);
            group.add(bridge);

            const windowCount = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < windowCount; i++) {
                const w = new THREE.Mesh(new THREE.SphereGeometry(0.28, 6, 6), windowMat);
                w.position.set(bridge.position.x + (i - windowCount / 2) * 0.9, 6.5, 2.1);
                group.add(w);
            }

            const mastLight = new THREE.Mesh(new THREE.SphereGeometry(0.38, 6, 6), mastLightMat);
            mastLight.position.set(bridge.position.x, 8.7, 0);
            group.add(mastLight);

            group.position.set(route.startX, 0, route.z);
            group.userData.direction = direction;
            group.userData.speed = 2.4 + Math.random() * 1.6;
            group.userData.mastLight = mastLight;
            group.userData.endX = route.endX;
            return group;
        }

        function updateShipTraffic(time) {
            const dt = lastShipFrameTime ? (time - lastShipFrameTime) / 1000 : 0;
            lastShipFrameTime = time;

            if (time > nextShipSpawn) {
                const direction = Math.random() < 0.5 ? 1 : -1;
                const routeCenterX = LIGHTHOUSE_POS.x + 38;
                const span = 72 + Math.random() * 28;
                const route = {
                    startX: routeCenterX + (direction > 0 ? -span : span),
                    endX: routeCenterX + (direction > 0 ? span : -span),
                    z: LIGHTHOUSE_POS.z - 38 - Math.random() * 34
                };
                const ship = createCargoShip(direction, route);
                scene.add(ship);
                activeShips.push(ship);
                nextShipSpawn = time + 14000 + Math.random() * 16000;
            }

            activeShips = activeShips.filter(ship => {
                ship.position.x += ship.userData.direction * ship.userData.speed * dt;
                ship.userData.mastLight.material.opacity = 1;
                if ((ship.userData.direction > 0 && ship.position.x > ship.userData.endX) ||
                    (ship.userData.direction < 0 && ship.position.x < ship.userData.endX)) {
                    scene.remove(ship);
                    disposeObject3D(ship);
                    return false;
                }
                return true;
            });
        }

        // C4: seagulls — a handful of tiny 2-triangle "V" shapes circling near the lighthouse/islets,
        // with a slow flap wobble via scale. Kept as a small group (not worth an InstancedMesh at 5).
        function createSeagullGeometry() {
            const shape = new THREE.BufferGeometry();
            // A shallow "V" — two thin triangles meeting at the center, wingtip up.
            const verts = new Float32Array([
                -0.6, 0.15, 0, 0, 0, 0, 0, 0.15, -0.6,
                0, 0, 0, 0.6, 0.15, 0, 0, 0.15, -0.6
            ]);
            shape.setAttribute('position', new THREE.BufferAttribute(verts, 3));
            shape.computeVertexNormals();
            return shape;
        }

        function createBackgroundLife() {
            const gullGeo = createSeagullGeometry();
            const gullMat = new THREE.MeshBasicMaterial({ color: 0xc9d8dd, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });

            const CIRCLE_CENTER = { x: LIGHTHOUSE_POS.x + 14, z: LIGHTHOUSE_POS.z + 8 };
            const gullCount = 7;
            const gulls = [];
            for (let i = 0; i < gullCount; i++) {
                const gull = new THREE.Mesh(gullGeo, gullMat);
                gull.userData.angle = (i / gullCount) * Math.PI * 2;
                gull.userData.radius = 10 + Math.random() * 18;
                gull.userData.height = 28 + Math.random() * 12;
                // Calming pass: halved circling angular speed (was 0.00025-0.0004).
                gull.userData.speed = 0.000125 + Math.random() * 0.000075;
                scene.add(gull);
                gulls.push(gull);
            }

            animators.push((time) => {
                gulls.forEach((gull, i) => {
                    const a = gull.userData.angle + time * gull.userData.speed;
                    gull.position.set(
                        CIRCLE_CENTER.x + Math.cos(a) * gull.userData.radius,
                        gull.userData.height + Math.sin(time * 0.002 + i) * 1.2,
                        CIRCLE_CENTER.z + Math.sin(a) * gull.userData.radius
                    );
                    gull.rotation.y = -a + Math.PI / 2;
                    // Calming pass: halved flap wobble rate (was 0.012).
                    const flap = 0.7 + Math.abs(Math.sin(time * 0.006 + i * 1.7)) * 0.5;
                    gull.scale.set(1, 1, flap);
                });
            });

            animators.push(updateShipTraffic);
        }

        /**
         * 4. 항해 및 인터랙션 로직
         */

        async function navigateTo(targetId) {
            if (isMoving || isInspecting || currentNodeId === targetId) return;
            isMoving = true;

            const startIdx = WORLD_DATA.nodes.findIndex(n => n.id === currentNodeId);
            const endIdx = WORLD_DATA.nodes.findIndex(n => n.id === targetId);
            const dir = endIdx > startIdx ? 1 : -1;

            for (let i = startIdx + dir; dir > 0 ? i <= endIdx : i >= endIdx; i += dir) {
                const node = WORLD_DATA.nodes[i];
                const targetX = 0;
                const targetZ = node.pos[2];
                const angle = Math.atan2(yachtGroup.position.x - targetX, yachtGroup.position.z - targetZ);

                new TWEEN.Tween(yachtGroup.rotation).to({ y: angle }, 800).easing(TWEEN.Easing.Quadratic.Out).start();

                await new Promise(res => {
                    new TWEEN.Tween(yachtGroup.position)
                        .to({ x: targetX, y: YACHT_FLOAT_BASE, z: targetZ }, 2500)
                        .easing(TWEEN.Easing.Cubic.InOut)
                        .onUpdate(() => { yachtGroup.rotation.x = Math.sin(Date.now() * 0.015) * 0.1; })
                        .onComplete(res).start();
                });
                currentNodeId = node.id;
                document.getElementById('current-node').innerText = node.label;
                updateNodeTrackerActive();
            }
            isMoving = false;
        }

        // Split into pointerdown (single-click: node/sea actions) + a dedicated dblclick event
        // (billboard focus), replacing the old manual lastClickTime timing hack. dblclick fires
        // natively for double-taps on mobile Chrome/Safari, so touch double-tap keeps working.
        function onPointerDown(e) {
            if (isMoving || isInspecting) return;

            updatePointer(e);
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(interactiveObjects, true);
            if (hits.length === 0) return;

            const obj = hits[0].object;
            if (obj.userData.isNode) {
                navigateTo(obj.userData.id);
            } else if (obj.userData.isSea) {
                const pt = hits[0].point;
                const idx = WORLD_DATA.nodes.findIndex(n => n.id === currentNodeId);
                if (pt.z < yachtGroup.position.z - 8 && idx < WORLD_DATA.nodes.length - 1) navigateTo(WORLD_DATA.nodes[idx+1].id);
                else if (pt.z > yachtGroup.position.z + 8 && idx > 0) navigateTo(WORLD_DATA.nodes[idx-1].id);
            }
        }

        function onDoubleClick(e) {
            if (isMoving || isInspecting) return;

            updatePointer(e);
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(interactiveObjects, true);
            if (hits.length === 0) return;

            const obj = hits[0].object;
            if (obj.userData.isContent) {
                focusOnBillboard(obj);
            }
        }

        // C2: generalized from the old hardcoded worldPos.x+22 / rotation.y=PI/2 (which only worked
        // when every billboard sat on the -x side facing +x). Now derives the camera focus position
        // from the screen's actual world position + world-space normal (via getWorldDirection, since
        // the PlaneGeometry's local +z is the screen's forward/normal axis), so it works for a
        // billboard facing either direction. Camera rotation target is computed the same "temp
        // object lookAt -> read quaternion" way the rest of the file already used for Euler tweens —
        // but the tween itself now slerps the quaternion instead of lerping Euler components.
        //
        // Euler component-tween bug (found via user report — camera visibly spun the "long way"
        // before settling): TWEEN.Tween(camera.rotation).to({x,y,z}, ...) lerps each of x/y/z
        // independently and in isolation, which breaks for two separate reasons:
        //  (a) +/-2*PI wrap — e.g. current y=-3.0 rad, target y=+1.6 rad lerps straight from -3.0 to
        //      +1.6 (a 4.6 rad sweep) instead of recognizing that -3.0 and +1.6 are ~1.68 rad apart
        //      the OTHER way around the circle. Euler numbers alone don't know they're angles on a
        //      circle, so the component lerp always takes whichever raw-number path is longer half
        //      the time.
        //  (b) gimbal-equivalent representations — lookAt() can return an Euler like (x~=PI, y',
        //      z~=PI) that represents the EXACT SAME orientation as some other (x~=0, y'', z~=0).
        //      Component-tweening between two Eulers that both describe similar orientations but via
        //      wildly different x/y/z numbers swings the camera through orientations neither the
        //      start nor the end actually had.
        // Quaternions don't have either failure mode: a quaternion slerp always interpolates along
        // the shortest arc on the rotation manifold, regardless of how the start/end Eulers happened
        // to be numbered.
        // Current focus behavior mirrors city: move to the +x side and face straight back toward the content.
        function focusOnBillboard(obj) {
            isInspecting = true;
            originalCamState.pos.copy(camera.position);
            originalCamState.rot.copy(camera.rotation);
            originalCamState.quat.copy(camera.quaternion);
            originalCamState.fov = camera.fov;

            const data = obj.userData.data;
            primeModalMedia(data);

            const worldPos = new THREE.Vector3();
            obj.getWorldPosition(worldPos);

            const camTarget = { x: worldPos.x + 22, y: worldPos.y, z: worldPos.z };

            // Match city: use a fixed +x inspection angle instead of deriving a per-object rotation.
            // planned camera position back at the screen and read its quaternion (not Euler — see
            // note above) as the slerp target.
            new TWEEN.Tween(camera.position).to(camTarget, 900).easing(TWEEN.Easing.Cubic.Out).start();
            new TWEEN.Tween(camera.rotation).to({ y: Math.PI / 2, x: 0, z: 0 }, 900).easing(TWEEN.Easing.Cubic.Out)
                .onComplete(() => {
                    document.getElementById('modal').style.display = 'flex';
                    onFirstModalOpen();
                }).start();
        }

        function primeModalMedia(data) {
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-desc').innerText = data.desc;
            document.getElementById('modal-link').href = data.link;

            const mediaBox = document.getElementById('modal-media');
            if (data.youtubeId) {
                mediaBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.youtubeId}?autoplay=1&playsinline=1&rel=0&modestbranding=1&enablejsapi=1" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                mediaBox.innerHTML = `<img src="${data.media}">`;
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('modal-media').innerHTML = "";
            const startQuat = camera.quaternion.clone();
            const endQuat = originalCamState.quat.clone();
            new TWEEN.Tween(camera.position).to({ x: originalCamState.pos.x, y: originalCamState.pos.y, z: originalCamState.pos.z }, 1200).easing(TWEEN.Easing.Cubic.InOut).start();
            new TWEEN.Tween({ t: 0 }).to({ t: 1 }, 1200).easing(TWEEN.Easing.Cubic.InOut)
                .onUpdate((o) => { camera.quaternion.slerpQuaternions(startQuat, endQuat, o.t); })
                .onComplete(() => {
                    camera.quaternion.copy(endQuat);
                    isInspecting = false;
                }).start();
        }

        function updatePointer(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function onMouseMove(e) {
            updatePointer(e);
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(interactiveObjects, true);
            document.body.style.cursor = (hits.length > 0) ? 'pointer' : 'default';

            // Billboard hover feedback: boost neon ring + show tooltip. Skipped on coarse pointers
            // (no true hover on touch).
            if (isCoarsePointer()) return;
            const hit = hits.find(h => h.object.userData && h.object.userData.isContent);
            if (hit) {
                setHoveredFort(hit.object.userData.neonRef || null);
                showHoverTip(e.clientX, e.clientY, hit.object.userData.tooltipTitle || '');
            } else {
                setHoveredFort(null);
                hideHoverTip();
            }
        }

        function onResize() { scheduleResize(); }

        function resizeRendererToViewport() {
            if (!camera || !renderer) return;
            const { width, height } = getViewportSize();
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
            renderer.setSize(width, height, false);
            renderer.domElement.style.width = `${width}px`;
            renderer.domElement.style.height = `${height}px`;
        }

        function scheduleResize() {
            resizeRendererToViewport();
            if (resizeTimer) clearTimeout(resizeTimer);
            requestAnimationFrame(resizeRendererToViewport);
            resizeTimer = setTimeout(resizeRendererToViewport, 120);
            setTimeout(resizeRendererToViewport, 350);
            setTimeout(resizeRendererToViewport, 700);
        }

        function onWheel(e) { if (e.cancelable) e.preventDefault(); targetFOV = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFOV + e.deltaY * 0.08)); }

        // Escape must close the modal even though modal-open state IS isInspecting — handled
        // BEFORE the isMoving||isInspecting early-return that every other key uses.
        function onKey(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('modal');
                if (modal.style.display === 'flex') closeModal();
                return;
            }
            if (isMoving || isInspecting) return;
            const idx = WORLD_DATA.nodes.findIndex(n => n.id === currentNodeId);
            if ((e.key === 'w' || e.key === 'ArrowUp') && idx < WORLD_DATA.nodes.length - 1) navigateTo(WORLD_DATA.nodes[idx+1].id);
            if ((e.key === 's' || e.key === 'ArrowDown') && idx > 0) navigateTo(WORLD_DATA.nodes[idx-1].id);
        }

        // Backdrop click closes the modal — e.target === e.currentTarget means the click landed on
        // the dark #modal backdrop itself, not inside .modal-content.
        function onModalBackdropClick(e) {
            if (e.target === e.currentTarget) closeModal();
        }

        function resetPosition() { targetFOV = 40; navigateTo("n1"); }

        /**
         * 4b. UI/UX: node tracker, guide auto-hide/idle, hover tooltip, touch guide text, zoom buttons, pinch
         */
        function buildNodeTracker() {
            const container = document.getElementById('node-tracker');
            container.innerHTML = '';
            WORLD_DATA.nodes.forEach(n => {
                const row = document.createElement('div');
                row.className = 'node-dot-row';

                const label = document.createElement('span');
                label.className = 'node-dot-label';
                label.innerText = n.label;
                row.appendChild(label);

                const dot = document.createElement('span');
                dot.className = 'node-dot';
                dot.dataset.nodeId = n.id;
                dot.addEventListener('click', () => navigateTo(n.id));
                row.appendChild(dot);

                container.appendChild(row);
            });
            updateNodeTrackerActive();
        }

        function updateNodeTrackerActive() {
            const dots = document.querySelectorAll('#node-tracker .node-dot');
            dots.forEach(dot => {
                dot.classList.toggle('active', dot.dataset.nodeId === currentNodeId);
            });
        }

        // --- Guide box auto-hide + idle revive ---
        function hideGuideBox() {
            const guide = document.getElementById('guide-box');
            guide.classList.add('hidden-by-timer');
            guideHiddenByTimer = true;
        }

        function showGuideBox() {
            const guide = document.getElementById('guide-box');
            guide.classList.remove('hidden-by-timer');
            guideHiddenByTimer = false;
        }

        function scheduleGuideHide() {
            if (guideHideTimer) clearTimeout(guideHideTimer);
            guideHideTimer = setTimeout(hideGuideBox, GUIDE_HIDE_DELAY_MS);
        }

        function resetGuideIdleTimer() {
            if (guideIdleTimer) clearTimeout(guideIdleTimer);
            guideIdleTimer = setTimeout(() => {
                if (!isInspecting) {
                    showGuideBox();
                    scheduleGuideHide();
                }
            }, GUIDE_IDLE_REVIVE_MS);
        }

        function onFirstModalOpen() {
            if (hasOpenedModalOnce) return;
            hasOpenedModalOnce = true;
            if (guideHideTimer) clearTimeout(guideHideTimer);
            hideGuideBox();
        }

        function onUserActivity() {
            resetGuideIdleTimer();
        }

        // --- Hover tooltip + neon hover boost ---
        function showHoverTip(clientX, clientY, title) {
            const tip = document.getElementById('hover-tip');
            document.getElementById('hover-tip-title').innerText = title;
            tip.style.display = 'block';
            const offsetX = 18, offsetY = 18;
            let x = clientX + offsetX;
            let y = clientY + offsetY;
            const maxX = window.innerWidth - 280;
            const maxY = window.innerHeight - 80;
            if (x > maxX) x = clientX - offsetX - 240;
            if (y > maxY) y = clientY - offsetY - 60;
            tip.style.left = `${x}px`;
            tip.style.top = `${y}px`;
        }

        function hideHoverTip() {
            document.getElementById('hover-tip').style.display = 'none';
        }

        function setHoveredFort(neonRef) {
            if (lastHoveredFort === neonRef) return;
            if (lastHoveredFort) lastHoveredFort.hoverBoost = 1;
            lastHoveredFort = neonRef;
            if (lastHoveredFort) lastHoveredFort.hoverBoost = 1.6;
        }

        // --- Touch-aware guide text ---
        function isCoarsePointer() {
            return window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        }

        function applyTouchAwareGuideText() {
            document.body.classList.toggle('coarse-pointer', isCoarsePointer());
            if (!isCoarsePointer()) return;
            document.getElementById('guide-move').innerText = '🚢 탭해서 항해';
            document.getElementById('guide-watch').innerText = '📽 두 번 탭해서 보기';
            document.getElementById('guide-zoom').innerText = '🤏 핀치 줌';
        }

        // --- On-screen zoom buttons ---
        function stepTargetFOV(delta) {
            targetFOV = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFOV + delta));
        }

        function stopZoomButtonRepeat() {
            if (zoomButtonInterval !== null) {
                clearInterval(zoomButtonInterval);
                zoomButtonInterval = null;
            }
        }

        function startZoomButtonRepeat(delta) {
            stopZoomButtonRepeat();
            stepTargetFOV(delta);
            zoomButtonInterval = setInterval(() => stepTargetFOV(delta), ZOOM_BUTTON_REPEAT_MS);
        }

        function initZoomButtons() {
            const zoomInBtn = document.getElementById('zoom-in-btn');
            const zoomOutBtn = document.getElementById('zoom-out-btn');
            if (!zoomInBtn || !zoomOutBtn) return;

            const wire = (btn, delta) => {
                btn.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    startZoomButtonRepeat(delta);
                });
                btn.addEventListener('contextmenu', (e) => e.preventDefault());
            };
            wire(zoomInBtn, -ZOOM_BUTTON_STEP);
            wire(zoomOutBtn, ZOOM_BUTTON_STEP);

            ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
                zoomInBtn.addEventListener(evt, stopZoomButtonRepeat);
                zoomOutBtn.addEventListener(evt, stopZoomButtonRepeat);
            });
            window.addEventListener('blur', stopZoomButtonRepeat);
        }

        // --- Minimal two-finger pinch -> targetFOV ---
        function onTouchStartPinch(e) {
            if (e.touches.length === 2) {
                pinchLastDist = getTouchDistance(e.touches);
            }
        }

        function onTouchMovePinch(e) {
            if (e.touches.length !== 2) return;
            const dist = getTouchDistance(e.touches);
            if (pinchLastDist !== null) {
                const delta = pinchLastDist - dist;
                targetFOV = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFOV + delta * 0.15));
                if (e.cancelable) e.preventDefault();
            }
            pinchLastDist = dist;
        }

        function onTouchEndPinch(e) {
            if (e.touches.length < 2) pinchLastDist = null;
        }

        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            animators.forEach(fn => fn(time));

            if (!isInspecting && yachtGroup) {
                const desired = yachtGroup.position.clone().add(getResponsiveCamOffset());
                camera.position.lerp(desired, 0.07);
                camera.lookAt(yachtGroup.position.clone().add(new THREE.Vector3(-12, 1.5, -18)));
            }

            const effectiveTargetFOV = getEffectiveTargetFOV();
            if (Math.abs(camera.fov - effectiveTargetFOV) > 0.01) {
                camera.fov += (effectiveTargetFOV - camera.fov) * 0.1;
                camera.updateProjectionMatrix();
            }
            renderer.render(scene, camera);
        }

        window.onload = boot;
    </script>
</body>
</html>
