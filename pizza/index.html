function drawLoadingScreen(progress) {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = '#1a120b';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    ctx.fillStyle = '#ff9f43';
    ctx.textAlign = 'center';
    ctx.font = '900 36px Pretendard';
    ctx.fillText('LOADING ASSETS', WIDTH / 2, HEIGHT / 2 - 24);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px Pretendard';
    ctx.fillText(`${Math.round(progress)}%`, WIDTH / 2, HEIGHT / 2 + 24);
}

function loadImageWithFallback(assetDef) {
    const svgFallback = assetDef.webp ? assetDef.webp.replace(/\.webp$/, '.svg') : null;
    const candidates = [assetDef.webp, assetDef.png, svgFallback].filter(Boolean);
    return new Promise((resolve) => {
        const tryLoad = (idx) => {
            if (idx >= candidates.length) {
                resolve({ key: assetDef.logicalName, img: null });
                return;
            }
            const img = new Image();
            img.onload = () => resolve({ key: assetDef.logicalName, img });
            img.onerror = () => tryLoad(idx + 1);
            img.src = candidates[idx];
        };
        tryLoad(0);
    });
}

function getAssetList() {

async function loadAssets() {
    const assets = getAssetList();

    drawLoadingScreen(0);

    const tasks = assets.map(async (assetDef) => {
        const { key, img } = await loadImageWithFallback(assetDef);
        loadedImages[key] = img;
        loaded += 1;
        assetLoadingProgress = (loaded / total) * 100;
        drawLoadingScreen(assetLoadingProgress);
    });

    await Promise.all(tasks);

function initGeneratedSprites() {

function createZombieLayerSheets() {
    const layers = ['body', 'arm', 'head', 'eyes'];
    const out = {};
    layers.forEach(layer => {
        const sheet = document.createElement('canvas');
        sheet.width = ZOMBIE_CELL * ZOMBIE_FRAME_COUNT;
        sheet.height = ZOMBIE_CELL * ZOMBIE_STATES.length;
        const sctx = sheet.getContext('2d');
        ZOMBIE_STATES.forEach((state, row) => {
            for (let frame = 0; frame < ZOMBIE_FRAME_COUNT; frame++) {
                const x = frame * ZOMBIE_CELL;
                const y = row * ZOMBIE_CELL;
                drawZombieLayerFrame(sctx, layer, state, frame, x, y);
            }
        });
        out[layer] = sheet;
    });
    return out;
}

function drawZombieLayerFrame(sctx, layer, state, frame, x, y) {
    const centerX = x + ZOMBIE_CELL / 2;
    const centerY = y + ZOMBIE_CELL / 2;
    const sway = Math.sin((frame / ZOMBIE_FRAME_COUNT) * Math.PI * 2);
    const armWave = Math.sin((frame / ZOMBIE_FRAME_COUNT) * Math.PI * 2) * 10;

    if (layer === 'body') {
        sctx.fillStyle = state === 'angry' ? '#324422' : '#2e4025';
        sctx.beginPath();
        sctx.ellipse(centerX, centerY + 18 + sway * 1.5, 22, 30, 0, 0, Math.PI * 2);
        sctx.fill();
    }

    if (layer === 'arm') {
        sctx.fillStyle = '#3c522a';
        const waveX = state === 'happyLeaving' ? armWave : sway * 3;
        sctx.fillRect(centerX - 26 + waveX, centerY + 12, 18, 8);
        sctx.fillRect(centerX + 8, centerY + 14 + sway, 16, 8);
    }

    if (layer === 'head') {
        sctx.fillStyle = state === 'angry' ? '#628a45' : '#6ea355';
        sctx.beginPath();
        sctx.arc(centerX + sway * 1.5, centerY - 10, 20, 0, Math.PI * 2);
        sctx.fill();
    }

    if (layer === 'eyes') {
        const eyeGlow = state === 'angry' ? '#ff4d4d' : '#d9ff6a';
        sctx.shadowBlur = state === 'angry' ? 10 : 0;
        sctx.shadowColor = eyeGlow;
        sctx.fillStyle = eyeGlow;
        const wobble = state === 'angry' ? (frame % 2 === 0 ? -2 : 2) : 0;
        sctx.beginPath();
        sctx.arc(centerX - 8 + wobble, centerY - 13, 4, 0, Math.PI * 2);
        sctx.arc(centerX + 8 + wobble, centerY - 13, 4, 0, Math.PI * 2);
        sctx.fill();
        sctx.shadowBlur = 0;
    }
}

function createParticleSprites() {
    const make = (drawFn) => {
        const c = document.createElement('canvas');
        c.width = 36;
        c.height = 36;
        const cctx = c.getContext('2d');
        drawFn(cctx);
        return c;
    };
    return {
        cheese: make(cctx => {
            cctx.fillStyle = '#ffd447';
            cctx.beginPath(); cctx.moveTo(5, 30); cctx.lineTo(30, 20); cctx.lineTo(12, 6); cctx.closePath(); cctx.fill();
            cctx.fillStyle = '#f4b729';
            cctx.beginPath(); cctx.arc(17, 18, 3, 0, Math.PI * 2); cctx.arc(23, 14, 2, 0, Math.PI * 2); cctx.fill();

        flame: make(cctx => {
            cctx.fillStyle = '#ff6b35';

            cctx.arc(20, 16, 8, 0, Math.PI * 2);
            cctx.arc(26, 22, 6, 0, Math.PI * 2);
            cctx.fill();
        })
    };
}

function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

const sfx = {
    move: () => {
        if (!isSoundOn || !audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.setValueAtTime(150, audioCtx.currentTime);
        o.frequency.linearRampToValueAtTime(250, audioCtx.currentTime + 0.1);
        g.gain.setValueAtTime(0.02, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    },
    merge: () => {
        if (!isSoundOn || !audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(440, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
        g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.15);
    },
    success: () => {
        if (!isSoundOn || !audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'triangle';
        o.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        o.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
        o.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.4);
    }
};

document.getElementById('soundToggle').addEventListener('click', (e) => {

// --- Logic Classes ---

class Customer {
    constructor() {
        this.id = Date.now() + Math.random();
        this.x = WIDTH - 260;
        this.y = 120 + (this.getQueueCount() * 125);
        this.targetY = this.y;
        this.hunger = 0;
        this.active = true;
        this.isLeaving = false; // 퇴장 중인지 여부
        this.animState = 'idle';
        this.leaveMoodTimer = 0;
        this.nextCriticalFxAt = 0;
        this.undeadProfile = UNDEAD_ARCHETYPES[Math.floor(Math.random() * UNDEAD_ARCHETYPES.length)];
        this.requirements = [];
        const count = Math.random() < 0.6 ? 1 : 2;
        for (let i = 0; i < count; i++) {
            this.requirements.push(Math.floor(Math.random() * 5) + 1);
        }
        this.orderSeed = Math.random() * 1000;
    }

    getQueueCount() {
        return customers.filter(c => !c.isLeaving).length;
    }

    update(dt, timeMs) {
        if (this.isLeaving) {
            this.x += 300 * dt; // 오른쪽으로 퇴장
            this.leaveMoodTimer += dt;
            this.animState = 'happyLeaving';
            return;
        }

        // 대기열 위치 조정 (앞 사람이 나가면 앞으로 당김)
        const currentWaiters = customers.filter(c => !c.isLeaving);
        const myIndex = currentWaiters.indexOf(this);
        if (myIndex !== -1) {
            this.targetY = 120 + (myIndex * 125);
            this.y += (this.targetY - this.y) * 5 * dt;
        }

        this.hunger += (0.35 + (gameTime / 600)) * dt; 
        this.animState = this.hunger > 72 ? 'angry' : 'idle';
        if (this.hunger >= 100) {
            this.hunger = 100;
            currentState = GameState.OVER;
        }

        if (this.hunger > 88) {
            this.animState = 'angry';
        }
    }

    getFrameIndex(timeMs) {
        const speed = this.animState === 'happyLeaving' ? 10 : (this.animState === 'angry' ? 12 : 6);
        return Math.floor((timeMs / 1000) * speed) % ZOMBIE_FRAME_COUNT;
    }

    drawFallback() {
        const zX = this.x + 35;
        const zY = this.y + 45;
        const bobFreq = this.isLeaving ? 12 : 3;
        const bobAmp = this.isLeaving ? 8 : 3;
        const bob = Math.sin(gameTime * bobFreq + this.id) * bobAmp;
        const profile = this.undeadProfile;
        const isAggro = this.hunger > 72 && !this.isLeaving;
        const bodyW = profile.silhouette === 'lean' ? 22 : 28;
        const bodyH = profile.silhouette === 'hunched' ? 48 : 44;

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(zX, zY + 62, profile.silhouette === 'float' ? 16 : 22, profile.silhouette === 'float' ? 7 : 10, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = profile.apparel;
        const armX = this.isLeaving ? zX - 10 : zX - 30;
        ctx.beginPath();
        ctx.roundRect(armX, zY + 20 + bob, 40, 15, 6);
        ctx.fill();

        const clothGrad = ctx.createLinearGradient(zX - bodyW, zY - 8, zX + bodyW, zY + 46);
        clothGrad.addColorStop(0, profile.apparel);
        clothGrad.addColorStop(1, '#1f1a17');
        ctx.fillStyle = clothGrad;
        ctx.beginPath();
        if (profile.silhouette === 'float') {
            ctx.moveTo(zX - bodyW, zY + 12 + bob);
            ctx.quadraticCurveTo(zX - bodyW - 8, zY + 52 + bob, zX - bodyW + 6, zY + 68 + bob);
            ctx.quadraticCurveTo(zX, zY + 46 + bob, zX + bodyW - 6, zY + 68 + bob);
            ctx.quadraticCurveTo(zX + bodyW + 8, zY + 52 + bob, zX + bodyW, zY + 12 + bob);
            ctx.closePath();
        } else {
            ctx.ellipse(zX, zY + 35 + bob, bodyW, bodyH, 0, 0, Math.PI * 2);
        }
        ctx.fill();

        const skinGrad = ctx.createRadialGradient(zX - 6, zY - 18 + bob, 4, zX, zY + bob, 30);
        skinGrad.addColorStop(0, profile.skinBase);
        skinGrad.addColorStop(1, profile.skinShade);
        ctx.fillStyle = skinGrad;
        ctx.beginPath();
        ctx.arc(zX, zY + bob, 24, 0, Math.PI * 2);
        ctx.fill();

        const eyeColor = this.isLeaving ? '#ffffff' : (isAggro ? '#ff5353' : profile.eye);
        ctx.shadowBlur = (!this.isLeaving && isAggro) ? 15 : 6;
        ctx.shadowColor = eyeColor;
        ctx.fillStyle = eyeColor;
        ctx.beginPath();
        ctx.arc(zX - 10, zY - 5 + bob, 4.5, 0, Math.PI * 2);
        ctx.arc(zX + 10, zY - 5 + bob, 4.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.beginPath();
        ctx.arc(zX - 10, zY - 4 + bob, 2, 0, Math.PI * 2);
        ctx.arc(zX + 10, zY - 4 + bob, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        if (this.isLeaving) {
            ctx.arc(zX, zY + 10 + bob, 8, 0, Math.PI);
        } else {
            ctx.ellipse(zX, zY + 12 + bob, 10, 4 + (this.hunger/20), 0, 0, Math.PI * 2);
        }
        ctx.fill();

        ctx.fillStyle = '#1e1e1e';
        ctx.font = 'bold 10px Pretendard';
        ctx.textAlign = 'center';
        ctx.fillText(profile.type.toUpperCase(), zX, zY + 82 + bob);
        ctx.restore();
    }

    drawOrderSheet(sX, sY) {
        const orderImg = loadedImages.order;
        const parchmentImg = loadedImages.parchment;
        if (orderImg) {
            ctx.drawImage(orderImg, sX, sY, 160, 95);
        } else {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.beginPath();
            ctx.moveTo(sX, sY);
            ctx.lineTo(sX + 160, sY);
            ctx.lineTo(sX + 160, sY + 95);
            for (let i = 160; i >= 0; i -= 10) {
                ctx.lineTo(sX + i, sY + 95 + (i % 20 === 0 ? 5 : -5));
            }
            ctx.closePath();
            ctx.clip();

            if (parchmentImg) {
                ctx.drawImage(parchmentImg, sX, sY, 160, 100);
            } else {
                const paperGrad = ctx.createLinearGradient(sX, sY, sX + 150, sY + 90);
                paperGrad.addColorStop(0, '#f8efba');
                paperGrad.addColorStop(1, '#e1d49a');
                ctx.fillStyle = paperGrad;
                ctx.fillRect(sX, sY, 160, 100);
            }
            ctx.restore();

            ctx.strokeStyle = "rgba(93, 64, 55, 0.12)";
            ctx.lineWidth = 1;
            for (let i = sY + 35; i < sY + 80; i += 12) {
                ctx.beginPath();
                ctx.moveTo(sX + 15, i);
                ctx.lineTo(sX + 145, i);
                ctx.stroke();
            }
        }

        ctx.fillStyle = "rgba(0,0,0,0.14)";
        ctx.fillRect(sX + 15, sY + 80, 130, 6);
        const barColor = this.hunger > 85 ? '#eb4d4b' : (this.hunger > 60 ? '#f0932b' : '#6ab04c');
        ctx.fillStyle = barColor;
        ctx.fillRect(sX + 15, sY + 80, 130 * (this.hunger / 100), 6);

        ctx.fillStyle = "#5d4037";
        ctx.font = "bold 11px Pretendard";
        ctx.fillText(`ORDER #${Math.floor(this.orderSeed)}`, sX + 15, sY + 22);

        this.requirements.forEach((level, idx) => {
            const offsetX = idx * 55;
            drawItem(level, sX + 35 + offsetX, sY + 35, 0.48);
        });

        return getCustomerStatusIcon(this);
    }

    draw() {
        const state = this.animState;
        const customerAssetByState = {
            idle: 'customer-waiting',
            angry: 'customer-angry',
            happyLeaving: 'customer-leaving'
        };
        const customerImg = loadedImages[customerAssetByState[state]];
        const bobFreq = this.isLeaving ? 12 : 3;
        const bobAmp = this.isLeaving ? 8 : 3;
        const bob = Math.sin(gameTime * bobFreq + this.id) * bobAmp;
        const drawX = this.x - 10;
        const drawY = this.y + 15 + bob;
        const frame = this.getFrameIndex(rafClock);
        const stateRow = ZOMBIE_STATES.indexOf(state);

        if (stateRow >= 0 && generatedSprites.zombieLayers.body) {
            const sx = frame * ZOMBIE_CELL;
            const sy = stateRow * ZOMBIE_CELL;
            const jitter = (this.animState === 'angry' && this.hunger > 88) ? (frame % 2 === 0 ? -2 : 2) : 0;
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath(); ctx.ellipse(this.x + 35, this.y + 105, 28, 12, 0, 0, Math.PI * 2); ctx.fill();

            ['body', 'arm', 'head', 'eyes'].forEach(layer => {
                const sheet = generatedSprites.zombieLayers[layer];
                if (!sheet) return;
                ctx.drawImage(sheet, sx, sy, ZOMBIE_CELL, ZOMBIE_CELL, drawX + jitter, drawY, 96, 96);
            });
        } else if (customerImg) {
            ctx.drawImage(customerImg, this.x - 45, this.y - 20 + bob, 160, 160);
        } else {
            this.drawFallback();
        }

        if (!this.isLeaving) {
            const sX = this.x + 75;
            const sY = this.y + 15;
            ctx.save();
            const statusIcon = this.drawOrderSheet(sX, sY);
            if (statusIcon) drawStatusIcon(statusIcon, sX - 30, sY + 6);
            ctx.restore();
        }
    }
}

class TileItem {
    constructor(level, index) {
        this.level = level;
        this.index = index;
        this.isAnimating = false;
        this.scale = 1.0;
    }
    getPos() {
        const col = this.index % GRID_SIZE;
        const row = Math.floor(this.index / GRID_SIZE);
        return {
            x: GRID_START_X + col * (TILE_SIZE + SPACING),
            y: GRID_START_Y + row * (TILE_SIZE + SPACING)
        };
    }
}

// --- Systems ---

function resetGame() {
    grid = Array(GRID_SIZE * GRID_SIZE).fill(null);
    for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
        grid[i] = new TileItem(1, i);
    }
    customers = [];
    animations = [];
    effectParticles = [];
    gold = 0;
    gameTime = 0;
    turnTimer = 0;
    spawnTimer = 0;
    restartCountdown = 7;
    currentState = GameState.PLAYING;
}

function processTurn() {
    if (animations.length > 0) return;
    let sorted = grid.map((_, i) => i).filter(i => grid[i] && !grid[i].isAnimating);
    sorted.sort((a, b) => grid[b].level - grid[a].level);

    for (let i of sorted) {
        const itemA = grid[i];
        let sameLevel = [];
        grid.forEach((itemB, idx) => {
            if (itemB && itemB !== itemA && !itemB.isAnimating && itemB.level === itemA.level) {
                sameLevel.push(idx);
            }
        });
        if (sameLevel.length === 0) continue;
        let closestIdx = -1;
        let minDist = Infinity;
        const ax = i % GRID_SIZE, ay = Math.floor(i / GRID_SIZE);
        sameLevel.forEach(idxB => {
            const bx = idxB % GRID_SIZE, by = Math.floor(idxB / GRID_SIZE);
            const d = Math.abs(ax - bx) + Math.abs(ay - by);
            if (d < minDist) { minDist = d; closestIdx = idxB; }
        });
        if (closestIdx === -1) continue;
        const itemB = grid[closestIdx];
        const bx = closestIdx % GRID_SIZE, by = Math.floor(closestIdx / GRID_SIZE);

        if (minDist === 1) {
            itemB.isAnimating = true;
            animations.push({
                type: 'merge', from: closestIdx, to: i, level: itemB.level,
                progress: 0, startPos: itemB.getPos(), endPos: itemA.getPos()
            });
            sfx.merge();
            return;
        } else {
            const dx = ax > bx ? 1 : (ax < bx ? -1 : 0);
            const dy = ay > by ? 1 : (ay < by ? -1 : 0);
            let targets = (Math.abs(ax - bx) >= Math.abs(ay - by)) 
                ? [{ x: bx + dx, y: by }, { x: bx, y: by + dy }]
                : [{ x: bx, y: by + dy }, { x: bx + dx, y: by }];
            for (let t of targets) {
                const nIdx = t.y * GRID_SIZE + t.x;
                if (t.x >= 0 && t.x < GRID_SIZE && t.y >= 0 && t.y < GRID_SIZE && !grid[nIdx]) {
                    itemB.isAnimating = true;
                    animations.push({
                        type: 'move', from: closestIdx, to: nIdx, level: itemB.level,
                        progress: 0, startPos: itemB.getPos(), endPos: {
                            x: GRID_START_X + t.x * (TILE_SIZE + SPACING),
                            y: GRID_START_Y + t.y * (TILE_SIZE + SPACING)
                        }
                    });
                    sfx.move();
                    return;
                }
            }
        }
    }
}

function spawnIngredient() {
    let empties = [];
    grid.forEach((item, idx) => { if (!item) empties.push(idx); });
    if (empties.length > 0) {
        const idx = empties[Math.floor(Math.random() * empties.length)];
        grid[idx] = new TileItem(1, idx);
    }
}

function spawnParticles(x, y, color, kind = 'cheese') {
    const particleKind = kind || 'cheese';
    for (let i = 0; i < 15; i++) {
        effectParticles.push({
            x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
            life: 1.0, color, size: Math.random() * 5 + 2, kind: particleKind
        });
    }
}

function update(time) {
    rafClock = time;
    const dt = Math.min((time - lastTime) / 1000, 0.1);
    lastTime = time;
    if (currentState === GameState.OVER) {
        restartCountdown -= dt;
        if (restartCountdown <= 0) resetGame();
        return;
    }
    gameTime += dt;
    spawnTimer += dt;
    turnTimer += dt;

    if (turnTimer >= 2.0) { processTurn(); turnTimer = 0; }
    if (spawnTimer >= 4.0) { spawnIngredient(); spawnTimer = 0; }

    for (let i = animations.length - 1; i >= 0; i--) {
        const a = animations[i];
        a.progress += dt * 5;
        if (a.progress >= 1) {
            if (a.type === 'merge') {
                if (grid[a.to]) {
                    grid[a.to].level++;
                    grid[a.to].scale = 1.4;
                    spawnParticles(a.endPos.x + TILE_SIZE/2, a.endPos.y + TILE_SIZE/2, PIZZA_DATA[grid[a.to].level-1].color, 'flame');
                }
                grid[a.from] = null;
            } else {
                const mItem = grid[a.from];
                if (mItem) {
                    mItem.index = a.to; mItem.isAnimating = false;
                    grid[a.to] = mItem; grid[a.from] = null;
                }
            }
            animations.splice(i, 1);
        }
    }

    grid.forEach(item => {
        if (item && item.scale > 1.0) item.scale -= dt * 3;
        if (item && item.scale < 1.0) item.scale = 1.0;
    });

    // 대기 중인 손님 수만 체크하여 스폰
    const waitingCount = customers.filter(c => !c.isLeaving).length;
    if (waitingCount < 4 && Math.random() < 0.007) {
        customers.push(new Customer());
    }

    customers.forEach(c => c.update(dt, time));

    // 주문 수령 및 퇴장 처리
    customers.forEach(cust => {
        if (!cust.active || cust.isLeaving) return;
        for (let rIdx = 0; rIdx < cust.requirements.length; rIdx++) {
            const levelNeeded = cust.requirements[rIdx];
            const gIdx = grid.findIndex(it => it && !it.isAnimating && it.level === levelNeeded);
            if (gIdx !== -1) {
                const p = grid[gIdx].getPos();
                spawnParticles(p.x + TILE_SIZE/2, p.y + TILE_SIZE/2, PIZZA_DATA[levelNeeded-1].color, 'cheese');
                grid[gIdx] = null;
                cust.requirements.splice(rIdx, 1);
                gold += levelNeeded * 400;
                sfx.success();
                break; 
            }
        }
        // 모든 주문 완료 시 퇴장 모드로 전환
        if (cust.requirements.length === 0) {
            cust.animState = 'happyLeaving';
            cust.isLeaving = true;
        } else if (cust.hunger > 88 && rafClock > cust.nextCriticalFxAt) {
            spawnParticles(cust.x + 35, cust.y + 30, '#ff6b6b', 'smoke');
            cust.nextCriticalFxAt = rafClock + 240;
        }
    });
    
    // 화면 밖으로 완전히 나간 손님 필터링
    customers = customers.filter(c => c.x < WIDTH + 200);

    effectParticles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= dt * 1.5;
        p.vx *= 0.98;
    });
    effectParticles = effectParticles.filter(p => p.life > 0);
}

// --- Drawing Systems ---

function drawChefFallback(x, y) {
    const breathe = Math.sin(gameTime * 2) * 2;
    ctx.save();
    ctx.translate(x, y + breathe);

    const coatGrad = ctx.createLinearGradient(-36, 0, 36, 60);
    coatGrad.addColorStop(0, '#fff8ee');
    coatGrad.addColorStop(1, '#d9cec2');
    ctx.fillStyle = coatGrad;
    ctx.beginPath(); ctx.roundRect(-38, 0, 76, 64, 14); ctx.fill();
    ctx.strokeStyle = '#bcae9d'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.fillStyle = '#b33939';
    ctx.beginPath(); ctx.moveTo(-38, 12); ctx.lineTo(38, 12); ctx.lineTo(0, 34); ctx.closePath(); ctx.fill();

    const faceGrad = ctx.createRadialGradient(-2, -18, 4, 0, -6, 34);
    faceGrad.addColorStop(0, '#ffdcb4'); faceGrad.addColorStop(1, '#d6a574');
    ctx.fillStyle = faceGrad;
    ctx.beginPath(); ctx.arc(0, -8, 30, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.roundRect(-31, -72, 62, 38, 13); ctx.fill();
    ctx.strokeStyle = '#ece4d8'; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0, -72, 37, 19, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#3b2618';
    ctx.beginPath();
    ctx.moveTo(-18, -4); ctx.quadraticCurveTo(0, 8, 18, -4); ctx.quadraticCurveTo(0, 20, -18, -4); ctx.fill();

    ctx.fillStyle = '#241711';
    ctx.beginPath(); ctx.arc(-11, -20, 3.5, 0, Math.PI * 2); ctx.arc(11, -20, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-12, -21, 1.1, 0, Math.PI * 2); ctx.arc(10, -21, 1.1, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#2f1f14';
    ctx.beginPath();
    ctx.moveTo(-15, 0); ctx.quadraticCurveTo(0, 8, 15, 0); ctx.quadraticCurveTo(0, 15, -15, 0); ctx.fill();

    ctx.fillStyle = '#f7ede1';
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.roundRect(i * 14 - 4, 20, 8, 24, 2);
        ctx.fill();
    }
    
    ctx.restore();
}

function drawChef(x, y) {
    const chefImg = loadedImages.chef;
    if (chefImg) {
        const breathe = Math.sin(gameTime * 2) * 2;
        ctx.drawImage(chefImg, x - 80, y - 90 + breathe, 160, 160);
        return;
    }
    drawChefFallback(x, y);
}

function draw() {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    
    const bgImg = loadedImages.background;
    if (bgImg) {
        ctx.drawImage(bgImg, 0, 0, WIDTH, HEIGHT);
    } else {
        ctx.fillStyle = "#1a0f0a"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2;
        for(let i=0; i<WIDTH; i+=60) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, HEIGHT); ctx.stroke();
        }
    }

    const headerTexture = loadedImages.headerTexture;
    if (headerTexture) {
        ctx.drawImage(headerTexture, 0, 0, WIDTH, 110);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(0, 0, WIDTH, 110);
    } else {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, WIDTH, 110);
    }
    drawChef(WIDTH/2 - 200, 75);

    ctx.fillStyle = "#ff9f43";
    ctx.font = "900 36px Pretendard";
    ctx.fillText(gold.toLocaleString(), 60, 80);
    ctx.font = "bold 13px Pretendard";
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.fillText("REVENUE COLLECTED", 60, 42);

    const tX = WIDTH / 2 - 80;
    const tY = 60;
    const timerFillX = tX + 4;
    const timerFillY = tY + 11;
    const timerFillW = 152;
    const timerFillH = 16;
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(timerFillX, timerFillY, timerFillW, timerFillH);
    const tGrad = ctx.createLinearGradient(timerFillX, 0, timerFillX + timerFillW, 0);
    tGrad.addColorStop(0, "#ff9f43");
    tGrad.addColorStop(1, "#ff6b6b");
    ctx.fillStyle = tGrad;
    ctx.fillRect(timerFillX, timerFillY, timerFillW * (turnTimer / 2), timerFillH);
    const timerFrame = loadedImages.timerFrame;
    if (timerFrame) {
        ctx.drawImage(timerFrame, tX - 16, tY, 200, 38);
    } else {
        ctx.strokeStyle = "rgba(255,220,170,0.5)";
        ctx.lineWidth = 2;
        ctx.strokeRect(timerFillX - 2, timerFillY - 2, timerFillW + 4, timerFillH + 4);
    }

    ctx.save();
    ctx.shadowBlur = 40; ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.fillStyle = "#2d1e12";
    ctx.beginPath(); ctx.roundRect(GRID_START_X - 18, GRID_START_Y - 18, (TILE_SIZE + SPACING) * GRID_SIZE + 24, (TILE_SIZE + SPACING) * GRID_SIZE + 24, 25); ctx.fill();
    ctx.restore();

    for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
        const col = i % GRID_SIZE; const row = Math.floor(i / GRID_SIZE);
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.roundRect(GRID_START_X + col * (TILE_SIZE + SPACING), GRID_START_Y + row * (TILE_SIZE + SPACING), TILE_SIZE, TILE_SIZE, 15); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.03)"; ctx.stroke();
    }

    grid.forEach(it => { if (it && !it.isAnimating) drawItem(it.level, it.getPos().x, it.getPos().y, it.scale); });
    animations.forEach(a => {
        const x = a.startPos.x + (a.endPos.x - a.startPos.x) * a.progress;
        const y = a.startPos.y + (a.endPos.y - a.startPos.y) * a.progress;
        drawItem(a.level, x, y, a.type === 'merge' ? 1.15 : 1.0);
    });

    effectParticles.forEach(p => {
        ctx.globalAlpha = p.life;
        const particleSprite = generatedSprites.particles[p.kind] || generatedSprites.particles.cheese;
        const size = p.size * 4;
        if (particleSprite) {
            ctx.drawImage(particleSprite, p.x - size / 2, p.y - size / 2, size, size);
        } else {
            ctx.fillStyle = p.color; ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        }
    });
    ctx.globalAlpha = 1;

    // 퇴장 중인 손님을 나중에 그려서 우선순위 확보
    customers.forEach(c => c.draw());
    
    if (currentState === GameState.OVER) drawGameOver();
}

function drawItemFallback(level, x, y, scale) {
    const data = PIZZA_DATA[level - 1]; if (!data) return;
    const cx = x + TILE_SIZE / 2; const cy = y + TILE_SIZE / 2;
    const r = (TILE_SIZE / 2 - 10) * scale;

    ctx.save();
    ctx.shadowBlur = 14 * scale; ctx.shadowColor = 'rgba(0,0,0,0.45)'; ctx.shadowOffsetY = 6 * scale;
    const boardGrad = ctx.createRadialGradient(cx - r / 4, cy - r / 3, r / 8, cx, cy, r);
    boardGrad.addColorStop(0, data.color);
    boardGrad.addColorStop(1, data.detail);
    ctx.fillStyle = boardGrad;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    if (level >= 3) {
        ctx.strokeStyle = '#b7702f';
        ctx.lineWidth = 4 * scale;
        ctx.beginPath();
        ctx.arc(cx, cy, r - 2 * scale, 0, Math.PI * 2);
        ctx.stroke();
    }

    if (level <= 2) {
        ctx.fillStyle = level === 1 ? '#f5e4c5' : '#c73d36';
        ctx.beginPath();
        ctx.roundRect(cx - 22 * scale, cy - 15 * scale, 44 * scale, 30 * scale, 10 * scale);
        ctx.fill();
    }

    if (level >= 3) {
        const cheeseGrad = ctx.createRadialGradient(cx, cy - 6 * scale, 2, cx, cy, r - 8 * scale);
        cheeseGrad.addColorStop(0, '#ffe27a');
        cheeseGrad.addColorStop(1, '#f3b72e');
        ctx.fillStyle = cheeseGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, r - 7 * scale, 0, Math.PI * 2);
        ctx.fill();
    }

    if (level >= 4) {
        ctx.fillStyle = '#a3372c';
        for (let i = 0; i < 5; i++) {
            const ang = (Math.PI * 2 * i) / 5;
            ctx.beginPath();
            ctx.arc(cx + Math.cos(ang) * r * 0.45, cy + Math.sin(ang) * r * 0.4, 6 * scale, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    if (level >= 5) {
        ctx.fillStyle = '#8b6a52';
        for (let i = 0; i < 4; i++) {
            const ang = (Math.PI * 2 * i) / 4 + 0.4;
            ctx.beginPath();
            ctx.ellipse(cx + Math.cos(ang) * r * 0.28, cy + Math.sin(ang) * r * 0.3, 5 * scale, 3.5 * scale, ang, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    if (level >= 6) {
        ctx.fillStyle = '#1f1f24';
        for (let i = 0; i < 3; i++) {
            const ang = (Math.PI * 2 * i) / 3 + 0.7;
            ctx.beginPath();
            ctx.arc(cx + Math.cos(ang) * r * 0.22, cy + Math.sin(ang) * r * 0.26, 4 * scale, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    if (level >= 7) {
        ctx.strokeStyle = '#2f8c43';
        ctx.lineWidth = 2 * scale;
        for (let i = 0; i < 4; i++) {
            const ang = (Math.PI * 2 * i) / 4 + 0.2;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(ang) * r * 0.1, cy + Math.sin(ang) * r * 0.1);
            ctx.quadraticCurveTo(cx + Math.cos(ang + 0.2) * r * 0.25, cy + Math.sin(ang + 0.2) * r * 0.25, cx + Math.cos(ang) * r * 0.45, cy + Math.sin(ang) * r * 0.45);
            ctx.stroke();
        }
    }

    if (level >= 8) {
        ctx.strokeStyle = 'rgba(255, 136, 62, 0.65)';
        ctx.lineWidth = 3 * scale;
        ctx.beginPath();
        ctx.arc(cx, cy, r - 12 * scale, Math.PI * 0.2, Math.PI * 0.8);
        ctx.stroke();
    }

    if (level >= 9) {
        ctx.fillStyle = 'rgba(255, 218, 127, 0.35)';
        ctx.beginPath();
        ctx.arc(cx, cy, r - 15 * scale, 0, Math.PI * 2);
        ctx.fill();
    }

    if (level === 10) {
        const shine = ctx.createLinearGradient(cx-r, cy-r, cx+r, cy+r);
        shine.addColorStop(0, "rgba(255,255,255,0)");
        shine.addColorStop(0.5, "rgba(255,255,255,0.32)");
        shine.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = shine; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    }

    ctx.fillStyle = data.textColor;
    ctx.font = `900 ${Math.max(8, 8.5 * scale)}px Pretendard`;
    ctx.textAlign = "center";
    ctx.fillText(data.name.split(' ')[0], cx, cy + 31 * scale);
    ctx.restore();
}

function drawItem(level, x, y, scale) {
    const itemImg = loadedImages[`item-${level}`];
    if (itemImg) {
        const size = 128 * scale;
        const centerX = x + TILE_SIZE / 2;
        const centerY = y + TILE_SIZE / 2;
        ctx.save();
        ctx.shadowBlur = 12 * scale;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowOffsetY = 6 * scale;
        ctx.drawImage(itemImg, centerX - size / 2, centerY - size / 2, size, size);
        ctx.restore();
        return;
    }
    drawItemFallback(level, x, y, scale);
}

function getCustomerStatusIcon(customer) {
    if (!customer) return null;
    if (customer.isLeaving) return 'leave';
    if (!Array.isArray(customer.requirements) || customer.requirements.length === 0) return null;
    if (customer.hunger >= 80) return 'warning';
    return 'ok';
}

function drawStatusIcon(iconType, x, y) {
    if (!iconType) return;

    const iconRadius = 13;
    const centerX = x + iconRadius;
    const centerY = y + iconRadius;
    const iconStyleMap = {
        warning: { bg: '#f39c12', stroke: '#7a4a00', symbol: '#ffffff', text: '!' },
        leave: { bg: '#e74c3c', stroke: '#6e140c', symbol: '#ffffff', text: '↗' },
        ok: { bg: '#2ecc71', stroke: '#0b5f2d', symbol: '#ffffff', text: '✓' }
    };

    const style = iconStyleMap[iconType];
    if (!style) return;

    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.fillStyle = style.bg;
    ctx.beginPath();
    ctx.arc(centerX, centerY, iconRadius, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.strokeStyle = style.stroke;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = style.symbol;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = "bold 14px Pretendard";
    ctx.fillText(style.text, centerX, centerY + (iconType === 'warning' ? 0.5 : 0));
    ctx.restore();
}

function drawGameOver() {
    ctx.fillStyle = "rgba(0,0,0,0.9)";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    const frameW = 700;
    const frameH = 320;
    const frameX = WIDTH / 2 - frameW / 2;
    const frameY = HEIGHT / 2 - frameH / 2;
    const gameoverFrame = loadedImages.gameoverFrame;

    if (gameoverFrame) {
        ctx.drawImage(gameoverFrame, frameX, frameY, frameW, frameH);
    } else {
        ctx.fillStyle = "rgba(45,30,18,0.95)";
        ctx.beginPath();
        ctx.roundRect(frameX, frameY, frameW, frameH, 30);
        ctx.fill();
        ctx.strokeStyle = "#ff9f43";
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    ctx.textAlign = "center";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "rgba(255, 71, 87, 0.5)";
    ctx.fillStyle = "#ff4757";
    ctx.font = "900 70px Pretendard";
    ctx.fillText("UNDEAD RIOT!", WIDTH / 2, frameY + 128);

    ctx.shadowBlur = 0;
    ctx.fillStyle = "#f8efe2";
    ctx.font = "20px Pretendard";
    ctx.fillText("The hungry horde breached the kitchen!", WIDTH / 2, frameY + 196);

    ctx.fillStyle = "#ffb24a";
    ctx.font = "bold 24px Pretendard";
    ctx.fillText(`KITCHEN REOPENING IN ${Math.ceil(restartCountdown)}s`, WIDTH / 2, frameY + 256);
}

function loop(time) { update(time); draw(); requestAnimationFrame(loop); }

window.addEventListener('resize', setupCanvasResolution);
loadAssets();

</script>
